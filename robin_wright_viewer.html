s he battles the communist witch hunt. In Her Shoes: Estranged sisters (Cameron Diaz and Toni Collette) reconnect with help from a mystery grandma (Shirley MacLaine). Curtis Hanson directs. Kiss Kiss, Bang Bang: Robbery gone awry gives a thief (Robert Downey Jr.) a movie audition and a lesson in sleuthing with a detective (Val Kilmer). The Legend of Zorro: The masked swordsman (Antonio Banderas) and his wife (Catherine Zeta-Jones) are back in action in this swashbuckling sequel. Nine Lives: Crises of nine disparate women are examined. With Holly Hunter, Glenn Close, Sissy Spacek and Robin Wright Penn. North Country: A single mother (Charlize Theron) leads a sexual-harassment crusade on behalf of female co-workers at a mining company. Prime: A 30-something divorcee (Uma Thurman) takes up with a young painter. Meryl Streep co-stars. Protocols of Zion: Documentary filmmaker Marc Levin examines a backlash of anti-Semitism that followed the Sept. 11 attacks. Saw II: A cop (Donnie Wahlberg) discovers that a maniacal serial killer is back in business in the follow-up to last year's horror hit. Shopgirl: A Saks clerk (Claire Danes) is wooed by an older man (Steve Martin) and a younger suitor (Jason Schwartzman). Based on Martin's novella. The Squid and the Whale: Marriage and parenthood are on the rocks between two Brooklyn writers (Jeff Daniels and Laura Linney). Stay: A psychiatrist races to prevent a patient from making good on a threat to commit suicide. With Ewan McGregor and Naomi Watts. Two for the Money: Al Pacino, Rene Russo and Matthew McConaughey star in the tale of an ex-athlete who enters the high-rolling sports gambling world. Wallace & Gromit: The Curse of the Were-Rabbit: Britain's favorite cheese-lover and his loyal dog square off against a monster bunny in this clay-animated comedy. The Weather Man: A local weather guy (Nicolas Cage) wins a national TV audition but faces storm clouds in his personal life. Michael Caine co-stars. Where the Truth Lies: A reporter (Alison Lohman) probes the dark secrets behind the breakup of a musical-comedy duo (Kevin Bacon and Colin Firth). Atom Egoyan directs. November Bee Season: An overlooked daughter is thrown into the limelight when she becomes a spelling champ. With Richard Gere and Juliette Binoche. Breakfast on Pluto: A cross-dressing Irish misfit (Cillian Murphy) hunts for the mother who abandoned him as a baby. Neil Jordan directs, Liam Neeson co-stars. Chicken Little: The sky is really, really falling in an animated tale of the chick who cried wolf. Zach Braff heads the voice cast. Derailed: Business execs having an affair (Jennifer Aniston and Clive Owen) square off against a blackmailer. Dying for Dolly: A club DJ (Usher) falls for the daughter of the crime boss (Chazz Palminteri) whose life he saved. The Dying Gaul: A writer (Peter Sarsgaard) lands in a bizarre triangle with a studio exec (Campbell Scott) and his wife (Patricia Clarkson). Ellie Parker: A wannabe actress (Naomi Watts) gallops through auditions and disappointments in Hollywood. With Chevy Chase. The Family Stone: A Manhattan career woman (Sarah Jessica Parker) gets a cold reception from her fiance's family. With Diane Keaton, Luke Wilson. Get Rich or Die Tryin': Rapper 50 Cent stars as a street punk who abandons drug dealing for music. Jim Sheridan directs. Harry Potter and the Goblet of Fire: A sorcery competition puts wiz kid Harry (Daniel Radcliffe) in the clutches of dark Lord Voldemort (Ralph Fiennes). The Ice Harvest: Yuletide turns dicey for an embezzler (John Cusack) stuck in Wichita on Christmas Eve. Billy Bob Thornton co-stars, Harold Ramis directs. I Love Your Work: A movie star (Giovanni Ribisi) struggles with the frenzy of celebrity. Actor Adam Goldberg directs. Jarhead: A third-generation Marine (Jake Gyllenhaal) joins a sniper platoon in the Gulf war. Jamie Foxx co-stars, Sam Mendes directs. Just Friends: A music-business hotshot (Ryan Reynolds) is reunited with his old high school dream girl. With Anna Faris and Amy Smart. The Matador: A hit man (Pierce Brosnan) and a traveling salesman (Greg Kinnear) pal around after meeting at a Mexican bar. Pride & Prejudice: Keira Knightley stars in Jane Austen's classic of love and class warfare in 18th century Britain. With Donald Sutherland and Brenda Blethyn. Rent: Addicts, transsexuals and other Manhattanites cope with poverty and AIDS in director Chris Columbus' adaptation of the stage musical. With Rosario Dawson and Taye Diggs. Syriana: George Clooney is an ex-CIA guy and Matt Damon is an oil exec in this political thriller with a \"Traffic\"-like ensemble cast. Walk the Line: Joaquin Phoenix plays the man in black, Johnny Cash, in the story of the country legend's early years. With Reese Witherspoon. The White Countess: Ralph Fiennes stars in a tale of decadence and redemption in 1930s Shanghai. From director James Ivory and his late producing partner Ismail Merchant. Wolf Creek: Three stranded backpackers encounter terror at the hands of a local on a trip in the Australian Outback. Zathura: Two young brothers discover a game that transports them into an interstellar adventure. Actor Jon Favreau directs. Copyright, 2005, (c) Times Union. All Rights Reserved."}, {"article_id": "261464066", "match_score": 87.35177865612648, "source": "Daily Herald (Arlington Heights, IL)", "date": "September 16, 2005", "window_summary": "The excerpt lists Robin Wright Penn as part of the cast of the HBO miniseries \"Empire Falls.\"", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full DVD/video roundup similarly names Robin Wright Penn among the ensemble cast of the Emmy‑nominated HBO miniseries \"Empire Falls,\" presented factually as one of the performers.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "the resilience of lifelong friends and neighbors. The show received to emmy nominations. The cast includes Aidan Quinn Helen Hunt Robin Wright Penn Philip Seymour Hoffman and the following programs Are now available on did a the Dick Cavett show the Ray", "newsbank_text": "The following video titles arrive at local stores this week: \"The Hitchhiker's Guide to the Galaxy\" @* @* @* (2005, Touchstone, 109 minutes, Rated PG, $29.99) Douglas Adams' science-fiction satire began as a radio play, then became a five-book trilogy, followed by a television serial; now, after 20 years, it's a feature film that mixes sci-fi elements with comedy, adventure and philosophy. Bewildered Brit Arthur Dent (Martin Freeman) learns that his house is about to be bulldozed by aliens who plan to destroy Earth to make way for a hyperspace bypass. Dent is saved by his friend Ford Prefect (Mos Def), who is an alien and travel-guide researcher. Arthur goes along for the ride and discovers the nature of the universe. He meets the two-faced president of the galaxy (Sam Rockwell), the beautiful Trillian (Zooey Deschanel), a depressed robot, the computer Deep Thought, a planet builder, an intergalactic preacher and many others - all while struggling to find a proper cup of tea. There are some excellent special effects. The cast includes John Malkovich, Bill Nighy, Warwick Davis, Stephen Fry, Anna Chancellor, Alan Rickman and Helen Mirren. Comedy \"Fever Pitch\" @* @* 1/2(2005, Fox, 103 minutes, Rated PG-13, $24.98; on DVD $29.98) Math teacher Ben Wrightman (Jimmy Fallon) is charming, funny, great with kids and single. Lindsey Meeks (Drew Barrymore) is a high-powered business consultant who meets Ben on a school field trip. Her friends tell her to be careful, but Lindsey falls for Ben. All goes well until spring, when Ben becomes an obsessive Boston Red Sox fan. He lives and breathes the Red Sox and puts the team ahead of Lindsey. She wants to get married, but Ben's priorities have to be straightened out. This is a fun romantic comedy, and the ride is enjoyable as Lindsey comes to realize that baseball is more than a game to Ben. You will be pulling for the couple to make it. Classic films \"Ben-Hur: Collectors Edition\" (Warner, $39.92) This epic film won 11 Academy Awards in 1959, wowing audiences with its 8,000 extras, 300 sets and 100,000 costumes. At the time, it had the biggest budget of any motion picture. The four-disc set includes: new documentaries, featurettes, outtakes, screen tests, vintage newsreels, Academy Awards ceremony footage, makeup tests, audio commentary, the 1925 feature-length silent version of \"Ben-Hur\" with a score by composer Carl Davis and more. \"The Thing: 50th Anniversary Edition\" (Warner, $14.98) Howard Hawks produced this classic, which is still considered one of the scariest films to come out of Hollywood in that era. Dimitri Tiomkin's score keeps the eerie feeling along with the suspense. A young James Arness appears as The Thing, and the transfer is terrific, with excellent audio and video quality. Special interest \"Luciano Pavarotti: The Last Tenor\" (Universal, $29.98) Luciano Pavarotti is considered the greatest tenor of his generation. This program celebrates his career and includes an intimate portrait as he says goodbye to the opera stage. We see his humble beginnings, his operatic debut and scenes from his wedding to Nicoletta Mantovani, along with interviews with family and friends. There are wonderful performances from all over the world, and the extras include 75 minutes of bonus footage along with bonus music tracks, videos and more. Drama \"Empire Falls\" @* @* @* (2005, HBO, $29.98) Adapted by Richard Russo from his Pulitzer Prize-winning novel, this HBO miniseries stars Ed Harris as Miles Roby, who runs the Empire Grill. It is a restaurant in which we see a cast of characters whose lives and histories are intertwined. The powerful Mrs. Whiting (Joanne Woodward) makes life difficult for Miles, while he has to keep on eye out for his father (Paul Newman), who likes to drink and is always getting in trouble. There are lots of secrets in the small town, and we see the resilience of lifelong friends and neighbors. The show received 10 Emmy nominations. The cast includes Aidan Quinn, Helen Hunt, Robin Wright Penn, Philip Seymour Hoffman and others. Television The following programs are now available on DVD: \"The Dick Cavett Show: The Ray Charles Collection\" (Shout, two discs, three episodes, $24.98) \"Las Vegas: Season 2\" (Universal, three discs, 24 episodes, $59.98) \"Smallville: Complete Fourth Season\" (Warner, six discs, 22 episodes, $59.98) \"Everybody Loves Raymond: Fourth Season\" (HBO, five discs, 24 episodes, $44.98) \"One Tree Hill: Second Season\" (Warner, six discs, 22 episodes, $59.98) \"SCTV: Season Five\" (Shout, six discs, 12 episodes, $89.98) \"Brady Bunch: Season Three\" (Paramount, four discs, 23 episodes, $39.98) \"Cheers: Season Six\" (Paramount, four discs, 25 episodes, $39.98) \"Frasier: Season Six\" (Paramount, four discs, 23 episodes, $39.98) \"Taxi: Season Three\" (Paramount, four discs, 20 episodes, $39.98) Copyright 2005 Daily Herald"}, {"article_id": "81863744", "match_score": 86.63793103448276, "source": "American Press (Lake Charles, LA)", "date": "February 26, 2005", "window_summary": "The archive line for Forrest Gump identifies Robin Wright as Forrest's love interest.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The TV listing for Forrest Gump states that Robin Wright plays the lead character's love interest, a straightforward casting mention with no evaluative language.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "Viet Nam War hero millionaire entrepreneur and witness to history. Sally Field co stars As Forrest s Prole live Mother Robin Wright plays his love interest and Gary Sinise portrays his reluctant buddy. Out of Africa 7 . On a Etc she", "newsbank_text": "The People Next Door A mother of three (Nicollette Sheridan) who's just fled her abusive husband finds instant friendship with her new neighbors (Tracy Ellis, Michael O'Keefe ). They're a wealthy, child-less couple who give generously of their time and money to help the struggling family. What she doesn't know is that they want something in return:her kids. Faye Dunaway also stars in this 1996 thriller. 7 PM #, Forrest Gump Tom Hanks stars in the feel-good blockbuster of 1994. Simple-minded Forrest (Hanks) takes a head-on approach to life and becomes a Vietnam War hero, millionaire entrepre-neur and witness to history. Sally Field co-stars as Forrest's protective mother, Robin Wright plays his love interest, and Gary Sinise portrays his reluctant buddy. The film won six Academy Awards. 7 PM _ $ Law & Order Four pedestrians are gunned down on a sidewalk in \" All in the Family. \" Fontana and Green (Dennis Farina, Jesse L. Martin) discover one of the victims had ties to Russian organized crime and was helping the feds. The killers are found, but issues of jurisdiction and religion make things difficult for McCoy (Sam Waterston ). Mercedes Ruehl guest stars. 7 PM (TCM) Out of Africa She had a farm in Africa and wrote about it so beautifully — under the pen name Isak Dine-sen — that filmmaker Sydney Pollack crafted this lush, romanticized biography of Danish author Karen Blixen (Meryl Streep) and her 17 years on a Kenyan plantation. Robert Red-ford stars as her love interest, Denys Finch-Hatton. The 1985 drama won seven Oscars, including best picture, best director and best original score. 7 PM (WTBS) Twister Even though the plot contains holes big enough to shoo a monster cyclone through, don't miss the terrifying and often sublime computer-generated storms in this 1996 thriller about teams of tornado chasers who vie for groundbreaking information on the violent storms. Helen Hunt and Bill Paxton are appealing in the lead roles. Cary Elwes also stars. 8 PM _ $ Law & Order:Criminal Intent The strangling of a female employee of a computer-game firm turns Goren's (Vincent D'Onofrio) attention toward her former bosses in \" F. P. S. \" The software tycoons are desper-ate to develop another successful game; their resentful ex-partner also becomes a suspect in the murder. 8 PM = America 's Most Wanted:America Fights Back In the new episode \" Without a Trace Special Edition, \" the person being sought isn't wanted for a crime; she's the possible victim of one. A popular nursery-school teacher, she was enjoying a day at the shore, painting the scenery and having lunch, when she vanished. Host John Walsh travels to the scene of her disappearance and discloses the identity of a man who may have access to the solution for this mystery. 9 PM _ $ Law & Order:Special Victims Unit In \" Identity, \" Benson and Stabler (Mariska Hargitay, Christopher Meloni) investigate what looks like a clear-cut case of retribution:a gang member pushed to his death from a roof after committing a sexual assault. But the subsequent death of the young woman (guest star Regan Thompson) whom he attacked shows the detectives that this one won't be so easy after all. Mary Stuart Masterson guest stars. Copyright 2005, 2007, American Press. All Rights Reserved."}, {"article_id": "182092057", "match_score": 84.54106280193237, "source": "Associated Press News Service, The", "date": "April 8, 2005", "window_summary": "The archive window includes Robin Wright Penn in a list of birthdays, stating she is 39. The mention is a brief factual listing.", "window_context": "personal_life", "window_tone": "neutral", "fulltext_summary": "The full article is a 'Today'/birthdays piece that lists 'Actress Robin Wright Penn is 39' among other public figures. It provides a neutral biographical note (age/profession) only.", "fulltext_context": "personal_life", "fulltext_tone": "neutral", "archive_window": "is 43. Singer Julian Lennon is 42. Singer musician Donita Sparks l7 is 42. Rapper Biz Markie is 41. Actress Robin Wright Penn is 39. Actress Patricia Arquette is 37. Clymac r \\ \\ j v j answer Here to it onto", "newsbank_text": "Today is Friday, April 8, the 98th day of 2005. There are 267 days left in the year. Today's Highlight in History: On April 8, 1974, Hank Aaron of the Atlanta Braves hit his 715th career home run in a game against the Los Angeles Dodgers, breaking Babe Ruth's record. The round-tripper was off pitcher Al Downing. On this date: In 1513, explorer Juan Ponce de Leon claimed Florida for Spain. In 1935, the Works Progress Administration was approved by Congress. In 1946, the League of Nations assembled in Geneva for the last time. In 1952, President Truman seized the steel industry to avert a nationwide strike. In 1970, the Senate rejected President Nixon's nomination of G. Harold Carswell to the U.S. Supreme Court. In 1973, artist Pablo Picasso died at his home near Mougins, France, at age 91. In 1981, Gen. Omar N. Bradley died in New York at age 88. In 1990, Ryan White, the teenage AIDS patient whose battle for acceptance gained national attention, died in Indianapolis at age 18. In 1993, singer Marian Anderson died in Portland, Ore., at age 96. In 1994, Kurt Cobain, singer and guitarist for the grunge band Nirvana, was found dead in Seattle from an apparently self-inflicted gunshot wound; he was 27. Ten years ago: Former secretary of defense Robert S. McNamara, in an interview with AP Network News and Newsweek magazine to promote his memoirs, called America's Vietnam War policy ''terribly wrong.'' Five years ago: The Central Intelligence Agency confirmed that personnel action had been taken following the mistaken bombing of the Chinese embassy during the NATO war against Yugoslavia; one employee was reportedly fired. Actress Claire Trevor died in Newport Beach, Calif. One year ago: National security adviser Condoleezza Rice told the Sept. 11 commission ''there was no silver bullet'' that could have prevented the 2001 terrorist attacks. Iraqi insurgents released a videotape of three Japanese captives, threatening to burn them alive if Japan did not withdraw its troops from Iraq. (The hostages were later released unharmed.) Fred Olivi, who copiloted the plane that dropped the atomic bomb on Nagasaki, died in Lemont, Ill., at age 82. Today's Birthdays: Former first lady Betty Ford is 87. Comedian Shecky Greene is 79. Investigative reporter Seymour Hersh is 68. Basketball Hall-of-Famer John Havlicek is 65. Singer J.J. Jackson is 64. Singer Peggy Lennon (The Lennon Sisters) is 64. Songwriter-producer Leon Huff is 63. Actor Hywel Bennett is 61. Actor Stuart Pankin is 59. Rock musician Steve Howe (Yes) is 58. Rock musician Mel Schacher (Grand Funk Railroad) is 54. Baseball Hall- of-Famer Gary Carter is 51. Actor John Schneider is 45. Rock musician Izzy Stradlin is 43. Singer Julian Lennon is 42. Rock singer-musician Donita Sparks (L7) is 42. Rapper Biz Markie is 41. Actress Robin Wright Penn is 39. Actress Patricia Arquette is 37. Rock singer Craig Honeycutt (Everything) is 35. Rock musician Darren Jessee is 34. Actor Taran Noah Smith is 21. Actress Kirsten Storms is 21. Thought for Today: ''A highbrow is a person educated beyond his intelligence.'' - James Brander Matthews, American author and educator (1852-1929). Copyright (c) 2005 The Associated Press All Rights Reserved"}, {"article_id": "435910541", "match_score": 84.375, "source": "Rocky Mountain News (Denver, CO)", "date": "October 6, 2005", "window_summary": "The archive window is a light list of celebrity baby names that credits Robin Wright and Sean Penn with naming a child 'Hopper.'", "window_context": "family", "window_tone": "neutral", "fulltext_summary": "The full column's humorous/curiosity list of celebrity baby names includes 'Robin Wright and Sean Penn — Hopper,' portraying Wright in the context of family/child-naming trivia without evaluative comment.", "fulltext_context": "family", "fulltext_tone": "neutral", "archive_window": "Rhames — “Rainbow” and “Freedom” 2. Victoria and David Beckham — “Brooklyn” and “Romeo” 3. Erykah Badu — “Puma” 4. Robin Wright and Sean Penn — “Hopper” 5. Gary Oldman — “Gulliver” 6. F rank and Gail Zappa — “Diva Muffin” 7.", "newsbank_text": "WACKY QUESTIONS What is the song in the Cingular commercial with a guy in a convertible in San Francisco? The song is about a man from Nazareth with no place to lay his head. That's The Weight, performed by The Band and written by Robbie Robertson. Here's the first verse: I pulled into Nazareth, was feeling 'bout half past dead I just need some place where I can lay my head \"Hey, Mister, can you tell me, where a man might find a bed?\" He just grinned and shook my hand, \"No\" was all he said. Have a stumper? Call the Wacky Questions Research Center, 303-892-5225, or e-mail rudeenm@RockyMountainNews.com. Wacky Questions appears Monday through Friday in Spotlight. NO KIDDING What the hip named their kids * Ving Rhames - Rainbow and Freedom * Victoria and David Beckham - Brooklyn and Romeo * Erykah Badu - Puma * Robin Wright and Sean Penn - Hopper * Gary Oldman - Gulliver * Frank and Gail Zappa - Diva Muffin * Jason Lee - Pilot Inspektor Source: World Features Syndicate LETTERMAN Top 10 signs that your Supreme Court pick isn't qualified 10 Lost 10 grand last weekend in the \"case\" of Jets v. Ravens. 9 Spends most of her time trying to fit the gavel into her mouth. 8 Her legal mentor: Oliver Wendell Redenbacher. 7 Asks courtroom stenographer to \"Quit that annoying tapping.\" 6 Instead of constitutional law books, consults set of Garfield paperbacks. 5 Keeps shouting, \"When does mama get to hang somebody?\" 4 When Scalia walks by, she pretends to cough and says, \"Rogaine.\" 3 Authored the book I'm Not Qualified to Be a Supreme Court Justice. 2 The closest thing to courtroom experience was being an extra on Matlock. 1 Glowing letter of recommendation from former FEMA director Michael Brown. Donated to the Denver Public Library by the Rocky Mountain News, under the permission of the City and County of Denver, other rights reserved. Copyright © 2005 Rocky Mountain News. All Rights Reserved."}, {"article_id": "269973076", "match_score": 83.40248962655602, "source": "American Press (Lake Charles, LA)", "date": "May 26, 2005", "window_summary": "The archive excerpt mentions Robin Wright Penn as one of the cast members of the HBO production (Empire Falls).", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full article (AP piece about Paul Newman and Empire Falls) lists Robin Wright Penn among the 'stellar cast' of the HBO adaptation, noting her role as a cast member alongside other well-known actors.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "off to Florida with a senile priest. Other members of the cast include de Harris Philip Seymour Hoffman Helen Hunt Robin Wright Penn Aidan Quinn a and Newman a wife Joanne Woodward. Dear unsupervised kids in hotels create havoc for the staff", "newsbank_text": "LOS ANGELES (AP) — \" I wish I was 79 again, \" quips Paul Newman, who turned 80 in January. He's far from being retired. His food company, Newman's Own, has donated $200 million in lifetime profits to charity. He supports the Hole in the Wall Camps, which provide outdoor vacations for terminally ill children (the name comes from the \" Butch Cassidy and the Sundance Kid \" hideout ). He owns an auto racing team that will compete this year in Australia, South Korea and Argentina. And, oh yes, Newman is still doing what he does best — acting. He appears on HBO on Saturday and Sunday in \" Empire Falls \" (8 p.m. CDT ), a film based on the Pulitzer Prize-winning novel by Richard Russo, who also wrote the script. Empire Falls, Maine, is a crumbling town that once thrived with clothing mills. The hangers-on comprise a rich mix of families whose secrets and failings provide the drama as well as some light touches. Newman plays Max Roby, the wily and irreverent patriarch of one of those families, whose unkempt beard is reputed to be littered with cracker crumbs. Newman gets fifth billing and disappears for a long stretch when Max runs off to Florida with a senile priest. Other members of the cast include Ed Harris, Philip Seymour Hoffman, Helen Hunt, Robin Wright Penn, Aidan Quinn — and Newman's wife, Joanne Woodward, in a rare villainess role as the heiress who wields malevolent power over some of the town's residents. Having also played an old-timer in the adaptation of another Russo novel, \" Nobody's Fool, \" Newman read \" Empire Falls \" with more than the usual interest. \" An extraordinary book, \" the actor said in an interview. \" I know there was a lot of interest in making like a two- hour film out of it, and I thought that would truncate all the values in it. It had to be done in a longer format. No major studio 1 wants to make a 3- hour, 3/2-hour film. \" HBO had no such qualms. As an executive producer, Newman helped line up the stellar cast, and he insisted that \" Empire Falls \" be shot in Maine. \" That's where it was set in the mind of Russo, and that's where we shot it, \" he said. \" We would have saved a little money by going to Canada, but I think the film would have suffered. And I think there's an obligation whenever it's possible that we should shoot here in the United States. \" One of the first Method actors to become a movie star, Newman is a stickler for realism. He grew a vagrant-style beard for the role of Max, but it didn't last long. \" Joanne made me shave the homeless part off first. Then she got the rest of it; I should really say while I was sleeping, \" he joked during a telephone chat from his home in Westport, Conn. \" She was not enamored with it. \" Copyright 2005, 2007, American Press. All Rights Reserved."}, {"article_id": "229267636", "match_score": 83.2512315270936, "source": "American Press (Lake Charles, LA)", "date": "May 28, 2005", "window_summary": "The archive excerpt names Robin Wright (credited as Robin Wright Penn) as one of the stars of the miniseries Empire Falls.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The TV listing/preview for Empire Falls explicitly lists Robin Wright Penn among the principal cast alongside Helen Hunt and Joanne Woodward.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "Miles Roby de Harris who try As he might can to shake his ties to the old Hometown. Helen Hunt Robin Wright Penn and Joanne Woodward also Star. Part 2 airs sunday. A a of Cotterjr medic As seen my to Usa", "newsbank_text": "6 PM (FX) NASCAR Racing For the second consecutive Saturday, there is racing under the lights at Lowe's Motor Speedway in Concord, N. C., home this week to the Busch CarQuest Auto Parts 300. Kyle Busch turned in a dominating performance in this race last year, leading for 92 of 200 laps before it ended under caution with two laps to go. The win was Busch's second in three races. 7 PM & * NCIS A dead civilian is found on a Marine firing range, which leads to the discovery that the Mafia has been using the site as a dumping ground for years. When the victim is identified as an undercover FBI agent, Gibbs '( Mark Harmon) counterpart in the bureau, Agent Fornell (guest star Joe Spano ), is accused of spying for the mob. Sasha Alexander and David McCallum also star in \" The Bone Yard. \" 7 PM _ $ The Patriot Colonial plantation owner and French and Indian War veteran Benjamin Martin (Mel Gibson) has no interest in the fight for independence from the British. He certainly doesn't want his oldest son (Heath Ledger) to join the rebellion, but he can't stop him. When a British colonel captures the youth and kills his brother, Dad becomes the redcoats 'worst nightmare. 7 PM = Cops Police crack down on Mardi Gras in the first of two episodes from — where else? — New Orleans. Among those getting in trouble are a transsexual with a breast exposed and a man who flashes something other than his chest in an attempt to score some beads. Officers also bust a couple who have decided to have their own party for two... in public. 8 PM & * Cold Case Lilly (Kathryn Morris) and her team reopen a murder case that brings back painful memories for those who survived the \" red scare \" of the 1950 s. Orson Bean (\" Dr. Quinn, Medicine Woman\") guest stars in \" Red Glare \" as a man suspected of having communist sympathies. It's a role to which Bean can relate, having been on the Hollywood blacklist in real life. 8 PM (TLC) America 's Ugliest Bedroom Three Los Angeles families are in the running for the questionable honor in this latest \" America's Ugliest \" special. Designer Doug Wilson chooses the one bedroom he deems most in need of improvement and gives it a total makeover. After all, the room you spend a third of your life in should be attractive, even if you do spend much of that time in it unconscious. 8 PM (HBO) Empire Falls Paul Newman, an Oscar nominee for his work in 1994 's \" Nobody's Fool, \" stars in another adapta-tion of a Richard Russo novel. Like \" Fool, \" this two-part comedy-drama is set in a weary, past-its-prime Northeastern town. Newman plays the busybody father of restaurateur Miles Roby (Ed Har-ris ), who, try as he might, can't shake his ties to the old hometown. Helen Hunt, Robin Wright Penn and Joanne Woodward also star. Part 2 airs Sunday. 8 PM (SHOW) Laugh Whore Comedian Mario Cantone (\" Sex and the City, \" \" Love! Valour! Compassion! \") brings his one-man Broadway show to television in this new special. In addition to funny bits on New York cabbies, his Italian-American upbringing and the relationship dynamics of a kids Christmas special, Cantone impersonates Cher, Liza Minnelli and other divas, and shows off his own song stylings. 10 PM = Mad TV Guest star Nicole Richie (\" The Simple Life\") portrays Kelly Ripa in a shampoo commercial parody that also features Nicole Parker as Sarah Jessica Parker and Danielle Gaither as Vienetta Jones. Parker also plays Kelly Clarkson in a sendup of the \" American Idol \" winner's video \" Since U Been Gone, \" with Michael McDonald as \" Idol \" judge Simon Cowell. Musical guest the Donnas perform. Copyright 2005, 2007, American Press. All Rights Reserved."}, {"article_id": "259115095", "match_score": 83.1896551724138, "source": "Washington Times, The (DC)", "date": "February 10, 2005", "window_summary": "The archive excerpt notes that Robin Wright wrote a Washington Post piece suggesting Iraq's elections helped U.S.-Europe relations begin to improve.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full article cites Robin Wright as a Washington Post foreign-policy reporter whose analysis linked Iraq's elections to a warming of relations between the United States and key European allies; she is presented as an authoritative reporting source.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "beginning to make up after two years of bitterly strained relations Over the . Invasion of Iraq a the posts Robin Wright wrote recently. Rice a whirlwind debut across Europe and the Middle East As Bush a new Secretary of state timed", "newsbank_text": "The success of Iraq's first democratic elections in more than 50 years has led to greater geopolitical gains than anyone imagined - uniting the Iraqi factions sooner than expected, while improving U.S. relations in Europe. As Iraqi officials prepared to announce the voting results on Thursday, which will create a National Assembly that will choose new government leaders and write a constitution - it's worth taking a moment to fully digest the breathtaking changes that quickly followed Iraq's historic elections. Even amid escalating terror by the antidemocracy insurgents, the conciliatory overtures between the various Iraqi factions, the Shi'ite majority and Sunni Arab minority, suggest a new birth of national unity is flowing from the elections that, if it holds up, will strengthen the future government. \"We are hearing some positive remarks coming from their [Sunni] side,\" said Finance Minister Adel Abdel-Mehdi, a key Shi'ite prime ministerial candidate. \"That's very good. We are encouraging them. We are really willing to offer the maximum.\" It was a grand gesture to bring the minority Sunni Arab groups into the government-creating process, after many Sunni leaders boycotted the elections, but thought better when they saw the huge numbers of Iraqis, including Sunnis, who voted. President Bush instructed us and the rest of the world in his State of the Union address not to underestimate the force of freedom to move people toward democratic reform. And we are witnessing that now in Iraq, where even embittered, anti-occupation factions are gradually coming forward after the election they shunned to say they want to take part in creating a new government. The Association of Muslim Scholars, one of these key groups, now says it will abide by the election's results. It is reported that 13 parties in the Sunni factions want to participate writing the constitution. Bowing to the will of the people (as expressed at the ballot box), Tariq Hashemi, secretary-general of the Sunni-led Iraqi Islamic Party, which withdrew from the elections, now humbly says, \"We should respect the choice of the Iraqi people.\" In the postwar violence after the U.S.-led invasion that toppled Saddam Hussein's regime, critics of Mr. Bush's daring policy to plant a new democracy in Baghdad questioned if religious factions, separated by centuries of bitter rivalries, could ever be brought together to form a new national government. But Mr. Hashemi said Saturday \"drafting of the constitution is a very important issue for all Iraqis, and we have to be very clear on that. We will have a role, we will play a role.\" After months of pessimistic news dispatches that saw nothing but division, death and chaos in Iraq's future, this past week's postelection reports from Baghdad suggest \"that the vote may have created a new dynamic,\" reported The Washington Post. Meanwhile, European capitals, where once were found the loudest critics of U.S. war policies in Iraq, are hailing the democratic victory there and grudgingly acknowledging that Mr. Bush's antiterrorism offensive is bearing much fruit. In Berlin, German Chancellor Gerhard Schroeder, a chief Bush critic on Iraq, was suddenly singing a different tune to reporters during Secretary of State Condoleezza Rice's visit. \"Irrespective of what one thought about the military intervention in Iraq in the first place,\" Germany is \"strongly ready ... to help Iraq to get toward this stable and hopefully democratic development,\" he said. Germany's postelection change of heart is seen elsewhere too. \"Courtesy of the large turnout in Iraq's election a week ago, the United States and key European allies are beginning to make up after two years of bitterly strained relations over the U.S. invasion of Iraq,\" The Post's Robin Wright wrote Sunday. Miss Rice's whirlwind debut this week across Europe and the Middle East as Mr. Bush's new secretary of state, timed to follow the Iraqi elections, has been the focal point of this warming trend between the U.S. and its critics. \"What we're hearing from Europe is a desire to move on to the next chapter in the history of this great alliance,\" she said in Warsaw. Britain's Independent newspaper said the political success of the Iraqi elections is the catalyst changing Europe's mood toward the United States. \"Iraqis go to vote ... and the U.S. and Europe suddenly cannot get enough of each other's company,\" the newspaper said. Had the Iraqis stayed home in large numbers, instead of turning out in droves to vote, defying the terrorists' threats to \"bathe the streets in blood,\" Europe's whiners and bellyachers would no doubt be saying, \"We told you so.\" But in two back-to-back elections, one here and one in Iraq, Mr. Bush has proven his war critics wrong on both sides of the Atlantic, winning a strong vote of confidence in each case. Now comes the hard part for the Iraqis: building a democracy that will stand the test of time. Donald Lambro, chief political correspondent of The Washington Times, is a nationally syndicated columnist. Copyright 2005 News World Communications, Inc."}, {"article_id": "326435436", "match_score": 83.1615120274914, "source": "Times Reporter, The (New Philadelphia, OH)", "date": "February 12, 2005", "window_summary": "The archive excerpt lists Robin Wright (noted as 'Robin Wright (Deb) of Warsaw') among surviving relatives in a funeral/obituary notice.", "window_context": "family", "window_tone": "neutral", "fulltext_summary": "The full obituary names Robin Wright (Deb) of Warsaw as one of the surviving relatives of Burton Earl Zimmerman, simply identifying her as a family member in the survivors list.", "fulltext_context": "family", "fulltext_tone": "neutral", "archive_window": "Art Zimmerman Diane Alabama Robert Zimmerman Jeanne Virginia Elmer Zimmerman Kim Columbiana o., Frank Zimmerman Melley Pennsylvania Kevin Wright Coshocton Robin Wright Deb Warsaw Douglas Wright Kathy Baltic Dan Miller Jane Stone Creek three nieces Nancy Lahmers Dave newcomer town Kathy Karr", "newsbank_text": "Burton Earl Zimmerman, age 79, of 57426 County Rd. 2, Fresno, O., passed away at 3:23 p.m. Thursday, Feb. 10, 2005, at Coshocton County Memorial Hospital. He was born in Adams Township, Coshocton County, on Oct. 20, 1925, to the late Charles and Mildred (Deibel) Zimmerman. Burton was a 1943 graduate of Fresno High School and was a lifelong farmer. He was a member of the Fresno United Methodist Church, Progressive Valley Grange for 65 years, Coshocton County Fair Board for 30 years, and Junior Fair Board for three years. On Aug. 29, 1954, he married Betty I. (Wright) Zimmerman who survives. Also surviving are 11 nephews, Frederick Zimmerman (Nancy) of Newcomerstown, Charles Zimmerman (Pat) of Troy, O., Donald Zimmerman (Carol) of Lowellville, O., Art Zimmerman (Diane) of Alabama, Robert Zimmerman (Jeanne) of Virginia, Elmer Zimmerman (Kim) of Columbiana, O., Frank Zimmerman (Melley) of Pennsylvania, Kevin Wright (Pam) of Coshocton, Robin Wright (Deb) of Warsaw, Douglas Wright (Kathy) of Baltic, Dan Miller (Jane) of Stone Creek; three nieces, Nancy Lahmers (Dave) of Necomerstown, Kathy Karr (Ward) of Coshocton, Mary Mullet (Steve) of Fresno; two sisters-in- law, Hazel Zimmerman of Fresno, Mary Zimmerman of Lowellville; one brother-in-law Lyman Wright (Janet) of Coshocton. He was preceded in death by two brothers, Wayne Zimmerman and Delbert Zimmerman. Funeral services will be held Monday, Feb. 14, at 11 a.m. at the Fresno United Methodist Church with Pastor Susan Stevens officiating. Burial will follow in Fairfield Cemetery, West Lafayette. Friends may call at Given-Dawson Funeral Home at Coshocton from 2 to 5 p.m., Sunday, Feb. 13, and for one hour prior to the service on Monday at the church. For those who wish, contributions may be made to Fresno United Methodist Church, Memorial Fund, Fresno, O., 43824. Given-Dawson (740) 622-1711 Copyright (c) 2005 The Times Reporter"}, {"article_id": "171814549", "match_score": 82.95964125560538, "source": "Post-Star, The (Glens Falls, NY)", "date": "December 16, 2005", "window_summary": "The excerpt says one of the best stories in the film collection involves Robin Wright Penn opposite Jason Isaacs, highlighting their characters' emotional encounter.", "window_context": "career", "window_tone": "positive", "fulltext_summary": "Roger Ebert's full piece praises the segment starring Robin Wright Penn (in Nine Lives), describing it as the collection's best story and commending the tender, truthful moments the actors convey.", "fulltext_context": "career", "fulltext_tone": "positive", "archive_window": "that each scene is told in one although they will sense the tangible passage of real the Best Story involves Robin Wright Perm and Jason Isaacs As two former now married to she who meet by Chance in a supermarket and during", "newsbank_text": "Roger Ebert How in the world can anyone think it was a bad year for the movies when so many were wonderful, a few were great, a handful were inspiring, and there were scenes so risky you feared the tightrope might break? If none of the year's 10 best had been made, I could name another 10 and no one would wonder at the choices. There were a lot of movies to admire in 2005. The year's 10 best films: 1. \"Crash.\" Much of the world's misery is caused by conflicts of race and religion; Paul Haggis' film, written with Robert Moresco, uses interlocking stories to show we are in the same boat, that prejudice flows freely from one ethnic group to another. His stories are a series of contradictions in which the same people can be sinned against or sinning. There was once a simple morality formula in America in which white society was racist and blacks were victims, but that model is long obsolete. Now many more players have entered the game: Latinos, Asians, Muslims, and those defined by sexual orientation, income, education or appearance. America is a nation of minority groups, and we get along with each other better than many societies that criticize us; France has recently been reminded of that. We are all immigrants here. What is wonderful about \"Crash\" is that it tells not simpleminded parables, but textured human stories based on paradoxes. Not many films have the possibility of making their viewers better people; anyone seeing it is likely to leave with a little more sympathy for people not like themselves. The film opened quietly in May and increased its audience week by week, as people told each other they must see it. 2. \"Syriana.\" Stephen Gaghan's film doesn't reveal the plot, but surrounds us with it. Interlocking stories again: There is less oil than the world requires, and that will make some rich and others dead, unless we all die first. The movie has been called \"liberal,\" but it is apolitical, suggesting that all of the players in the oil game are corrupt and compromised, and in some bleak sense must be, to defend their interests - and ours. The story involves oil, money and politics in America, the Middle East and China. The CIA is on both sides of one situation, China may be snatching oil away from us in order to sell it back, and no one in this movie understands the big picture because there isn't one, just a series of tactical skirmishes. \"Syriana\" argues that in the short run, every society must struggle for oil, and in the long run it will be gone. 3. \"Munich.\" Steven Spielberg's film may be the bravest of the year, and it plays like a flowing together of the currents in \"Crash\" and \"Syriana,\" showing an ethnic and religious conflict that floats atop a fundamental struggle over land and oil. Working from a screenplay by Tony Kushner, Spielberg begins with the massacre of Israeli athletes at the Munich Olympiad of 1972, and follows a secret assassination team as it attempts to track down the 11 primary killers. Nine eventually die, but not before the Israeli (Eric Bana) who leads the team loses his moral certainty and nearly his sanity, and not before the film sees revenge as a process that may have harmed Israel more than its targets. The film is not critical of Israel, as some believe, but a more general mourning for the loss of idealism in a region marching steadily toward terrorism and anarchy. In defending itself, can Israel afford to compromise its standards - or afford not to? Spielberg doesn't have the answer. He has the courage to suggest that some of Israel's post- Munich policies have not made it a better or safer place. 4. \"Junebug.\" At last, a movie about ordinary people. Or put it this way: Phil Morrison's \"Junebug\" was the best non- geopolitical film of the year. In simply human terms, there was no other film like it. It understands, profoundly and with love and sadness, the world of small towns; it captures ways of talking and living I remember from my childhood, and has the complexity and precision of great fiction. The story, written by Angus McLachlan, involves Alessandro Nivola and Embeth Davidtz as Chicagoans who return to North Carolina to visit his family: his mother (Celia Weston), mercilessly critical of everyone; his father (Scott Wilson), who has withdrawn into his wood-carving; his brother (Benjamin McKenzie), who loves his wife but has been brought to a halt by his demons and shyness; and the pregnant wife (Amy Adams), who is a good soul. \"Junebug\" is a great film because it is a true film. It understands that families are complicated, and their problems are not solved during a short visit, just in time for the happy ending. Families and their problems go on and on, and they aren't solved; they're dealt with. There is one heartbreaking moment of truth after another, and humor and love as well. 5. \"Brokeback Mountain.\" Two cowboys in Wyoming discover to their surprise they love each other. They have no way to deal with that fact. Directed by Ang Lee, based on a short story by E. Annie Proulx and a screenplay by Larry McMurtry and Diana Ossana. In the summer of 1963, Ennis (Heath Ledger) and Jack (Jake Gyllenhaal) find themselves one night on a distant mountainside suddenly having sex. \"You know I ain't queer,\" Ennis tells Jack after their first night together. \"Me neither,\" says Jake. But their love lasts a lifetime and gives them no consolation, because they cannot accept its nature and because they fear, not incorrectly, that in that time and place they could be murdered if it were discovered. Oh, what a sad and lonely story this is, containing what truth and sorrow. 6. \"Me and You and Everyone We Know.\" The previous films have waded fearlessly into troubled waters. Miranda July's walks on them. It's a comedy about falling in love with someone who speaks your rare emotional language of playfulness and daring, of playful mind games and bold challenges. July writes, directs and stars. In her first film, she trusts a delicate sense of humor that negotiates situations that would be shocking if they weren't so darn nice. Can you imagine a scene involving teenage sexual experimentation that is sweet and innocent and not shocking at all, because it's not about sex but about what funny and lovable creatures we humans can be? And when have you seen a woman seduce a man not with sex but with unbridled and passionate whimsy? 7. \"Nine Lives.\" Rodrigo Garcia's film started as a 3.5-star movie and worked its way onto this list because I found myself admiring it more and more. It involves nine stories told in a total of nine shots. It is not a stunt. Most audiences will probably never notice that each scene is told in one shot, although they will sense the tangible passage of real time. The best story involves Robin Wright Penn and Jason Isaacs as two former lovers, now married to others, she pregnant, who meet by chance in a supermarket and during a casual conversation realize that although their lives are content, they made the mistakes of their lifetimes by not marrying each other. Stating this so boldly, I miss the subtle sympathy that Garcia has for all of his characters, who are permitted those tender moments of truth by which we learn what a tease life is - so slow to teach us how to live it, so quick to end. 8. \"King Kong.\" A stupendous cliff-hanger, a glorious adventure, a shameless celebration of every single resource of the blockbuster, told in a film of visual beauty and surprising emotional impact. Of course this will be the most popular film of the year, and nothing wrong with that: If movies like \"King Kong\" didn't delight us with the magic of the cinema, we'd never start going in the first place. Peter Jackson's triumph is not a remake of the 1933 classic so much as a celebration of its greatness and a flowering of its possibilities. Its most particular contribution is in the area of the heart: It transforms the somewhat creepy relationship of the gorilla and the girl into a celebration of empathy, in which a vaudeville acrobat (Naomi Watts) intuitively understands that when Kong roars he isn't threatening her but stating his territorial dominance; she responds with acrobatics that delight him, not least because Kong is a gorilla few have ever tried to delight. From their relationship flows the emotional center of the film, which spectacular special effects surround and enhance, but could not replace. 9. \"Yes.\" An elegant Irish-American woman, living with a rich and distant British politician, makes eye contact with a waiter. Neither turns away. Their sex is eager and makes them laugh. They are not young; they are grateful because of long experience with what can go wrong. He was a surgeon in Lebanon. Sally Potter tells their story in iambic pentameter, the rhythm scheme of Shakespeare. The dialogue style elevates what is being said into a realm of grace and care. Joan Allen stars, and has ever a movie loved a woman more? To recline at the edge of the pool in casual physical perfection is natural to her, disturbing to him. They realize they cannot live together successfully in either of their cultures. A third place is required. Their story is told in counterpoint with the bold asides of a cleaner (Shirley Henderson), who notes that for all their passion they shed the same strands of hair and flakes of skin and tiny germs as the rest of us, and must be cleaned up after. Bold, erotic, political, and like no other film I have ever seen. 10. \"Millions.\" The best family film of the year is by the unlikely team of director Danny Boyle (\"Trainspotting\") and writer Frank Cottrell Boyce (\"Hilary and Jackie,\" \"24 Hour Party People\"). Nine-year-old Anthony Cunningham and his 7-year-old brother, Damian (Lewis McGibbon and Alex Etel), find a bag containing loot that bounced off a train and is currently stuffed under their bed. With limitless imagination and joy, the film follows the brothers as they deal with their windfall. They begin by taking homeless men to Pizza Hut. Damian wants to continue their charity work, but Anthony leans toward investing in property. Oh, and Damian gets advice from saints, real ones. St. Francis of Assisi, his favorite, provides advice that Anthony is sure will get them into trouble. Despite how it sounds, this isn't a \"cute little film.\" The director makes hard-boiled movies, the writer has worked at the cutting edge, and this is what a family film would look like if it were made with the intelligence of adults. I have created as usual the Special Jury Prize, and, taking my lead from the Academy Awards, spun out such categories as feature documentary and animated films. I've also listed five prime candidates for my Overlooked Film Festival. The jury prize At film festivals, the \"jury prize\" is how some jury members urgently signal that THIS is the film they like better than the eventual winner. It's not second place, but somebody's idea of first place. Again this year there has been a 10- way tie, listed alphabetically: * \"Best of Youth\" by Marco Tullio Giordana, the story of two Italian brothers and their lives from 1963 to 2000, as they intersect with politics and history: the hippie period, the disastrous flood in Florence, the Red Brigades, kidnappings, hard times and layoffs, and, finally, a certain peace. * \"Broken Flowers\" by Jim Jarmusch. Another inward, intriguing performance from Bill Murray, as a millionaire who lives in isolation and loneliness until he learns he might once have fathered a child, and visits the possible mothers (Sharon Stone, Frances Conroy, Jessica Lange, Tilda Swinton and Julie Delpy). * \"Downfall\" by Oliver Hirschbiegel. We do not recognize Bruno Ganz, hunched over, shrunken, his left hand fluttering behind his back like a trapped bird. This is Adolf Hitler in his final days in the bunker beneath Berlin, where after his war was lost he waged it in fantasy. Pounding on maps, screaming ultimatums, he moved troops that no longer existed and issued orders to commanders who were dead. A chilling portrait of evil and madness. * \"Duane Hopwood\" by Matt Mulhern. A career-transforming performance by David Schwimmer, as an Atlantic City pit boss who loves his wife and children, and is losing everything because of alcoholism. Not the sensational drunk scenes of melodrama, but the daily punishment of the disease: Sometimes he drinks way too much. Sometimes he drinks too much. Sometimes he drinks almost too much. Sometimes he doesn't drink enough. Those are the only four sometimes for an alcoholic. * \"Good Night, and Good Luck\" by George Clooney. David Strathairn stars as Edward R. Murrow, who, with his CBS News colleagues, helped to bring about the downfall of the demagogue Sen. Joseph McCarthy. McCarthy (shown in archival footage) is a liar and a bully, surrounded by yes-men, recklessly calling his opponents traitors; he destroys others, and then is destroyed by the truth. * \"Match Point\" by Woody Allen. A return to greatness for Allen, not with a \"Woody Allen picture\" but with a thriller based on stomach-churning guilt. Jonathan Rhys-Meyers is a poor, ambitious tennis pro who marries well (to rich girl Emily Mortimer) while dallying with Scarlett Johansson, the former fiancee of his brother-in-law. Can he solve his problems with a perfect murder? * \"North Country\" by Niki Caro. Another powerful performance by Charlize Theron, as a working mother who becomes a miner on the Minnesota iron range and becomes the target of her male fellow union members. Based on the true story of the woman who inspired the first class-action lawsuit on sexual harassment. With great supporting work by Frances McDormand. * \"The New World\" by Terrence Malick. A visionary story of Pocahontas (Q'Orianka Kilcher), that places her, John Smith (Colin Farrell) and John Rolfe (Christian Bale) in an unspoiled sylvan forest where the Indians live in harmony with the land, and the English blunder in with guns and ignorance. Pocahontas falls in love with Smith, and her transformation leads to an unimaginable personal journey. * \"The Three Burials of Melquiades Estrada,\" directed by and starring Tommy Lee Jones (best actor, Cannes 2005). He plays a ranch hand whose Mexican friend is killed by a border patrolman (Barry Pepper). He forces the younger man to join him on a long journey with the body to the friend's birthplace, in a film that could have been directed by John Huston and starred Humphrey Bogart. * \"Pride & Prejudice\" by Joe Wright. Keira Knightley is the first among equals in a gifted cast that captures all the charm and romance of the Jane Austen novel. Set a little earlier and closer to the land than most Austen adaptations, so that the urgency of a fortunate marriage is underlined, and the characters seem less precious. Gloriously romantic. Special jury awards Film festivals also hand out special awards for excellence, and so do I, because, in the words of Mickey Spillane, \"I, the Jury.\" Alphabetically: * \"Batman Begins,\" the best and darkest of the Batman pictures. * \"Bee Season,\" with its wondrous performance by Flora Cross as a young woman with mystical gifts. * \"Cache,\" the French thriller about a family that knows it is being watched - but not why, or by whom, or how. * \"Capote,\" with Philip Seymour Hoffman's Oscar-bound performance as Truman Capote. * \"Fear and Trembling,\" with Sylvie Testud, who takes a job in Japan and finds herself a definitive outsider. * \"Firecracker,\" Steve Balderson's brilliant indie about a murder in small-town Kansas. * \"Harry Potter and the Goblet of Fire,\" with Harry surviving not only Lord Voldemort but the prom. * \"Head-On,\" a harrowing portrait of Turkish \"guest workers\" in Germany and their desperation on the margins. * David Cronenberg's \"A History of Violence,\" with Viggo Mortensen as a small-town diner owner who is pulled back roughly into his past. * \"Hustle & Flow,\" with Terrence Howard's great performance as a pimp who transforms himself through art. * \"Last Days,\" Gus Van Sant's uncompromising look at the decline and death of a character based on Kurt Cobain. * \"Lord of War,\" vibrating with the energy of Nicolas Cage's performance as a freelance arms dealer. * \"The Merchant of Venice,\" another reminder of Al Pacino's passion and fierce focus. * \"Mysterious Skin,\" about growing up gay in Kansas and thinking maybe aliens were involved. * \"Oldboy,\" from Korea, about a man who is kept prisoner for 15 years for reasons he cannot imagine. * \"Palindromes,\" Todd Solondz's challenging use of eight different actors in an examination of the moral complexities of abortion. * \"Proof,\" with Gwyneth Paltrow as the daughter of a great mathematician (Anthony Hopkins) who loses his mind but leaves behind historic work - or is it his? * \"Saraband,\" Ingmar Bergman's return in his 80s to the same characters and actors (Liv Ullmann and Erland Josephson) from his \"Scenes From a Marriage\" (1973). * \"Schultze Gets the Blues,\" starring Horst Krause as a simple German accordion player who wins a contest and finds himself in New Orleans playing zydeco polka. * \"Shopgirl,\" the bittersweet relationship between a millionaire (Steve Martin) and a clerk (Claire Danes) who are divided not so much by age or money as by courage. * \"Sin City,\" the visual extravaganza adapted from Frank Miller's dark graphic novels. * Noah Baumbach's \"The Squid and the Whale\" involves two divorcing writers (Jeff Daniels and Laura Linney), two sons with divided loyalties and all the mysteries of parents and children. * \"The Ballad of Jack and Rose,\" Rebecca Miller's film about an aging hippie (Daniel Day-Lewis) and his daughter (Camilla Belle), living in isolation on an island. * \"The Constant Gardener,\" with Ralph Fiennes and Rachel Weisz stumbling across reckless programs to test drugs in Africa. * \"The Memory of a Killer,\" with Jan Decleir as an aging Italian hit man, undertaking a last assignment although senility is approaching. * \"The Upside of Anger,\" with housewife Joan Allen and retired baseball pitcher Kevin Costner building a relationship on booze and the wrong assumptions. * \"The World,\" Zhang Ke Jia's revealing look at the culture of the workers in a Beijing theme park. * \"Turtles Can Fly,\" about children living amid the wreckage of war on the Iraqi-Turkish border. * And \"Walk the Line,\" for its astonishing performances by Joaquin Phoenix and Reese Witherspoon. Best documentaries * \"Grizzly Man,\" Werner Herzog's portrait of a man who loves bears unwisely and too well. * \"Aliens of the Deep,\" James Cameron's visual astonishment from the ocean floor. * \"Enron: The Smartest Guys in the Room,\" mercilessly explaining how Enron fabricated the California energy crisis. * \"Gunner Palace,\" about the daily lives of American soldiers in Iraq. * \"March of the Penguins,\" about the responsibilities of parenthood. * \"Murderball,\" about the sport of full-contact quadriplegic wheelchair rugby (yes). * \"No Direction Home: Bob Dylan,\" Martin Scorsese's look at the singer's odyssey. * \"Tell Them Who You Are,\" Mark Wexler's portrait of his complex and gifted father, the cinematographer Haskell Wexler. * \"Touch the Sound,\" about the deaf percussionist Evelyn Glennie. * \"The Wild Parrots of Telegraph Hill,\" about Mark Bittner, who knows San Francisco's wild parrots by name. Best animated films * \"Wallace & Gromit: The Curse of the Were-Rabbit,\" one of the most delightful films ever made. * \"Tim Burton's Corpse Bride,\" surprisingly cheerful under the circumstances. * \"Robots,\" with its future that looks like Tupperware. Overlooked * \"Off the Map,\" Campbell Scott's film with Joan Allen living in the New Mexico desert with her depressed husband (Sam Elliott) and imaginative daughter (Valentina de Angelis). * Gore Verbinski's \"The Weather Man,\" and Nicolas Cage brilliant again, as a man  and Kathy Baker) at moments of high drama - a violent confrontation, an affair - and some are ordinary pieces of a life. But every film has an intriguing duality: On the one hand, they are so detailed that we're conscious a lot of life comes before the scenes we see and a lot will come after. And, at the same time, the films are so observant that these little slices seem to be showing us everything we need to know about these women. I suspect everyone will have a different favorite. I loved the Amy Brenneman segment, a surprising portrait of how the heightened emotions people feel at a funeral can make things crazy. And I loved the delicacy and nuances of Robin Wright Penn's performance in a segment about a disturbing encounter at a grocery store. But I got something out of each of the nine lives. Beautifully written and directed by Rodrigo Garcia (whose dad is writer Gabriel Garcia Marquez), they make a persuasive case that, as one character says, \"Each woman is a universe.\" * REVIEW A- NINE LIVES Parents' guide: R; Language Running time: 115 minutes Showing at: Ritz Five, Ritz 16/NJ Sonia: Holly Hunter Diana: Robin Wright Penn Lorna: Amy Brenneman Copyright (c) 2005 Philadelphia Daily News"}, {"article_id": "280687718", "match_score": 81.99052132701422, "source": "American Press (Lake Charles, LA)", "date": "May 28, 2005", "window_summary": "The archive window (TV listing) notes that Helen Hunt, Robin Wright Penn and Joanne Woodward also star in the two-part HBO drama Empire Falls.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full TV listing likewise identifies Robin Wright Penn as a cast member of Empire Falls, mentioning her among the principal actors in the program's lineup.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "Miles Roby de Harris who try As he might can t shake his ties to the old Hometown. Helen Hunt Robin Wright Penn and Joanne Woodward also Star. Part 2 airs whore9 . On show comedian Mario Cantone Quot sex and the", "newsbank_text": "6 PM (FX) NASCAR Racing For the second consecutive Saturday, there is racing under the lights at Lowe's Motor Speedway in Concord, N. C., home this week to the Busch CarQuest Auto Parts 300. Kyle Busch turned in a dominating performance in this race last year, leading for 92 of 200 laps before it ended under caution with two laps to go. The win was Busch's second in three races. 7 PM & * NCIS A dead civilian is found on a Marine firing range, which leads to the discovery that the Mafia has been using the site as a dumping ground for years. When the victim is identified as an undercover FBI agent, Gibbs '( Mark Harmon) counterpart in the bureau, Agent Fornell (guest star Joe Spano ), is accused of spying for the mob. Sasha Alexander and David McCallum also star in \" The Bone Yard. \" 7 PM _ $ The Patriot Colonial plantation owner and French and Indian War veteran Benjamin Martin (Mel Gibson) has no interest in the fight for independence from the British. He certainly doesn't want his oldest son (Heath Ledger) to join the rebellion, but he can't stop him. When a British colonel captures the youth and kills his brother, Dad becomes the redcoats 'worst nightmare. 7 PM = Cops Police crack down on Mardi Gras in the first of two episodes from — where else? — New Orleans. Among those getting in trouble are a transsexual with a breast exposed and a man who flashes something other than his chest in an attempt to score some beads. Officers also bust a couple who have decided to have their own party for two... in public. 8 PM & * Cold Case Lilly (Kathryn Morris) and her team reopen a murder case that brings back painful memories for those who survived the \" red scare \" of the 1950 s. Orson Bean (\" Dr. Quinn, Medicine Woman\") guest stars in \" Red Glare \" as a man suspected of having communist sympathies. It's a role to which Bean can relate, having been on the Hollywood blacklist in real life. 8 PM (TLC) America 's Ugliest Bedroom Three Los Angeles families are in the running for the questionable honor in this latest \" America's Ugliest \" special. Designer Doug Wilson chooses the one bedroom he deems most in need of improvement and gives it a total makeover. After all, the room you spend a third of your life in should be attractive, even if you do spend much of that time in it unconscious. 8 PM (HBO) Empire Falls Paul Newman, an Oscar nominee for his work in 1994 's \" Nobody's Fool, \" stars in another adapta-tion of a Richard Russo novel. Like \" Fool, \" this two-part comedy-drama is set in a weary, past-its-prime Northeastern town. Newman plays the busybody father of restaurateur Miles Roby (Ed Har-ris ), who, try as he might, can't shake his ties to the old hometown. Helen Hunt, Robin Wright Penn and Joanne Woodward also star. Part 2 airs Sunday. 8 PM (SHOW) Laugh Whore Comedian Mario Cantone (\" Sex and the City, \" \" Love! Valour! Compassion! \") brings his one-man Broadway show to television in this new special. In addition to funny bits on New York cabbies, his Italian-American upbringing and the relationship dynamics of a kids Christmas special, Cantone impersonates Cher, Liza Minnelli and other divas, and shows off his own song stylings. 10 PM = Mad TV Guest star Nicole Richie (\" The Simple Life\") portrays Kelly Ripa in a shampoo commercial parody that also features Nicole Parker as Sarah Jessica Parker and Danielle Gaither as Vienetta Jones. Parker also plays Kelly Clarkson in a sendup of the \" American Idol \" winner's video \" Since U Been Gone, \" with Michael McDonald as \" Idol \" judge Simon Cowell. Musical guest the Donnas perform. Copyright 2005, 2007, American Press. All Rights Reserved."}, {"article_id": "125606491", "match_score": 81.70212765957447, "source": "Bucks County Courier Times (Levittown, PA)", "date": "February 26, 2005", "window_summary": "The snippet references Forrest Gump and indicates that Robin Wright plays Forrest's love interes popular nursery-school teacher, she was enjoying a day at the shore, painting the scenery and having lunch, when she vanished. Host John Walsh travels to the scene of her disappearance and discloses the identity of a man who may have access to the solution for this mystery. ''Never Die Alone,'' 10 p.m., Cinemax Rapper DMX stars in this 2004 drama as King David, a drug dealer who's decided to reform, starting by repaying the money he owes to a crime boss. Things go wrong when his thugs come to collect, and David is mortally wounded. His story unfolds in flashbacks after a wannabe writer (David Arquette) comes into possession of his money and belongings, including a diary of sorts on audiotape. Copyright, 2005, Bucks County Courier Times"}, {"article_id": "127421294", "match_score": 81.60000000000001, "source": "Repository, The (Canton, OH)", "date": "August 1, 2005", "window_summary": "unclear", "window_context": "other", "window_tone": "neutral", "fulltext_summary": "unclear", "fulltext_context": "other", "fulltext_tone": "neutral", "archive_window": "Fred Mann sorted people who appeared As guests on the shows into three Camps Liberal and when Washington Post reporter Robin Wright showed up on the Diane Rehm Manns investigative expertise marked her Down As a the according to Mann Wrights viewpoint", "newsbank_text": "American journalists owe a debt to Kenneth Tomlinson, chairman of the Corporation for Public Broadcasting, a fervent purifier of those radio and television programs from liberal bias — particularly the cleansing of any criticism of the Bush administration. He has taught us journalists what we should have already known: no element of journalism should seek or accept government funds, from any administration. Mr. Tomlinson has clearly shown that \"political orthodoxy\" is not the ideological monopoly of Michael Moore, MoveOn.org, George Soros or Al Franken. But those communicators do not have the heavy hand of government to police public speech in order to help strengthen their political goals. As what George Orwell might have called the Big Brother of the public broadcasting system, Tomlinson paid $14,700 of public funds to Fred Mann, a \"researcher,\" to monitor present and past public broadcasting shows by Bill Moyers, Tavis Smiley, David Brancaccio, Diane Rehm (of whom Mr. Tomlinson professes to be \"a great admirer\"), and even the witty conservative Tucker Carlson. (His guests too \"proved\" to be suspect.) If Mann or another \"researcher\" is to be paid to do an encore, I expect National Public Radio’s \"Morning Edition\" — a source of many of my news leads — could be included for its illuminating June 20 report of Mr. Mann’s methodology for ferreting out leftists. NPR reporter David Folkenflik noted that Fred Mann \"sorted people who appeared as guests on the shows into three camps: conservative, liberal and neutral.\" When Washington Post reporter Robin Wright showed up on \"The Diane Rehm Show,\" Mr. Mann’s investigative expertise marked her down as a liberal. The proof, according to Mann: \"Ms. Wright’s viewpoint was that U.S. intelligence was geared to fight the Cold War and did not adapt to the new threat of terrorism.\" Hello? Worse yet, as Folkenflik added, Tucker Carlson was a host of interest to Mann because on his show, there were \"more liberal guests than conservatives.\" Could it be that Tucker Carlson wanted to make fun of them? To discover that Bill Moyers, on his weekly hour, was not an admirer of the Bush administration is like, in the old phrase, \"shooting ducks in a barrel.\" I was a guest on that show once, citing the damage that certain sections of the Patriot Act and subsequent administration executive orders were doing to the Bill of Rights. But I was also a guest on William Buckley’s \"Firing Line\" when it was on PBS — a program I wish was back there again. And currently, Wall Street Journal editors and writers can instructively be seen and heard every week on PBS. Moreover, each night, on \"The NewsHour with Jim Lehrer\" there is intense jousting between liberals and conservatives. Tomlinson is being so ham-handed in his mission to protect the Bush administration from dread diversity of ideas that I would think someone at the White House — or among the Republican leadership in Congress — would be at least embarrassed. After all, the president has said we should pride ourselves that in this constitutional democracy, our government is \"transparent.\" Furthermore, it is demeaning to such forcefully articulate administration policy makers as Donald Rumsfeld, Condoleezza Rice and John Negroponte to imply that they need Kenneth Tomlinson to buffer them against contrasting views on public broadcasting programs. Tomlinson, however, seems to have no limits to his sense of himself as a commander of the president’s Praetorian Guard. He has successfully managed to install Patricia Harrison as the new CEO and president of the Corporation for Public Broadcasting. Her credits for this prestigious post — as tribune of the free flow of diverse views to the public — include her previous services as co-chairwoman of the Republican Party! It is as if George Soros were to become editor-in-chief of the Associated Press. Long ago, during my unformed youth, I was speaking on a panel as an anti-Communist (having read Arthur Koestler’s \"Darkness at Noon\" when I was 15) but wondering about the possibilities of \"democratic socialism.\" A libertarian on the panel asked me how long I thought a free press would flourish under any kind of socialist government. Like a clap of thunder, I was awakened from my fantasy. Now, under a Republican administration, \"public\" broadcasting is being investigated as if we were subject to so statist a government that we must be insulated from insufficient appreciation of this administration’s virtues. This would be farcical if it weren’t actually happening. But I am grateful to Tomlinson for illuminating the sticky strings that come with government financial support of the press — which must be free to be free. Nat Hentoff is a nationally renowned authority on the First Amendment and the Bill of Rights and author of several books. Copyright 2005, The Repository, All Rights Reserved."}, {"article_id": "261248959", "match_score": 81.42857142857143, "source": "American Press (Lake Charles, LA)", "date": "May 28, 2005", "window_summary": "The archive window lists Robin Wright Penn among the stars of the HBO miniseries Empire Falls.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The TV listing simply names Robin Wright Penn as a co‑star of Empire Falls alongside Helen Hunt and Joanne Woodward; the mention is factual and neutral.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "Miles Roby de Harris who try As he might can to shake his ties to the old Hometown. Helen Hunt Robin Wright Penn and Joanne Woodward also Star. Part 2 airs sunday at 8 . On Hob. Saturday afternoon and evening j", "newsbank_text": "6 PM (FX) NASCAR Racing For the second consecutive Saturday, there is racing under the lights at Lowe's Motor Speedway in Concord, N. C., home this week to the Busch CarQuest Auto Parts 300. Kyle Busch turned in a dominating performance in this race last year, leading for 92 of 200 laps before it ended under caution with two laps to go. The win was Busch's second in three races. 7 PM & * NCIS A dead civilian is found on a Marine firing range, which leads to the discovery that the Mafia has been using the site as a dumping ground for years. When the victim is identified as an undercover FBI agent, Gibbs '( Mark Harmon) counterpart in the bureau, Agent Fornell (guest star Joe Spano ), is accused of spying for the mob. Sasha Alexander and David McCallum also star in \" The Bone Yard. \" 7 PM _ $ The Patriot Colonial plantation owner and French and Indian War veteran Benjamin Martin (Mel Gibson) has no interest in the fight for independence from
