<script>
const DATA = [{"article_id": "435929140", "match_score": 98.86792452830188, "source": "Charleston Gazette (WV)", "date": "May 22, 2005", "window_summary": "The excerpt identifies Robin Wright Penn as Grace, Miles' mother (who died when he was young), in the story's description. It notes her character's role in the protagonist's background.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The article about HBO's Empire Falls describes the ensemble cast and mentions that Robin Wright Penn appears as Miles' mother in flashback scenes; her character's influence on the protagonist is noted but she has limited screen time. The piece treats her as a contributing member of a praised ensemble rather than focusing on her individually.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "angry about her parents’ imminent divorce and her mother’s (Helen Hunt) approaching remarriage to another man. Miles' mother, Grace (Robin Wright Penn), died when Miles was a young man, but his irascible father. Max (Paul Newman), is still around, doing halfhearted", "newsbank_text": "An all-star cast brings to vibrant life Richard Russo's \"Empire Falls\" in a funny and achingly beautiful two-part adaptation airing Saturday and Sunday on HBO. Set in a declining Maine mill town, the TV movie stars four-time Oscar nominee Ed Harris (\"Pollock\") as Miles Roby, the central character, who is in a kind of emotional paralysis as the story opens. As a boy, Miles showed great promise for a successful life far beyond his struggling hometown, but fate and family obligations born out of long-buried secrets have forced him to remain in Empire Falls, where he scrapes out a living running the Empire Grill for Francine Whiting (Joanne Woodward), the iron-willed widow whose family owns anything worth owning in Empire Falls. At the center of Miles' life is his sensitive teenage daughter, Tick (Danielle Panabaker), who is angry about her parents' imminent divorce and her mother's (Helen Hunt) approaching remarriage to another man. Miles' mother, Grace (Robin Wright Penn), died when Miles was a young man, but his irascible father, Max (Paul Newman), is still around, doing halfhearted odd jobs in exchange for beer money. Helping Miles at the diner is his younger brother, David (Aidan Quinn), who bitterly remembers how determined their mother was that Miles would escape the dead-end existence in which he now finds himself. \"Miles is really stuck when this thing starts,\" Harris says. \"He's got nowhere to turn, doesn't see any way out of what he's doing, even though he's not very happy. During the course of this thing, he gets unstuck.\" Getting unstuck for Miles requires uncovering and confronting some startling secrets that explain the complicated ties between his own blue-collar family and the elite Whiting clan, including Francine's late husband, C.B. (Philip Seymour Hoffman), and their daughter, Cindy (Kate Burton), who was disabled in a childhood accident and harbors a desperate, unrequited love for Miles. As fans of Russo's Pulitzer Prize-winning novel know, there is a startling act of school violence near the end of the narrative, but apart from that, the story unfolds with the quirky, unhurried pace of small town life. Dramatic tension arises not from explosions or car chases, but from the resentments, passions and private shames that run through Empire Falls like the Knox River. That \"Empire Falls\" remains so utterly engrossing for its three-hours-plus running time is both a tribute to Russo's writing - he wrote the teleplay as well - and to the dazzling ensemble of actors, who manage to convince us that they've shared life experiences for years, even for generations. That's possible in large part because executive producer Newman and director Fred Schepisi gathered the entire cast together in New York for extended rehearsals before moving to the Maine filming location. \"We knew we had to concentrate on and bring about (that sense of interconnected lives), particularly as many of the characters don't actually play scenes with one another and yet they have a large effect on one another,\" Schepisi says. With Russo on hand during those early sessions, Schepisi and his cast had the luxury of asking the author to interpolate scenes or lines of dialogue he originally had omitted from the adapted script, which clarified motivations for the actors. \"I nagged Rick a bit to put some things in or take some things out. Fortunately, he transcended that nagging,\" Schepisi says, chuckling. Filming primarily in the part of Maine where Russo had lived while writing his novel also gives the TV movie added resonance, Harris says. \"That was really helpful, and I am so glad that we shot it in the towns of Waterville and Skowhegan where we were,\" he says. \"All of the community was very supportive, and you know, it's a mill town that's kind of fallen on hard times, which is just what the story was about. It just gives you so much that you don't have to think about, because you're really right there in the environment.\" Harris says his \"Empire Falls\" colleagues are the best ensemble with which he's ever worked. \"And what was really fun was that as Miles, I really got to work with every one of these actors,\" Harris says. \"Miles is the only character who interacts with all the others, except for Robin Wright Penn (who appears only in flashback scenes) - but Paul and Joanne, Helen, Aidan, Theresa Russell, Philip Seymour Hoffman, everybody else I got to work with.\" And while Miles undergoes a harrowing transformation during the course of \"Empire Falls,\" he comes out of it free to pursue the dreams his mother had held out for him, Harris says. Copyright, 2005, Charleston Newspapers"}, {"article_id": "285069497", "match_score": 97.93388429752066, "source": "Journal Gazette (Mattoon, IL)", "date": "April 8, 2005", "window_summary": "The excerpt lists actress Robin Wright Penn's age (39) in a 'Today's birthdays' rundown.", "window_context": "personal_life", "window_tone": "neutral", "fulltext_summary": "The article's 'Today's birthdays' section simply names Robin Wright Penn and gives her age (39), with no commentary on her work or persona.", "fulltext_context": "personal_life", "fulltext_tone": "neutral", "archive_window": "43. Singer guitarist Donita Sparks of l7 is 42. Singer Julian Lennon is 42. Rapper Biz Markie is 41. Actress Robin Wright Penn is 39. Actress Patricia Arquette is 37. Singer Craig Honeycutt of everything is 35. Drummer Darren Jessee Ben folds", "newsbank_text": "Elton:Eminen on par with Hendrix, Jagger NEW YORK (AP) - Elton John says that Eminem is on par with Jimi Hendrix and Mick Jagger. In the new issue of Rolling Stone, the rapper is listed in the magazine's second \"Immortals\" edition, featuring another 50 of the greatest figures of rock 'n' roll with appreciations written by other artists. In his immortalizing of Eminem, John writes that he got goose bumps when he first rehearsed with him for their performance at the 2001 Grammy Awards. \"From the start, I've always admired Eminem's thinking,\" John writes. \"That's the reason I wanted to appear on the Grammys with him when I was asked, despite all the nonsense talked about his being homophobic. Other contributors include Dave Matthews writing on Radiohead, Trey Anastasio on Frank Zappa, Beck on Hank Williams, David Bowie on Nine Inch Nails and Mos Def on Miles Davis. Host of 'TheView' gives birth to daughter NEW YORK (AP) - A day after her daughter was born, Elisabeth Hasselbeck called her co-hosts on ABC's \"The View\" to reveal the baby's name: Grace Elisabeth. \"I'm a little beat up, but it's all worth it,\" Hasselbeck said Thursday. Grace Elisabeth was born at a New York hospital weighing 7 pounds, 8 ounces, Hasselbeck and her husband, Washington Redskins quarterback Tim Hasselbeck, announced Wednesday. She is the couple's first child. The baby had been a frequent topic of conversation on the daytime chat fest. \"We feel like we all had a baby!\" exclaimed co-host Joy Behar. Today's birthdays Comedian Shecky Greene is 79. Singer J.J. Jackson is 64. Guitarist Steve Howe of Yes is 58. Bassist Mel Schacher of Grand Funk Railroad is 54. Singer-actor John Schneider is 45. Guitarist Izzy Stradlin (Guns N' Roses) is 43. Singer- guitarist Donita Sparks of L7 is 42. Singer Julian Lennon is 42. Rapper Biz Markie is 41. Actress Robin Wright Penn is 39. Actress Patricia Arquette is 37. Singer Craig Honeycutt of Everything is 35. Drummer Darren Jessee (Ben Folds Five) is 34. Actor Taran Noah Smith (\"Home Improvement\") is 21."}, {"article_id": "432520775", "match_score": 97.23320158102769, "source": "Bluffton Today (SC)", "date": "October 14, 2005", "window_summary": "The archive window lists Robin Wright Penn among the prominent cast members (with Sissy Spacek, Glenn Close, etc.) of Rodrigo Garcia's film Nine Lives.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The film review mentions Robin Wright Penn as part of a large, high-profile ensemble in Nine Lives but does not single her out for individual praise or criticism; her presence is noted as part of the cast.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "breeze by to little effect. Garcia rounded up a huge and lus- trous cast, highlighted by Sissy Spacek, Glenn Close, Robin Wright Penn, Holly Hunter and Lisa Gay Hamil- ton. The filmmakers accom- plished an impressive feat of scheduling and camera chore-", "newsbank_text": "Cameron Crowe has made his name with movies that strike just the right tone - a bittersweet balance that's funny and melancholy, romantic and observant. It's one that his idol, Billy Wilder, perfected decades ago, and one that's hard to achieve. Which is what makes Crowe's latest film so curious, and such a disappointment. In telling the story of a young man (Orlando Bloom) who returns to his small-town Kentucky roots after his father's death, it's as if Crowe wanted to make several different movies but couldn't decide among them, so he just went ahead and made them all, then trimmed for time. Characters say and do things that real people don't say and do, and they frequently come up with poignant turns of phrase that are so perfectly timed, they clang self-consciously - especially Kirsten Dunst as the perky flight attendant with whom Bloom's character strikes up an unexpected romance. (They do have some lovely moments together, though.) Susan Sarandon, Alec Baldwin and Jessica Biel co-star. PG-13 'NINE LIVES' Rodrigo Garcia follows his previous anthology films \"Ten Tiny Love Stories\" and \"Things You Can Tell Just by Looking at Her\" with this medley of short films about women in crisis. Like a solid collection of short stories, some of Garcia's little dramas are riveting, some are explosive, some are merely intriguing, and they collectively add up to an emotional total somewhat less than their parts. A few of the vignettes pack a wallop. Others simply breeze by to little effect. Garcia rounded up a huge and lustrous cast, highlighted by Sissy Spacek, Glenn Close, Robin Wright Penn, Holly Hunter and Lisa Gay Hamilton. The filmmakers accomplished an impressive feat of scheduling and camera choreography to shoot his nine stories in just 18 days - two days apiece, each segment captured in single takes lasting 10 to 14 minutes. R 'WHERE THE TRUTH LIES' Kevin Bacon and Colin Firth star as Jerry-and-Dean-type '50s entertainers whose act and friendship were destroyed when a young blonde was found dead in their hotel suite after a menage a trois. Fifteen years later, an up-and- coming entertainment reporter (Alison Lohman) tries to uncover the truth about what happened that night. Director Atom Egoyan wallows so devilishly in the conventions of film noir, he approaches parody. The melodramatic voiceover, the glamorous and gritty settings, the obsession with the ugly side of show business - Egoyan takes them all and whips them up into a fizzy cocktail that's intoxicating but also flummoxing. Strong performances anchor the film, though Egoyan jumps jarringly between various times and perspectives. Not rated but wow - name it and it's probably in there: language, nudity and violence, sex, drugs and rock 'n' roll. ART 'DRAWN BY THE LIGHT' When: Through Nov. 12. Where: 48 Boundary St. Description: The Society of Bluffton Artists (SoBA) presents an exhibit of pastels by local artist Kathy Tortorella. Gallery hours are 10 a.m. to 5 p.m. Tuesday through Saturday. Cost: Free Details: 757-6586 'PAINTING THE GOOD LIFE: THE ART OF COBY WHITMORE' When: The exhibit will be open to the public from 10 a.m. to 4 p.m. Monday through Friday, noon to 4 p.m. on Saturdays and one hour prior to performances in the Elizabeth Wallace Theatre through Oct. 28 Where: Arts Center of Coastal Carolina Description: Exhibit of artwork by a superstar among American illustrators in the heyday of illustrations. Cost: $5 for reception (free for arts center members) Details: 842-2787 (ARTS) THEATER 'EVITA' When: Through Oct. 23 Where: Arts Center of Coastal Carolina, Hilton Head Island Description: One the most successful shows ever written by the British dream team of Andrew Lloyd Webber and Tim Rice, \"Evita\" ran for 1,567 performances on Broadway, picking up seven Tony Awards, including Best Musical. The show chronicles the rags-to-riches life of Argentina's first lady, Eva Peron. Cost: Tickets are $45, $31 for children younger than 16 Details: 842-ARTS (2787) MUSIC HILTON HEAD CHORAL SOCIETY When: 8 p.m. today Where: First Presbyterian Church Description: The 2005-06 season kicks off with the 30th anniversary concert featuring pop chart favorites, hits from MGM musicals, music from Irving Berlin's Broadway and well-loved standards from \"West Side Story\" to \"South Pacific.\" Cost: Attend four HHCS concerts for $65 or four HHCS concerts plus two Chamber Singers concerts for $95; children younger than 12 pay $32. General admission tickets are $18 for Chamber Singers concerts, $20 for HHCS concerts. Details: visit www.hiltonheadchoralsociety.org or call (843) 341-3818 'A POCKETFUL OF MUSIC' When: 2 p.m. Sunday Where: Bluffton Library Description: Martha Braden, a pianist and music educator, will present a program of works by Bach, Mozart, Gian Carlo Menotti and other composers. Cost: Free Details: 757-1536 or www.bcgov.net/library WIDESPREAD PANIC When: Doors open at 6:30 p.m. Sunday and show time is at 7:30 p.m. Where: Savannah Civic Center Description: True road warriors, Widespread Panic ranked among the top 50 grossing touring acts for eight years running. Cost: $25 general admission Details: Call the Savannah Civic Center ticket office at (912) 651-6556 or visit www. Etix.com or www.widespreadpanic.com USCB FESTIVAL SERIES When: 5 p.m. Sunday Where: USCB Performing Arts Center, 801 Carteret St., Beaufort Description: Charles Wadsworth returns for the season opener in another five-concert chamber music series. Cost: $40, $35 and $30 (half price for children 12 and younger) Details: 521-4145 ETC. WINETIME When: Today and Saturday Where: Honey Horn, Hilton Head Island Description: A gourmet dinner, wine tasting and auction under the stars starting at 6 p.m. today. The public wine tasting takes place from 1 to 4 p.m. Saturday with hundreds of wines from more than 70 vineyards. Cost: The cost of the dinner is $150 per person. Admission to the tasting event, to include tasting, snacks and entertainment, is $20 per person. Details: 689-6767 POLO FOR CHARITY When: Gates open at noon for tailgating, match begins at 2 p.m. Sunday Where: Rose Hill Plantation Description: Sponsored by the Okatie Rotary Club. Proceeds benefit United Way of Beaufort County. Cost: Admission is $10 per person, children younger than 16 admitted free Details: 815-POLO or 686-1553 WOODWORKERS OPEN HOUSE When: 10 a.m. to 2 p.m. Saturday Where: Sun City - enter main gate on U.S. 278, go straight ahead on Sun City Boulevard to the end. Turn left and the open house will be in the first building on your left. Description: The Woodworkers & Modelmakers Guild of Sun City Hilton Head will offer demonstrations of various shop activities including woodcrafts, model railroads and stained glass. Refreshments will be available. Cost: Free Details: Call Bill Griffin at 705-2212 Copyright (c) 2005 Savannah Morning News"}, {"article_id": "432510305", "match_score": 96.58119658119658, "source": "Times Union, The (Albany, NY)", "date": "April 7, 2005", "window_summary": "", "window_context": "", "window_tone": "", "fulltext_summary": "", "fulltext_context": "", "fulltext_tone": "", "archive_window": "films him- self. And as long as we’re counting his blessings, let’s not forget that he’s married to the lovely Robin Wright Penn and that they have two presumably wonderful chil- dren. Yet Sean Penn never looks happy. In fact, he usu-", "newsbank_text": "TORONTO - What, exactly, is Sean Penn's problem? Here's a guy who, at age 44, has won virtually every award a movie actor can win, including the Academy Award. And since 1981, when he made his screen debut in \"Taps,\" he has worked steadily - averaging more than a picture per year and collaborating with such top-notch directors as Clint Eastwood, Terrence Malick, David Fincher, Oliver Stone, Woody Allen and Brian De Palma. Penn also has managed to direct a few films himself. And as long as we're counting his blessings, let's not forget that he's married to the lovely Robin Wright Penn and that they have two presumably wonderful children. Yet Sean Penn never looks happy. In fact, he usually seems about one bad hangover away from carrying out a suicide pact with the \"Phantom of the Opera.\" \"He is maybe the only actor now who, in interviews, can summon up the tortured introspection of the early Method actors without irony or shame,\" notes film historian David Thomson in \"The New Biographical Dictionary of Film.\" Can this really be the same person who made everyone laugh with his hilarious portrayal of Jeff Spicoli, the quintessential no-worries stoner of 1982's \"Fast Times at Ridgemont High\"? These days, Penn more often seems like he's popping downers. Ask him a question - even a total softball - and just see what happens: Hey, Sean, would you like to be remembered more for your art or your politics? \"As I sit here today,\" he says in a low, halting growl, \"I don't know that I have a value as a memory, a legacy.\" Now that's tortured introspection. Wearing shades and a thin mustache, Penn certainly looks the part of the angry, slightly weary, middle-aged man. During a press conference for his latest film, \"The Assassination of Richard Nixon,\" he keeps those shades handy while he chain-smokes. Penn's angst-ridden image is often a drag. But it may have added a certain fizz to his work in such films as \"Casualties of War,\" in which he played a vicious Vietnam Era soldier, and \"Mystic River,\" for which he earned his Oscar by portraying an ex-con with a chip the size of a cellblock on his shoulder. Penn's bad-boy vibe also turns out to be a plus in \"The Assassination of Richard Nixon.\" In this dark, fact-inspired drama, Penn plays Sam Bicke, a salesman who attempts to kill the 37th president of the United States by hijacking a plane and flying it into the White House. Like Penn, Bicke is a desperate character who thinks of himself as a decent person. An inveterate loser, Bicke suffers from paranoia and delusions of grandeur that seem only a step or two beyond whatever's eating Penn. When Penn speaks about Bicke, however, he tends to draw other comparisons. \"It's not hard to find people in my life who I've had thoughts (that) something bad might happen to,\" he reveals. \"So there might be a rhythm or two borrowed from a couple of pals.\" The script for the new film caught Penn's eye before Sept. 11, 2001. But, since then, he has been increasingly struck by what he calls the \"incredible parallels\" between the attacks of that day and the attack that the real salesman (whose name is actually spelled \"Byck\") attempted in 1974. \"Knowing about this story made watching people like Condoleezza Rice kind of amusing when she said `Who would have ever thought' - other than the FBI and the CIA and the Secret Service, who all have this case on file and study it,\" says Penn, with bitter relish. The edginess of the new film seems to have inspired Penn to throw himself into this project. In fact, Niels Mueller, who directed and co-wrote the film, says that the actor's unrelenting commitment is the main reason that, after five years, it finally got made. Beyond that, Mueller implies that Penn often functioned as a sort of co-director. It was Penn who suggested Naomi Watts for the role of Bicke's estranged wife. (He made \"21 Grams\" with her.) And when Mueller ran into problems directing the film, he'd often ask Penn for advice. In some scenes, in fact, it was Penn who actually operated the camera. \"We wanted to keep this film from Sam's point of view, as much as possible,\" Mueller explains. \"When he points the gun at the irate customer, Sean's holding the gun and he's holding the camera. Not an easy task, by the way. The camera's heavy.\" Having taken so much responsibility for \"The Assassination of Richard Nixon,\" is Penn at all concerned that the movie could encourage copycat violence? For once, he doesn't miss a beat. \"I'm a believer that society has to deal with its issues without the scapegoat of movies giving somebody the big idea,\" he says. \"The story of a twisted head on a basically good man is a valuable story. And the results of what happened are more dangerous not to look at than to look at.\" Copyright, 2005, (c) Times Union. All Rights Reserved."}, {"article_id": "325190074", "match_score": 96.42857142857144, "source": "Post-Star, The (Glens Falls, NY)", "date": "December 16, 2005", "window_summary": "The archive snippet notes a story segment in which Robin Wright Penn and Jason Isaacs play former lovers (she is pregnant) who meet by chance, indicating Wright appears in that film segment.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "In Roger Ebert's year-end film roundup he highlights a story in Rodrigo GarcÃ­a's Nine Lives that involves Robin Wright Penn and Jason Isaacs as former lovers; the segment is singled out as one of the film's best and is described with sympathy and emotional subtlety.", "fulltext_context": "career", "fulltext_tone": "positive", "archive_window": "scene is told in one shot although they will sense the tangible passage of real time. The Best Story involves Robin Wright Penn and Jason Isaacs As two former lovers now married to others she pregnant who meet by Chance in a", "newsbank_text": "Roger Ebert How in the world can anyone think it was a bad year for the movies when so many were wonderful, a few were great, a handful were inspiring, and there were scenes so risky you feared the tightrope might break? If none of the year's 10 best had been made, I could name another 10 and no one would wonder at the choices. There were a lot of movies to admire in 2005. The year's 10 best films: 1. \"Crash.\" Much of the world's misery is caused by conflicts of race and religion; Paul Haggis' film, written with Robert Moresco, uses interlocking stories to show we are in the same boat, that prejudice flows freely from one ethnic group to another. His stories are a series of contradictions in which the same people can be sinned against or sinning. There was once a simple morality formula in America in which white society was racist and blacks were victims, but that model is long obsolete. Now many more players have entered the game: Latinos, Asians, Muslims, and those defined by sexual orientation, income, education or appearance. America is a nation of minority groups, and we get along with each other better than many societies that criticize us; France has recently been reminded of that. We are all immigrants here. What is wonderful about \"Crash\" is that it tells not simpleminded parables, but textured human stories based on paradoxes. Not many films have the possibility of making their viewers better people; anyone seeing it is likely to leave with a little more sympathy for people not like themselves. The film opened quietly in May and increased its audience week by week, as people told each other they must see it. 2. \"Syriana.\" Stephen Gaghan's film doesn't reveal the plot, but surrounds us with it. Interlocking stories again: There is less oil than the world requires, and that will make some rich and others dead, unless we all die first. The movie has been called \"liberal,\" but it is apolitical, suggesting that all of the players in the oil game are corrupt and compromised, and in some bleak sense must be, to defend their interests - and ours. The story involves oil, money and politics in America, the Middle East and China. The CIA is on both sides of one situation, China may be snatching oil away from us in order to sell it back, and no one in this movie understands the big picture because there isn't one, just a series of tactical skirmishes. \"Syriana\" argues that in the short run, every society must struggle for oil, and in the long run it will be gone. 3. \"Munich.\" Steven Spielberg's film may be the bravest of the year, and it plays like a flowing together of the currents in \"Crash\" and \"Syriana,\" showing an ethnic and religious conflict that floats atop a fundamental struggle over land and oil. Working from a screenplay by Tony Kushner, Spielberg begins with the massacre of Israeli athletes at the Munich Olympiad of 1972, and follows a secret assassination team as it attempts to track down the 11 primary killers. Nine eventually die, but not before the Israeli (Eric Bana) who leads the team loses his moral certainty and nearly his sanity, and not before the film sees revenge as a process that may have harmed Israel more than its targets. The film is not critical of Israel, as some believe, but a more general mourning for the loss of idealism in a region marching steadily toward terrorism and anarchy. In defending itself, can Israel afford to compromise its standards - or afford not to? Spielberg doesn't have the answer. He has the courage to suggest that some of Israel's post- Munich policies have not made it a better or safer place. 4. \"Junebug.\" At last, a movie about ordinary people. Or put it this way: Phil Morrison's \"Junebug\" was the best non- geopolitical film of the year. In simply human terms, there was no other film like it. It understands, profoundly and with love and sadness, the world of small towns; it captures ways of talking and living I remember from my childhood, and has the complexity and precision of great fiction. The story, written by Angus McLachlan, involves Alessandro Nivola and Embeth Davidtz as Chicagoans who return to North Carolina to visit his family: his mother (Celia Weston), mercilessly critical of everyone; his father (Scott Wilson), who has withdrawn into his wood-carving; his brother (Benjamin McKenzie), who loves his wife but has been brought to a halt by his demons and shyness; and the pregnant wife (Amy Adams), who is a good soul. \"Junebug\" is a great film because it is a true film. It understands that families are complicated, and their problems are not solved during a short visit, just in time for the happy ending. Families and their problems go on and on, and they aren't solved; they're dealt with. There is one heartbreaking moment of truth after another, and humor and love as well. 5. \"Brokeback Mountain.\" Two cowboys in Wyoming discover to their surprise they love each other. They have no way to deal with that fact. Directed by Ang Lee, based on a short story by E. Annie Proulx and a screenplay by Larry McMurtry and Diana Ossana. In the summer of 1963, Ennis (Heath Ledger) and Jack (Jake Gyllenhaal) find themselves one night on a distant mountainside suddenly having sex. \"You know I ain't queer,\" Ennis tells Jack after their first night together. \"Me neither,\" says Jake. But their love lasts a lifetime and gives them no consolation, because they cannot accept its nature and because they fear, not incorrectly, that in that time and place they could be murdered if it were discovered. Oh, what a sad and lonely story this is, containing what truth and sorrow. 6. \"Me and You and Everyone We Know.\" The previous films have waded fearlessly into troubled waters. Miranda July's walks on them. It's a comedy about falling in love with someone who speaks your rare emotional language of playfulness and daring, of playful mind games and bold challenges. July writes, directs and stars. In her first film, she trusts a delicate sense of humor that negotiates situations that would be shocking if they weren't so darn nice. Can you imagine a scene involving teenage sexual experimentation that is sweet and innocent and not shocking at all, because it's not about sex but about what funny and lovable creatures we humans can be? And when have you seen a woman seduce a man not with sex but with unbridled and passionate whimsy? 7. \"Nine Lives.\" Rodrigo Garcia's film started as a 3.5-star movie and worked its way onto this list because I found myself admiring it more and more. It involves nine stories told in a total of nine shots. It is not a stunt. Most audiences will probably never notice that each scene is told in one shot, although they will sense the tangible passage of real time. The best story involves Robin Wright Penn and Jason Isaacs as two former lovers, now married to others, she pregnant, who meet by chance in a supermarket and during a casual conversation realize that although their lives are content, they made the mistakes of their lifetimes by not marrying each other. Stating this so boldly, I miss the subtle sympathy that Garcia has for all of his characters, who are permitted those tender moments of truth by which we learn what a tease life is - so slow to teach us how to live it, so quick to end. 8. \"King Kong.\" A stupendous cliff-hanger, a glorious adventure, a shameless celebration of every single resource of the blockbuster, told in a film of visual beauty and surprising emotional impact. Of course this will be the most popular film of the year, and nothing wrong with that: If movies like \"King Kong\" didn't delight us with the magic of the cinema, we'd never start going in the first place. Peter Jackson's triumph is not a remake of the 1933 classic so much as a celebration of its greatness and a flowering of its possibilities. Its most particular contribution is in the area of the heart: It transforms the somewhat creepy relationship of the gorilla and the girl into a celebration of empathy, in which a vaudeville acrobat (Naomi Watts) intuitively understands that when Kong roars he isn't threatening her but stating his territorial dominance; she responds with acrobatics that delight him, not least because Kong is a gorilla few have ever tried to delight. From their relationship flows the emotional center of the film, which spectacular special effects surround and enhance, but could not replace. 9. \"Yes.\" An elegant Irish-American woman, living with a rich and distant British politician, makes eye contact with a waiter. Neither turns away. Their sex is eager and makes them laugh. They are not young; they are grateful because of long experience with what can go wrong. He was a surgeon in Lebanon. Sally Potter tells their story in iambic pentameter, the rhythm scheme of Shakespeare. The dialogue style elevates what is being said into a realm of grace and care. Joan Allen stars, and has ever a movie loved a woman more? To recline at the edge of the pool in casual physical perfection is natural to her, disturbing to him. They realize they cannot live together successfully in either of their cultures. A third place is required. Their story is told in counterpoint with the bold asides of a cleaner (Shirley Henderson), who notes that for all their passion they shed the same strands of hair and flakes of skin and tiny germs as the rest of us, and must be cleaned up after. Bold, erotic, political, and like no other film I have ever seen. 10. \"Millions.\" The best family film of the year is by the unlikely team of director Danny Boyle (\"Trainspotting\") and writer Frank Cottrell Boyce (\"Hilary and Jackie,\" \"24 Hour Party People\"). Nine-year-old Anthony Cunningham and his 7-year-old brother, Damian (Lewis McGibbon and Alex Etel), find a bag containing loot that bounced off a train and is currently stuffed under their bed. With limitless imagination and joy, the film follows the brothers as they deal with their windfall. They begin by taking homeless men to Pizza Hut. Damian wants to continue their charity work, but Anthony leans toward investing in property. Oh, and Damian gets advice from saints, real ones. St. Francis of Assisi, his favorite, provides advice that Anthony is sure will get them into trouble. Despite how it sounds, this isn't a \"cute little film.\" The director makes hard-boiled movies, the writer has worked at the cutting edge, and this is what a family film would look like if it were made with the intelligence of adults. I have created as usual the Special Jury Prize, and, taking my lead from the Academy Awards, spun out such categories as feature documentary and animated films. I've also listed five prime candidates for my Overlooked Film Festival. The jury prize At film festivals, the \"jury prize\" is how some jury members urgently signal that THIS is the film they like better than the eventual winner. It's not second place, but somebody's idea of first place. Again this year there has been a 10- way tie, listed alphabetically: * \"Best of Youth\" by Marco Tullio Giordana, the story of two Italian brothers and their lives from 1963 to 2000, as they intersect with politics and history: the hippie period, the disastrous flood in Florence, the Red Brigades, kidnappings, hard times and layoffs, and, finally, a certain peace. * \"Broken Flowers\" by Jim Jarmusch. Another inward, intriguing performance from Bill Murray, as a millionaire who lives in isolation and loneliness until he learns he might once have fathered a child, and visits the possible mothers (Sharon Stone, Frances Conroy, Jessica Lange, Tilda Swinton and Julie Delpy). * \"Downfall\" by Oliver Hirschbiegel. We do not recognize Bruno Ganz, hunched over, shrunken, his left hand fluttering behind his back like a trapped bird. This is Adolf Hitler in his final days in the bunker beneath Berlin, where after his war was lost he waged it in fantasy. Pounding on maps, screaming ultimatums, he moved troops that no longer existed and issued orders to commanders who were dead. A chilling portrait of evil and madness. * \"Duane Hopwood\" by Matt Mulhern. A career-transforming performance by David Schwimmer, as an Atlantic City pit boss who loves his wife and children, and is losing everything because of alcoholism. Not the sensational drunk scenes of melodrama, but the daily punishment of the disease: Sometimes he drinks way too much. Sometimes he drinks too much. Sometimes he drinks almost too much. Sometimes he doesn't drink enough. Those are the only four sometimes for an alcoholic. * \"Good Night, and Good Luck\" by George Clooney. David Strathairn stars as Edward R. Murrow, who, with his CBS News colleagues, helped to bring about the downfall of the demagogue Sen. Joseph McCarthy. McCarthy (shown in archival footage) is a liar and a bully, surrounded by yes-men, recklessly calling his opponents traitors; he destroys others, and then is destroyed by the truth. * \"Match Point\" by Woody Allen. A return to greatness for Allen, not with a \"Woody Allen picture\" but with a thriller based on stomach-churning guilt. Jonathan Rhys-Meyers is a poor, ambitious tennis pro who marries well (to rich girl Emily Mortimer) while dallying with Scarlett Johansson, the former fiancee of his brother-in-law. Can he solve his problems with a perfect murder? * \"North Country\" by Niki Caro. Another powerful performance by Charlize Theron, as a working mother who becomes a miner on the Minnesota iron range and becomes the target of her male fellow union members. Based on the true story of the woman who inspired the first class-action lawsuit on sexual harassment. With great supporting work by Frances McDormand. * \"The New World\" by Terrence Malick. A visionary story of Pocahontas (Q'Orianka Kilcher), that places her, John Smith (Colin Farrell) and John Rolfe (Christian Bale) in an unspoiled sylvan forest where the Indians live in harmony with the land, and the English blunder in with guns and ignorance. Pocahontas falls in love with Smith, and her transformation leads to an unimaginable personal journey. * \"The Three Burials of Melquiades Estrada,\" directed by and starring Tommy Lee Jones (best actor, Cannes 2005). He plays a ranch hand whose Mexican friend is killed by a border patrolman (Barry Pepper). He forces the younger man to join him on a long journey with the body to the friend's birthplace, in a film that could have been directed by John Huston and starred Humphrey Bogart. * \"Pride & Prejudice\" by Joe Wright. Keira Knightley is the first among equals in a gifted cast that captures all the charm and romance of the Jane Austen novel. Set a little earlier and closer to the land than most Austen adaptations, so that the urgency of a fortunate marriage is underlined, and the characters seem less precious. Gloriously romantic. Special jury awards Film festivals also hand out special awards for excellence, and so do I, because, in the words of Mickey Spillane, \"I, the Jury.\" Alphabetically: * \"Batman Begins,\" the best and darkest of the Batman pictures. * \"Bee Season,\" with its wondrous performance by Flora Cross as a young woman with mystical gifts. * \"Cache,\" the French thriller about a family that knows it is being watched - but not why, or by whom, or how. * \"Capote,\" with Philip Seymour Hoffman's Oscar-bound performance as Truman Capote. * \"Fear and Trembling,\" with Sylvie Testud, who takes a job in Japan and finds herself a definitive outsider. * \"Firecracker,\" Steve Balderson's brilliant indie about a murder in small-town Kansas. * \"Harry Potter and the Goblet of Fire,\" with Harry surviving not only Lord Voldemort but the prom. * \"Head-On,\" a harrowing portrait of Turkish \"guest workers\" in Germany and their desperation on the margins. * David Cronenberg's \"A History of Violence,\" with Viggo Mortensen as a small-town diner owner who is pulled back roughly into his past. * \"Hustle & Flow,\" with Terrence Howard's great performance as a pimp who transforms himself through art. * \"Last Days,\" Gus Van Sant's uncompromising look at the decline and death of a character based on Kurt Cobain. * \"Lord of War,\" vibrating with the energy of Nicolas Cage's performance as a freelance arms dealer. * \"The Merchant of Venice,\" another reminder of Al Pacino's passion and fierce focus. * \"Mysterious Skin,\" about growing up gay in Kansas and thinking maybe aliens were involved. * \"Oldboy,\" from Korea, about a man who is kept prisoner for 15 years for reasons he cannot imagine. * \"Palindromes,\" Todd Solondz's challenging use of eight different actors in an examination of the moral complexities of abortion. * \"Proof,\" with Gwyneth Paltrow as the daughter of a great mathematician (Anthony Hopkins) who loses his mind but leaves behind historic work - or is it his? * \"Saraband,\" Ingmar Bergman's return in his 80s to the same characters and actors (Liv Ullmann and Erland Josephson) from his \"Scenes From a Marriage\" (1973). * \"Schultze Gets the Blues,\" starring Horst Krause as a simple German accordion player who wins a contest and finds himself in New Orleans playing zydeco polka. * \"Shopgirl,\" the bittersweet relationship between a millionaire (Steve Martin) and a clerk (Claire Danes) who are divided not so much by age or money as by courage. * \"Sin City,\" the visual extravaganza adapted from Frank Miller's dark graphic novels. * Noah Baumbach's \"The Squid and the Whale\" involves two divorcing writers (Jeff Daniels and Laura Linney), two sons with divided loyalties and all the mysteries of parents and children. * \"The Ballad of Jack and Rose,\" Rebecca Miller's film about an aging hippie (Daniel Day-Lewis) and his daughter (Camilla Belle), living in isolation on an island. * \"The Constant Gardener,\" with Ralph Fiennes and Rachel Weisz stumbling across reckless programs to test drugs in Africa. * \"The Memory of a Killer,\" with Jan Decleir as an aging Italian hit man, undertaking a last assignment although senility is approaching. * \"The Upside of Anger,\" with housewife Joan Allen and retired baseball pitcher Kevin Costner building a relationship on booze and the wrong assumptions. * \"The World,\" Zhang Ke Jia's revealing look at the culture of the workers in a Beijing theme park. * \"Turtles Can Fly,\" about children living amid the wreckage of war on the Iraqi-Turkish border. * And \"Walk the Line,\" for its astonishing performances by Joaquin Phoenix and Reese Witherspoon. Best documentaries * \"Grizzly Man,\" Werner Herzog's portrait of a man who loves bears unwisely and too well. * \"Aliens of the Deep,\" James Cameron's visual astonishment from the ocean floor. * \"Enron: The Smartest Guys in the Room,\" mercilessly explaining how Enron fabricated the California energy crisis. * \"Gunner Palace,\" about the daily lives of American soldiers in Iraq. * \"March of the Penguins,\" about the responsibilities of parenthood. * \"Murderball,\" about the sport of full-contact quadriplegic wheelchair rugby (yes). * \"No Direction Home: Bob Dylan,\" Martin Scorsese's look at the singer's odyssey. * \"Tell Them Who You Are,\" Mark Wexler's portrait of his complex and gifted father, the cinematographer Haskell Wexler. * \"Touch the Sound,\" about the deaf percussionist Evelyn Glennie. * \"The Wild Parrots of Telegraph Hill,\" about Mark Bittner, who knows San Francisco's wild parrots by name. Best animated films * \"Wallace & Gromit: The Curse of the Were-Rabbit,\" one of the most delightful films ever made. * \"Tim Burton's Corpse Bride,\" surprisingly cheerful under the circumstances. * \"Robots,\" with its future that looks like Tupperware. Overlooked * \"Off the Map,\" Campbell Scott's film with Joan Allen living in the New Mexico desert with her depressed husband (Sam Elliott) and imaginative daughter (Valentina de Angelis). * Gore Verbinski's \"The Weather Man,\" and Nicolas Cage brilliant again, as a man without a clue for his own happiness. * \"Keane,\" Lodge Kerrigan's portrait of a schizophrenic (Damian Lewis) trying to hold himself together. * \"Duma,\" Carroll Ballard's magnificent story of a boy and his cheetah. * \"The Woodsman,\" Nicole Kassell's film starring Kevin Bacon as a recovering pedophile. Roger Ebert is a film critic for The Chicago Sun-Times. Copyright © 2005 Glenns Falls Post-Star, Lawrence & Cooper Streets Glens Falls, NY, All Rights Reserved."}, {"article_id": "432517483", "match_score": 96.309963099631, "source": "Repository, The (Canton, OH)", "date": "August 1, 2005", "window_summary": "The archive window notes that Washington Post reporter Robin Wright was labeled 'liberal' by a researcher monitoring public-broadcasting guests, citing her viewpoint on U.S. intelligence adaptation to terrorism.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "In the op-ed, Robin Wright is portrayed as a journalist who was classified as 'liberal' by a paid researcher because she expressed the view that U.S. intelligence was oriented to the Cold War and had not adapted to new terrorist threats; the piece uses her as an example in criticizing the researcher and funding oversight.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "‘‘sorted people who appeared as guests on the shows into three camps: conservative, liberal and neutral.’’ When Washington Post reporter Robin Wright showed up on ‘‘The Diane Rehm Show,’’ Mann’s investigative expertise marked her down as a liberal. The proof, accord- ing", "newsbank_text": "American journalists owe a debt to Kenneth Tomlinson, chairman of the Corporation for Public Broadcasting, a fervent purifier of those radio and television programs from liberal bias — particularly the cleansing of any criticism of the Bush administration. He has taught us journalists what we should have already known: no element of journalism should seek or accept government funds, from any administration. Mr. Tomlinson has clearly shown that \"political orthodoxy\" is not the ideological monopoly of Michael Moore, MoveOn.org, George Soros or Al Franken. But those communicators do not have the heavy hand of government to police public speech in order to help strengthen their political goals. As what George Orwell might have called the Big Brother of the public broadcasting system, Tomlinson paid $14,700 of public funds to Fred Mann, a \"researcher,\" to monitor present and past public broadcasting shows by Bill Moyers, Tavis Smiley, David Brancaccio, Diane Rehm (of whom Mr. Tomlinson professes to be \"a great admirer\"), and even the witty conservative Tucker Carlson. (His guests too \"proved\" to be suspect.) If Mann or another \"researcher\" is to be paid to do an encore, I expect National Public Radio’s \"Morning Edition\" — a source of many of my news leads — could be included for its illuminating June 20 report of Mr. Mann’s methodology for ferreting out leftists. NPR reporter David Folkenflik noted that Fred Mann \"sorted people who appeared as guests on the shows into three camps: conservative, liberal and neutral.\" When Washington Post reporter Robin Wright showed up on \"The Diane Rehm Show,\" Mr. Mann’s investigative expertise marked her down as a liberal. The proof, according to Mann: \"Ms. Wright’s viewpoint was that U.S. intelligence was geared to fight the Cold War and did not adapt to the new threat of terrorism.\" Hello? Worse yet, as Folkenflik added, Tucker Carlson was a host of interest to Mann because on his show, there were \"more liberal guests than conservatives.\" Could it be that Tucker Carlson wanted to make fun of them? To discover that Bill Moyers, on his weekly hour, was not an admirer of the Bush administration is like, in the old phrase, \"shooting ducks in a barrel.\" I was a guest on that show once, citing the damage that certain sections of the Patriot Act and subsequent administration executive orders were doing to the Bill of Rights. But I was also a guest on William Buckley’s \"Firing Line\" when it was on PBS — a program I wish was back there again. And currently, Wall Street Journal editors and writers can instructively be seen and heard every week on PBS. Moreover, each night, on \"The NewsHour with Jim Lehrer\" there is intense jousting between liberals and conservatives. Tomlinson is being so ham-handed in his mission to protect the Bush administration from dread diversity of ideas that I would think someone at the White House — or among the Republican leadership in Congress — would be at least embarrassed. After all, the president has said we should pride ourselves that in this constitutional democracy, our government is \"transparent.\" Furthermore, it is demeaning to such forcefully articulate administration policy makers as Donald Rumsfeld, Condoleezza Rice and John Negroponte to imply that they need Kenneth Tomlinson to buffer them against contrasting views on public broadcasting programs. Tomlinson, however, seems to have no limits to his sense of himself as a commander of the president’s Praetorian Guard. He has successfully managed to install Patricia Harrison as the new CEO and president of the Corporation for Public Broadcasting. Her credits for this prestigious post — as tribune of the free flow of diverse views to the public — include her previous services as co-chairwoman of the Republican Party! It is as if George Soros were to become editor-in-chief of the Associated Press. Long ago, during my unformed youth, I was speaking on a panel as an anti-Communist (having read Arthur Koestler’s \"Darkness at Noon\" when I was 15) but wondering about the possibilities of \"democratic socialism.\" A libertarian on the panel asked me how long I thought a free press would flourish under any kind of socialist government. Like a clap of thunder, I was awakened from my fantasy. Now, under a Republican administration, \"public\" broadcasting is being investigated as if we were subject to so statist a government that we must be insulated from insufficient appreciation of this administration’s virtues. This would be farcical if it weren’t actually happening. But I am grateful to Tomlinson for illuminating the sticky strings that come with government financial support of the press — which must be free to be free. Nat Hentoff is a nationally renowned authority on the First Amendment and the Bill of Rights and author of several books. Copyright 2005, The Repository, All Rights Reserved."}, {"article_id": "279980649", "match_score": 95.71984435797664, "source": "Bucks County Courier Times (Levittown, PA)", "date": "February 26, 2005", "window_summary": "The archive excerpt lists Robin Wright as playing Forrest Gump's love interest in the film Forrest Gump.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The TV listing describes Forrest Gump and credit-rolls Robin Wright as a co-star who plays Forrest's love interest; it is a straightforward cast mention.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "becomes a Vietnam War hero millionaire entrepreneur and witness to history. Sally Field co stars As Forrest a protective Mother Robin Wright plays his love interest and Gary Sinise portrays his reluctant buddy. The film won six Academy awards. Law amp order", "newsbank_text": "Catch it tonight ''The People Next Door,'' 7 p.m., Lifetime A mother of three (Nicollette Sheridan) who's just fled her abusive husband finds instant friendship with her new neighbors (Tracy Ellis, Michael O'Keefe). They're a wealthy, childless couple who give generously of their time and money to help the struggling family. What she doesn't know is that they want something in return: her kids. Faye Dunaway also stars in this 1996 thriller. ''Forrest Gump,'' 8 p.m., ABC Tom Hanks stars in the feel-good blockbuster of 1994. Simple-minded Forrest (Hanks) takes a head-on approach to life and becomes a Vietnam War hero, millionaire entrepreneur and witness to history. Sally Field co-stars as Forrest's protective mother, Robin Wright plays his love interest, and Gary Sinise portrays his reluctant buddy. The film won six Academy Awards. Law & Order, 8 p.m., NBC Four pedestrians are gunned down on a sidewalk in ''All in the Family.'' Fontana and Green (Dennis Farina, Jesse L. Martin) discover one of the victims had ties to Russian organized crime and was helping the feds. The killers are found, but issues of jurisdiction and religion make things difficult for McCoy (Sam Waterston). Mercedes Ruehl guest stars. America's Most Wanted: America Fights Back, 9 p.m., Fox In the new episode ''Without a Trace Special Edition,'' the person being sought isn't wanted for a crime; she's the possible victim of one. A popular nursery-school teacher, she was enjoying a day at the shore, painting the scenery and having lunch, when she vanished. Host John Walsh travels to the scene of her disappearance and discloses the identity of a man who may have access to the solution for this mystery. ''Never Die Alone,'' 10 p.m., Cinemax Rapper DMX stars in this 2004 drama as King David, a drug dealer who's decided to reform, starting by repaying the money he owes to a crime boss. Things go wrong when his thugs come to collect, and David is mortally wounded. His story unfolds in flashbacks after a wannabe writer (David Arquette) comes into possession of his money and belongings, including a diary of sorts on audiotape. Copyright, 2005, Bucks County Courier Times"}, {"article_id": "211326043", "match_score": 95.67099567099568, "source": "Charleston Daily Mail (WV)", "date": "October 13, 2005", "window_summary": "The archive window identifies Robin Wright Penn as Diana, a pregnant wife whose life is disrupted by an encounter with an old lover in the vignette.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The review of Nine Lives lists Robin Wright Penn as one of the ensemble actors (playing Diana) in the anthology; her role is described factually as part of the film’s mosaic of female-centered vignettes.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "fit in among other prisoners and a guard Miguel Sandoval with veto Power Over visits with her daughter. A Diana Robin Wright Penn is a pregnant wife whose placidity is shattered by a Chance meeting with an old Lover Jason Isaacs at", "newsbank_text": "Nine Lives (R) HH 1/2 The anthology film is a delicate balance for a filmmaker and a tough sell for audiences used to a cohesive story and consistent characters to carry them from beginning to end. Yet Rodrigo Garcia continues to specialize in piecemeal filmmaking, following his previous anthology films \"Ten Tiny Love Stories\" and \"Things You Can Tell Just by Looking at Her\" with \"Nine Lives,\" essentially a medley of short films about women with a few recurring characters. Like a solid collection of short stories, some of Garcia's little dramas are riveting, some are explosive, some are merely intriguing, and they collectively add up to an emotional total somewhat less than their parts. A few of the vignettes pack a wallop. Others simply breeze by to little effect. Garcia rounded up a huge, lustrous cast and accomplished an impressive feat of scheduling and camera choreography to shoot his nine stories in just 18 days - two days apiece, each segment captured in single takes lasting 10 to 14 minutes. The stories in a nutshell: * Jail inmate Sandra (Elpidia Carrillo) walks a tightrope to fit in among other prisoners and a guard (Miguel Sandoval) with veto power over visits with her daughter. * Diana (Robin Wright Penn) is a pregnant wife whose placidity is shattered by a chance meeting with an old lover (Jason Isaacs) at a supermarket. * Holly (Lisa Gay Hamilton) storms into her childhood home to confront her stepfather over the trauma he inflicted. * The seemingly happy relationship Sonia (Holly Hunter) has with her boyfriend (Stephen Dillane) turns sour after he discloses a painful secret to their friends. * Teenager Samantha (Amanda Seyfried) is an emotional tennis ball putting on a supportive front for her physically crippled father (Ian McShane) and psychologically crippled mother (Sissy Spacek). * Lorna (Amy Brenneman) finds herself a pariah at the funeral of her ex-husband's wife, who committed suicide. * Missing romance at home with her crippled husband, Ruth (Spacek again) mulls a romantic fling with a garrulous suitor (Aidan Quinn). * Cancer victim Camille (Kathy Baker) rages to her husband (Joe Mantegna) about the breakdown of her body as she prepares for breast-removal surgery. * Maggie (Glenn Close) and daughter Maria (Dakota Fanning) share a wistful graveside picnic. Rounding out the cast are Molly Parker, William Fichtner, Mary Kay Place and Sydney Tamiia Poitier. The performances are remarkable, the actors clearly reveling in the theatrical flourish of shooting their scenes in one continuous take. While the women - notably the subtle Spacek and Seyfried and the combustible Hamilton - dominate, the men provide tremendous support, especially Quinn in an uncharacteristically open and accessible turn. The actors perform a skillful dance to stay ahead of the camera, which follows them down hallways, up elevators, outdoors and back inside, all this motion fluid and graceful. Characters recurring from one vignette to another sometimes become a distraction, leaving viewers to grasp for links between the scenarios that are not there. In a couple of instances, notably Spacek's reappearance, the backstory examined in her first scene greatly illuminates the dilemma and decisions her character makes in the second. It's both a blessing and a curse that Garcia, the son of author Gabriel Garcia Marquez, manages to pack so much into these portraits. You quickly become invested in the characters, but then are yanked away and hurled into another situation without time to digest the previous one. Each component of \"Nine Lives\" generally leaves you wanting more. That's usually a positive result on a full-length film to keep audiences talking and thinking long after they have left the theater. With \"Nine Lives,\" it becomes taxing at times, slipping into the groove of one woman's story only to have it abruptly dropped for the next. The stories are sketches, often without resolution, and while individual segments succeed admirably, taken together the portraits are a fitful match. Copyright, 2005, Charleston Newspapers"}, {"article_id": "258293266", "match_score": 95.52845528455283, "source": "Orlando Sentinel, The (FL)", "date": "May 22, 2005", "window_summary": "The excerpt says Robin Wright Penn appears in flashback scenes as Miles' elegant mother but that those flashback scenes give her a 'thankless' role.", "window_context": "career", "window_tone": "negative", "fulltext_summary": "The review of HBO's Empire Falls notes Robin Wright Penn is cast in thankless flashback scenes as Miles's elegant mother, implying her role is minor and underused amid an otherwise strong ensemble.", "fulltext_context": "career", "fulltext_tone": "negative", "archive_window": "never easy on film a before coming to a revelation about his family the Flashback scenes give thankless roles to Robin Wright Penn As Miles elegant Mother and Philip Seymour Hoffman As a mystery Man. There Are impressive actors crammed into every", "newsbank_text": "On paper, the miniseries of Empire Falls sounds awesome. On film, it plays as if it's still on paper. The Pulitzer Prize-winning novel becomes a sprawling, inert HBO miniseries. The two-part, 31/2-hour drama, which starts Saturday and concludes May 29, is a major disappointment. The mostly impeccable cast, led by Ed Harris and Paul Newman, works lovingly on this saga of small-town life. With a sure hand, director Fred Schepisi evokes the sad, faded atmosphere of fictional Empire Falls, Maine. But everyone is at the mercy of Richard Russo, who adapted his book. Russo loads down the plot with chapters, narration and flashbacks that sap the drama's energy. The miniseries is not a good advertisement for an outstanding novel. The executive producers, who include Newman, obviously adore Russo and the book. They could have shown their affection by letting someone else adapt the novel and mold it into a satisfying script. The meandering Empire Falls follows many characters and jumps back and forth in time. The dawdling style gives way to a traumatic event that stuns the town and overshadows everything that has come before. The script concludes with a bit of head-scratching philosophy rather than a worthwhile emotional payoff. No one will blame you if you want to get out of town. Even so, some exceptional actors still make Empire Falls worth a look. The central character is Miles Roby (Harris), who runs the Empire Grill and feels stuck in life. Miles has strained relations with his needy ex-wife, Janine (Helen Hunt); his crabby, disheveled father, Max (Newman); and the grill's owner, Francine Whiting (Joanne Woodward). The best reasons to visit Empire Falls are Newman and Woodward. She portrays the town's matriarch with malevolent glee and taunts Miles, \"I know you better than you know yourself.\" Behind scraggly hair and a dirty beard, Newman gives a funny, energetic performance as an old scam artist. Harris does as well as he can with a tricky role, playing a trapped, lonely man who has trouble expressing himself. The actor's best moments are as loving father to Miles' teen daughter, Tick (Danielle Panabaker). But Harris also has to spend a lot of time contemplating the past -- never easy on film -- before coming to a revelation about his family. The flashback scenes give thankless roles to Robin Wright Penn as Miles' elegant mother and Philip Seymour Hoffman as a mystery man. There are impressive actors crammed into every corner of Empire Falls. They include Aidan Quinn as Miles' brother, Estelle Parsons as a bar owner, Theresa Russell as a waitress, Dennis Farina as a health club owner, William Fichtner as a police officer and Kate Burton as a longtime admirer of Miles. Law & Order star Farina gives the showiest performance, and Oscar-winner Hunt delivers the weakest as the strident, unhappy Janine. Empire Falls struggles to say something about the frustrations and limitations of small-town life. But because the miniseries lacks emotional punch, the larger issues matter less than the smaller pleasures. The Maine locations, a bouncy musical score and a psychotic cat add distinctive flavor. In the end, Empire Falls represents another great novel lost in translation to film. In this case, blame the author. Copyright 2005 Sentinel Communications Co."}, {"article_id": "261248666", "match_score": 95.27896995708154, "source": "Daily Herald (Arlington Heights, IL)", "date": "May 27, 2005", "window_summary": "The archive excerpt indicates Robin Wright Penn appears as Grace, Miles' mother, in the HBO adaptation.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The review of HBO's Empire Falls describes Robin Wright Penn playing Grace (Miles' mother) as part of an A‑list ensemble; she is presented positively as a contributing member of a strong cast.", "fulltext_context": "career", "fulltext_tone": "positive", "archive_window": "Story exists if anywhere in places the present mingles with the past As Miles recalls his childhood with his Mother Robin Wright Pennis Grace and the affair she had one summer while Max was in jail with a certain Charlie Mayne played", "newsbank_text": "Having rubbed the broadcast networks' noses in the dirt with declarations like, \"It's not TV, it's HBO,\" the top premium-cable channel is now taking on feature films. HBO already did Tony Kushner's Pulitzer Prize-winning \"Angels in America\" better than any movie could have, allowing it to sprawl in its entirety across two long nights, just as it did on Broadway. Now HBO moves on to Richard Russo's Pulitzer-winning novel, \"Empire Falls.\" The best seller was supposedly pursued by all the top movie studios, but wound up on HBO, in part because producer Paul Newman felt it would be a travesty to cut it down to the two-hour running time typical of Hollywood films. So it debuts on HBO in two parts at 8 p.m. Saturday and Sunday, at three and a half hours from start to finish, and it's hard to argue with the results. Russo himself writes the script, which retains the whimsical irony of his book with the help of a narrator, and director Fred Schepisi keeps the tone dry and comical, the better to cast the melodrama in relief. Best of all, the A-list cast can compete with Hollywood's most hyped holiday Oscar bait. Newman delights in the role of the eccentric old reprobate Max, and Ed Harris is expressively stoic as his son, Miles. Helen Hunt, Philip Seymour Hoffman, Aidan Quinn and, of course, Newman's running mate Joanne Woodward all turn in stellar work that nevertheless remains true to the understated aims of the novel. Not only is this the sort of small, humble, nonetheless powerful boutique project HBO is famous for, it's also the sort of thing HBO subscribers are happy to pay for - even if it prompts their cheapskate friends to ask them to put it on tape and pass it around. So whether you see it now, secondhand on tape or on DVD when it makes its inevitable way to home video, \"Empire Falls\" makes for rewarding viewing. Too subtle to fit in on broadcast TV or among the current crop of feature films, it truly is the sort of thing only HBO is doing right now. Harris stars as Miles, an underachiever in the underachieving title town, a depressed old mill village along the Knox River in Maine. He looks after his dad - as much as he'll let himself be looked after - and runs the Empire Grill, where like most of the residents he's beholden to Woodward's local matriarch Francine Whiting. He has half-custody of his sweet if somewhat surly daughter, Christina (Danielle Panabaker), at least until his divorce is final from Helen Hunt's Janine. Having dropped 50 pounds since ending her unhappy marriage, she's about to remarry with Dennis Farina's blustery fitness maven Walt, better known as \"The Silver Fox.\" Still, everyone meets at the grill and pretty much gets along - when Janine isn't yelling at Miles over how little he loved her, that is. Miles has a brother who helps out at the grill, Quinn's David, and a waitress he's sort of sweet on, Theresa Russell's Charlene, but his life is mostly placid and calm. It only rocks a little when the crippled Cindy Whiting, played by Kate Burton, returns to display as strong a crush on him as ever. There's not much narrative drive to \"Empire Falls.\" It's more a character study of a small town in cross-section. The story exists, if anywhere, in places the present mingles with the past, as Miles recalls his childhood with his mother, Robin Wright Penn's Grace, and the affair she had one summer, while Max was in jail, with a certain Charlie Mayne, played by Hoffman. It's unclear if Grace orchestrates their meeting, but when she and Miles sit down next to Charlie at a Martha's Vineyard restaurant while on vacation, and she asks, \"Are you eating alone?\" Charlie replies, \"Alas,\" with a self- conscious sigh you could jab with a fork. Miles has issues not even he is aware of, and those issues are going to bubble up until they're resolved, for better or for worse. That's where most of the drama of \"Empire Falls\" lies. In the concluding segment there's a fistfight that seems all too Hollywood, as well as an all-too-topical plot twist that is entirely Russo's doing. But for the most part the production thrives on the exquisite acting and a persistent note of sadness, thinly veiled by Russo's occasional wry commentary in the narration and the dry wit of his dialogue. If the end seems a little flat, well, it only shows that not even HBO has found a way to re-create the literary magic of a perfect passage like the last paragraph of \"The Great Gatsby.\" But they seem to be working on it; just give them time. - Ted Cox's column runs Tuesday and Thursday in Suburban Living, Friday in sports and Friday in Time out! Copyright 2005 Daily Herald"}, {"article_id": "281486224", "match_score": 94.77911646586344, "source": "Hawk Eye, The (Burlington, IA)", "date": "August 15, 2005", "window_summary": "The archive snippet lists a person named Robin Wright of Chicago as one of the deceased woman's brothers in an obituary.", "window_context": "family", "window_tone": "neutral", "fulltext_summary": "The full obituary enumerates survivors and includes a brother named Robin Wright of Chicago; the reference appears to be a familial mention rather than the actress.", "fulltext_context": "family", "fulltext_tone": "neutral", "archive_window": "of Carthage and four Brothers Richard Wright of Carthage Roland Wright of Kenny 111., Randy Wright of mount pleasant and Robin Wright of Chicago. Besides her husband she was preceded in death by a daughter and her Stepfather. Visitation will be from", "newsbank_text": "Born Sept. 10, 1940, in Jacksonsville, Ill., she was the daughter of Bill and Mary Bennett Wright. In 1962 she married Herman Glen Vogler in Chicago. He died in 1996. Mrs. Vogler was a 1958 graduate of Bowen High School and a 1988 graduate of Carl Sandberg College in Carthage, where she received an associate degree in accounting. She was a member of the Burnside Christian Church. Survivors include one daughter, Faye Stephenson of Kahoka, Mo.; her mother, Mary Wright of Burnside; three granddaughters; two great-grandchildren; four sisters, Crystal Mittlehouse of Sedalia, Mo., Carmen Coyle of Georgia, and Joyce Roberts and Cheri Dale, both of Carthage; and four brothers, Richard Wright of Carthage, Roland Wright of Kenny, Ill., Randy Wright of Mount Pleasant, and Robin Wright of Chicago. Besides her husband, she was preceded in death by a daughter and her stepfather. Visitation will be from 6 to 8 p.m. today at Printy Funeral Home in Carthage. The funeral for Mrs. Vogler will be 2 p.m. Monday at Burnside Christian Church in Burnside. Burial will follow in St. Mary's Cemetery in St. Mary, Ill. Copyright, 2005, The Hawk Eye, Burlington IA"}, {"article_id": "262985649", "match_score": 94.7136563876652, "source": "Daily Breeze (Torrance, CA)", "date": "December 25, 2005", "window_summary": "The archive excerpt names Robin Wright Penn as one of the co-stars (alongside Kathy Baker, Glenn Close and Holly Hunter) of the film Nine Lives.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full Ask Stacy column briefly notes that Amy Brenneman's film Nine Lives co-stars Robin Wright Penn; Wright is mentioned only as a cast member, with no further detail about her role or career.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "who resiliently meet the tra vails and disappointments of life also co stars Kathy Baker Glenn close Holly Hunter and Robin Wright Penn. Amyl a also Busy being a Mother to two. She has a 4-year-old daughter and her son was born", "newsbank_text": "Dear Stacy: What has Shelley Long been up to lately? Will we see her soon in something besides brief appearances on sitcoms? -- ART R., Torrance Dear Art: Yes, you will. In fact, the former \"Cheers\" star has three flicks on the way. Long has already completed the Hallmark TV movie \"Falling in Love with the Girl Next Door,\" which hits the airwaves in February. In it, she co-stars with Patrick Duffy and Patty Duke. She's also currently filming the comedy \"Trust Me,\" with Craig Ferguson. Her next project, \"The Last Guy on Earth,\" stars Rob Schneider as a man who becomes a hot ticket in town after the ladies discover that he is the last guy on Earth. Dear Stacy: I really miss \"Judging Amy.\" Can you tell me what Amy Brenneman and Tyne Daly are up to these days? -- RENEE D., Brooklyn, N.Y. Dear Renee: Amy has the compelling flick \"Nine Lives\" making the festival circuit. The movie about nine women who resiliently meet the travails and disappointments of life also co-stars Kathy Baker, Glenn Close, Holly Hunter and Robin Wright Penn. Amy's also busy being a mother to two. She has a 4-year-old daughter, and her son was just born in June. As for Tyne Daly, she's set to star with John Slattery and Cynthia Nixon in the Broadway play \"Rabbit Hole,\" scheduled to open in February. Dear Stacy: I'm interested in what has become of Bitty Schram, who played the nurse/sidekick on \"Monk.\" I miss her and wonder what she is doing now. Tony Shalhoub is great! -- GLORIA G., Brooklyn, N.Y. Dear Gloria: The talented Schram has been on and off the radar since leaving \"Monk\" in 2004 after a reported salary dispute. In September, she appeared in an episode of \"Kitchen Confidential\" and was also in the recent comedy flick \"A-List.\" According to her former cast mate Shalhoub, Schram has plenty of offers coming her way. He told this column recently, \"Bitty has so many opportunities opening up for her now ... she has bigger fish to fry.\" Dear Stacy: Last year on \"Desperate Housewives,\" Lynette had \"four kids under the age of 5.\" This year, I've only seen two. What happened to the twin boys? -- ROBERTA D., Cedar Rapids, Iowa Dear Roberta: Lynette still has four children. They're just not all seen all the time. There are the oldest twins, Preston and Porter, who still repeatedly misbehave. The middle child is Parker, who invented an imaginary friend to help cope with his mother's new job, and the youngest is baby girl Penny. Dear Stacy: I adored the Sagal twins, who starred in \"Double Trouble.\" It seems their older sister, Katey, is in the limelight. Where are the twins today? -- A.P., Astoria, N.Y. Dear A.P.: You are referring to Liz and Jean Sagal, who were also known as the \"Doublemint\" Twins of the early '80s. While their sister Katey's acting career has bloomed with shows like \"Married ... With Children\" and \"8 Simple Rules,\" the twins have chosen different paths. Liz has gone on to write for such shows as \"Charmed\" and \"Monk,\" while Jean has gone on to direct shows like \"Just Shoot Me!\" and \"Mad TV.\" Dear Stacy: What happened to the MTV show \"Meet the Barkers\"? Is it coming back? -- ERIC D., Springfield, Mass. Dear Eric: Production is under way for the next season of the reality show centered on Travis Barker (drummer of Blink 182) and wife Shanna, but no debut date has been slated as yet. Dear Stacy: Whatever happened to \"The Phantom's\" Gerard Butler? What is he doing now? -- M.S., New York, N.Y. Dear M.S.: Butler is certainly keeping busy since starring as the Phantom. His most recent flick, \"Beowulf & Grendel,\" in which he plays Beowulf, has been hitting the festival circuit this year. He's now working on the action flick \"300.\" The movie is about the 480 B.C. Battle of Thermopylae, in which the King of Sparta led his army against the advancing Persians. Butler, of course, plays King Leonidas. It co-stars Lena Headley as Queen Gorgo and Rodrigo Santoro as Xerxes. It's also been announced that he will play the poet Robert Burns alongside Julia Stiles in the movie \"Burns.\" Send your questions to Ask Stacy in care of the Daily Breeze, 5215 Torrance Blvd., Torrance, CA 90503-4077.Ask Stacy Copyright (c) 2005, Daily Breeze, All Rights Reserved"}, {"article_id": "302806796", "match_score": 94.0677966101695, "source": "Wisconsin State Journal (WI)", "date": "December 8, 2005", "window_summary": "The excerpt mentions Robin Wright Penn as part of the \"ridiculously strong\" ensemble cast of the film collection \"Nine Lives.\"", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full entertainment blurb lists Robin Wright Penn among notable actors in Rodrigo Garcia's \"Nine Lives,\" presenting her as a member of a high-quality ensemble and recommending the film.", "fulltext_context": "career", "fulltext_tone": "positive", "archive_window": "at her featuring a ridiculously Strong cast that includes Holly Hunter Sissy Spacek Aidan Quinn Joe Mantegna Dakota fanning and Robin Wright Penn. Its Short attention Span theater for the Althouse crowd and it opens Friday. A Rob Thomas", "newsbank_text": "Kathy Mattea, Overture Hall, Wednesday Here's one holiday event that shouldn't get lost in the rush of shows. A former country hit maker, Mattea has shifted to folk music on a small record label with terrific results. Unlike many other performers on tour during the holiday season, Mattea recorded two albums of Christmas music and pushed both into wonderful realms. Mattea's song selections are unique, and when she performs a Christmas standard, it's done with a fresh arrangement. The show's at 7:30 p.m. Ticket info is available at www.overturecenter.com. -- Tom Alesia \"The Nutcracker,\" Madison Ballet, Overture Hall, opening Saturday A colossal set will have patrons marveling. But Madison Ballet also presents talented dancers, including a few professionals, to spark the production. Madison Ballet is presenting \"Nutcracker\" six times -- 2 and 7:30 p.m. Saturday; 2 p.m. Sunday; 7:30 p.m. Dec. 16-17; and 2 p.m. Dec. 18 -- and it's certain to draw fans of all ages. The Wisconsin Chamber Orchestra handles the delightful score. -- Tom Alesia \"Hansel & Gretel,\" Opera for the Young, two locations This weekend, Opera for the Young offers two shows in the suburbs: 7:30 p.m. Friday at the Verona Performing Arts Center and 2 p.m. Saturday at Middleton Performing Arts Center. Opera for the Young has been around since 1970, introducing kids to opera and enticing adults. Show details are available at www.operafortheyoung.org. -- Tom Alesia 'Nine Lives' opens at Hilldale Theatre Between \"Syriana,\" \"Narnia,\" and \"The Squid and the Whale,\" there's a plethora of good movies to have to choose from this weekend. And, if that wasn't enough, Hilldale is bringing in nine more. Well, nine short films, anyway, for the price of one ticket. \"Nine Lives\" brings together a series of 10-minute short vignettes by writer-director Rodrigo Garcia (\"Things You Can Tell Just by Looking at Her\"), featuring a ridiculously strong cast that includes Holly Hunter, Sissy Spacek, Aidan Quinn, Joe Mantegna, Dakota Fanning and Robin Wright Penn. It's Short Attention Span Theater for the arthouse crowd, and it opens Friday. -- Rob Thomas John Lennon tribute at High Noon Wednesday Just because you're paying tribute to one of the great songwriters of the 20th century and making a stand against handgun violence doesn't mean you can't be comfy. That's the thinking behind the Madison band Yammer's decision to mark the 25th anniversary of John Lennon's murder by re-creating his infamous 1969 \"bed-in\" with Yoko Ono. The show \"Imagine No Handguns\" will take place at 7 p.m. Wednesday at the High Noon Saloon, 701 E. Washington Ave., and will feature Yammer, the Buffali, Lynette Margulies and other celebrity guests performing some Lennon covers while under the covers. The cover charge is $6.
