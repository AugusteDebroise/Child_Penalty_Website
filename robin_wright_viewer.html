” a road - trip tale about a man preparing for the final surgi - cal procedures to become a woman ; Dina Korzun as a Russian woman married to a rock ' n ' roll legend who becomes involved with her husband ' s son in “ Forty Shades of Blue ” ; S . Epatha Merkerson as proprietor of a boarding house who takes in an outcast teen in “ Lackawanna Blues ” ; and Cyndi Williams in “ Room , ” about a Texas woman who goes in search of a mysterious place she sees in visions . The nonprofit group Film Independent , which sponsors the Independent Spirit Awards , will announce win - ners March 4 , the night before the Academy Awards . Along with Eisenberg , sup - porting - actor nominees were Firdous Bamji for “ The War Within , ” about a Middle Eastern man involved in a ter - rorist plot in New York City ; Matt Dillon as a bigoted cop in the ensemble drama “ Crash ” ; Barry Pepper as a Border Patrol agent who kills a Mexican immigrant and is forced by the victim ' s friend to dig up the body for reburial in Mexico in “ The Three Burials of Melquiades Estrada ” ; and Jeffrey Wright as a man who sends his neigh - bor on a quest to find the son he never knew in “ Broken Flowers . ” Supporting - actress picks were Amy Adams as a Southern waif captivated by her new sister - in - law from up north in “ Junebug ” ; Maggie Gyllenhaal as a gold - digger pursuing an older man in “ Happy Endings ” ; Allison Janney as a mom trying to hold her crumbling family together in “ Our Very Own ” ; Michelle Williams as a wife stung by revelations her hus - band is carrying on with another man in “ Brokeback Mountain ” ; and Robin Wright Penn as a married woman thrown into turmoil by a chance encounter with an old lover in “ Nine Lives . ” Daniels was nominated for lead actor and Linney for lead actress as parents going through a caustic divorce in the movie , inspired by writer - director Baumbach ' s own parents ' breakup . Copyright 2005, 2007, American Press. All Rights Reserved."}, {"article_id": "302919417", "match_score": 91.21338912133892, "source": "Wisconsin State Journal (WI)", "date": "November 1, 2005", "window_summary": "The archive window presents a playful celebrity-name mashup that includes Robin Wright Penn in a joke about combining famous names.", "window_context": "other", "window_tone": "neutral", "fulltext_summary": "The full item is a light, humorous column combining famous names; it mentions Robin Wright Penn only as part of a gag (If Robin Wright Penn and Fred Gwynne had a daughter...), portraying her in a trivial, jocular manner.", "fulltext_context": "other", "fulltext_tone": "neutral", "archive_window": "lot of government or work As Flatley Dee Nye. Of Carmen Electra married Alonzo mourning would Electra become mourning of Robin Wright Penn and Fred Gwynne had a daughter named Marjorie would she be Marge of the Penn Wynnes of Billy Crystal", "newsbank_text": "Author: Compiled from oregonlive.com; World Features Syndicate; No Kidding . E-mail us at theskinny@ madison.com. Section: DAYBREAK 277 Words Page: D1 OpenURL Link Recently, the Washington Post asked its readers to marry or otherwise combine famous names and supply the result. Some of our favorite unions: * If Ewan MacGregor married James Watt and then Dick Armey, would he be Ewan Watt Armey? * If Tyra Banks married Harrison Ford, she'd be the model T. Ford. * If Glenn Close married Bob Seger but didn't change her name, would she be Close but no Seger? * If Ivana Trump, Samantha Bee, Lorna Luft and Oksana Baiul formed a matchmaking firm, it would be Ivana Bee Luft Baiul. * If Michelle Wie married Prince William, she'd be the royal Wie. * If Irish dancer Michael Flatley partnered with Sandra Dee and Louis Nye, they'd get a lot of government PR work as Flatley Dee Nye. * If Carmen Electra married Alonzo Mourning, would Electra become Mourning? * If Robin Wright Penn and Fred Gwynne had a daughter named Marjorie, would she be Marge of the Penn- Gwynnes? * If Billy Crystal married Tristram Shandy and then King Lear, would he be Crystal Shandy Lear? * If Alice Cooper married Garry Trudeau, Keye Luke, Larry King and Philip Glass, would he be Alice Trudeau Luke King Glass? * If Frank Oz married Sen. Pat Leahy and then President Hu Jintao, he'd be Yoda Leahy Hu. * If Uma Thurman married Monty Hall, would she be Monty's Uma? * If Don Ho married Heidi Fleiss, she'd be Heidi Ho. ... and more of the same The Names They Considered * Virgin record label -- considered \"Slipped Disc Records\" * Outback Steakhouse -- \"Dundee's\" and \"Sydney's\" * Revlon -- \"Revlac\" * Fortune magazine -- \"Power\" * Whatchamacalit candy bar -- \"Hello Mouth\" and \"Eat Me!\" * Sony -- \"Sonny\" and \"TTK,\" for Tokyo Tsushin Kogyo Copyright, 2005, Madison Newspapers, Inc."}, {"article_id": "300838374", "match_score": 91.2, "source": "Charleston Gazette (WV)", "date": "May 22, 2005", "window_summary": "The archive excerpt identifies Miles' mother, Grace, as played by Robin Wright Penn and notes she died when Miles was young (appearing only in flashback material).", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full article is a review of HBO's Empire Falls that describes the ensemble cast and specifically notes Robin Wright Penn appears as Miles' deceased mother Grace (only in flashback scenes) as part of the praised ensemble.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "angry about her parents imminent divorce and her Mother s Helen Hunt approaching remarriage to another Man. Miles Mother Grace Robin Wright pen died when Miles was a Young Man but his irascible father Max Paul Newman is still around doing halfhearted", "newsbank_text": "An all-star cast brings to vibrant life Richard Russo's \"Empire Falls\" in a funny and achingly beautiful two-part adaptation airing Saturday and Sunday on HBO. Set in a declining Maine mill town, the TV movie stars four-time Oscar nominee Ed Harris (\"Pollock\") as Miles Roby, the central character, who is in a kind of emotional paralysis as the story opens. As a boy, Miles showed great promise for a successful life far beyond his struggling hometown, but fate and family obligations born out of long-buried secrets have forced him to remain in Empire Falls, where he scrapes out a living running the Empire Grill for Francine Whiting (Joanne Woodward), the iron-willed widow whose family owns anything worth owning in Empire Falls. At the center of Miles' life is his sensitive teenage daughter, Tick (Danielle Panabaker), who is angry about her parents' imminent divorce and her mother's (Helen Hunt) approaching remarriage to another man. Miles' mother, Grace (Robin Wright Penn), died when Miles was a young man, but his irascible father, Max (Paul Newman), is still around, doing halfhearted odd jobs in exchange for beer money. Helping Miles at the diner is his younger brother, David (Aidan Quinn), who bitterly remembers how determined their mother was that Miles would escape the dead-end existence in which he now finds himself. \"Miles is really stuck when this thing starts,\" Harris says. \"He's got nowhere to turn, doesn't see any way out of what he's doing, even though he's not very happy. During the course of this thing, he gets unstuck.\" Getting unstuck for Miles requires uncovering and confronting some startling secrets that explain the complicated ties between his own blue-collar family and the elite Whiting clan, including Francine's late husband, C.B. (Philip Seymour Hoffman), and their daughter, Cindy (Kate Burton), who was disabled in a childhood accident and harbors a desperate, unrequited love for Miles. As fans of Russo's Pulitzer Prize-winning novel know, there is a startling act of school violence near the end of the narrative, but apart from that, the story unfolds with the quirky, unhurried pace of small town life. Dramatic tension arises not from explosions or car chases, but from the resentments, passions and private shames that run through Empire Falls like the Knox River. That \"Empire Falls\" remains so utterly engrossing for its three-hours-plus running time is both a tribute to Russo's writing - he wrote the teleplay as well - and to the dazzling ensemble of actors, who manage to convince us that they've shared life experiences for years, even for generations. That's possible in large part because executive producer Newman and director Fred Schepisi gathered the entire cast together in New York for extended rehearsals before moving to the Maine filming location. \"We knew we had to concentrate on and bring about (that sense of interconnected lives), particularly as many of the characters don't actually play scenes with one another and yet they have a large effect on one another,\" Schepisi says. With Russo on hand during those early sessions, Schepisi and his cast had the luxury of asking the author to interpolate scenes or lines of dialogue he originally had omitted from the adapted script, which clarified motivations for the actors. \"I nagged Rick a bit to put some things in or take some things out. Fortunately, he transcended that nagging,\" Schepisi says, chuckling. Filming primarily in the part of Maine where Russo had lived while writing his novel also gives the TV movie added resonance, Harris says. \"That was really helpful, and I am so glad that we shot it in the towns of Waterville and Skowhegan where we were,\" he says. \"All of the community was very supportive, and you know, it's a mill town that's kind of fallen on hard times, which is just what the story was about. It just gives you so much that you don't have to think about, because you're really right there in the environment.\" Harris says his \"Empire Falls\" colleagues are the best ensemble with which he's ever worked. \"And what was really fun was that as Miles, I really got to work with every one of these actors,\" Harris says. \"Miles is the only character who interacts with all the others, except for Robin Wright Penn (who appears only in flashback scenes) - but Paul and Joanne, Helen, Aidan, Theresa Russell, Philip Seymour Hoffman, everybody else I got to work with.\" And while Miles undergoes a harrowing transformation during the course of \"Empire Falls,\" he comes out of it free to pursue the dreams his mother had held out for him, Harris says. Copyright, 2005, Charleston Newspapers"}, {"article_id": "298263729", "match_score": 91.02040816326532, "source": "Lexington Herald-Leader (KY)", "date": "January 21, 2005", "window_summary": "The excerpt notes Nine Lives as an ensemble drama at Sundance and includes Robin Wright Penn among the film's cast.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full article describing the Sundance Film Festival lists Nine Lives in the celebrity-heavy premieres and names Robin Wright Penn as one of the ensemble actors, without additional detail about her role.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "a dangerously overprotective mom Quot nine an ensemble drama with a cast including Glenn close. Holly Hunter Sissy Spacek and Robin Wright Penn and Quot the Ballad of Jack and a father daughter drama starring Daniel Day Lewis and directed by his", "newsbank_text": "PARK CITY, Utah -- Critics say the Sundance Film Festival has become too big, too commercial, too focused on celebrity sightings and star-driven movies at the expense of spotlighting undiscovered talent. \"Hollywood on ice\" is a frequent wisecrack hurled at the 11-day festival, which opened yesterday amid the snow and cold of Park City's upscale ski resorts. Yet unlike Hollywood, where many Sundance filmmakers would be able to get onto a studio lot only if they took a tour with the rest of the general public, the festival is cinema democracy in action. Where else could unknowns such as Pape Sidy Niang, Anna Oxygen and Eric Breedlove star in a film competing for top festival honors against movies featuring Keanu Reeves, Liv Tyler and Naomi Watts? \"As much as the press argues that Sundance has completely changed, it hasn't changed that much,\" said festival director Geoffrey Gilmore. \"It's still a place for discovery. It's a place for common ground among filmmakers and audiences more than it is the celebrity stuff.\" Niang, Oxygen and Breedlove are among the cast of director Robinson Devor's Police Beat, one of 16 films in Sundance's dramatic competition, a launching pad for such critical and commercial hits such as In the Bedroom and You Can Count On Me. A culture-clash romance following an immigrant West African bicycle cop involved with a Seattle woman, Police Beat faces off against such competition entries as Lonesome Jim, the tale of a dysfunctional family featuring Tyler and Casey Affleck; Ellie Parker, starring Watts in an expansion of her short film about a wannabe Hollywood actress; and Thumbsucker, with Reeves as a dentist in an ensemble tale about a teenager (Lou Pucci) with an oral fixation on his thumbs. Co-starring Tilda Swinton, Vince Vaughn and Benjamin Bratt, Thumbsucker is considered one of the hot potential acquisitions for distributors prowling Sundance in search of the next big indie hit. Sundance's dramatic competition is a dream slot for filmmakers seeking a high-profile place to premiere a movie for distributors. It's also a nerve-racking experience. \"Obviously, it's a great honor, but it's given me a major stomachache right now,\" said Thumbsucker director Mike Mills. Along with the competition for U.S.-made independent dramas, the Sundance lineup of 120 feature films includes competitions for American and world-cinema documentaries. New this year is a competition for world-cinema drama, whose lineup includes the Latin American tale Cronicas, starring John Leguizamo as a crime journalist; the British flick On a Clear Day, with Peter Mullan and Brenda Blethyn in the story of an out-of-work laborer trying to swim the English Channel; and Denmark's Brothers, a sibling drama featuring Connie Nielsen. Among films in Sundance's celebrity-heavy premiere category: The Upside of Anger, a comic romantic drama with Joan Allen and Kevin Costner; The Matador, a hit-man comedy starring Pierce Brosnan; The Jacket, a time-travel thriller with Adrien Brody, Keira Knightley and Jennifer Jason Leigh; Loverboy, directed by Kevin Bacon and featuring his wife, Kyra Sedgwick, as a dangerously overprotective mom; Nine Lives, an ensemble drama with a cast including Glenn Close, Holly Hunter, Sissy Spacek and Robin Wright Penn; and The Ballad of Jack and Rose, a father- daughter drama starring Daniel Day-Lewis and directed by his wife, Rebecca Miller. Copyright (c) 2005 Lexington Herald-Leader"}, {"article_id": "303635884", "match_score": 90.9090909090909, "source": "New Braunfels Herald-Zeitung (TX)", "date": "May 3, 2005", "window_summary": "The archive excerpt refers to a New Braunfels Middle School science teacher named Robin Wright who required students to create PowerPoint reports.", "window_context": "career", "window_tone": "positive", "fulltext_summary": "The full article covers a school technology showcase and portrays Robin Wright as an engaged middle-school science teacher who assigns PowerPoint projects and good-naturedly notes that students are teaching her about technology.", "fulltext_context": "career", "fulltext_tone": "positive", "archive_window": "everyone could see what All these students can do a she said. A its new braunfels Middle school science teacher Robin Wright required her students to create a report about Martli quakes and their economic Impact using powerpoint. Although she could Tell", "newsbank_text": "Danny Hayden and Geoff Smith are bound to end up in Hollywood some day. The New Braunfels High School juniors showed off their digital graphics and animation skills Saturday at the New Braunfels Independent School District's Technology Showcase. The annual event gives students a chance to demonstrate some of the computer-assisted techniques they are learning in every subject. Accompanied by the \"Star Wars\" movie theme, Hayden introduced his audience to \"Luke,\" his animated mannequin. Hayden used an animation software Cinema 4D to insert Luke into a light saber fight scene from the Lucas film trilogy. Smith's mannequin had a slightly less serious task to accomplish in its 30-second clip. \"I decided to make my figure dance,\" Smith said. \"He moonwalks and does the Thriller. It's not exactly human motions, but it's close. Isn't he beautiful?\" Smith showed his audience how the software allowed him to easily move the mannequin's arms, legs and head. Taking the skills he already has learned in high school, Smith plans on going on to art school to become a full-time animator. Down the hall, another budding movie producer, Emma Roddy, showed off her short documentary of her fifth-grade year. Titled \"Our Year in Fifth Grade,\" the movie was a compilation of still photographs imported into Apple's iMovie software. \"We started working on it in March,\" said Roddy, whose friend Karese Sacco helped with production but could not attend Saturday's showcase. \"I was surprised by how much we learned while we were doing it.\" The girls used song clips and special effects to provide extra comic relief. The film documented Roddy's and Sacco's progress through the ups and downs of their final year at Carl Schurz Elementary, including classroom experiments, the Christmas assembly and an awards ceremony. Teacher Vicki Head said she just gave the girls a camera and turned them loose. \"I'm so proud of them,\" she said. \"They did such a good job.\" Before the house lights came back up, the audience was treated to a blooper reel. The film projects were just one example of the advanced technology used in NBISD classrooms from primary school through 12th grade. PowerPoint presentations are popular for giving reports - hardly anyone uses paper any more. Students also use spreadsheets for organizing research data and music creation software to write their own songs. New Braunfels Middle School Technology Specialist Carol Cochran said she was thrilled parents got a chance to see what their children did every day instead of just hearing about it when they got home. \"I wish everyone could see what all these students can do,\" she said. \"It's amazing.\" New Braunfels Middle School science teacher Robin Wright required her students to create a report about earthquakes and their economic impact using PowerPoint. Although she could tell them almost anything they wanted to know about seismic events, computer questions were another matter. \"These kids are teaching me about technology,\" she said, laughing. Copyright, 2005, New Braunfels Herald-Zeitung"}, {"article_id": "273883739", "match_score": 90.66666666666666, "source": "Philadelphia Inquirer, The (PA)", "date": "July 27, 2005", "window_summary": "The archive excerpt says Robin Wright Penn stars in Sorry, Haters, portraying a career woman who develops a relationship with an Arab cab driver.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The article (festival/news roundup) notes that Robin Wright Penn stars in Sorry, Haters, describing her character as a career woman who forms an unlikely bond with an Arab taxi driver; the mention is descriptive and neutral.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "was Quot a drama about a psychiatrist who takes a Job at a mental Hospital where his father lives. And Robin Wright Penn stars in Quot sorry haters Quot about a career woman who develops a relationship with an Arab cab Driver", "newsbank_text": "Frye leather boots, PH Advantage cosmetics, Pagliei jewelry, Ted Rossi handbags, Peter Thomas Roth skin care products, and Fake Bake tanning products were among the goodies an East Rutherford, N.J., woman reportedly finagled for herself by posing as Jessica Simpson's assistant. Courtney Handel, 23, is accused of amassing more than $12,000 in free merchandise by sending e-mails and faxes to companies under the name of Simpson's assistant, CaCee Cobb. Simpson, 25, stars as Daisy Duke in the coming film, The Dukes of Hazzard. Handel, who has not yet entered a plea, faces charges of theft by deception, fraud and trademark infringement. She reportedly told the companies that Simpson had expressed interest in their products. When police detectives arrived to arrest her on July 22, they said they found her home full of merchandise. \"As we were standing outside, UPS pulled up with 12 more packages. We turned to each other and said, 'If only all our cases could be this easy,' \" Detective Sgt. Jeff Yannaconi told the New York Daily News. Police were arranging to return the products to the companies. Sue Messent, a Vancouver fashion designer, was among those Handel reportedly tried to scam. \"I was all excited, it was huge,\" Messent told the Vancouver Province. \"She's [Simpson's] like the 'it' girl right now. It would open a lot of doors.\" But Messent, who had worked in the film industry, was suspicious, so she contacted Simpson's record label and the plot unraveled from there. Parlez-vous Mayan? He presented The Passion of the Christ in Aramaic, Latin and Hebrew, and now Mel Gibson plans to release his next film, Apocalypto, in an obscure Mayan dialect. The movie, which does not have a religious theme, will feature unknown actors who live in the region of Mexico where it is being shot. The title is taken from the Greek word meaning \"revelation\" or \"uncovering.\" Shooting is set to start in October and a summer 2006 release is expected. Gibson's spokesman Alan Nierob said coyly, \"He lets his work speak for itself.\" Toronto expands offerings Nine additional movies were announced yesterday for the Toronto International Film Festival, which runs Sept. 8- 17. Among them is Little Fish, starring Cate Blanchett, Sam Neill and Hugo Weaving. It is about a woman who becomes involved in a menacing drug deal while trying to raise money to open an Internet cafe. Harsh Times stars Christian Bale and Freddy Rodriguez as out-of-work pals whose lives spiral downward during a fun-seeking spree in South Central Los Angeles. Nick Nolte, Aaron Eckhart, Ian McKellen and Brittany Murphy are featured in Neverwas, a drama about a psychiatrist who takes a job at a mental hospital where his father lives. And Robin Wright Penn stars in Sorry, Haters, about a career woman who develops a relationship with an Arab cabdriver (Abdel Kechiche) amid the aftermath of the Sept. 11 attacks. Also premiering at the Toronto festival: Terry Gilliam's Tideland, the tale of a teen (Jodelle Ferland) who concocts a vivid fantasy life to cope with her hard upbringing. Jeff Bridges and Jennifer Tilly costar. Previously announced Toronto films include Gwyneth Paltrow and Anthony Hopkins' Proof, Cameron Diaz's In Her Shoes (from the best-seller by Philadelphian Jennifer Weiner), Keira Knightley's Pride and Prejudice, and Steve Martin's Shopgirl. Double your pleasure Martha Stewart's new daytime TV show, which is expected to launch Sept. 12 and will be called Martha, will be broadcast on NBC in the daytime and rebroadcast the same evening on TLC, according to a deal announced yesterday. Can't get enough of that sugar crisp? TLC will also be the place to turn for Stewart's forthcoming home-improvement reality show - in which six women in the middle of large life transitions will work with a member of the Martha Stewart Living Omnimedia design team to renovate their homes. Among the unanswered questions: Why would someone going through a \"large life transition\" want to complicate matters by renovating? Big bang theory We knew the Stones were going back on tour, now we know the name of their new CD and the release date. The Rolling Stones' first all-new studio album in eight years, A Bigger Bang, will be released on Sept. 6. The tour launches Aug. 21 at Boston's Fenway Park. Mick Jagger, Keith Richards, Charlie Watts and Ron Wood say the title reflects their fascination with the scientific theory about the origin of the universe. A Bigger Bang, running a full 16 cuts, was produced by Don Was and The Glimmer Twins. Photog convicted The photographer who took topless photos of a 19-year-old aspiring model named Cameron Diaz, then attempted to sell them back to her after she became a star, now faces up to six years in prison. John Rutter was convicted Monday of forgery, attempted grand theft, and perjury. Rutter had testified that he gave Diaz two days to pay him $3.5 million for the photos before he shopped them to prospective buyers for a campaign timed to coincide with the 2003 release of her film Charlie's Angels: Full Throttle. But he said he was only offering Diaz \"right of first refusal,\" not trying to blackmail her. Diaz, whose screen credits include two Shrek films (with Mike Myers and Eddie Murphy) and There's Something About Mary . . . (with Ben Stiller and Matt Dillon), released a statement saying she was \"gratified that justice has been served.\" Sentencing was set for Sept. 15 and a civil case against Rutter is pending. The photos show Diaz in leather boots and fishnet stockings in a warehouse and holding a chain attached to a male model's neck. Contact \"Newsmakers\" at 215-854-5797 or newsmakers@phillynews.com. Reuters and the Associated Press contributed to this report. Copyright (c) 2005 The Philadelphia Inquirer"}, {"article_id": "326247573", "match_score": 90.2654867256637, "source": "Times-Mail, The (Bedford, IN)", "date": "May 18, 2005", "window_summary": "The archive window lists programming and names Robin Wright Penn among the stars of the 2002 film adaptation White Oleander.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full TV/entertainment column mentions Robin Wright Penn as one of the principal cast members of White Oleander, noting her role in the film's broadcast; no evaluative commentary about her performance is provided.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "Jack Black and Gwyneth Paltrow Star in the 2001 comedy a shallow has 7 ., Fox tv-14. A Alison Lohman Robin Wright Penn Michelle Pfeiffer and Renee Zellweger Star in the 2002 adaptation of Janet Fitch a novel a White Oleander 8", "newsbank_text": "Author: Sara Clifford 836 Words OpenURL Link This \"Wizard\" is odd. The folks at \"The Wonderful World of Disney\" have cast R&B star Ashanti in \"Muppets Wizard of Oz\" (8 p.m., ABC), based on one of the most beloved musical films of all time, but have decided to do away with the songs. Okay, Ashanti does sing a bleak, hip-hoppy theme song about getting out of Kansas and Miss Piggy (as the Wicked Witch in black leather) warbles about being a \"diva,\" but these are exceptional musical moments in a gag-heavy parody of a beloved classic that often falls far short of enchanting. Let's start with Dorothy. In the Judy Garland original, Dorothy runs away from home because she's hurt and confused, rather typical feelings for an adolescent. In the Ashanti version, Dorothy wants to blow out of Kansas because she needs to be a big star. This starlicious attitude sets the tone for the \"Muppets\" misadventure. Queen Latifah co-stars as Aunt Em, the no-nonsense owner of a Kansas diner, where Dorothy and Uncle Henry (David Alan Grier) serve breakfast specials and Sloppy Joes to truck drivers. Dorothy wants more. As we know, a twister obliges her and sends her to Oz, along with her pet prawn Toto (don't ask). Even the casting of the Muppets as the Scarecrow (Kermit), the Tin Thing (Great Gonzo) and the Lion (Fozzie Bear) robs this \"Oz\" of its essential story. As everyone knows, in the movie, these characters are dreamlike composites of people from Dorothy's past. But here everything is sacrificed on the altar of entertainment in-jokes. The poppy field scene is transformed into a druggy trip (or at least a druggy trip as imagined by the set director of \"The Dating Game\"). And, as if to prove that he has to appear in virtually everything, director Quentin Tarantino makes a cameo appearance as himself. n Correspondent Elizabeth Vargas travels to Jerusalem and elsewhere in the Middle East for the \"20/20\" special, \"The Resurrection of Jesus Christ: Searching for Answers\" (10 p.m., ABC). Vargas speaks with historians and theologians about divergent views on the event at the center of the Christian faith. For some, Christ's resurrection and his physical presence on Earth for days and weeks after his crucifixion is an axiomatic fact. \"He would be palpable, he would be physical, he would be tangible,\" says William Lane Craig, Research Professor, Talbot School of Theology. Others don't share that view. Some feel that the Apostles and those close to Jesus were in a kind of dream state. Perhaps they were hallucinating, others contend. A professor from Notre Dame argues that if one had a digital camera on the fateful day and tried to take a group shot of Peter, Mary Magdalene and Jesus, only two of the three figures would appear in the shot. Which raises the theological question: why a digital camera? With all due respect, is this \"news\"? Is a news magazine the appropriate place to debate the tenets of belief? The same news magazine that last week interviewed the cast of \"Lost\"? If anything is certain, ratings gold can be reaped in pouring over religious controversies. Specials about \"The Da Vinci Code\" have done well for network news magazines on cable channels as diverse as Pax and the National Geographic Channel. Tonight's highlights n Dr. Phil McGraw hosts a primetime special \"Escaping Addiction\" (8 p.m., CBS). What if you're addicted to Dr. Phil? n Jack Black and Gwyneth Paltrow star in the 2001 comedy \"Shallow Hal\" (8 p.m., Fox, TV-14). n Alison Lohman, Robin Wright Penn, Michelle Pfeiffer and Renee Zellweger star in the 2002 adaptation of Janet Fitch's novel \"White Oleander\" ( 9 p.m., Lifetime). n Judi Dench, Cher, Joan Plowright, Maggie Smith and Lily Tomlin star in director Franco Zeffirelli's 1999 autobiographical drama \"Tea with Mussolini\" (9 p.m., Pax). n On three episodes of \"Reba\" (WB, TV-PG,D), Dolly Parton (8:30 p.m., r), tipsy suspicions (9 p.m.), Van's football dreams take a hit (9:30 p.m., r). The middle episode is the season finale. n Merv Griffin receives a Lifetime Achievement Award at the 32nd annual Daytime Emmy awards (9 p.m., CBS, TV- PG). n A victim of police brutality stands accused on \"Law & Order: Trial By Jury\" (10 p.m., NBC, TV-14). This series will not return in the fall. Cult choice A grieving couple (Sam Neill and Nicole Kidman) on a recuperative cruise encounter a sea-going psychopath (Billy Zane) in the terrific, white knuckle 1989 thriller \"Dead Calm\" (8:20 p.m., Cinemax). Series notes Tyra Banks hosts two hours of \"America's Next Top Model\" (8 p.m., UPN, r) ... Vince goes to Florida on the season finale of \"What I Like About You\" (8 p.m., WB, TV-PG,D). Late night David Arquette and Gordon Ramsay appear on \"Late Show with David Letterman\" (11:35 p.m., CBS) ... Jay Leno hosts Lisa Kudrow and Interpol on \"The Tonight Show\" (11:35 p.m., NBC) ... Tracy Morgan, Rodney Rothman and The Dears appear on \"Jimmy Kimmel Live\" (12:05 a.m., ABC). Ted Danson and Mudvayne chat on \"Late Night with Conan O'Brien\" (12:35 a.m., NBC) ... Craig Ferguson hosts Randy Jackson, Bai Ling and Gary Greff on \"The Late, Late Show\" (12:37 a.m., CBS). Kevin McDonough can be reached at kmcdonough@unitedmedia.com © Copyright 2005 The Times-Mail. All rights reserved."}, {"article_id": "68756875", "match_score": 89.1213389121339, "source": "American Press (Lake Charles, LA)", "date": "May 26, 2005", "window_summary": "The archive excerpt lists Robin Wright Penn among the ensemble cast of Empire Falls, naming her alongside other prominent actors. It presents her simply as a cast member in the production.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full AP article mentions Robin Wright Penn only as one of the several notable actors in the HBO adaptation Empire Falls, listing her among the ensemble without additional comment. Her portrayal in the article is factual and limited to cast credit.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "off to Florida with a senile priest. Other members of the cast include de Harris Philip Seymour Hoffman Hofen hum Robin Wright Penn Aidan and Newman s wife Laime Woodward in a rare villainess role As the heiress who wields malevolent Power", "newsbank_text": "LOS ANGELES (AP) — \" I wish I was 79 again, \" quips Paul Newman, who turned 80 in January. He's far from being retired. His food company, Newman's Own, has donated $200 million in lifetime profits to charity. He supports the Hole in the Wall Camps, which provide outdoor vacations for terminally ill children (the name comes from the \" Butch Cassidy and the Sundance Kid \" hideout ). He owns an auto racing team that will compete this year in Australia, South Korea and Argentina. And, oh yes, Newman is still doing what he does best — acting. He appears on HBO on Saturday and Sunday in \" Empire Falls \" (8 p.m. CDT ), a film based on the Pulitzer Prize-winning novel by Richard Russo, who also wrote the script. Empire Falls, Maine, is a crumbling town that once thrived with clothing mills. The hangers-on comprise a rich mix of families whose secrets and failings provide the drama as well as some light touches. Newman plays Max Roby, the wily and irreverent patriarch of one of those families, whose unkempt beard is reputed to be littered with cracker crumbs. Newman gets fifth billing and disappears for a long stretch when Max runs off to Florida with a senile priest. Other members of the cast include Ed Harris, Philip Seymour Hoffman, Helen Hunt, Robin Wright Penn, Aidan Quinn — and Newman's wife, Joanne Woodward, in a rare villainess role as the heiress who wields malevolent power over some of the town's residents. Having also played an old-timer in the adaptation of another Russo novel, \" Nobody's Fool, \" Newman read \" Empire Falls \" with more than the usual interest. \" An extraordinary book, \" the actor said in an interview. \" I know there was a lot of interest in making like a two- hour film out of it, and I thought that would truncate all the values in it. It had to be done in a longer format. No major studio 1 wants to make a 3- hour, 3/2-hour film. \" HBO had no such qualms. As an executive producer, Newman helped line up the stellar cast, and he insisted that \" Empire Falls \" be shot in Maine. \" That's where it was set in the mind of Russo, and that's where we shot it, \" he said. \" We would have saved a little money by going to Canada, but I think the film would have suffered. And I think there's an obligation whenever it's possible that we should shoot here in the United States. \" One of the first Method actors to become a movie star, Newman is a stickler for realism. He grew a vagrant-style beard for the role of Max, but it didn't last long. \" Joanne made me shave the homeless part off first. Then she got the rest of it; I should really say while I was sleeping, \" he joked during a telephone chat from his home in Westport, Conn. \" She was not enamored with it. \" Copyright 2005, 2007, American Press. All Rights Reserved."}, {"article_id": "127421558", "match_score": 88.63636363636364, "source": "San Juan Star, The (Puerto Rico)", "date": "August 18, 2005", "window_summary": "unclear", "window_context": "other", "window_tone": "neutral", "fulltext_summary": "unclear", "fulltext_context": "other", "fulltext_tone": "neutral", "archive_window": "a Washington Post scoop follow ing Bush meeting with his National Secu Rity team at his ranch in the posts Robin Wright and Ellen Knickmeyer reported that the administration is significantly lowering expectations of what can be achieved in Anonymous officials were", "newsbank_text": "Martin Schram Commentary T he new signs are, in a sense, positive. It appears that President Bush, Vice President Cheney, Defense Secretary Rumsfeld and Secretary of State Rice, et al., may have finally stopped conning themselves about their avalanche of misjudgments and self-deceptions that caused things to go so horribly wrong in Iraq. Any day now, they may stop conning us. The most hopeful sign appeared on Sunday in a Washington Post scoop following Bush's meeting with his national security team at his ranch in Crawford, Texas. The Post's Robin Wright and Ellen Knickmeyer reported that the administration is \"significantly lowering expectations\" of what can be achieved in Iraq. Long-silent, anonymous \"U. S. officials\" were now saying Team Bush no longer expects the toppling of Saddam Hussein will result in a model democracy, a self-supporting oil industry or a nation free from attacks by insurgents. Officials say they miscalculated the fervency of Iraq's factional divisions, the power of the insurgents and the ability of outside militants to fuel them. Bush officials thought rebuilding Iraq's electricity and water would be no problem. \"What we expected to achieve was never realistic given the timetable or what unfolded on the ground,\" according to \"a senior official involved in policy since the 2003 invasion\"quoted by the Post. \"We are in a process of absorbing the factors of the situation we're in and shedding the unreality that dominated at the beginning,\" the senior official is quoted as saying. Now, hopefully, this gang that was so clueless in getting us into the mess in Iraq - a policy failure with a price tag that includes the lost lives of 1,846 troops so far - will apply a new cold, clear candor to getting us out. The solution must start with a new essential bottom line. And it cannot be as simple as promptly pulling out the troops, the demand of many unthinking critics who warn about a Vietnamization of the Iraq war. Bush's new bottom line must be to get U.S. troops out of Iraq in a way that avoids forever a worst-case scenario that was once inconceivable, was always unacceptable, but is now no longer unimaginable: the Afghanization of Iraq. Which is to say that U.S. homeland security requires that Iraq cannot be allowed to disintegrate into an ungoverned non-nation composed of three factions (Shiites, Sunnis,Kurds) that break apart rather than coexist in compromised unity. That will only create the sort of vacuum that will become the new haven for global terrorists, just as Afghanistan was the haven for the al Qaeda terrorists, where they planned their attacks of Sept. 11, 2001. Meanwhile, when it comes to basics in Iraq, the Shiites, Sunnis and Kurds are not the only ones who cannot seem to get it together. Team Bush seems to be having similar problems of coherence and cohesion. One day, the top U.S. general in Iraq, Gen. George Casey, says that if things go well, \"substantial reductions\" in troops can be made next spring or summer. Other military officials put \"substantial\" in numerical terms - 20 percent or 25 percent of the 135,000 U.S. forces in Iraq. But then Bush declares:\"No decision has been made yet\" about troop-withdrawal possibilities. He adds:\"I know there's a lot of speculation and rumors about that.\" Meanwhile,Rumsfeld prods Iraqis to do more to stop infiltration of weapons and terrorists from Iran and Syria. But it was Bush officials who disbanded the Iraqi army that might have helped seal the borders. They've been trying to reconstitute an Iraqi army ever since. The United States hasn't had enough troops in Iraq to secure the outlying cities and towns,nor prevent infiltration of terrorists and bombs that are killing Iraqis and U.S. troops. That is why Sens. John McCain, R-Ariz., and Joseph Biden, D-Del., have courageously urged increases in U.S. troop levels. It is the key to protecting troops now at risk and the key to preparing for a prudent pullout. The unresolved question is whether Bush will have the fortitude to increase forces next year in the middle of the 2006 congressional elections - bad politics, but the best way to protect the military and salvage a bit of their mission. While an Afghanization of Iraq is unacceptable, Americans may wind up accepting an outcome that Bush had no clue 28 months ago might be a result of his zeal to topple Saddam: the Iranization of Iraq. Which is to say that Iraq will likely end up as an Islamic republic, as some experts predict. Iraq could even evolve into a radicalized, fundamentalist Islamic republic, one with close ties to Iran. The tragic irony is that this will leave the U.S. homeland and Americans traveling around the world with a security threat far more perilous than any Saddam ever posed. Copyright (c) 2005 The San Juan Star"}, {"article_id": "326483193", "match_score": 88.47736625514403, "source": "Ledger-Enquirer (Columbus, GA)", "date": "April 8, 2005", "window_summary": "The archive window is a brief 'This Day' birthday listing that names Robin Wright Penn and her age.", "window_context": "personal_life", "window_tone": "neutral", "fulltext_summary": "The full text is the same birthday/anniversary listing, repeating Robin Wright Penn's name and age with no additional information or evaluation.", "fulltext_context": "personal_life", "fulltext_tone": "neutral", "archive_window": "Schneider is 45. Rock musician Izzy Stradling is 43. Singer Julian Lennon is 42. Rapper Biz Markle is 41. Actress Robin Wright Penn is 39. Actress Patricia Arquette is 37. Rock Singer Craig Honeycutt everything is 35. Actor Taran Noah Smith is", "newsbank_text": "309 Words Page: A2 OpenURL Link Today is Friday, April 8, the 98th day of 2005. There are 267 days left in the year. On this date: In 1513, explorer Juan Ponce de Leon claimed Florida for Spain. In 1935, the Works Progress Administration was approved by Congress. In 1946, the League of Nations assembled in Geneva for the last time. In 1952, President Truman seized the steel industry to avert a nationwide strike. In 1973, artist Pablo Picasso died at his home near Mougins, France, at age 91. In 1974, Hank Aaron of the Atlanta Braves hit his 715th career home run in a game against the Los Angeles Dodgers, breaking Babe Ruth's record. In 1990, Ryan White, the teenage AIDS patient whose battle for acceptance gained national attention, died in Indianapolis at age 18. In 1994, Kurt Cobain, singer and guitarist for the grunge band Nirvana, was found dead in Seattle from an apparently self-inflicted gunshot wound; he was 27. One year ago: National security adviser Condoleezza Rice told the Sept. 11 commission ''there was no silver bullet'' that could have prevented the 2001 terrorist attacks. Thought for Today: ''A highbrow is a person educated beyond his intelligence.'' --- James Brander Matthews, American author and educator (1852-1929). Former first lady Betty Ford is 87. Comedian Shecky Greene is 79. Investigative reporter Seymour Hersh is 68. Basketball Hall-of-Famer John Havlicek is 65. Singer J.J. Jackson is 64. Singer Peggy Lennon (The Lennon Sisters) is 64. Songwriter-producer Leon Huff is 63. Actor Hywel Bennett is 61. Actor Stuart Pankin is 59. Baseball Hall-of- Famer Gary Carter is 51. Actor John Schneider is 45. Rock musician Izzy Stradlin is 43. Singer Julian Lennon is 42. Rapper Biz Markie is 41. Actress Robin Wright Penn is 39. Actress Patricia Arquette is 37. Rock musician Darren Jessee is 34. Actor Taran Noah Smith is 21. Actress Kirsten Storms is 21. Copyright (c) 2005 Columbus Ledger-Enquirer"}, {"article_id": "292357117", "match_score": 88.42592592592592, "source": "Telegraph, The (Nashua, NH)", "date": "August 27, 2005", "window_summary": "The archive window briefly contrasts a 'sad Kevin Costner' with a 'determined Robin Wright' in a cultural reference to Message in a Bottle, portraying Wright as the resolute female lead.", "window_context": "career", "window_tone": "positive", "fulltext_summary": "The full excerpt uses the phrase to link the film Message in a Bottle to a mental image, calling Robin Wright the 'determined' counterpart to Kevin Costner — a short, favorable career-related description.", "fulltext_context": "career", "fulltext_tone": "positive", "archive_window": "bearded Castaway on a raft or maybe if you re a Chick movie Buff a sad Kevin Costner and determined Robin Wright. Then again that annoying 80s attempt of up be kind make that Quot popular song by the police May Start", "newsbank_text": "You hear \"message in a bottle\" and you think ocean and the cliche, bearded castaway on a raft, or maybe, if you're a chick-movie buff, a sad Kevin Costner and determined Robin Wright. Then again, that annoying '80s attempt (OK, I'll be kind, make that \"popular song\") by The Police may start circulating in your brain. Safe to say, whatever the phrase prompts for you, it's highly unlikely you'll think of a bark-mulched flower garden around a metal flagpole in a Nashua family's front yard. But two weeks ago, when Bob Champa's shovel made an unexpected clang in the loose soil as he landscaped in front of his Shore Drive home - yep, you guessed it - there lay the proverbial message in a bottle. Although the Nashua River does flow close by the Champas' home, their \"MIAB\" had nothing to do with water or washing ashore on a wave. Turns out the label-less, clear glass bottle, its metal screw top imprinted \"All Natural, No Preservatives,\" was ceremoniously buried some two decades ago by a former resident of the house as a tribute to his son - a 19- year-old U.S. Air Force serviceman who died in a 1982 traffic accident in Colorado Springs, Colo. \"It was quite a surprise to see something inside when we pulled the bottle out of the ground,\" Diane Champa said this week. \"We've dug, even rototilled over there before, but never saw anything. My husband thought it was just something the kids had buried while they were playing. \"But then I looked closely, saw writing, and thought, 'Hey, that's not kid writing, there really is a note in here,'\" she said.Sealed within were a handwritten letter and a faded photo of the youth, showing him in uniform next to the American flag, wearing the determined, proud military expression. William Goodwin was a 1981 Nashua High School graduate, a football player and wrestler who evidently joined the military shortly after graduation. The Tusitala yearbook photo of a bushy-haired, bearded youth sporting a wide collar and leisure suit stands in stark contrast to his formal, military look. Kenneth Goodwin, himself a military man, a highly decorated Korean War \"Angel from Hell\" paratrooper to be exact, wrote the letter he enclosed with his son's photo. It's dated June 9, 1985, and begins, in smudged but clearly legible blue ink, \"To whoever has found this bottle . . .\" \"That area was always kind of bare, sandy, we could never grow grass there,\" Diane Champa said. Over time, though, a fairly decent lawn came in, encouraging the couple to beautify further and dig out a circular garden - and keep the rocks as ornaments. \"Reading the letter, it was really freaky to think of the people and their son - and how long this thing stayed buried right in our yard.\" The elder Goodwin mentioned two special rocks in his letter. The Champas immediately thought of the two large rocks, one anvil-shaped, the other somewhat flatter, that had always been partially visible above ground. Kenneth Goodwin explained how he and his wife, Leona, picked them up when they traveled to Colorado Springs and New Mexico three years after their son was killed. One was from Peterson Air Force Base, where William was stationed and where the accident happened; the other came from Santa Fe, N.M., perhaps also a significant stop on the Goodwins' trip. Back home, they arranged the rocks to form a small cairn, or monument, around the flagpole in William's memory. Kenneth and Leona Goodwin moved from the Shore Drive home in 1998, Diane Champa believes. The next resident stayed only briefly before the Champas bought the house in 2000. Kenneth Goodwin died in February 2003 in Maine. He and his wife had moved to the town of Hiram. The Champas started researching online and inquiring of long-term neighbors if they might know the whereabouts of Leona Goodwin or any other family members who might want the bottle and its contents in remembrance of William - and now, his father, too. Before long, Diane Champa found the Goodwins' daughter, Nadine Hughes, in Maryland. They had a long phone conversation Thursday night and exchanged e-mails. Hughes was excited to learn of the bottle, and appreciative that Champa had put in the effort to find her. And Champa has a whole new perspective on the majestic maple tree in front of her house now that she knows it was only a scrawny sapling when Hughes gave it to her parents after her brother died. Hughes shared news of the discovery with another brother, Michael Goodwin, who lives in Billerica, Mass., and he plans to visit the Champas soon to collect the bottle and its contents. Until then, the simple but heartfelt gesture by one aging veteran in memory of a beloved son, a budding serviceman whose life ended way too soon, has been resealed and returned to the spot from whence it came. Hughes and her siblings never knew about the bottle until Champa called - but they weren't too surprised at what their father had done. \"My dad was a fun-loving kind of guy,\" Hughes wrote in one of her e-mails to Champa. \"He would have enjoyed this.\" TEXT OF THE MESSAGE In 1985, three years after his son, William, a U.S. Air Force serviceman, died in a traffic accident in Colorado, Kenneth Goodwin wrote a short letter, sealed it in a glass jar with a military photo of William, and buried the jar in the yard of the Shore Drive home in which he lived at the time. The father's tribute to his son was discovered recently by the current residents as they landscaped their yard. Following are the contents of Kenneth Goodwin's letter: June 9, 1985. To whoever has found this bottle: I put this bottle with my son's picture in it under this stone as a little monument to him. So every morning I raise the flag as a sort of tribute to him. My wife and I have just returned from Colorado Springs, Colorado, where our son was killed in an automobile accident on Sept. 18, 1982. The stone above this bottle comes from Colorado Springs. The one next to it comes from Santa Fe, New Mexico, where we also visited. Billy was stationed in the Air Force at Peterson Air Force Base at Colorado Springs at the time of his untimely death. Born St. Joseph Hosp. Nashua, Nov. 1, 1962. Died Colorado Springs, Colorado, Sept. 18, 1982. So that is why the stones, bottle, flag in case you were wondering. Kenneth Goodwin Copyright, 2005, The Telegraph, Nashua, N.H. All Rights Reserved."}, {"article_id": "265286900", "match_score": 88.38174273858921, "source": "Repository, The (Canton, OH)", "date": "August 1, 2005", "window_summary": "The archive excerpt says Washington Post reporter Robin Wright was marked as a liberal guest by a researcher monitoring public-broadcasting shows, with Mann citing her viewpoint that U.S. intelligence remained geared to the Cold War and did not adapt to the new terrorism threat.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full op-ed cites Robin Wright as an example of a journalist labeled 'liberal' by a government-funded monitor, quoting the monitor's characterization of her view that U.S. intelligence was Cold War–oriented and slow to adapt; Wright is used to illustrate criticisms of the monitoring effort.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "people who appeared As guests on the shows into three Camps Nat Hentoff conservative Liberal and when Washington Post reporter Robin Wright showed up on a the Diane Rehm show a or. Mann a investigative expertise marked her Down As a Liberal.", "newsbank_text": "American journalists owe a debt to Kenneth Tomlinson, chairman of the Corporation for Public Broadcasting, a fervent purifier of those radio and television programs from liberal bias — particularly the cleansing of any criticism of the Bush administration. He has taught us journalists what we should have already known: no element of journalism should seek or accept government funds, from any administration. Mr. Tomlinson has clearly shown that \"political orthodoxy\" is not the ideological monopoly of Michael Moore, MoveOn.org, George Soros or Al Franken. But those communicators do not have the heavy hand of government to police public speech in order to help strengthen their political goals. As what George Orwell might have called the Big Brother of the public broadcasting system, Tomlinson paid $14,700 of public funds to Fred Mann, a \"researcher,\" to monitor present and past public broadcasting shows by Bill Moyers, Tavis Smiley, David Brancaccio, Diane Rehm (of whom Mr. Tomlinson professes to be \"a great admirer\"), and even the witty conservative Tucker Carlson. (His guests too \"proved\" to be suspect.) If Mann or another \"researcher\" is to be paid to do an encore, I expect National Public Radio’s \"Morning Edition\" — a source of many of my news leads — could be included for its illuminating June 20 report of Mr. Mann’s methodology for ferreting out leftists. NPR reporter David Folkenflik noted that Fred Mann \"sorted people who appeared as guests on the shows into three camps: conservative, liberal and neutral.\" When Washington Post reporter Robin Wright showed up on \"The Diane Rehm Show,\" Mr. Mann’s investigative expertise marked her down as a liberal. The proof, according to Mann: \"Ms. Wright’s viewpoint was that U.S. intelligence was geared to fight the Cold War and did not adapt to the new threat of terrorism.\" Hello? Worse yet, as Folkenflik added, Tucker Carlson was a host of interest to Mann because on his show, there were \"more liberal guests than conservatives.\" Could it be that Tucker Carlson wanted to make fun of them? To discover that Bill Moyers, on his weekly hour, was not an admirer of the Bush administration is like, in the old phrase, \"shooting ducks in a barrel.\" I was a guest on that show once, citing the damage that certain sections of the Patriot Act and subsequent administration executive orders were doing to the Bill of Rights. But I was also a guest on William Buckley’s \"Firing Line\" when it was on PBS — a program I wish was back there again. And currently, Wall Street Journal editors and writers can instructively be seen and heard every week on PBS. Moreover, each night, on \"The NewsHour with Jim Lehrer\" there is intense jousting between liberals and conservatives. Tomlinson is being so ham-handed in his mission to protect the Bush administration from dread diversity of ideas that I would think someone at the White House — or among the Republican leadership in Congress — would be at least embarrassed. After all, the president has said we should pride ourselves that in this constitutional democracy, our government is \"transparent.\" Furthermore, it is demeaning to such forcefully articulate administration policy makers as Donald Rumsfeld, Condoleezza Rice and John Negroponte to imply that they need Kenneth Tomlinson to buffer them against contrasting views on public broadcasting programs. Tomlinson, however, seems to have no limits to his sense of himself as a commander of the president’s Praetorian Guard. He has successfully managed to install Patricia Harrison as the new CEO and president of the Corporation for Public Broadcasting. Her credits for this prestigious post — as tribune of the free flow of diverse views to the public — include her previous services as co-chairwoman of the Republican Party! It is as if George Soros were to become editor-in-chief of the Associated Press. Long ago, during my unformed youth, I was speaking on a panel as an anti-Communist (having read Arthur Koestler’s \"Darkness at Noon\" when I was 15) but wondering about the possibilities of \"democratic socialism.\" A libertarian on the panel asked me how long I thought a free press would flourish under any kind of socialist government. Like a clap of thunder, I was awakened from my fantasy. Now, under a Republican administration, \"public\" broadcasting is being investigated as if we were subject to so statist a government that we must be insulated from insufficient appreciation of this administration’s virtues. This would be farcical if it weren’t actually happening. But I am grateful to Tomlinson for illuminating the sticky strings that come with government financial support of the press — which must be free to be free. Nat Hentoff is a nationally renowned authority on the First Amendment and the Bill of Rights and author of several books. Copyright 2005, The Repository, All Rights Reserved."}, {"article_id": "326241163", "match_score": 87.85714285714286, "source": "Journal Gazette (Mattoon, IL)", "date": "April 8, 2005", "window_summary": "The archive window is a birthday listing that identifies Robin Wright Penn as an actress and gives her age (39).", "window_context": "personal_life", "window_tone": "neutral", "fulltext_summary": "The full article (a roundup/briefs piece) includes a 'Today's birthdays' list that names Robin Wright Penn and notes her age, presenting her solely in that biographical/birthday context.", "fulltext_context": "personal_life", "fulltext_tone": "neutral", "archive_window": "Guitarist Izzy Stradling guns roses43. Singer guitarist Donita Sparks of l7, 42. Singer Julian Lennon 42. Rapper Biz Markie,41. Actress Robin Wright Penn 39. Actress Patricia Arquette 37. Singer Craig Honeycutt of everything 35. Drummer Darren Jessee Ben folds five34. Actor Taran", "newsbank_text": "Elton:Eminen on par with Hendrix, Jagger NEW YORK (AP) - Elton John says that Eminem is on par with Jimi Hendrix and Mick Jagger. In the new issue of Rolling Stone, the rapper is listed in the magazine's second \"Immortals\" edition, featuring another 50 of the greatest figures of rock 'n' roll with appreciations written by other artists. In his immortalizing of Eminem, John writes that he got goose bumps when he first rehearsed with him for their performance at the 2001 Grammy Awards. \"From the start, I've always admired Eminem's thinking,\" John writes. \"That's the reason I wanted to appear on the Grammys with him when I was asked, despite all the nonsense talked about his being homophobic. Other contributors include Dave Matthews writing on Radiohead, Trey Anastasio on Frank Zappa, Beck on Hank Williams, David Bowie on Nine Inch Nails and Mos Def on Miles Davis. Host of 'TheView' gives birth to daughter NEW YORK (AP) - A day after her daughter was born, Elisabeth Hasselbeck called her co-hosts on ABC's \"The View\" to reveal the baby's name: Grace Elisabeth. \"I'm a little beat up, but it's all worth it,\" Hasselbeck said Thursday. Grace Elisabeth was born at a New York hospital weighing 7 pounds, 8 ounces, Hasselbeck and her husband, Washington Redskins quarterback Tim Hasselbeck, announced Wednesday. She is the couple's first child. The baby had been a frequent topic of conversation on the daytime chat fest. \"We feel like we all had a baby!\" exclaimed co-host Joy Behar. Today's birthdays Comedian Shecky Greene is 79. Singer J.J. Jackson is 64. Guitarist Steve Howe of Yes is 58. Bassist Mel Schacher of Grand Funk Railroad is 54. Singer-actor John Schneider is 45. Guitarist Izzy Stradlin (Guns N' Roses) is 43. Singer- guitarist Donita Sparks of L7 is 42. Singer Julian Lennon is 42. Rapper Biz Markie is 41. Actress Robin Wright Penn is 39. Actress Patricia Arquette is 37. Singer Craig Honeycutt of Everything is 35. Drummer Darren Jessee (Ben Folds Five) is 34. Actor Taran Noah Smith (\"Home Improvement\") is 21."}, {"article_id": "302978770", "match_score": 87.76371308016877, "source": "Bucks County Courier Times (Levittown, PA)", "date": "September 2, 2005", "window_summary": "The archive window identifies Robin Wright as Forrest Gump's love interest in the film Forrest Gump.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The TV schedule blurb for Forrest Gump notes that Robin Wright plays the lead character's love interest, a factual casting mention without evaluation.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "becomes a Vietnam War hero millionaire entrepreneur and witness to history. Sally Field co stars As Forrest a protective Mother. Robin Wright plays his love interest and Gary St Oise is his reluctant buddy. Pg-13, 2 22 a v drama die hard", "newsbank_text": "Catch it tonight \"Forrest Gump,\" 8 p.m., TNT Tom Hanks stars in the feel-good blockbuster of 1994. Simple-minded Forrest (Hanks) takes a head-on approach to life and becomes a Vietnam War hero, millionaire entrepreneur and witness to history. Sally Field co-stars as Forrest's protective mother, Robin Wright plays his love interest, and Gary Sinise is his reluctant buddy. The film won six Academy Awards. Supernanny, 8 p.m., ABC Forget spoonfuls of sugar. The star of this reality series is more Patton than Poppins. Jo Frost, who's spent years taming bratty Brits, helps American parents take back the reins of power from their youngsters. Once Frost has helped Mom and Dad lay down and enforce the law, and the kids have had some practice following it, she lets the family fly solo. Never fear, though; she's watching and will return if help is needed. What I Like About You, 8 p.m., WB In \"My Boyfriend's Back,\" Holly (Amanda Bynes) seeks advice from old flame Henry (guest star Michael McMillian) on improving her miserable track record with guys. Her sister (Jennie Garth) is on the receiving end of an attempt to revive her own love life, as Lauren (Leslie Grossman) lures Todd (guest star Luke Perry) back to the bakery. Hope & Faith, 9 p.m., ABC Faith (Kelly Ripa) lands a new job doing the weather at a television station, and the temperature rises when she meets newscaster Larry (guest star Dean Cain). Hope (Faith Ford) feels abandoned by her partner in the catering business and hires a new, superefficient assistant. Now it's Faith's turn to feel slighted. Ted McGinley also stars in \"Weather or Not.\" What Not to Where Are They Now?, 9 p.m., TLC It's easy to change your look when you have a pair of fashion experts, a top hairstylist and a professional makeup artist helping you out - not to mention a Visa card with $5,000 on it. But can you keep it up? In this new special edition of the series, fashionistas Stacy London and Clinton Kelly surprise four of their past makeover subjects to see whether they've kept up their new looks. Arrested Development, 9:30 p.m., Fox Michael (Jason Bateman) wants George Sr. (Jeffrey Tambor) out of the model home's attic because an inspector is coming. Gob (Will Arnett) tries to help, but his efforts backfire in a big way. Ann and George Michael (Mae Whitman, Michael Cera) organize a movie boycott, which also backfires. Alia Shawkat, Portia de Rossi and David Cross also star in \"Righteous Brothers.\" NUMB3RS, 10 p.m., CBS A prison bus crashes, and two dangerous inmates manage to escape in the ensuing confusion. Don (Rob Morrow) knows something about finding fugitives, but as always, a little help from his math-whiz brother, Charlie (David Krumholtz), couldn't hurt. Sabrina Lloyd also stars in \"Man Hunt.\" Crossing Jordan, 10 p.m., NBC Two deaths at the airport have the authorities wondering if a killer virus hitched a ride on an international flight. Garret (Miguel Ferrer) determines that both victims - a passenger and a baggage handler - died of drug overdoses. Woody (Jerry O'Connell) thinks the deaths are related and possibly linked to a smuggling ring. Jordan (Jill Hennessy) suspects an elderly man's death was an assisted suicide in \"Gray Murders.\" Copyright, 2005, Bucks County Courier Times"}, {"article_id": "258093610", "match_score": 87.6068376068376, "source": "Tampa Bay Times (FL)", "date": "May 27, 2005", "window_summary": "The archive snippet lists Robin Wright Penn among the film/TV cast (with Ed Harris, Joanne Woodward, Helen Hunt and Philip Seymour Hoffman).", "window_context": "career", "window_tone": "positive", "fulltext_summary": "The full Empire Falls article highlights a 'stellar' cast and explicitly names Robin Wright Penn as one of the notable actors, portraying her as part of a respected ensemble in the production.", "fulltext_context": "career", "fulltext_tone": "positive", "archive_window": "degrees of is the director. As for the human characters the movies cast includes de Harris Joanne Woodward. Helen Hunt Robin Wright Penn and Phillip Seymour Hoffman. A and when you be got Paul Newman walking on in the first scene Quot", "newsbank_text": "When the Pulitzer Prize-winning novel Empire Falls comes to the small screen on HBO Saturday and Sunday nights, author Richard Russo won't be complaining about the screenwriter botching his book. He wrote the screenplay, streamlining his rich, complex novel about the intertwined lives of the residents of a New England town from almost 500 pages to about 120 pages of script. Even given the luxury of a two-night miniseries of about 3 1/2 hours, almost twice the length of a theatrical movie, Russo says, \"You leave out about three-quarters of it.\" Yet the movie captures the book's sprawling story about several generations of working people and their wealthy employers in a Maine mill town, bringing Russo's funny, touching characters to vivid life. Every avid reader has seen pallid movies that don't live up to the books they're drawn from, he says. \"When you're feeling disappointed in a movie that's based on a novel you really love, when you're noticing that certain of your favorite things aren't there, that usually means what is there isn't quite as compelling as it could be.\" Russo, 55, has seen another of his novels successfully make the transition to a movie: Nobody's Fool, a 1994 theatrical release directed by Robert Benton and starring Paul Newman. How did Russo get lucky twice, when so many authors see their fiction mangled by Hollywood? \"Good directors and good actors, that's the easy answer to that one,\" he says. For Empire Falls, shot on location in Maine, Russo says, \"We have a very skilled and wonderful storyteller in Fred Schepisi,\" the director, whose resume includes Last Orders and Six Degrees of Separation. \"He has a marvelous sense of place. We all felt that one of the characters in this story was the place itself.\" As for the human characters, the movie's stellar cast includes Ed Harris, Joanne Woodward, Helen Hunt, Robin Wright Penn and Phillip Seymour Hoffman. \"And when you've got Paul Newman walking on in the first scene,\" Russo says, \"you can't lose.\" Newman is one of the executive producers and was instrumental in bringing the project to HBO. He plays Max Roby, the father of the main character. Max is a con man and a drunk, a roistering boy in an old man's body, and Newman plays him with gusto. He played a similar character, Sully Sullivan, in Nobody's Fool, and Russo says those characters are one reason he and Newman have collaborated so successfully. \"The roles he seems to be most fond of, the ones where he has done his most extraordinary work, have been the ones where he's played the rogue male,\" Russo says, in movies such as Hud, Harper, The Sting The Color of Money. \"He brings such incredible charm to those roles. And every one of my novels, except maybe Straight Man, has one of those great rogue males.\" Newman, who is 80, had said that Nobody's Fool would be his swan song, Russo says. \"He had been saying the same thing about this. Now he's saying, `Maybe I've got one more movie in me.' \" Russo's road to getting Empire Falls on the screen was also smoothed by his work on half a dozen other screenplays, including Nobody's Fool (which he co-wrote for the screen with Benton); Twilight, which also starred Newman; several TV movies; and the upcoming Ice Harvest, starring John Cusack and Billy Bob Thornton. The intensely collaborative nature of filmmaking is a stark contrast to the solitary work of writing fiction. \"I find that they complement each other,\" Russo says. \"After screenwriting, I love the solitude when I get back to novel writing. Then when I've been working on a novel for a while, and, as my wife would tell you, I'm in danger of indulging in antisocial tendencies, it's really wonderful to work with other people.\" Russo says his strategy for writing changes dramatically when he works on a screenplay. \"As a novelist, I'm so expansive, so digressive, everything you can't afford to be when you're writing a screenplay. \"As a novelist my impulse is to get it all in. As a screenwriter, it's to take it all out and get an outline that works.\" After many drafts of the Empire Falls screenplay, the first version he presented to Schepisi was \"as stripped down as any version I'd written. I wanted clarity, economy, grace.\" Schepisi read it and asked to see the one he had written just before. \"He told me, `Your last draft was much better, much sloppier. This is a movie that needs to be sloppy. It's about community.' \" The keystone of that community is Miles Roby, played by Ed Harris. Miles has borne many disappointments - a failed marriage, unrequited love, a career abandoned to care for his dying mother - yet he has such quiet strength and compassion that he becomes the moral center of the struggling town. \"I hope people realize how good Ed is in it,\" Russo says. \"He's surrounded by nut cases, and in their outrageousness, they have all these wonderful lines. \"Ed's performance is all the more stunning because even surrounded by all that lunacy I think he commands the camera.\" But the character closest to Russo's heart is Tick, Miles' teenage daughter, played by 17-year-old Danielle Panabaker. To create Tick, a girl who has inherited both her father's sensitive intelligence and her mother's wisecracking toughness, Russo used aspects of his two daughters, who were teenagers while he was writing the novel. He says, \"I took it for granted that we would never find anyone to play Tick who would satisfy me. I was ready to cut my losses after all the love I had invested in that character. \"Then Danielle comes on and just does it. She doesn't resemble either of my daughters physically, but she just captures how those girls are, their grace, their intelligence, their kindness, their smarts.\" With the Empire Falls movie finished, Russo is back in novel-writing mode, working on his next book. \"I'm about 500 pages into it. I'm working on it exclusively now, no screenwriting until I get this done.\" He expects to complete the book this summer, and, \"depending on what my editor says,\" to see it in bookstores in about a year and a half. But he's not talking about its story or characters, or even its title. \"I try not to talk about a novel I'm writing. I have enough problems with them.\" Colette Bancroft can be reached at (727) 893-8435 or bancroft@sptimes.com. © This entire service and/or content portions thereof are copyrighted by NewsBank and/or its content providers."}, {"article_id": "321688765", "match_score": 87.44769874476988, "source": "Times Union, The (Albany, NY)", "date": "September 2, 2005", "window_summary": "The archive excerpt lists Robin Wright Penn as one of the ensemble cast members in the film Nine Lives, alongside Holly Hunter, Glenn Close and Sissy Spacek.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full article is a fall film slate that lists Nine Lives among upcoming releases and names Robin Wright Penn as part of its ensemble cast; it presents her credit matter-of-factly.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "and Kip Perdue nine lives crises of nine disparate women Are examined with Hody Hunter Glenn close Sissy Spacek and Robin Wright Penn North country a single Mother Chartae theron leads a sexual Hara amps ment crusade on behalf of female co", "newsbank_text": "Highlights of the fall film slate. Release dates are subject to change, and some films will take a longer time getting to the Capital Region: September Cry Wolf: Teens spreading online rumors about a serial killer find the story coming true when classmates begin turning up dead. Everything is Illuminated: A man seeks to find a Ukrainian woman who saved his grandfather during the Holocaust. Elijah Wood stars, actor Liev Schreiber directs. The Exorcism of Emily Rose: A lawyer (Laura Linney) defends a priest (Tom Wilkinson) accused in the death of a girl who underwent an exorcism. Flightplan: A widow (Jodie Foster) insists her 6-year-old daughter vanished on a trans-Atlantic flight - all evidence to the contrary. The Greatest Game Ever Played: A young amateur (Shia LaBeouf) shocks the golfing world in an upset of the British champ in 1913. Actor Bill Paxton directs. A History of Violence: Mobsters muscle in on a small-town diner owner (Viggo Mortensen) after his act of heroism. With Ed Harris, Maria Bello and William Hurt. Into the Blue: Divers hunting for treasure on a sunken ship find danger instead. With Jessica Alba and Paul Walker. Just Like Heaven: A man encounters romance from beyond when a ghostly woman (Reese Witherspoon) keeps appearing in his apartment. Mark Ruffalo co-stars. Lord of War: An arms dealer (Nicolas Cage) faces a crisis of conscience as he is pursued by an Interpol agent (Ethan Hawke). The Man: A fed (Samuel L. Jackson) teams with a dental-supply guy (Eugene Levy) to solve an agent's murder in this buddy comedy. Mirrormask: The Jim Henson Co. works its visual magic in
