L driver Scott Goodyear providing the analysis. (5) (6) 8 PM: National Memorial Day Concert: Erich Kunzel conducts the National Symphony Orchestra in the annual concert from the West Lawn of the U.S. Capitol. Vanessa Williams, Gary Sinise, Joe Mantegna, Brian Stokes Mitchell, Trace Adkins and Harolyn Blackwell are featured, with former Secretary of State Colin Powell leading a tribute to the late Ossie Davis, who had served as the concert's host for 14 years. See Andy Smith's story on page 3. (2) (36) 9 PM: Empire Falls: Paul Newman (who is also executive producer), Joanne Woodward, Ed Harris, Helen Hunt, Robin Wright Penn, Aidan Quinn and Philip Seymour Hoffman star in the conclusion of a two-part adaptation of Richard Russo's Pulitzer Prize-winning novel about life in a declining Maine mill town. (If you missed last night's telecast of part one, you can watch a repeat at 7 p.m., then move right on to the conclusion.) HBO MONDAY 6:30 PM: Unknown Soldier: Searching for a Father: Tonight's America Undercover documentary has Rhode Island roots as it follows filmmaker John Hulme on an odyssey to discover the man he knew only as a face in a photograph, the father who died on a Vietnamese battlefield just five weeks after young John was born -- Pawtucket-native Marine Lt. John (Jack) Hulme. HBO 7 PM: Icon: Patrick Swayze stars as former CIA agent Jason Monk in a three-hour TV adaptation of Frederick Forsyth's thriller about a Russian presidential candidate plotting to return his country to dictatorship. Patrick Bergin co-stars as radical right-wing politician Igor Komarov, with Ben Cross as sadistic former KGB officer Anotoli Grishin, who is now Komarov's head of security. Michael York plays the head of a shadowy international intelligence operation, and Annika Peterson is Sonia Astrova, a Russian police detective. HALL The Life and Times of Juniper Lee: Cartoon Network's newest heroine is an 11-year-old who combines her normal life of school, guitar lessons and family fun with her role as Te Xuan Lee (\"The Protector\"), the latest member of her family to have both the honor and the burden of keeping the real and the magical worlds in balance. The series moves to its regular time of Sunday nights at 7:30 next weekend. TOON 8 PM: Antiques Roadshow: This is a make-good for WGBH, which skipped this episode when it originally aired. Part two of a three-part stay in Portland, Ore., uncovers a bronze Japanese altar set elaborately decorated with mythical creatures from the Taisho period; a German artist's landscape sketchbook chronicling his travels through the Alps around 1862, and a little girl's shoe, accompanied by documentation from 1928 showing that it once bore the autographs of Babe Ruth and Lou Gehrig. (2) Strange Days on Planet Earth: The conclusion of this four-hour, two-part series begins with how the disappearance of predators affects an ecosystem, and then looks at possible remedies to combat toxins in the world's water systems. (36) Faith of My Fathers: Sen. John McCain's best-selling book is the basis of this two-hour TV movie chronicling his capture and five years as a POW during the Vietnam War. Shawn Hatosy portrays McCain, then a U.S. Navy pilot, and Scott Glenn is his father, Admiral Jack McCain. Erin Cottrell is McCain's first wife, Carol, with Cary-Hiroyuki Tagawa as the commander of the infamous \"Hanoi Hilton.\" A&E 9 PM: World War II Memorial: A Testament: This one-hour documentary looks at the building of Washington's newest monument, a long-awaited tribute to the men and women who fought in World War II. (2) Miss Universe Pageant: Billy Bush and Nancy O'Dell, who hosted last month's Miss USA Pageant, are back to do the same for this one. This year's event is being telecast live from Bangkok, Thailand, which means those contestants will be strutting their stuff at 8 a.m. Bangkok time to make primetime here. Chelsea Cooley of Charlotte, N.C., is Miss USA. (7) (10) Hell's Kitchen: Professional soccer player turned chef Gordon Ramsay works with 12 aspiring restaurateurs to open a world-class restaurant in Los Angeles in this new short-run summer series. (25) (64) TUESDAY 1 PM: Bishop Installation: WJAR offers live coverage from the Cathedral of SS Peter and Paul of the installation of Bishop Thomas J. Tobin as the new head of the Roman Catholic Diocese of Providence, succeeding retiring Bishop Robert E. Mulvee. (10) 9 PM: Frontline: Brookline, Mass., filmmaker Marian Marzynski offers a very personal commemorative of the 60th anniversary of the end of World War II. In A Jew Among Germans, Marzynski, who survived the Holocaust as a Jewish boy in Poland, visits Berlin and encounters ordinary Germans who wrestle with big questions of guilt, responsibility and memory. (2) Repeats Wednesday, 10 pm (44) 10 PM: Independent Lens: Newton, Mass., native Amanda Micheli takes a look at the blue-collar heroines of Hollywood, legendary stuntwomen Jeannie Epper and Zoe Bell, in Double Dare. (44) WEDNESDAY Full Channel Cable, serving Barrington, Bristol and Warren, makes significant changes to its channel lineup effective today. Check the conversion chart on Page 2 for the new lineup. 8 PM: The Eagles in Australia: NBC wipes clean its premiere time schedule tonight for a musical special featuring Glenn Frey, Don Henley, Joe Walsh and Timothy B. Schmidt performing Down Under as part of The Eagles Farewell 1 Tour. (7) (10) Beauty and the Geek: Ashton Kutcher and Jason Goldberg of Punk'd team up for a six-episode social experiment that looks at what happens when beauty meets brain. It all starts with seven women who are \"academically challenged,\" and seven males who are anything but. (56) Also at 10 pm on (28) Steve McQueen: The Essence of Cool: Turner Classic Movies marks the 75th anniversary of Steve McQueen's birth with a new documentary look at the legendary actor and stylish tough guy. McQueen was an icon who so embodied the essence of cool that even 25 years after his death, his image was chosen to promote Ford's new Mustang. A telecast of McQueen's classic Bullitt follows at 9:30 p.m., with The Great Escape Thursday night at 8 and The Magnificent Seven Friday at 11 p.m. TCM 9 PM: Dancing with the Stars: You know it's summer when shows like this begin turning up. ABC pairs six celebrities -- Trista Sutter of The Bachelorette; model Rachel Hunter; boxer Evander Holyfield; Joey McIntyre, formerly of New Kids on the Block; Seinfeld's John O'Hurley and General Hospital's Kelly Monaco with professional dancers to train and then compete in front of a studio audience. (5) (6) American Experience: Guerrilla: The Taking of Patty Hearst takes a look at the rise and fall of the Symbionese Liberation Army, a politically radical California-based group that advocated the violent overthrow of the U.S. government in the hothouse of 1970s America. Their kidnapping of Patty Hearst, the teenage newspaper heiress, turned into the first media circus of the television age. (36) 10 PM: Lost: Okay, for all you folks who've said \"I'd watch, but I don't want to start in the middle,\" ABC has heard you. Last season's best new drama begins its repeat at a new time with the first episode and continues in order through the summer. (5) (6) Sports Kids Moms & Dads: Tracy Austin, who was a teen tennis sensation whose competitive career ended when she was in her early 20s, lends her perspective as a former child sports star to this eight-part series following five families and their child athletes. BRV THURSDAY 9 PM: Hit Me Baby One More Time: Another British import crosses the pond, this one has its original host, Vernon Kay, along for the ride. The summer series features musicians competing with performances of their hits and a cover of a popular song. The audience will determine the winner. (7) (10) FRIDAY 9 PM: Mystery!: A train trip by Elspeth McGillicuddy (Pam Ferris) leads to another case for her friend Miss Marple (Geraldine McEwan), when she sees a murder committed on a f iraqi religious ethnic and", "newsbank_text": "Author: Ellen KnickmeyerRobin Wright 677 Words Page: A1 OpenURL Link By Copyrightsymbol 2005 The Washington Post BAGHDAD, Iraq - Drafters of a new constitution have summoned leaders of Iraqi religious, ethnic and political blocs to an emergency national summit this week in an attempt to resolve the toughest deadlocking issues in reshaping the country, U.S. and Iraqi officials said on Tuesday. U.S. officials in Washington said the gathering will take place on Thursday and Friday, if enough leaders - particularly members of Iraq's Sunni Arab minority - agree. Humam Hamoudi, chairman of the constitution-writing committee, has called for the forum, and U.S. officials said the aim is to bring in leaders from outside the committee, particularly Sunni Arabs. The U.S. officials spoke on the condition of anonymity because of the sensitivity of the talks. Sunni Arab delegates returned to the committee meetings on Tuesday after a weeklong boycott. But it remained clear that the major divisive issue was federalism, which Sunni participants charge would break up the country. In insurgent violence, meanwhile, attackers hurled grenades and fired automatic weapons at a bus carrying workers near Baghdad's Abu Ghraib prison, killing 18 of the laborers, police said. The U.S. military said on Tuesday that four U.S. soldiers were killed on Sunday night when their vehicle ran over a roadside bomb in the southwest section of the city. Jim Driscoll, a spokesman for the Georgia National Guard, said the victims were assigned to the 48th Infantry Brigade, the Associated Press reported. He said they were the Georgia Guard unit's first combat casualties since World War II. Separately, a video posted on the Internet showed an Algerian diplomat who was kidnapped last week. The diplomat, wearing a blindfold, and another Algerian seized with him had been subjected to \"the judgment of God\" and would be killed, said an accompanying statement, attributed to an insurgent group led by Abu Musab al- Zarqawi. Progress toward an Aug. 15 deadline for completing a constitutional draft is seen as essential by the interim government and its U.S. backers to demonstrate that political reform has momentum over the relentless insurgency. A credible draft is considered equally vital to convince the Sunni Arab minority that progress has been made in a country also wracked by common crime and chronic shortages. Many insurgent fighters are recruited among disaffected Sunnis. The draft is expected to be delivered to the National Assembly shortly after the Aug. 15 deadline. A national referendum on the constitution is set for October. The attempt to draw new participants was intended to give additional impetus to the process, officials said. \"There is a notion that they can get it done by August 15, so there is a big push to have big leaders involved so there is no posturing inside the constitutional committee to make life difficult,\" said a senior Iraqi official familiar with the talks. Leaders of \"all groups and political parties and the groups which are represented in the National Assembly\" should participate in the constitutional summit this week, said Kamran Qaradaghi, spokesman for Iraqi President Jalal Talabani. Talabani would likely be among the participants, Qaradaghi said. In Washington, a State Department official said Massoud Barzani, the Kurdistan regional president and political leader, who seldom leaves his northern stronghold, \"is coming down from the mountains\" for the meeting in Baghdad. \"It's the reality of any political system that political leaders need to be involved in dealmaking, either directly or indirectly,\" said a senior State Department official, describing the meeting as a positive development. \"This is bringing them into the process more directly.\" Committee delegates on Tuesday established an 18member subcommittee assigned to work out major unresolved issues, chiefly federalism, said Saad Jawad Qandeel, a Shiite Muslim committee member. Kurds are pushing for federalism as the only acceptable system for their already autonomous north. Some in the Shiite majority also want the same rights for the heavily Shiite south. Sunnis, who governed until the 2003 U.S. invasion that ousted President Saddam Hussein, reject such a provision. Sunni delegates said on Tuesday they flatly reject a southern Shiite federal region under any circumstance. They proposed putting off the federal question until some months after the constitution is approved, said Salih Mutlaq, a leading Sunni on the committee."}, {"article_id": "228872595", "match_score": 62.43093922651934, "source": "Chronicle, The (Willimantic, CT)", "date": "September 3, 2005", "window_summary": "The archive excerpt is a TV listing that references the film Forrest Gump and names Robin Wright as a co-star alongside Tom Hanks. It identifies her in the context of that movie.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full TV-schedule text lists Forrest Gump (1994) with Tom Hanks and Robin Wright, presenting her as part of the film's cast in a neutral programming context.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "b 00 wickedly perfect n s 3 o 0 in movie a a a a Forrest Gumpy 1994 Tom Hanks Robin Wright. A slow witted southerner experiences 30 years of history. S 3 3 00 q cd a Law amp order a", "newsbank_text": "1107 Words OpenURL Link 6: 00 6: 30 7: 00 7: 30 8: 00 8: 30 9: 00 9: 30 10: 00 10: 30 11: 00 11: 30 Water- Masterpiece Theatre Masterpiece Theatre Masterpiece Theatre Monarch of the Glen gate Plus '' Aristocrats'' ( s) ( Part 1 of 3) '' Aristocrats'' ( s) ( Part 2 of 3) '' Aristocrats'' ( s) ( Part 3 of 3) CBS News ( cc)60 Minutes ( s) ( cc) Cold Case '' Best Movie:TT Along Came a Spider ( 2001) News CSI News Friends'' ( s) ( cc) ( Morgan Freeman, Monica Potter) ( DVS) News ( cc)NBC Countdown to NASCAR Racing Nextel Cup Series -- minator ( 1984) ( s) ( cc) Celebrity Oops! Celebrity Oops! Celebrity Oops! Girls Girls Cattle Drive Taradise Taradise 10 2> WEDH 11 H WBZ 19 1B WUVN 20 2: WTXX 23 3@ WSBE 36 AMC 37 BRAV 38 TRAV 39 DSC 40 ANIM 41 TLC 42 HGTV 43 FOOD 44 TBS 45 OXY 46 A& E 48 FAM 49 TVLD 50 NICK 51 TOON 52 DISN 53 SCI 54 USA 57 CNN 58 CNBC 59 MSNB 60 FNC 62 BET 63 VH1 64 MTV 65 COM 66 SPIKE 68 E! Copyright 2005 The Chronicle Printing Company. All Rights Reserved"}, {"article_id": "171813687", "match_score": 62.39669421487604, "source": "Arkansas Democrat-Gazette (Little Rock, AR)", "date": "November 23, 2005", "window_summary": "unclear", "window_context": "other", "window_tone": "neutral", "fulltext_summary": "unclear", "fulltext_context": "other", "fulltext_tone": "neutral", "archive_window": "Pentagon Aims to Cut gis in Iraq tentative plans would reduce level to under in 06 by Bradley Graham and Robin Wright the Washington Post Washington barring any major surprises in the Penta gon tentatively plans to reduce the number of forces", "newsbank_text": "BAGHDAD, Iraq - A suicide car bomber killed 21 people in northern Iraq on Tuesday after insurgents lured police to the scene by shooting an officer, officials said. Elsewhere, insurgents fired a mortar shell at a U.S. ceremony transferring one of Saddam Hussein's palaces in Tikrit to Iraqi control. The shell failed to explode but sent the U.S. ambassador, the top American commander and robed tribal sheiks scurrying for cover as the round whistled overhead. The suicide bomber struck on a busy commercial street in Kirkuk, a mixed Arab, Kurdish and Turkoman city in an oil-producing region 180 miles north of Baghdad. About half the dead were police who rushed to the scene after gunmen killed a fellow officer. In addition to the 21 dead, 24 people were wounded, according to police Brig. Gen. Sarhad Qader. The attack came as the latest in a wave of suicide operations that have killed more than 160 Iraqis since Friday. Most of the victims were Shiites. Barring any major surprises in Iraq, the Pentagon tentatively plans to reduce the number of U.S. forces there early next year by as many as three combat brigades from the 18 now, but to keep at least one brigade \"on call\" in Kuwait in case more troops are needed quickly, several senior military officers said. Pentagon authorities also have set a series of \"decision points\" during 2006 to consider further force cuts that, under a \"moderately optimistic\" scenario, would drop the number of troops from more than 150,000 now to fewer than 100,000, in- cluding 10 combat brigades, by the end of the year, the officers said. Bush administration officials say military and political factors heavily constrain how fast U.S. forces should leave. U.S. military commanders continue to favor a gradual, phased reduction. A senior general, who likened an accelerated withdrawal to \"taking the training wheels off of a bike too early,\" warned that a sudden removal of all U.S. troops would risk the collapse of Iraq's fledgling security forces. The current number of U.S. forces in Iraq represents an increase of more than 15,000 troops over a base level this year of about 138,000, including 17 combat brigades. The equivalent of another brigade's worth of combat power was added this fall to bolster security for the Oct. 15 constitutional referendum and the coming Dec. 15 vote on a new national government. Defense Secretary Donald Rumsfeld spoke over the weekend of plans to bring the force level down to 138,000 after the elections, effectively removing the extra brigade-equivalent added for the election period. Also, officers said, two combat brigades that had been set to move into Iraq to replace units coming out are now expected to be held back. One of those units - a brigade of the 1st Armored Division based in Germany - will probably be positioned in Kuwait. The other unit, a brigade of the 1st Infantry Division, will probably remain at its home base of Fort Riley, Kan., the officers said. The plan to keep at least one brigade in Kuwait is intended to hedge against events in Iraq deteriorating once U.S. force levels begin to drop, one senior officer said, adding that the Pentagon probably will place troops on alert elsewhere as well. All the officers who spoke about the troop plans stressed that final decisions will come only after the Dec. 15 vote. They spoke on the condition of anonymity because they had not been authorized to discuss the plans. SHELL INTERRUPTS CEREMONY U.S. officials sought to downplay the mortar attack in Tikrit, 80 miles north of Baghdad, noting that the lone shell failed to explode or to interfere with the hand-over. \"This was an ineffectual attempt to stop the progress that goes on every day in Iraq,\" said Lt. Col. Barry Johnson, a spokesman for the U.S. command in Baghdad. However, Arabic satellite television stations aired footage showing an American colonel ducking for cover as the shell whistled overhead and sputtered into sand about 300 yards away from the podium. U.S. security hustled U.S. Ambassador Zalmay Khalilzad and the U.S. commander in Iraq, Gen. George Casey, into the palace while American infantrymen and an Apache attack helicopter searched for the source of fire. The ceremony resumed a few minutes later. MEMO ON AL-JAZEERA Elsewhere, a British civil servant has been charged under Britain's Official Secrets Act on accusations of leaking a government memo that a newspaper said Tuesday suggested that Prime Minister Tony Blair persuaded President Bush not to bomb the Arab satellite station Al-Jazeera. The Daily Mirror reported that Bush spoke of targeting Al-Jazeera's headquarters in Doha, Qatar, when he met Blair at the White House on April 16, 2004. The Bush administration has regularly accused Al-Jazeera of being a mouthpiece for anti-American sentiments. The newspaper attributed its information to unidentified sources. One source, said to be in the government, was quoted as saying that the purported threat was \"humorous, not serious,\" but the Daily Mirror quoted another source as saying that \"Bush was deadly serious, as was Blair.\" \"We are not interested in dignifying something so outlandish and inconceivable with a response,\" White House spokesman Scott McClellan told The Associated Press in an e-mail. In Washington, a senior diplomat said the Bush remark as recounted in the newspaper \"sounds like one of the president's one-liners that is meant as a joke.\" But, the diplomat said, \"it was foolish for someone to write it down, and now it will be a story for days.\" Blair's office declined to comment on the report. Al-Jazeera said in a statement that it was investigating the report. Cabinet Office civil servant David Keogh is accused of passing the document to Leo O'Connor, who formerly worked for former British lawmaker Tony Clarke. Both Keogh and O'Connor are scheduled to appear at London's Bow Street Magistrates Court next week. According to the Crown Prosecution Service, Keogh was charged with an offense under Section 3 of the Official Secrets Act relating to \"a damaging disclosure\" by a servant of the Crown of information relating to international relations or information obtained from a state other than the United Kingdom. O'Connor was charged under Section 5, which relates to receiving and disclosing illegally disclosed information. According to the newspaper, Clarke returned the memo to Blair's office. Clarke did not respond to calls from The Associated Press seeking comment. OPERATION FINISHED Also Tuesday, U.S. Marines announced the end of a major operation to secure towns along the Syrian border used by al-Qaida to smuggle foreign fighters into Iraq. Ten Marines and 139 insurgents were killed in \"Operation Steel Curtain,\" which began Nov. 5 with about 2,500 U.S. troops and 1,000 Iraqi soldiers, a military statement said. U.S. commanders plan to establish a long-term presence in the area to prevent al-Qaida and its Iraqi allies from re- establishing themselves in the area. Meanwhile, the U.S. command said a soldier was killed Monday by a roadside bomb near Habaniyah, 50 miles west of Baghdad. That death raised the number of U.S. servicemen who have died since the Iraq war began in March 2003 to at least 2,100, according to a U.S. military count. That number is four higher than Associated Press figures. The reason for the discrepancy wasn't immediately clear. Two other soldiers from Task Force Freedom were killed Saturday by small-arms fire while on patrol in Mosul, 225 miles northwest of Baghdad, a U.S. statement said. Those deaths were already included in the overall figures. Information for this article was contributed by Robert H. Reid, Zaki Mahmoud, Qassim Abdul-Zahra, Yahya Barzanji and Robert Barr of The Associated Press and Ellen Knickmeyer, Kevin Sullivan, Walter Pincus, Bradley Graham and Robin Wright of The Washington Post. Copyright 2005, 2012, Arkansas Democrat-Gazette."}, {"article_id": "281492042", "match_score": 61.855670103092784, "source": "Chronicle, The (Willimantic, CT)", "date": "September 3, 2005", "window_summary": "The excerpt is a TV listing that names Robin Wright as a star of the film \"Forrest Gump.\"", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full TV schedule entry lists the 1994 film \"Forrest Gump,\" crediting Robin Wright alongside Tom Hanks, presented as part of routine programming information.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "1 of 2 cd friends s part 2 of 2 cd a Forrest Gump Quot 1994, drama a Tom Hanks Robin Wright Gary Sytse a slow witted southerner experiences 30 years of history cd i in in 10 Daisy does America j", "newsbank_text": "1107 Words OpenURL Link 6: 00 6: 30 7: 00 7: 30 8: 00 8: 30 9: 00 9: 30 10: 00 10: 30 11: 00 11: 30 Water- Masterpiece Theatre Masterpiece Theatre Masterpiece Theatre Monarch of the Glen gate Plus '' Aristocrats'' ( s) ( Part 1 of 3) '' Aristo The standing of al-Qaida terror network chief Osama bin Laden has dropped significantly in some key Muslim countries, while support for suicide bombings and other acts of violence has \"declined dramatically,\" according to a new survey released yesterday. In a striking finding, predominantly Muslim populations in a sampling of six North African, Middle East and Asian countries are also as alarmed as Western nations about Islamic extremism, which is now seen as a threat in their own nations, too, the poll found. \"Most Muslim publics are expressing less support for terrorism than in the past. Confidence in Osama bin Laden has declined markedly in some countries, and fewer believe suicide bombings that target civilians are justified in the defense of Islam,\" the Pew Global Attitudes Project concluded. Compared with previous surveys, the new poll also found growing majorities or pluralities of Muslims surveyed now say democracy can work in their countries and is not just a political system for the West. Support for democracy was in the 80 percent range in Indonesia, Jordan, Lebanon and Morocco and at 43 percent in Pakistan and 48 percent in Turkey. \"They are not just paying lip service. They are saying they specifically want a fair judiciary, freedom of expression and more than one party to participate in elections. It wasn't just a vague concept,\" said Andrew Kohut, president of the Pew Research Center in Washington and director of the project. \"U.S. and Western ideas about democracy have been globalized and are in the Muslim world.\" At the same time, however, most Muslims surveyed believe that Islam is playing an increasing role in politics, which they view as a positive shift in response to economic problems, growing immorality and concern about Western influence. Jordan was the only exception to the trend. The survey results indicate that growing numbers of Muslims differentiate between the peaceful influence of Islamic values in politics and the use of religion to justify attacks. \"The people who see Islam playing an important role in political life are the ones most worried about extremism,\" Kohut said in an interview. Yet solid majorities in five of the six Muslim countries surveyed -- Indonesia, Jordan, Lebanon, Pakistan and Turkey -- also now have unfavorable views of the United States. In the sixth, Morocco, views are divided. The governments in all six countries are allied with the United States and recipients of U.S. aid. The survey, conducted from April through mid-June and before the London bombings, polled 17,000 people in the six Muslim-dominated countries as well as 11 major Western and Asian nations -- including the United States -- on attitudes toward Islam, Muslim nations and extremist violence. The nonpartisan project is co-chaired by former Secretary of State Madeleine Albright and former Sen. John Danforth, R-Mo. Copyright (c) 2005 Pittsburgh Post-Gazette"}, {"article_id": "228879514", "match_score": 61.02564102564103, "source": "Chronicle, The (Willimantic, CT)", "date": "September 3, 2005", "window_summary": "The archive window is a TV listing noting Forrest Gump (1994) and credits Robin Wright as a co-star, describing the film briefly. The reference is to her film role.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full article is a television schedule that mentions Forrest Gump and includes Robin Wright among the credited actors, offering a neutral listing of her role for viewers.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "Chance for a jaded woman. Be 2 00 movie a a a x a Forrest Gumpy 1994 a Tom Hanks Robin Wright. A slow witted southerner experiences 30 years of history. Be 3 10 movie a a you Only live twice 1967", "newsbank_text": "1107 Words OpenURL Link 6: 00 6: 30 7: 00 7: 30 8: 00 8: 30 9: 00 9: 30 10: 00 10: 30 11: 00 11: 30 Water- Masterpiece Theatre Masterpiece Theatre Masterpiece Theatre Monarch of the Glen gate Pl e:TTTDirty Dancing ( 1987) ( s)Rock Simmons Surreal Hogan Celebrity Fit Club( s) Surreal Laguna Room Milonakis Punk'd Bam Pimp Pimp Bam Punk'd Milonakis Milonakis Milonakis Mad TV ( s) ( cc) Movie: TZ Scary Movie 2 ( 2001) ( cc) Mencia Mencia Mencia Mencia Mencia Mencia Amazing Video WWE Heat Movie:TT Raw Deal( 1986) ( cc) Movie:TTT The Terminator ( 1984) ( s) ( cc) Celebrity Oops! Celebrity Oops! Celebrity Oops! Girls Girls Cattle Drive Taradise Taradise 10 2> WEDH 11 H WBZ 19 1B WUVN 20 2: WTXX 23 3@ WSBE 36 AMC 37 BRAV 38 TRAV 39 DSC 40 ANIM 41 TLC 42 HGTV 43 FOOD 44 TBS 45 OXY 46 A& E 48 FAM 49 TVLD 50 NICK 51 TOON 52 DISN 53 SCI 54 USA 57 CNN 58 CNBC 59 MSNB 60 FNC 62 BET 63 VH1 64 MTV 65 COM 66 SPIKE 68 E! Copyright 2005 The Chronicle Printing Company. All Rights Reserved"}, {"article_id": "171807109", "match_score": 60.65573770491803, "source": "Seattle Times, The (WA)", "date": "February 14, 2005", "window_summary": "unclear", "window_context": "other", "window_tone": "neutral", "fulltext_summary": "unclear", "fulltext_context": "other", "fulltext_tone": "neutral", "archive_window": "looking into waste and abuse in 5255c Iran could get cozy election result not the outcome was hoping for by Robin Wright the Washington Post Washington when the Bush administration decided to invade Iraq two years ago this it envisioned a Quick", "newsbank_text": "Vote | <EM>The top two winning parties, which are expected to name Iraq's new prime minister and president, are Iran's closest allies in Iraq, a development the White House had not envisioned. </EM> WASHINGTON — When the Bush administration decided to invade Iraq two years ago, it envisioned a quick handover to handpicked allies in a secular government that would be the antithesis of Iran's theocracy — potentially even a foil to Tehran's regional ambitions. But, in one of the greatest ironies of the U.S. intervention, Iraqis instead went to the polls and elected a government with a strong religious base — and very close ties to the Islamic republic next door. It is the last thing the administration expected from its costly Iraq policy — $300 billion, at least 1,461 dead U.S. service members and counting — U.S. and regional analysts say. Yesterday, the White House heralded the election and credited the U.S. role. In a statement, President Bush praised Iraqis \"for defying terrorist threats and setting their country on the path of democracy and freedom. And I congratulate every candidate who stood for election and those who will take office once the results are certified.\" Yet the top two winning parties, which together won more than 70 percent of the vote and are expected to name Iraq's new prime minister and president, are Iran's closest allies in Iraq. Thousands of members of the United Iraqi Alliance, a Shiite-dominated slate that won almost half of the 8.5 million votes and will name the prime minister, spent decades in exile in Iran. Most of the militia members in its largest faction were trained in Shiite-dominated Iran. And the runner-up Kurdish alliance, whose co-leader Jalal Talabani is the top nominee for president, has roots in a province abutting Iran, which long served as its economic and political lifeline. \"This is a government that will have very good relations with Iran. The Kurdish victory reinforces this conclusion. Talabani is very close to Tehran,\" said Juan Cole, a University of Michigan expert on Iraq. \"In terms of regional geopolitics, this is not the outcome that the United States was hoping for.\" Added Rami Khouri, Arab analyst and editor of Beirut's Daily Star: \"The idea that the United States would get a quick, stable, prosperous, pro-American and pro-Israel Iraq has not happened. Most of the neoconservative assumptions about what would happen have proven false.\" The results have long-term implications. For decades, both Republican and Democratic administrations played Iraq and Iran off each other to ensure neither became a regional giant threatening or dominant over U.S. allies, notably Saudi Arabia and the oil-rich Gulf sheikdoms. But now, Cole said, Iraq and Iran are likely to take similar positions on many issues, from oil prices to U.S. policy on Iran. \"If the United States had decided three years ago to bomb Iran, it would have produced joy in Baghdad,\" he added. \"Now it might produce strong protests from Baghdad.\" Conversely, the Iraqi secular democrats backed most strongly by the Bush administration lost big. During his State of the Union Address last year, Bush invited Adnan Pachachi, a longtime Sunni politician and then-president of the Iraqi Governing Council, to sit with first lady Laura Bush. Pachachi's party won no seats in the national assembly, according to results announced yesterday in Baghdad. The election slate led by current Prime Minister Ayad Allawi, backed by the CIA during his years in exile and handpicked by U.S. and U.N. officials to lead the interim government, came in third. He addressed a joint session of Congress last September, a rare honor reserved for heads of state of the closest U.S. allies. But now, U.S. hopes that Allawi will tally enough votes to vie as a compromise candidate and continue his leadership are unrealistic, analysts say. \"The big losers in this election are the liberals,\" said Stanford University's Larry Diamond, who was an adviser to the U.S. occupation government. \"The fact that three-quarters of the national assembly seats have gone to just two (out of 111) slates is a worrisome trend. Unless the ruling coalition reaches out to broaden itself to include all groups, the insurgency will continue — and may gain ground.\" Adel Abdul-Mahdi, who is a leading contender to be prime minister, reiterated yesterday that the new government does not want to emulate Iran. \"We don't want either a Shiite government or an Islamic government,\" he said on CNN's \"Late Edition.\" \"Now we are working for a democratic government. This is our choice.\" And a senior State Department official said that the 48 percent vote won by the Shiite slate deprives it of an outright majority. \"If it had been higher, the slate would be seen with a lot more trepidation,\" he said on the condition of anonymity because of department rules. U.S. and regional analysts agree Iraq is not likely to become an Iranian surrogate. Iraq's Arabs and Iran's Persians have a long and rocky history. During the 1980-1988 Iran-Iraq war, Iraq's Shiite troops did not defect to Iran. \"There's the assumption that the new government will be close to Iran or influenced by Iran. That's a strong and reasonable assumption,\" Khouri said. \"But I don't think anyone knows — including Grand Ayatollah (Ali al-) Sistani — where the fault line is between Shiite religious identity and Iraqi national identity.\" Iranian-born al-Sistani is Iraq's top cleric — and the leader who pressed for elections when the Bush administration favored a caucus system to pick a government. His aides have rejected Iran's theocracy as a model, although the Shiite slate is expected to press for Islamic law to be incorporated in the new constitution. For now, the United States appears prepared to accept the results — in large part because it has no choice. But the results were announced at a time when the United States faces mounting tensions with Iran over its alleged nuclear-weapons ambitions, support for extremism and human-rights violations. On her first trip abroad this month, Secretary of State Condoleezza Rice said Iran's behavior was \"something to be loathed\" and charged that the \"unelected mullahs\" are not good for Iran or the region. One of the biggest questions, analysts say, is whether Iraq's democratic election will make it easier — or harder — to pressure Iran. Copyright (c) 2005 Seattle Times Company, All Rights Reserved."}, {"article_id": "302901881", "match_score": 60.55045871559632, "source": "American Press (Lake Charles, LA)", "date": "May 14, 2005", "window_summary": "The eech tuesday president Bush ignored some uncomfortable facts about the Enterprise in Iraq and", "newsbank_text": "Analysis In his speech Tuesday night, the president accurately portrayed how the Iraqis are meeting their deadlines for a governmental transition and development of security forces. But he glossed over the original rationale for the U.S. invasion, and overstated international support. WASHINGTON — In his speech Tuesday night, President Bush ignored some uncomfortable facts about the U.S. enterprise in Iraq and overstated the extent of overseas support. But he correctly identified the gains made by the nascent Iraqi government in the past year in the face of a fierce insurgency. The president portrayed the war in Iraq as a central front in the anti-terrorism effort, a sort of quarantine for terrorist groups that might otherwise attack the United States. But the original rationale for the invasion of Iraq was ignored Tuesday night: a conviction by the Bush administration that Saddam Hussein's government possessed chemical, biological and possibly nuclear weapons of mass destruction. In fact, the U.N. resolution that the Bush administration used as a rationale for the war dealt entirely with Iraq's failure to give up those weapons — none of which were found after the war. Bush, announcing the invasion on March 19, 2003, said the military operations were \"to disarm Iraq, to free its people and to defend the world from grave danger.\" Two and a half months later, when he declared that major combat operations were over, the president said it was a victory in the war against terrorism because Saddam was \"a source of terrorism funding\" (referring to Iraq's role in the Israeli-Palestinian conflict) and because \"no terrorist network will gain weapons of mass destruction from the Iraqi regime.\" \"An ally of al-Qaida\" Bush also described Saddam as \"an ally of al-Qaida,\" a point he suggested again Tuesday night, but the Sept. 11 commission concluded there had been no collaboration between Saddam and the terrorist group headed by Osama bin Laden. Now, many analysts inside and outside the government portray Iraq as a breeding ground for terrorist groups, in part because of mistakes made by the administration after it defeated Saddam and occupied Iraq. Bush emphasized the gains fighting terrorism, but the Pentagon commander for the Middle East, Gen. John Abizaid, said this month that more foreign fighters are now moving into Iraq than were six months ago. In other sections of his speech, the president strained to make the level of international support higher and broader than in reality. He said the \"international community has stepped forward with vital assistance,\" with 30 nations providing troops in Iraq. He also said the insurgents have failed to \"force a mass withdrawal by our allies.\" Liabilities abroad But the U.S.-led coalition, which once included about three dozen nations, has become a political liability for several participating countries. In the past year, more than a dozen countries have withdrawn or have announced plans to leave. Spain, one of the three original co-sponsors of the invasion, withdrew more than a year ago. Portugal, Norway, Hungary, the Philippines, New Zealand, Thailand, Honduras, the Dominican Republic and Tonga have also pulled out. Among three of the largest contributors, Ukraine and Poland have announced they will pull out by year's end, and Italy plans to begin reducing its presence this fall. Bush also asserted that \"some 40 countries and three international organizations have pledged about $34 billion in assistance for Iraqi reconstruction.\" But he did not say that $20 billion of that amount is from the United States, and much of it has been diverted to security or has not yet been delivered. Moreover, only about $2 billion of the remaining pledges — made nearly two years ago — has been delivered by the rest of the world. Even if the full $34 billion is eventually delivered, it is well short of the $56 billion that the World Bank and the United Nations said in 2003 that Iraq would need over the next five years. Yet, as Bush noted, the international community has become convinced that success in Iraq is important and that it is necessary to support, at least rhetorically, the transitional government. Bush said Iraq's political transformation is sparking change across the Middle East. Yet Yasser Arafat's death was the turning point that brought new Palestinian leadership — and new prospects for talks with Israel and U.S. intervention. The suicide bombing that assassinated Lebanon's opposition leader provoked the \"Cedar Revolution\" and demands for Syria's withdrawal. And the process that led to Libya's surrender of its weapons of mass destruction was started before Bush came to office. On several points, Bush accurately portrayed the situation. Despite the slowness in forming Iraq's current government, the three-phase transition has met most of the deadlines. More than 60 percent of Iraqis defied the violence to vote in January's free elections. Iraq has made significant gains in both the quantity and quality of its security forces over the past year, although together the 150,000-strong international coalition that ousted Saddam and the 160,000 Iraqi forces have not been able to handle the insurgency. Indeed, as Bush said, Iraqi insurgents and foreign fighters have so far failed to achieve their strategic goals — and hundreds have been killed or captured. Their activities are still largely in three of Iraq's 18 provinces. Bush also noted that the insurgents have \"failed to incite an Iraqi civil war.\" That is correct, thus far, but senior Iraqi officials warn that intensifying sectarianism makes a civil war increasingly possible. Copyright (c) 2005 Seattle Times Company, All Rights Reserved."}, {"article_id": "217033322", "match_score": 60.49382716049383, "source": "Seattle Times, The (WA)", "date": "February 14, 2005", "window_summary": " ost of the militia members in its largest faction were trained in Shiite-dominated Iran. And the runner-up Kurdish alliance, whose co-leader Jalal Talabani is the top nominee for president, has roots in a province abutting Iran, which long served as its economic and political lifeline. \"This is a government that will have very good relations with Iran. The Kurdish victory reinforces this conclusion. Talabani is very close to Tehran,\" said Juan Cole, a University of Michigan expert on Iraq. \"In terms of regional geopolitics, this is not the outcome that the United States was hoping for.\" Added Rami Khouri, Arab analyst and editor of Beirut's Daily Star: \"The idea that the United States would get a quick, stable, prosperous, pro-American and pro-Israel Iraq has not happened. Most of the neoconservative assumptions about what would happen have proven false.\" The results have long-term implications. For decades, both Republican and Democratic administrations played Iraq and Iran off each other to ensure neither became a regional giant threatening or dominant over U.S. allies, notably Saudi Arabia and the oil-rich Gulf sheikdoms. But now, Cole said, Iraq and Iran are likely to take similar positions on many issues, from oil prices to U.S. policy on Iran. \"If the United States had decided three years ago to bomb Iran, it would have produced joy in Baghdad,\" he added. \"Now it might produce strong protests from Baghdad.\" Conversely, the Iraqi secular democrats backed most strongly by the Bush administration lost big. During his State of the Union Address last year, Bush invited Adnan Pachachi, a longtime Sunni politician and then-president of the Iraqi Governing Council, to sit with first lady Laura Bush. Pachachi's party won no seats in the national assembly, according to results announced yesterday in Baghdad. The election slate led by current Prime Minister Ayad Allawi, backed by the CIA during his years in exile and handpicked by U.S. and U.N. officials to lead the interim government, came in third. He addressed a joint session of Congress last September, a rare honor reserved for heads of state of the closest U.S. allies. But now, U.S. hopes that Allawi will tally enough votes to vie as a compromise candidate and continue his leadership are unrealistic, analysts say. \"The big losers in this election are the liberals,\" said Stanford University's Larry Diamond, who was an adviser to the U.S. occupation government. \"The fact that three-quarters of the national assembly seats have gone to just two (out of 111) slates is a worrisome trend. Unless the ruling coalition reaches out to broaden itself to include all groups, the insurgency will continue — and may gain ground.\" Adel Abdul-Mahdi, who is a leading contender to be prime minister, reiterated yesterday that the new government does not want to emulate Iran. \"We don't want either a Shiite government or an Islamic government,\" he said on CNN's \"Late Edition.\" \"Now we are working for a democratic government. This is our choice.\" And a senior State Department official said that the 48 percent vote won by the Shiite slate deprives it of an outright majority. \"If it had been higher, the slate would be seen with a lot more trepidation,\" he said on the condition of anonymity because of department rules. U.S. and regional analysts agree Iraq is not likely to become an Iranian surrogate. Iraq's Arabs and Iran's Persians have a long and rocky history. During the 1980-1988 Iran-Iraq war, Iraq's Shiite troops did not defect to Iran. \"There's the assumption that the new government will be close to Iran or influenced by Iran. That's a strong and reasonable assumption,\" Khouri said. \"But I don't think anyone knows — including Grand Ayatollah (Ali al-) Sistani — where the fault line is between Shiite religious identity and Iraqi national identity.\" Iranian-born al-Sistani is Iraq's top cleric — and the leader who pressed for elections when the Bush administration favored const TONE_COLOR = {positive:'#d4edda',negative:'#f8d7da',neutral:'#e2e3e5',mixed:'#fff3cd'};
const TONE_BADGE = {positive:'#28a745',negative:'#dc3545',neutral:'#6c757d',mixed:'#fd7e14'};
const CTX_BADGE  = {career:'#007bff',personal_life:'#6f42c1',family:'#20c997',other:'#adb5bd'};

function badge(val, colors, fallback='#adb5bd') {
  const c = colors[val] || fallback;
  return `<span style="background:${c};color:white;padding:2px 8px;border-radius:10px;font-size:12px">${val||'—'}</span>`;
}

function render() {
  const minScore = parseFloat(document.getElementById('filterScore').value) || 0;
  const wTone    = document.getElementById('filterWTone').value;
  const wCtx     = document.getElementById('filterWCtx').value;
  const fTone    = document.getElementById('filterFTone').value;

  const filtered = DATA.filter(d =>
    d.match_score >= minScore &&
    (!wTone || d.window_tone === wTone) &&
    (!wCtx  || d.window_context === wCtx) &&
    (!fTone || d.fulltext_tone === fTone)
  );

  document.getElementById('count').textContent = filtered.length + ' articles';

  const html = filtered.map(d => `
    <div class="card">
      <div class="card-header" style="background:${TONE_COLOR[d.window_tone]||'#f8f9fa'}">
        <span class="score">Score: ${d.match_score.toFixed(1)}</span>
        <span>📰 ${d.source}</span>
        <span>📅 ${d.date}</span>
        <span>ID: ${d.article_id}</span>
      </div>
      <div class="card-body">
        <div class="panel">
          <h3>Archive window</h3>
          <div class="badges">
            ${badge(d.window_tone, TONE_BADGE)}
            ${badge(d.window_context, CTX_BADGE)}
          </div>
          <div class="summary">${d.window_summary}</div>
          <details><summary>Show raw text</summary><pre>${d.archive_window}</pre></details>
        </div>
        <div class="panel">
          <h3>NewsBank full text</h3>
          <div class="badges">
            ${badge(d.fulltext_tone, TONE_BADGE)}
            ${badge(d.fulltext_context, CTX_BADGE)}
          </div>
          <div class="summary">${d.fulltext_summary}</div>
          <details><summary>Show raw text</summary><pre>${d.newsbank_text}</pre></details>
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('cards').innerHTML = html || '<p style="padding:24px;color:#666">No articles match filters.</p>';
}

render();
