s new special. In addition to funny bits on New York cabbies, his Italian-American upbringing and the relationship dynamics of a kids Christmas special, Cantone impersonates Cher, Liza Minnelli and other divas, and shows off his own song stylings. 10 PM = Mad TV Guest star Nicole Richie (\" The Simple Life\") portrays Kelly Ripa in a shampoo commercial parody that also features Nicole Parker as Sarah Jessica Parker and Danielle Gaither as Vienetta Jones. Parker also plays Kelly Clarkson in a sendup of the \" American Idol \" winner's video \" Since U Been Gone, \" with Michael McDonald as \" Idol \" judge Simon Cowell. Musical guest the Donnas perform. Copyright 2005, 2007, American Press. All Rights Reserved."}, {"article_id": "318099885", "match_score": 81.41592920353982, "source": "Chicago Sun-Times (IL)", "date": "January 27, 2005", "window_summary": "The archive excerpt describes a segment in which Robin Wright Penn plays a pregnant woman who encounters a former lover in a supermarket, highlighting the scene's emotional impact.", "window_context": "career", "window_tone": "positive", "fulltext_summary": "The full review praises Rodrigo Garcia's Nine Lives and specifically notes the effectiveness of the single-take vignette featuring Robin Wright Penn, portraying her segment as one of the film's powerful short-story-like moments.", "fulltext_context": "career", "fulltext_tone": "positive", "archive_window": "of to to 12 minutes. Some segments have the Impact of great Short stories. For example a scene in which Robin Wright Penn plays a pregnant woman who meets a former Lover also now married in the supermarket. It becomes Clear to", "newsbank_text": "PARK CITY, Utah -- I took a day off to cover the Oscars, and I'm nine films behind. That's nine I've seen, not nine I've missed. They are so various and in many cases so good that the problem is to write about them without sounding like a crazed cinemaniac. \"Grizzly Man\" is the best place to start. This new documentary by Werner Herzog is an astonishing portrait of Tim Treadwell, who, like many of Herzog's subjects, is possessed of a serene ecstasy that forces him to go too far, try too much, risk his life in his search for the sublime. You read about Treadwell in the papers, or maybe you saw him on Letterman. He's the guy with the Viking haircut who spent 13 summers in Alaska living with grizzly bears. He spoke their language, he said, and knew their moods, and survived unarmed among them. But in the autumn of 2003, the communication broke down, and Treadwell and his girlfriend were killed and eaten by a bear -- a bear he didn't much like. Herzog, a great filmmaker, does not simply tell this story but transcends it, engaging in a debate with the dead man over the nature of Nature. Treadwell thinks Nature is harmonious. Herzog says he thinks it is made of \"chaos, hostility and murder.\" When Treadwell looks into a bear's eyes, he sees a friend. Herzog sees a wild animal, curious and possibly hungry. Treadwell got a video camera in 1999 and left behind 80 hours of extraordinary footage taken in the wilderness. The footage includes shots taken hours before his death, at the place where his bones were found, and shots of the bear that would eat him. He comes across as an engaging, exuberantly childish man who talks to the animals as if they were children and dramatizes his own mission and the constant danger he says (accurately) that surrounds him. Herzog talks to his friends, former lovers and partners, to the pilot who dropped him off and found his remains and the coroner who opened up the bear. \"Grizzly Man\" is chaotic, hostile, deadly, harmonious and brilliant. I also greatly admired \"Nine Lives,\" by Rodrigo Garcia, which has a large cast that includes many famous names and uses them in a series of nine vignettes, each one filmed in a single shot of 10 to 12 minutes. Some of the segments have the impact of great short stories. For example, a scene in which Robin Wright Penn plays a pregnant woman who is in the supermarket when she meets a former lover, also now married. It becomes clear to them that their old attraction is still powerful. In another lovely scene, Aidan Quinn and Sissy Spacek meet in a motel for illicit love, but the arrest of a woman in another room changes the dynamic. Glenn Close stars in a bittersweet closing segment in a cemetery. The film's mood is elegiac but hopeful, as needy people uncertainly reach out to one another. Rebecca Miller's \"The Ballad of Jack and Rose\" stars her husband, Daniel Day-Lewis, as the last survivor of a 1960s hippie commune. He lives on in his wind-powered island house with his teenage daughter (Camilla Belle), in a relationship too close to be healthy. After a heart attack, concerned about the future, he promises marriage to his mainland girlfriend (Catherine Keener), and she arrives with her two sons. Miller, who also wrote the story, develops it not as a standard relationship crisis, but as a series of tenderly observed and sharply emotional surprises. Steve Buscemi's \"Lonesome Jim\" is a little masterpiece of mood, starring Casey Affleck as an Indiana boy who fails to make it in New York and returns home to a relentlessly cheerful mother (Mary Kay Place), a distant father (Seymour Cassel) and a brother (Kevin Corrigan). Soon enough, the brother is in the hospital. There Affleck meets a nurse (Liv Tyler), and they begin a relationship filled with apprehension, caution and the frightening possibility of love. It's not what happens so much as how it feels, and sometimes it's funnier than I make it sound. Michael Hoffman's \"Game 6\" is a written picture, by which I mean that the dialogue must be attended to as in a stage play. It's the first and only screenplay by the novelist Don DeLillo, with Michael Keaton as a successful playwright, Griffin Dunne as a writer who is falling to pieces and Robert Downey Jr. as a critic of great eccentricity. Because the principal characters are writers, they talk like writers, with specific and evocative word choices. Mostly what they talk about is the collapse of the Boston Red Sox in 1986. Game 6 of that famous World Series unfolds during the movie, as the men find a metaphysical connection between themselves and their team. DeLillo's dialogue allows for a complexity and richness of speech that is refreshing, compared to the subject-verb-object recitation in many movies. There are other good films I will write about, but my space comes to a close, and I must not neglect Stephen Chow's \"Kung Fu Hustle,\" which is -- what? Imagine a film in which Jackie Chan and Buster Keaton meet Quentin Tarantino and Bugs Bunny. Yes. That describes it nicely. Oh, and I met a man named Dave Gebroe here who says I must see his film \"Zombie Honeymoon,\" which he describes as his response to my call for a truly romantic horror film. I cannot quite remember issuing that call, but no doubt he is right, and certainly there is a tragic lack of such films. Copyright 2005 Chicago Sun-Times, Inc."}, {"article_id": "128172737", "match_score": 81.17154811715481, "source": "Charleston Gazette (WV)", "date": "May 22, 2005", "window_summary": "The archive excerpt indicates Robin Wright (listed as Robin Wright Penn) portrays Miles Roby's mother, Grace, who died when he was young, a detail tied to the family dynamics in Empire Falls.", "window_context": "family", "window_tone": "neutral", "fulltext_summary": "The full piece about HBO's Empire Falls describes the ensemble cast and explains that Robin Wright Penn appears as Miles' mother (Grace) in flashback scenes; her role is noted as part of the larger, praised ensemble.", "fulltext_context": "family", "fulltext_tone": "neutral", "archive_window": "who is angry about her parents imminent divorce and her mothers Helen Hunt approaching re marriage to another Miles Grace Robin Wright died when Miles was a Young but his irascible a Max Paul is still doing halfhearted Odd jobs in Exchange", "newsbank_text": "An all-star cast brings to vibrant life Richard Russo's \"Empire Falls\" in a funny and achingly beautiful two-part adaptation airing Saturday and Sunday on HBO. Set in a declining Maine mill town, the TV movie stars four-time Oscar nominee Ed Harris (\"Pollock\") as Miles Roby, the central character, who is in a kind of emotional paralysis as the story opens. As a boy, Miles showed great promise for a successful life far beyond his struggling hometown, but fate and family obligations born out of long-buried secrets have forced him to remain in Empire Falls, where he scrapes out a living running the Empire Grill for Francine Whiting (Joanne Woodward), the iron-willed widow whose family owns anything worth owning in Empire Falls. At the center of Miles' life is his sensitive teenage daughter, Tick (Danielle Panabaker), who is angry about her parents' imminent divorce and her mother's (Helen Hunt) approaching remarriage to another man. Miles' mother, Grace (Robin Wright Penn), died when Miles was a young man, but his irascible father, Max (Paul Newman), is still around, doing halfhearted odd jobs in exchange for beer money. Helping Miles at the diner is his younger brother, David (Aidan Quinn), who bitterly remembers how determined their mother was that Miles would escape the dead-end existence in which he now finds himself. \"Miles is really stuck when this thing starts,\" Harris says. \"He's got nowhere to turn, doesn't see any way out of what he's doing, even though he's not very happy. During the course of this thing, he gets unstuck.\" Getting unstuck for Miles requires uncovering and confronting some startling secrets that explain the complicated ties between his own blue-collar family and the elite Whiting clan, including Francine's late husband, C.B. (Philip Seymour Hoffman), and their daughter, Cindy (Kate Burton), who was disabled in a childhood accident and harbors a desperate, unrequited love for Miles. As fans of Russo's Pulitzer Prize-winning novel know, there is a startling act of school violence near the end of the narrative, but apart from that, the story unfolds with the quirky, unhurried pace of small town life. Dramatic tension arises not from explosions or car chases, but from the resentments, passions and private shames that run through Empire Falls like the Knox River. That \"Empire Falls\" remains so utterly engrossing for its three-hours-plus running time is both a tribute to Russo's writing - he wrote the teleplay as well - and to the dazzling ensemble of actors, who manage to convince us that they've shared life experiences for years, even for generations. That's possible in large part because executive producer Newman and director Fred Schepisi gathered the entire cast together in New York for extended rehearsals before moving to the Maine filming location. \"We knew we had to concentrate on and bring about (that sense of interconnected lives), particularly as many of the characters don't actually play scenes with one another and yet they have a large effect on one another,\" Schepisi says. With Russo on hand during those early sessions, Schepisi and his cast had the luxury of asking the author to interpolate scenes or lines of dialogue he originally had omitted from the adapted script, which clarified motivations for the actors. \"I nagged Rick a bit to put some things in or take some things out. Fortunately, he transcended that nagging,\" Schepisi says, chuckling. Filming primarily in the part of Maine where Russo had lived while writing his novel also gives the TV movie added resonance, Harris says. \"That was really helpful, and I am so glad that we shot it in the towns of Waterville and Skowhegan where we were,\" he says. \"All of the community was very supportive, and you know, it's a mill town that's kind of fallen on hard times, which is just what the story was about. It just gives you so much that you don't have to think about, because you're really right there in the environment.\" Harris says his \"Empire Falls\" colleagues are the best ensemble with which he's ever worked. \"And what was really fun was that as Miles, I really got to work with every one of these actors,\" Harris says. \"Miles is the only character who interacts with all the others, except for Robin Wright Penn (who appears only in flashback scenes) - but Paul and Joanne, Helen, Aidan, Theresa Russell, Philip Seymour Hoffman, everybody else I got to work with.\" And while Miles undergoes a harrowing transformation during the course of \"Empire Falls,\" he comes out of it free to pursue the dreams his mother had held out for him, Harris says. Copyright, 2005, Charleston Newspapers"}, {"article_id": "225403899", "match_score": 80.85106382978724, "source": "Daily Times-Call, The (Longmont, CO)", "date": "April 8, 2005", "window_summary": "The archive excerpt lists Robin Wright Penn's age/birthday as part of a 'Today's Birthdays' roundup.", "window_context": "personal_life", "window_tone": "neutral", "fulltext_summary": "The Associated Press 'Today in History' item records Robin Wright Penn among notable birthdays, simply noting her age without further comment.", "fulltext_context": "personal_life", "fulltext_tone": "neutral", "archive_window": "51. Singer Julian Lennon is 42. Rock Singer musician Donita Sparks l7 is 42. Rapper Biz Markie is 41. Actress Robin Wright Penn is 39. Actress Patricia Arquette is 37. Actor Taran Noah Smith is 21. Actress Kirsten storms is 21. Thought", "newsbank_text": "The Associated Press Today is Friday, April 8, the 98th day of 2005. There are 267 days left in the year. Today’s Highlight in History: On April 8, 1974, Hank Aaron of the Atlanta Braves hit his 715th career home run in a game against the Los Angeles Dodgers, breaking Babe Ruth’s record. The round-tripper was off pitcher Al Downing. On this date: In 1513, explorer Juan Ponce de Leon claimed Florida for Spain. Today’s Birthdays: Former first lady Betty Ford is 87. Comedian Shec eak, hip-hoppy theme song about getting out of Kansas and Miss Piggy (as the Wicked Witch in black leather) warbles about being a \"diva,\" but these are exceptional musical moments in a gag-heavy parody of a beloved classic that often falls far short of enchanting. Let's start with Dorothy. In the Judy Garland original, Dorothy runs away from home because she's hurt and confused, rather typical feelings for an adolescent. In the Ashanti version, Dorothy wants to blow out of Kansas because she needs to be a big star. This starlicious attitude sets the tone for the \"Muppets\" misadventure. Queen Latifah co-stars as Aunt Em, the no-nonsense owner of a Kansas diner, where Dorothy and Uncle Henry (David Alan Grier) serve breakfast specials and Sloppy Joes to truck drivers. Dorothy wants more. As we know, a twister obliges her and sends her to Oz, along with her pet prawn Toto (don't ask). Even the casting of the Muppets as the Scarecrow (Kermit), the Tin Thing (Great Gonzo) and the Lion (Fozzie Bear) robs this \"Oz\" of its essential story. As everyone knows, in the movie, these characters are dreamlike composites of people from Dorothy's past. But here everything is sacrificed on the altar of entertainment in-jokes. The poppy field scene is transformed into a druggy trip (or at least a druggy trip as imagined by the set director of \"The Dating Game\"). And, as if to prove that he has to appear in virtually everything, director Quentin Tarantino makes a cameo appearance as himself. Other highlights l Dr. Phil McGraw hosts a primetime special \"Escaping Addiction\" (8 p.m., CBS). What if you're addicted to Dr. Phil? l Jack Black and Gwyneth Paltrow star in the 2001 comedy \"Shallow Hal\" (8 p.m., Fox, TV-14). l Alison Lohman, Robin Wright Penn, Michelle Pfeiffer and Renee Zellweger star in the 2002 adaptation of Janet Fitch's novel \"White Oleander\" ( 9 p.m., Lifetime). l Judi Dench, Cher, Joan Plowright, Maggie Smith and Lily Tomlin star in director Franco Zeffirelli's 1999 autobiographical drama \"Tea with Mussolini\" (9 p.m., Pax). l On three episodes of \"Reba\" (WB, TV-PG,D), Dolly Parton (8:30 p.m., r), tipsy suspicions (9 p.m.), Van's football dreams take a hit (9:30 p.m., r). The middle episode is the season finale. Cult choice A grieving couple (Sam Neill and Nicole Kidman) on a recuperative cruise encounter a sea-going psychopath (Billy Zane) in the terrific, white knuckle 1989 thriller \"Dead Calm\" (8:20 p.m., Cinemax). Late night David Arquette and Gordon Ramsay appear on \"Late Show with David Letterman\" (11:35 p.m., CBS). Jay Leno hosts Lisa Kudrow and Interpol on \"The Tonight Show\" (11:35 p.m., NBC). Tracy Morgan, Rodney Rothman and The Dears appear on \"Jimmy Kimmel Live\" (12:05 a.m., ABC). Ted Danson and Mudvayne chat on \"Late Night with Conan O'Brien\" (12:35 a.m., NBC). Craig Ferguson hosts Randy Jackson, Bai Ling and Gary Greff on \"The Late, Late Show\" (12:37 a.m., CBS). Copyright, 2005, Kalamazoo Gazette, All Rights Reserved."}, {"article_id": "224096736", "match_score": 80.0, "source": "American Press (Lake Charles, LA)", "date": "May 28, 2005", "window_summary": "The archive window lists Robin Wright Penn as one of the stars of the miniseries Empire Falls alongside Helen Hunt and Joanne Woodward.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The TV listings mention Robin Wright Penn as a co-star in Empire Falls; the mention is a neutral cast listing.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "Miles Roby de Harris who try As he might can to shake his ties to the old Hometown. Helen Hunt Robin Wright Penn and Joanne Woodward also Star. Part 2 airs sunday.11 . On Fox mad to guest Star Nicole Richie portrays", "newsbank_text": "6 PM (FX) NASCAR Racing For the second consecutive Saturday, there is racing under the lights at Lowe's Motor Speedway in Concord, N. C., home this week to the Busch CarQuest Auto Parts 300. Kyle Busch turned in about a disturbing encounter at a grocery store. But i got something out of each", "newsbank_text": "Have you ever played the game where you sit in the airport or mall and make up stories about the people around you? He's thinking of leaving her, she just learned she's pregnant, that family is in the witness protection program, that sort of thing. \"Nine Lives\" has a similar appeal. The title refers to the lives of nine women, each the focus of a roughly 10-minute minifilm shot in a single take. Some find the women (played by such great actresses as Holly Hunter, Sissy Spacek and Kathy Baker) at moments of high drama - a violent confrontation, an affair - and some are ordinary pieces of a life. But every film has an intriguing duality: On the one hand, they are so detailed that we're conscious a lot of life comes before the scenes we see and a lot will come after. And, at the same time, the films are so observant that these little slices seem to be showing us everything we need to know about these women. I suspect everyone will have a different favorite. I loved the Amy Brenneman segment, a surprising portrait of how the heightened emotions people feel at a funeral can make things crazy. And I loved the delicacy and nuances of Robin Wright Penn's performance in a segment about a disturbing encounter at a grocery store. But I got something out of each of the nine lives. Beautifully written and directed by Rodrigo Garcia (whose dad is writer Gabriel Garcia Marquez), they make a persuasive case that, as one character says, \"Each woman is a universe.\" * REVIEW A- NINE LIVES Parents' guide: R; Language Running time: 115 minutes Showing at: Ritz Five, Ritz 16/NJ Sonia: Holly Hunter Diana: Robin Wright Penn Lorna: Amy Brenneman Copyright (c) 2005 Philadelphia Daily News"}, {"article_id": "127420575", "match_score": 79.11111111111111, "source": "Charleston Gazette (WV)", "date": "May 22, 2005", "window_summary": "The excerpt states that Robin Wright Penn appears only in flashback scenes in the Empire Falls production, portraying the deceased mother.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full article on the HBO adaptation Empire Falls describes the cast and explicitly notes that Robin Wright Penn appears only in flashback scenes as Miles' late mother, Grace, a detail used to explain character relationships.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "to work with every one of these Harris Miles is the Only character who interacts with All the except for Robin Wright Penn who appears Only in Flashback scenes but Paul and Theresa Philip sey Mour everybody else i got to work", "newsbank_text": "An all-star cast brings to vibrant life Richard Russo's \"Empire Falls\" in a funny and achingly beautiful two-part adaptation airing Saturday and Sunday on HBO. Set in a declining Maine mill town, the TV movie stars four-time Oscar nominee Ed Harris (\"Pollock\") as Miles Roby, the central character, who is in a kind of emotional paralysis as the story opens. As a boy, Miles showed great promise for a successful life far beyond his struggling hometown, but fate and family obligations born out of long-buried secrets have forced him to remain in Empire Falls, where he scrapes out a living running the Empire Grill for Francine Whiting (Joanne Woodward), the iron-willed widow whose family owns anything worth owning in Empire Falls. At the center of Miles' life is his sensitive teenage daughter, Tick (Danielle Panabaker), who is angry about her parents' imminent divorce and her mother's (Helen Hunt) approaching remarriage to another man. Miles' mother, Grace (Robin Wright Penn), died when Miles was a young man, but his irascible father, Max (Paul Newman), is still around, doing halfhearted odd jobs in exchange for beer money. Helping Miles at the diner is his younger brother, David (Aidan Quinn), who bitterly remembers how determined their mother was that Miles would escape the dead-end existence in which he now finds himself. \"Miles is really stuck when this thing starts,\" Harris says. \"He's got nowhere to turn, doesn't see any way out of what he's doing, even though he's not very happy. During the course of this thing, he gets unstuck.\" Getting unstuck for Miles requires uncovering and confronting some startling secrets that explain the complicated ties between his own blue-collar family and the elite Whiting clan, including Francine's late husband, C.B. (Philip Seymour Hoffman), and their daughter, Cindy (Kate Burton), who was disabled in a childhood accident and harbors a desperate, unrequited love for Miles. As fans of Russo's Pulitzer Prize-winning novel know, there is a startling act of school violence near the end of the narrative, but apart from that, the story unfolds with the quirky, unhurried pace of small town life. Dramatic tension arises not from explosions or car chases, but from the resentments, passions and private shames that run through Empire Falls like the Knox River. That \"Empire Falls\" remains so utterly engrossing for its three-hours-plus running time is both a tribute to Russo's writing - he wrote the teleplay as well - and to the dazzling ensemble of actors, who manage to convince us that they've shared life experiences for years, even for generations. That's possible in large part because executive producer Newman and director Fred Schepisi gathered the entire cast together in New York for extended rehearsals before moving to the Maine filming location. \"We knew we had to concentrate on and bring about (that sense of interconnected lives), particularly as many of the characters don't actually play scenes with one another and yet they have a large effect on one another,\" Schepisi says. With Russo on hand during those early sessions, Schepisi and his cast had the luxury of asking the author to interpolate scenes or lines of dialogue he originally had omitted from the adapted script, which clarified motivations for the actors. \"I nagged Rick a bit to put some things in or take some things out. Fortunately, he transcended that nagging,\" Schepisi says, chuckling. Filming primarily in the part of Maine where Russo had lived while writing his novel also gives the TV movie added resonance, Harris says. \"That was really helpful, and I am so glad that we shot it in the towns of Waterville and Skowhegan where we were,\" he says. \"All of the community was very supportive, and you know, it's a mill town that's kind of fallen on hard times, which is just what the story was about. It just gives you so much that you don't have to think about, because you're really right there in the environment.\" Harris says his \"Empire Falls\" colleagues are the best ensemble with which he's ever worked. \"And what was really fun was that as Miles, I really got to work with every one of these actors,\" Harris says. \"Miles is the only character who interacts with all the others, except for Robin Wright Penn (who appears only in flashback scenes) - but Paul and Joanne, Helen, Aidan, Theresa Russell, Philip Seymour Hoffman, everybody else I got to work with.\" And while Miles undergoes a harrowing transformation during the course of \"Empire Falls,\" he comes out of it free to pursue the dreams his mother had held out for him, Harris says. Copyright, 2005, Charleston Newspapers"}, {"article_id": "228881034", "match_score": 78.714859437751, "source": "Ledger-Enquirer (Columbus, GA)", "date": "April 8, 2005", "window_summary": "The archive excerpt is a birthdays list that names actress Robin Wright Penn as 39, grouping her with other public figures. The mention is factual and brief.", "window_context": "personal_life", "window_tone": "neutral", "fulltext_summary": "The full piece is a 'Today in History'/birthdays item that lists 'Actress Robin Wright Penn is 39' with no additional detail, presenting a neutral biographical note.", "fulltext_context": "personal_life", "fulltext_tone": "neutral", "archive_window": "Hall of Famer Gary Carter 51 actor John Schneider 45 Rock musician Izzy Stradling 43 Singer Julian Lennon 42 actress Robin Wright Penn 39 actress Patricia Arquette 37 Rock musician Darren Jessee 34 actor Taran Noah Smith 21 actress Kirsten storms 21", "newsbank_text": "309 Words Page: A2 OpenURL Link Today is Friday, April 8, the 98th day of 2005. There are 267 days left in the year. On this date: In 1513, explorer Juan Ponce de Leon claimed Florida for Spain. In 1935, the Works Progress Administration was approved by Congress. In 1946, the League of Nations assembled in Geneva for the last time. In 1952, President Truman seized the steel industry to avert a nationwide strike. In 1973, artist Pablo Picasso died at his home near Mougins, France, at age 91. In 1974, Hank Aaron of the Atlanta Braves hit his 715th career home run in a game against the Los Angeles Dodgers, breaking Babe Ruth's record. In 1990, Ryan White, the teenage AIDS patient whose battle for acceptance gained national attention, died in Indianapolis at age 18. In 1994, Kurt Cobain, singer and guitarist for the grunge band Nirvana, was found dead in Seattle from an apparently self-inflicted gunshot wound; he was 27. One year ago: National security adviser Condoleezza Rice told the Sept. 11 commission ''there was no silver bullet'' that could have prevented the 2001 terrorist attacks. Thought for Today: ''A highbrow is a person educated beyond his intelligence.'' --- James Brander Matthews, American author and educator (1852-1929). Former first lady Betty Ford is 87. Comedian Shecky Greene is 79. Investigative reporter Seymour Hersh is 68. Basketball Hall-of-Famer John Havlicek is 65. Singer J.J. Jackson is 64. Singer Peggy Lennon (The Lennon Sisters) is 64. Songwriter-producer Leon Huff is 63. Actor Hywel Bennett is 61. Actor Stuart Pankin is 59. Baseball Hall-of- Famer Gary Carter is 51. Actor John Schneider is 45. Rock musician Izzy Stradlin is 43. Singer Julian Lennon is 42. Rapper Biz Markie is 41. Actress Robin Wright Penn is 39. Actress Patricia Arquette is 37. Rock musician Darren Jessee is 34. Actor Taran Noah Smith is 21. Actress Kirsten Storms is 21. Copyright (c) 2005 Columbus Ledger-Enquirer"}, {"article_id": "316609427", "match_score": 78.36734693877551, "source": "Associated Press Archive", "date": "September 9, 2005", "window_summary": "The archive window describes Robin Wright Penn as starring in Sorry, Haters as a 'troubled, angry New Yorker.'", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full article about post-9/11 films notes Wright's role in Sorry, Haters, portraying her character as troubled and angry and situates that casting as part of the film's exploration of post-9/11 Manhattan.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "11-like attacks around new York City the targets including grand Central station. Another Toronto entry a sorry haters Quot stars Robin Wright Penn As a troubled angry new yorker who associated press Ayad Akhtar is seen As Hassan in Quot the War", "newsbank_text": "Author: DAVID GERMAIN; AP Movie Writer 552 Words OpenURL Link Anguish over Sept. 11 lingers, yet filmmakers slowly are overcoming an early reticence to address the attacks with a growing number of projects examining the horrors and heroes and even finding rays of humor in the tragedy. Leading the way are two yet-untitled projects, Oliver Stone's big-screen tale starring Nicolas Cage in the story of two New York City rescuers involved in the World Trade Center aftermath and an ABC miniseries chronicling the terrorist attacks. The Toronto International Film Festival features a handful of films that, with the initial shock of Sept. 11 wearing off, now are beginning to incorporate the events in historical context as facts of everyday life. \"It takes artists awhile both to digest current events and get films made. This lag of four years makes sense, if one was going to predict accurately when we would start seeing these kinds of films,\" said Noah Cowan, Toronto festival co-director. Among the Toronto films: \"The War Within,\" a chilling portrait of an Arab student falsely detained as a terrorism suspect who seeks revenge against the United States by joining a terrorist cell that plots a new wave of Sept. 11- like attacks around New York City, the targets including Grand Central Station. Another Toronto entry, \"Sorry, Haters,\" stars Robin Wright Penn as a troubled, angry New Yorker who forges an unlikely bond with an Arab taxi driver, the relationship set against the backdrop of post-Sept. 11 Manhattan. In her performance film \"Sarah Silverman: Jesus Is Magic,\" comedian Silverman takes on a range of taboo topics -- AIDS, the Holocaust, race relations -- with a fierce politically incorrect attitude. Regarding Sept. 11, Silverman jokes that American Airlines missed out on a good marketing slogan: \"American Airlines: First through the towers.\" She also kids that Sept. 11 was especially trying for her because it was the same day she learned that the soy lattes she had been drinking daily had a whopping 900 calories. Silverman said it took her a long while after Sept. 11 before she could think about including material on the attacks in her act but that eventually the need for humor won out. \"I always want to laugh at the sad stuff. You don't need to laugh at the other stuff,\" Silverman said. \"I'm not numb to these things. I still go into really dark periods about Sept. 11. I think it's kind of like bullies. Bullies are just scared and thin-skinned, so they have to become bullies as a kind of survival tactic. I think comics are that way, too.\" Other films related to Sept. 11 are finding their way into theaters, onto television and on DVD. The documentary \"The Flight That Fought Back\" -- examining United Airlines Flight 93, whose passengers died in a crash after they foiled one of the terrorist attacks on Sept. 11 -- played in a handful of movie theaters in advance of its TV debut. \"Flight From Death: The Quest for Immortality,\" a documentary that includes a segment on how the Sept. 11 attacks wounded the American psyche, came out this week on DVD. \"Answering the Call: Ground Zero's Volunteers,\" a documentary about emergency personnel that mobilized on Sept. 11, is playing at memorial screenings this month in several cities. \"Protocols of Zion,\" which opens theatrically in October, looks at a surge in anti-Semitism that followed the Sept. 11 attacks."}, {"article_id": "262983283", "match_score": 78.21782178217822, "source": "Orlando Sentinel, The (FL)", "date": "May 22, 2005", "window_summary": "The archive excerpt says the flashback scenes in Empire Falls give 'thankless roles' to Robin Wright Penn as Miles' elegant mother.", "window_context": "career", "window_tone": "negative", "fulltext_summary": "The review of the Empire Falls miniseries notes Robin Wright Penn appears in flashbacks as Miles' elegant mother and characterizes her part as a 'thankless' role amid an otherwise strong cast.", "fulltext_context": "career", "fulltext_tone": "negative", "archive_window": "7 00 9 45 a fever pitch pm 13 1 15 4 15 7 15 9 45 thankless roles to Robin Wright Penn As Miles elegant Mother and Philip Seymour Hoffman As a mystery Man. There Are impressive actors crammed into every", "newsbank_text": "On paper, the miniseries of Empire Falls sounds awesome. On film, it plays as if it's still on paper. The Pulitzer Prize-winning novel becomes a sprawling, inert HBO miniseries. The two-part, 31/2-hour drama, which starts Saturday and concludes May 29, is a major disappointment. The mostly impeccable cast, led by Ed Harris and Paul Newman, works lovingly on this saga of small-town life. With a sure hand, director Fred Schepisi evokes the sad, faded atmosphere of fictional Empire Falls, Maine. But everyone is at the mercy of Richard Russo, who adapted his book. Russo loads down the plot with chapters, narration and flashbacks that sap the drama's energy. The miniseries is not a good advertisement for an outstanding novel. The executive producers, who include Newman, obviously adore Russo and the book. They could have shown their affection by letting someone else adapt the novel and mold it into a satisfying script. The meandering Empire Falls follows many characters and jumps back and forth in time. The dawdling style gives way to a traumatic event that stuns the town and overshadows everything that has come before. The script concludes with a bit of head-scratching philosophy rather than a worthwhile emotional payoff. No one will blame you if you want to get out of town. Even so, some exceptional actors still make Empire Falls worth a look. The central character is Miles Roby (Harris), who runs the Empire Grill and feels stuck in life. Miles has strained relations with his needy ex-wife, Janine (Helen Hunt); his crabby, disheveled father, Max (Newman); and the grill's owner, Francine Whiting (Joanne Woodward). The best reasons to visit Empire Falls are Newman and Woodward. She portrays the town's matriarch with malevolent glee and taunts Miles, \"I know you better than you know yourself.\" Behind scraggly hair and a dirty beard, Newman gives a funny, energetic performance as an old scam artist. Harris does as well as he can with a tricky role, playing a trapped, lonely man who has trouble expressing himself. The actor's best moments are as loving father to Miles' teen daughter, Tick (Danielle Panabaker). But Harris also has to spend a lot of time contemplating the past -- never easy on film -- before coming to a revelation about his family. The flashback scenes give thankless roles to Robin Wright Penn as Miles' elegant mother and Philip Seymour Hoffman as a mystery man. There are impressive actors crammed into every corner of Empire Falls. They include Aidan Quinn as Miles' brother, Estelle Parsons as a bar owner, Theresa Russell as a waitress, Dennis Farina as a health club owner, William Fichtner as a police officer and Kate Burton as a longtime admirer of Miles. Law & Order star Farina gives the showiest performance, and Oscar-winner Hunt delivers the weakest as the strident, unhappy Janine. Empire Falls struggles to say something about the frustrations and limitations of small-town life. But because the miniseries lacks emotional punch, the larger issues matter less than the smaller pleasures. The Maine locations, a bouncy musical score and a psychotic cat add distinctive flavor. In the end, Empire Falls represents another great novel lost in translation to film. In this case, blame the author. Copyright 2005 Sentinel Communications Co."}, {"article_id": "302966979", "match_score": 77.93427230046949, "source": "American Press (Lake Charles, LA)", "date": "May 28, 2005", "window_summary": "The archive window notes that Robin Wright Penn co-stars in the HBO miniseries Empire Falls.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The TV listings describe Empire Falls and list Robin Wright Penn among the principal cast, with no evaluative commentary.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "Miles Roby de Harris who try As he might can t shake his ties to the old Hometown. Helen Hunt Robin Wright Penn and Joanne Woodward also Star. Part 2 airs 7 . On Fol Kwid a 20-year-old unfinished novel sucks Paige", "newsbank_text": "6 PM (FX) NASCAR Racing For the second consecutive Saturday, there is racing under the lights at Lowe's Motor Speedway in Concord, N. C., home this week to the Busch CarQuest Auto Parts 300. Kyle Busch turned in a dominating performance in this race last year, leading for 92 of 200 laps before it ended under caution with two laps to go. The win was Busch's second in three races. 7 PM & * NCIS A dead civilian is found on a Marine firing range, which leads to the discovery that the Mafia has been using the site as a dumping ground for t his 715th career home run in a game against the Los Angeles Dodgers, breaking Babe Ruth's record. The round-tripper was off pitcher Al Downing. On this date: In 1513, explorer Juan Ponce de Leon claimed Florida for Spain. In 1935, the Works Progress Administration was approved by Congress. In 1946, the League of Nations assembled in Geneva for the last time. In 1952, President Truman seized the steel industry to avert a nationwide strike. In 1970, the Senate rejected President Nixon's nomination of G. Harold Carswell to the U.S. Supreme Court. In 1973, artist Pablo Picasso died at his home near Mougins, France, at age 91. In 1981, Gen. Omar N. Bradley died in New York at age 88. In 1990, Ryan White, the teenage AIDS patient whose battle for acceptance gained national attention, died in Indianapolis at age 18. In 1993, singer Marian Anderson died in Portland, Ore., at age 96. In 1994, Kurt Cobain, singer and guitarist for the grunge band Nirvana, was found dead in Seattle from an apparently self-inflicted gunshot wound; he was 27. Ten years ago: Former secretary of defense Robert S. McNamara, in an interview with AP Network News and Newsweek magazine to promote his memoirs, called America's Vietnam War policy ''terribly wrong.'' Five years ago: The Central Intelligence Agency confirmed that personnel action had been taken following the mistaken bombing of the Chinese embassy during the NATO war against Yugoslavia; one employee was reportedly fired. Actress Claire Trevor died in Newport Beach, Calif. One year ago: National security adviser Condoleezza Rice told the Sept. 11 commission ''there was no silver bullet'' that could have prevented the 2001 terrorist attacks. Iraqi insurgents released a videotape of three Japanese captives, threatening to burn them alive if Japan did not withdraw its troops from Iraq. (The hostages were later released unharmed.) Fred Olivi, who copiloted the plane that dropped the atomic bomb on Nagasaki, died in Lemont, Ill., at age 82. To ts of a child named Hopper in a light, celebrity-fact roundup.", "window_context": "family", "window_tone": "neutral", "fulltext_summary": "The full column (a light Q&A/celebrity facts piece) includes Robin Wright and Sean Penn in a list of celebrity baby names, stating their child's name as Hopper in a playful, factual item.", "fulltext_context": "family", "fulltext_tone": "neutral", "archive_window": "David Beckham a a a Brooklyn and a a Romeo a a Erykah Badu a a a Puma a a Robin Wright and Sean Penn a a shopper Quot a a Gary Oldman a a a Gulliver a a Frank and Gail", "newsbank_text": "WACKY QUESTIONS What is the song in the Cingular commercial with a guy in a convertible in San Francisco? The song is about a man from Nazareth with no place to lay his head. That's The Weight, performed by The Band and written by Robbie Robertson. Here's the first verse: I pulled into Nazareth, was feeling 'bout half past dead I just need some place where I can lay my head \"Hey, Mister, can you tell me, where a man might find a bed?\" He just grinned and shook my hand, \"No\" was all he said. Have a stumper? Call the Wacky Questions Research Center, 303-892-5225, or e-mail rudeenm@RockyMountainNews.com. Wacky Questions appears Monday through Friday in Spotlight. NO KIDDING What the hip named their kids * Ving Rhames - Rainbow and Freedom * Victoria and David Beckham - Brooklyn and Romeo * Erykah Badu - Puma * Robin Wright and Sean Penn - Hopper * Gary Oldman - Gulliver * Frank and Gail Zappa - Diva Muffin * Jason Lee - Pilot Inspektor Source: World Features Syndicate LETTERMAN Top 10 signs that your Supreme Court pick isn't qualified 10 Lost 10 grand last weekend in the \"case\" of Jets v. Ravens. 9 Spends most of her time trying to fit the gavel into her mouth. 8 Her legal mentor: Oliver Wendell Redenbacher. 7 Asks courtroom stenographer to \"Quit that annoying tapping.\" 6 Instead of constitutional law books, consults set of Garfield paperbacks. 5 Keeps shouting, \"When does mama get to hang somebody?\" 4 When Scalia walks by, she pretends to cough and says, \"Rogaine.\" 3 Authored the book I'm Not Qualified to Be a Supreme Court Justice. 2 The closest thing to courtroom experience was being an extra on Matlock. 1 Glowing letter of recommendation from former FEMA director Michael Brown. Donated to the Denver Public Library by the Rocky Mountain News, under the permission of the City and County of Denver, other rights reserved. Copyright © 2005 Rocky Mountain News. All Rights Reserved."}, {"article_id": "171814066", "match_score": 75.30864197530865, "source": "Wisconsin State Journal (WI)", "date": "December 8, 2005", "window_summary": "The archive excerpt notes a film (Nine Lives/short-vignette program) featuring a strong cast that includes Robin Wright (credited as Robin Wright Penn).", "window_context": "career", "window_tone": "positive", "fulltext_summary": "The full entertainment item lists Robin Wright Penn among the prominent cast of Rodrigo Garcia's short-film collection, presenting her as part of a notably strong ensemble; the mention is brief and promotional.", "fulltext_context": "career", "fulltext_tone": "positive", "archive_window": "can Tell just by looking at featuring a ridiculously Strong cast that includes Holly Sissy Aidan Joe Dakota fanning and Robin Wright its Short attention Span theater for the Althouse and it opens Fri Rob Thomas John Lennon tribute at High noon", "newsbank_text": "Kathy Mattea, Overture Hall, Wednesday Here's one holiday event that shouldn't get lost in the rush of shows. A former country hit maker, Mattea has shifted to folk music on a small record label with terrific results. Unlike many other performers on tour during the holiday season, Mattea recorded two albums of Christmas music and pushed both into wonderful realms. Mattea's song selections are unique, and when she performs a Christmas standard, it's done with a fresh arrangement. The show's at 7:30 p.m. Ticket info is available at www.overturecenter.com. -- Tom Alesia \"The Nutcracker,\" Madison Ballet, Overture Hall, opening Saturday A colossal set will have patrons marveling. But Madison Ballet also presents talented dancers, including a few professionals, to spark the production. Madison Ballet is presenting \"Nutcracker\" six times -- 2 and 7:30 p.m. Saturday; 2 p.m. Sunday; 7:30 p.m. Dec. 16-17; and 2 p.m. Dec. 18 -- and it's certain to draw fans of all ages. The Wisconsin Chamber Orchestra handles the delightful score. -- Tom Alesia \"Hansel & Gretel,\" Opera for the Young, two locations This weekend, Opera for the Young offers two shows in the suburbs: 7:30 p.m. Friday at the Verona Performing Arts Center and 2 p.m. Saturday at Middleton Performing Arts Center. Opera for the Young has been around since 1970, introducing kids to opera and enticing adults. Show details are available at www.operafortheyoung.org. -- Tom Alesia 'Nine Lives' opens at Hilldale Theatre Between \"Syriana,\" \"Narnia,\" and \"The Squid and the Whale,\" there's a plethora of good movies to have to choose from this weekend. And, if that wasn't enough, Hilldale is bringing in nine more. Well, nine short films, anyway, for the price of one ticket. \"Nine Lives\" brings together a series of 10-minute short vignettes by writer-director Rodrigo Garcia (\"Things You Can Tell Just by Looking at Her\"), featuring a ridiculously strong cast that includes Holly Hunter, Sissy Spacek, Aidan Quinn, Joe Mantegna, Dakota Fanning and Robin Wright Penn. It's Short Attention Span Theater for the arthouse crowd, and it opens Friday. -- Rob Thomas John Lennon tribute at High Noon Wednesday Just because you're paying tribute to one of the great songwriters of the 20th century and making a stand against handgun violence doesn't mean you can't be comfy. That's the thinking behind the Madison band Yammer's decision to mark the 25th anniversary of John Lennon's murder by re-creating his infamous 1969 \"bed-in\" with Yoko Ono. The show \"Imagine No Handguns\" will take place at 7 p.m. Wednesday at the High Noon Saloon, 701 E. Washington Ave., and will feature Yammer, the Buffali, Lynette Margulies and other celebrity guests performing some Lennon covers while under the covers. The cover charge is $6. -- Rob Thomas 'Side Effects,' shot in Madison, opens at Westgate One movie that shouldn't be overlooked in the holiday shuffle is the homegrown \"Side Effects,\" which opens Friday at Westgate. Fresh off a sold-out screening at last spring's Wisconsin Film Festival, \"Side Effects\" tells the story of a sales rep for a pharmaceutical company (Katherine Heigl of \"Grey's Anatomy\") faced with deep misgivings about the unethical practices she sees all around her. The feature from Kathleen Slattery-Moschkau, a former drug company sales rep, was shot in Madison in about 10 days. It's actually more of a romantic comedy than a whistleblowing melodrama, although the screenplay skillfully works in real-life information about the state of the health care industry. -- Rob Thomas Copyright, 2005, Madison Newspapers, Inc."}, {"article_id": "81869356", "match_score": 75.0, "source": "Bucks County Courier Times (Levittown, PA)", "date": "September 2, 2005", "window_summary": "The archive excerpt for Forrest Gump says Robin Wright plays the film's love interest.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The TV listing reiterates that Robin Wright portrays Forrest Gump's love interest, a simple cast credit with no further appraisal.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "life and becomes a Viet War entre pre Neor and history. Saily Field co stars As of serfs protective Mother Robin Wright plays his love merest and sary snipe is his reluctant buddy 2 22 a v Ftp bobbins gives a quietly", "newsbank_text": "Catch it tonight \"Forrest Gump,\" 8 p.m., TNT Tom Hanks stars in the feel-good blockbuster of 1994. Simple-minded Forrest (Hanks) takes a head-on approach to life and becomes a Vietnam War hero, millionaire entrepreneur and witness to history. Sally Field co-stars as Forrest's protective mother, Robin Wright plays his love interest, and Gary Sinise is his reluctant buddy. The film won six Academy Awards. Supernanny, 8 p.m., ABC Forget spoonfuls of sugar. The star of this reality series is more Patton than Poppins. Jo Frost, who's spent years taming bratty Brits, helps American parents take back the reins of power from their youngsters. Once Frost has helped Mom and Dad lay down and enforce the law, and the kids have had some practice following it, she lets the family fly solo. Never fear, though; she's watching and will return if help is needed. What I Like About You, 8 p.m., WB In \"My Boyfriend's Back,\" Holly (Amanda Bynes) seeks advice from old flame Henry (guest star Michael McMillian) on improving her miserable track record with guys. Her sister (Jennie Garth) is on the receiving end of an attempt to revive her own love life, as Lauren (Leslie Grossman) lures Todd (guest star Luke Perry) back to the bakery. Hope & Faith, 9 p.m., ABC Faith (Kelly Ripa) lands a new job doing the weather at a television station, and the temperature rises when she meets newscaster Larry (guest star Dean Cain). Hope (Faith Ford) feels abandoned by her partner in the catering business and hires a new, superefficient assistant. Now it's Faith's turn to feel slighted. Ted McGinley also stars in \"Weather or Not.\" What Not to Where Are They Now?, 9 p.m., TLC It's easy to change your look when you have a pair of fashion experts, a top hairstylist and a professional makeup artist helping you out - not to mention a Visa card with $5,000 on it. But can you keep it up? In this new special edition of the series, fashionistas Stacy London and Clinton Kelly surprise four of their past makeover subjects to see whether they've kept up their new looks. Arrested Development, 9:30 p.m., Fox Michael (Jason Bateman) wants George Sr. (Jeffrey Tambor) out of the model home's attic because an inspector is coming. Gob (Will Arnett) tries to help, but his efforts backfire in a big way. Ann and George Michael (Mae Whitman, Michael Cera) organize a movie boycott, which also backfires. Alia Shawkat, Portia de Rossi and David Cross also star in \"Righteous Brothers.\" NUMB3RS, 10 p.m., CBS A prison bus crashes, and two dangerous inmates manage to escape in the ensuing confusion. Don (Rob Morrow) knows something about finding fugitives, but as always, a little help from his math-whiz brother, Charlie (David Krumholtz), couldn't hurt. Sabrina Lloyd also stars in \"Man Hunt.\" Crossing Jordan, 10 p.m., NBC Two deaths at the airport have the authorities wondering if a killer virus hitched a ride on an international flight. Garret (Miguel Ferrer) determines that both victims - a passenger and a baggage handler - died of drug overdoses. Woody (Jerry O'Connell) thinks the deaths are related and possibly linked to a smuggling ring. Jordan (Jill Hennessy) suspects an elderly man's death was an assisted suicide in \"Gray Murders.\" Copyright, 2005, Bucks County Courier Times"}, {"article_id": "259115460", "match_score": 74.88372093023256, "source": "Washington Times, The (DC)", "date": "February 21, 2005", "window_summary": "The archive excerpt references a Page One analysis by foreign policy reporter Robin Wright headlined about Iraq winners being allied with Iran.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full column criticizes Wright's reporting, accusing her Page One analysis of being 'spin' and of mischaracterizing Iraqi parties as pro‑Iranian; she is portrayed negatively by the columnist as biased against the administration.", "fulltext_context": "career", "fulltext_tone": "negative", "archive_window": "like they Are failing. In the Post s Case it ran a front Page Analy Sis by foreign policy reporter Robin Wright under the headline Quot Iraq winners Allied with Iran Are the opposite of u s she wrote that the iraqis", "newsbank_text": "We're seeing much more \"spin\" in the national news media than ever before, a dubious, if not dishonest, practice that can distort and twist important public policy events and their meaning. This is not to say a reporter cannot have one take on a particular news story that widely varies with a consensus view. But when the stories consistently tilt against a particular policy, you have to wonder if something else is going on. Let's take two examples, and you be the judge. After months of pessimistic reporting that the stepped-up terrorist attacks threatened to delay the Iraq elections, they were held right on schedule and, as this column accurately forecast, were a triumphant success. It was hard for the news media to spin that story after nearly 60 percent of Iraqis turned out to vote across the country, defying terrorist threats to kill anyone who dared to show up at a voting booth. But the spin came a week or so later after the vote tally was announced, showing a large vote for the dominant Shi'ite and Kurdish parties, and support for other groups as well. The results suggested a diversified political lineup that would have to cut deals and seek alliances to form a unified government. The spin came Monday on Page One of The Washington Post and the New York Times, whose professional missions seem to be to cook up any news angle that would make the Bush administration's policies appear to be failing. The Post ran a Page One analysis by foreign policy reporter Robin Wright headlined \"Iraq winners allied with Iran are the opposite of U.S. vision.\" She wrote the Iraqis \"went to the polls and elected a government with a strong religious base - and very close ties to the Islamic republic next door.\" But leaders of the winning parties, who, in fact, are far more secular than Miss Wright acknowledges, have said many times they do not want to establish a government anything like Iran's theocratic dictatorship. The largest Shi'ite coalition, the United Iraqi Alliance, did poll 48 percent support, but that was not enough to capture majority rule in the provisional legislative assembly. To govern, they will have to form a coalition with the Kurdish parties or with Prime Minister Iyad Allawi's Iraqi List Party. Far from being a victory for the rigidly fundamentalist Iranian mullahs who want to turn Iraq into a carbon copy of their regime, this was a victory for secularism and political diversity. And that is just what the administration hoped would happen in a free and open democratic election. \"Both groups are secularist and fully cognizant of the need to build a federal system which will protect civic and minority rights,\" writes Gary Schmitt, executive director of the Project for the New American Century. Even The Post's editorial page disagreed with Miss Wright's story. \"Fears that Iraq's new government will be monopolized by pro-Iranian factions bent on religious rule seem unfounded,\" an editorial said. Notably, Iraq's worst religious extremist, Muqtada al-Sadr, drew few votes, winning only three seats in the 275-member assembly. In other words, this is a story that did not hold up to the light of sensible scrutiny. It was spin and hype, pure and simple. Now consider how the national news media reported Fed Chairman Alan Greenspan's testimony before Congress last week when he said he supported President Bush's proposal for Social Security personal retirement accounts (PRAs) that could be invested in high-yield stocks and bonds. The lead of this story was clearly Mr. Greenspan embracing the concept of PRAs, no ifs, ands or buts. But the national news wires, major newspapers and the TV networks gave much more attention to his prudent admonition - which no one disagrees with - \"to do it in a cautious, gradual way.\" No authority here, other than the president, has as much influence over economic policy matters than the Fed chairman, and his endorsement of the Bush plan would obviously be seen as a strategic victory for the White House. So when he began his take-it-slowly admonition saying, \"If you are going to move to private accounts, which I approve of,\" that was a slam-dunk victory for Mr. Bush's proposal. The newspaper headlines should have read \"Greenspan backs Social Security plan\" as The Washington Times (which, for full disclosure, I work for) reported. Instead, many read like The Post's \"Borrow cautiously, Greenspan advises.\" The Democrats, too, added their own self-serving political spin to the Fed chief's unambiguous testimony that the nightly news shows repeated, saying Mr. Bush's plan had won only \"a lukewarm endorsement\" from Mr. Greenspan. Huh? From the start, the Bush administration has said the plan would be phased in very slowly in stages. Indeed, it would not be fully operational until the end of this decade, giving the bond and stock markets plenty of time to adjust to the ensuing economic changes. Nothing new on this score. So there's an important lesson in how these stories were reshaped and spun for an unsuspecting public: Let the news buyer beware. Donald Lambro, chief political correspondent of The Washington Times, is a nationally syndicated columnist. Copyright 2005 News World Communications, Inc."}, {"article_id": "430010830", "match_score": 74.68879668049793, "source": "American Press (Lake Charles, LA)", "date": "May 26, 2005", "window_summary": "The excerpt lists Robin Wright Penn among the cast of Empire Falls.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The AP piece on Paul Newman and the HBO adaptation Empire Falls names Robin Wright Penn as a member of the ensemble cast but offers no further detail about her role.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "off to Florida with a senile priest. Other members of the cast include de Harris Philip Seymour Hoffman Helen Hunt Robin Wright Penn Aidan Quinn a and new nothing to lose but your5mgletlef we have arranged Over 2,000,000 first dates. Talk to", "newsbank_text": "LOS ANGELES (AP) — \" I wish I was 79 again, \" quips Paul Newman, who turned 80 in January. He's far from being retired. His food company, Newman's Own, has donated $200 million in lifetime profits to charity. He supports the Hole in the Wall Camps, which provide outdoor vacations for terminally ill children (the name comes from the \" Butch Cassidy and the Sundance Kid \" hideout ). He owns an auto racing team that will compete this year in Australia, South Korea and Argentina. And, oh yes, Newman is still doing what he does best — acting. He appears on HBO on Saturday and Sunday in \" Empire Falls \" (8 p.m. CDT ), a film based on the Pulitzer Prize-winning novel by Richard Russo, who also wrote the script. Empire Falls, Maine, is a crumbling town that once thrived with clothing mills. The hangers-on comprise a rich mix of families whose secrets and failings provide the drama as well as some light touches. Newman plays Max Roby, the wily and irreverent patriarch of one of those families, whose unkempt beard is reputed to be littered with cracker crumbs. Newman gets fifth billing and disappears for a long stretch when Max runs off to Florida with a senile priest. Other members of the cast include Ed Harris, Philip Seymour Hoffman, Helen Hunt, Robin Wright Penn, Aidan Quinn — and Newman's wife, Joanne Woodward, in a rare villainess role as the heiress who wields malevolent power over some of the town's residents. Having also played an old-timer in the adaptation of another Russo novel, \" Nobody's Fool, \" Newman read \" Empire Falls \" with more than the usual interest. \" An extraordinary book, \" the actor said in an interview. \" I know there was a lot of interest in making like a two- hour film out of it, and I thought that would truncate all the values in it. It had to be done in a longer format. No major studio 1 wants to make a 3- hour, 3/2-hour film. \" HBO had no such qualms. As an executive producer, Newman helped line up the stellar cast, and he insisted that \" Empire Falls \" be shot in Maine. \" That's where it was set in the mind of Russo, and that's where we shot it, \" he said. \" We would have saved a little money by going to Canada, but I think the film would have suffered. And I think there's an obligation whenever it's possible that we should shoot here in the United States. \" One of the first Method actors to become a movie star, Newman is a stickler for realism. He grew a vagrant-style beard for the role of Max, but it didn't last long. \" Joanne made me shave the homeless part off first. Then she got the rest of it; I should really say while I was sleeping, \" he joked during a telephone chat from his home in Westport, Conn. \" She was not enamored with it. \" Copyright 2005, 2007, American Press. All Rights Reserved."}, {"article_id": "116783718", "match_score": 74.26160337552743, "source": "Associated Press Archive", "date": "September 9, 2005", "window_summary": "The archive excerpt notes Robin Wright Penn stars in the Toronto film \"Sorry, Haters\" as an angry New Yorker who forges an unlikely bond with an Arab taxi driver in post–Sept. 11 Manhattan.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full article (an AP piece about films addressing Sept. 11) mentions Wright Penn among Toronto Festival entries, describing her role in \"Sorry, Haters\" as a troubled New Yorker forming a bond with an Arab taxi driver against a post-9/11 backdrop.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "cell that plots a new wave of 11like attacks around new York the targets including grand Central another Toronto stars Robin Wright Penn As a angry new yorker who forges an unlikely Bond with an Arab taxi the relationship set against the", "newsbank_text": "Author: DAVID GERMAIN; AP Movie Writer 552 Words OpenURL Link Anguish over Sept. 11 lingers, yet filmmakers slowly are overcoming an early reticence to address the attacks with a growing number of projects examining the horrors and heroes and even finding rays of humor in the tragedy. Leading the way are two yet-untitled projects, Oliver Stone's big-screen tale starring Nicolas Cage in the story of two New York City rescuers involved in the World Trade Center aftermath and an ABC miniseries chronicling the terrorist attacks. The Toronto International Film Festival features a handful of films that, with the initial shock of Sept. 11 wearing off, now are beginning to incorporate the events in historical context as facts of everyday life. \"It takes artists awhile both to digest current events and get films made. This lag of four years makes sense, if one was going to predict accurately when we would start seeing these kinds of films,\" said Noah Cowan, Toronto festival co-director. Among the Toronto films: \"The War Within,\" a chilling portrait of an Arab student falsely detained as a terrorism suspect who seeks revenge against the United States by joining a terrorist cell that plots a new wave of Sept. 11- like attacks around New York City, the targets including Grand Central Station. Another Toronto entry, \"Sorry, Haters,\" stars Robin Wright Penn as a troubled, angry New Yorker who forges an unlikely bond with an Arab taxi driver, the relationship set against the backdrop of post-Sept. 11 Manhattan. In her performance film \"Sarah Silverman: Jesus Is Magic,\" comedian Silverman takes on a range of taboo topics -- AIDS, the Holocaust, race relations -- with a fierce politically incorrect attitude. Regarding Sept. 11, Silverman jokes that American Airlines missed out on a good marketing slogan: \"American Airlines: First through the towers.\" She also kids that Sept. 11 was especially trying for her because it was the same day she learned that the soy lattes she had been drinking daily had a whopping 900 calories. Silverman said it took her a long while after Sept. 11 before she could think about including material on the attacks in her act but that eventually the need for humor won out. \"I always want to laugh at the sad stuff. You don't need to laugh at the other stuff,\" Silverman said. \"I'm not numb to these things. I still go into really dark periods about Sept. 11. I think it's kind of like bullies. Bullies are just scared and thin-skinned, so they have to become bullies as a kind of survival tactic. I think comics are that way, too.\" Other films related to Sept. 11 are finding their way into theaters, onto television and on DVD. The documentary \"The Flight That Fought Back\" -- examining United Airlines Flight 93, whose passengers died in a crash after they foiled one of the terrorist attacks on Sept. 11 -- played in a handful of movie theaters in advance of its TV debut. \"Flight From Death: The Quest for Immortality,\" a documentary that includes a segment on how the Sept. 11 attacks wounded the American psyche, came out this week on DVD. \"Answering the Call: Ground Zero's Volunteers,\" a documentary about emergency personnel that mobilized on Sept. 11, is playing at memorial screenings this month in several cities. \"Protocols of Zion,\" which opens theatrically in October, looks at a surge in anti-Semitism that followed the Sept. 11 attacks."}, {"article_id": "327238015", "match_score": 74.2489270386266, "source": "American Press (Lake Charles, LA)", "date": "April 8, 2005", "window_summary": "The excerpt is a birthdays/people listing noting actress Robin Wright Penn and giving her age (39).", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full item is a short people/birthdays note that identifies Robin Wright Penn as an actress and lists her age.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "Hywel Bennett is 61. Actor Stuart Pankin is 59. Actor John Schneider is 45. Singer Julian Lennon is 42. Actress Robin Wright Penn is 39. Actress Patricia Arque ble actresses.", "window_context": "career", "window_tone": "positive", "fulltext_summary": "In a film review, Robin Wright Penn is mentioned positively as a notable member of an impressive ensemble cast; the review criticizes the film's uneven tone but praises the strength of the assembled performers.", "fulltext_context": "career", "fulltext_tone": "positive", "archive_window": "some what less than their parts. Garcia rounded up a huge and Lustrous cast highlighted by Sissy Spacek Glenn close Robin Wright Penn Holly Hunter and Lisa Gay Hamilton. Associated press for the untutored aeon pronounced be on works for the a", "newsbank_text": "Cameron Crowe has made his name with movies that strike just the right tone - a bittersweet balance that's funny and melancholy, romantic and observant. It's one that his idol, Billy Wilder, perfected decades ago, and one that's hard to achieve. Which is what makes Crowe's latest film so curious, and such a disappointment. In telling the story of a young man (Orlando Bloom) who returns to his small-town Kentucky roots after his father's death, it's as if Crowe wanted to make several different movies but couldn't decide among them, so he just went ahead and made them all, then trimmed for time. Characters say and do things that real people don't say and do, and they frequently come up with poignant turns of phrase that are so perfectly timed, they clang self-consciously - especially Kirsten Dunst as the perky flight attendant with whom Bloom's character strikes up an unexpected romance. (They do have some lovely moments together, though.) Susan Sarandon, Alec Baldwin and Jessica Biel co-star. PG-13 'NINE LIVES' Rodrigo Garcia follows his previous anthology films \"Ten Tiny Love Stories\" and \"Things You Can Tell Just by Looking at Her\" with this medley of short films about women in crisis. Like a solid collection of short stories, some of Garcia's little dramas are riveting, some are explosive, some are merely intriguing, and they collectively add up to an emotional total somewhat less than their parts. A few of the vignettes pack a wallop. Others simply breeze by to little effect. Garcia rounded up a huge and lustrous cast, highlighted by Sissy Spacek, Glenn Close, Robin Wright Penn, Holly Hunter and Lisa Gay Hamilton. The filmmakers accomplished an impressive feat of scheduling and camera choreography to shoot his nine stories in just 18 days - two days apiece, each segment captured in single takes lasting 10 to 14 minutes. R 'WHERE THE TRUTH LIES' Kevin Bacon and Colin Firth star as Jerry-and-Dean-type '50s entertainers whose act and friendship were destroyed when a young blonde was found dead in their hotel suite after a menage a trois. Fifteen years later, an up-and- coming entertainment reporter (Alison Lohman) tries to uncover the truth about what happened that night. Director Atom Egoyan wallows so devilishly in the conventions of film noir, he approaches parody. The melodramatic voiceover, the glamorous and gritty settings, the obsession with the ugly side of show business - Egoyan takes them all and whips them up into a fizzy cocktail that's intoxicating but also flummoxing. Strong performances anchor the film, though Egoyan jumps jarringly between various times and perspectives. Not rated but wow - name it and it's probably in there: language, nudity and violence, sex, drugs and rock 'n' roll. ART 'DRAWN BY THE LIGHT' When: Through Nov. 12. Where: 48 Boundary St. Description: The Society of Bluffton Artists (SoBA) presents an exhibit of pastels by local artist Kathy Tortorella. Gallery hours are 10 a.m. to 5 p.m. Tuesday through Saturday. Cost: Free Details: 757-6586 'PAINTING THE GOOD LIFE: THE ART OF COBY WHITMORE' When: The exhibit will be open to the public from 10 a.m. to 4 p.m. Monday through Friday, noon to 4 p.m. on Saturdays and one hour prior to performances in the Elizabeth Wallace Theatre through Oct. 28 Where: Arts Center of Coastal Carolina Description: Exhibit of ar , mentioning her as a co-star in the two-part adaptation without additional commentary.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "plays the busybody father of restaurateur Miles Roby de try As he cant shake his ties to the old Helen Robin Wright Penn and Joanne Woodward also part 2 airs 9 on show laugh whore comedian Mario Cantone and the love valour", "newsbank_text": "6 PM (FX) NASCAR Racing For the second consecutive Saturday, there is racing under the lights at Lowe's Motor Speedway in Concord, N. C., home this week to the Busch CarQuest Auto Parts 300. Kyle Busch turned in a dominating performance in this race last year, leading for 92 of 200 laps before it ended under caution with two laps to go. The win was Busch's second in three races. 7 PM & * NCIS A dead civilian is found on a Marine firing range, which leads to the discovery that the Mafia has been using the site as a dumping ground for years. When the victim is identified as an undercover FBI agent, Gibbs '( Mark Harmon) counterpart in the bureau, Agent Fornell (guest star Joe Spano ), is accused of spying for the mob. Sasha Alexander and David McCallum also star in \" The Bone Yard. \" 7 PM _ $ The Patriot Colonial plantation owner and French and Indian War veteran Benjamin Martin (Mel Gibson) has no interest in the fight for independence from the British. He certainly doesn't want his oldest son (Heath Ledger) to join the rebellion, but he can't stop him. When a British colonel captures the youth and kills his brother, Dad becomes the redcoats 'worst nightmare. 7 PM = Cops Police crack down on Mardi Gras in the first of two episodes from — where else? — New Orleans. Among those getting in trouble are a transsexual with a breast exposed and a man who flashes something other than his chest in an attempt to score some beads. Officers also bust a couple who have decided to have their own party for two... in public. 8 PM & * Cold Case Lilly (Kathryn Morris) and her team  guest the Donnas perform. Copyright 2005, 2007, American Press. All Rights Reserved."}, {"article_id": "217036511", "match_score": 71.85501066098081, "source": "Repository, The (Canton, OH)", "date": "May 27, 2005", "window_summary": "The archive excerpt identifies Robin Wright Penn as appearing (as Miles' late mother) in the HBO miniseries Empire Falls.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full review of the Empire Falls miniseries mentions Robin Wright Penn in the cast (as the protagonist's late mother) but offers no specific praise or criticism of her performance.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "off to Florida with a senile priest. Other members of the cast include de Harris Philip Seymour Hoffman Helen Hunt Robin Wright Penn Aidan Quinn a and Newman a wife Joanne Woodward in a rare villainess role As the heiress who wields | daughter Kate Burton and dead husband Charles Philip Seymour Hoffman who shows up in flashbacks along with Miles late Mother Robin Wright Penn. There Are a lot of sad secrets among them and the film is largely a matter of getting them", "newsbank_text": "HOLLYWOOD -- Richard Russo’s 2001 Pulitzer Prize-winning novel, \"Empire Falls,\" has been turned into a two-part, star-studded HBO miniseries, also written by Richard Russo and directed by Fred Schepisi (\"Six Degrees of Separation,\" \"Roxanne\"). Airing Saturday and Sunday night, it’s a dutiful (self-)adaptation that hits all of the novel’s main points, and while it’s never dull, it’s rarely engaging. Even at a length of more than three hours, it feels underdeveloped. It never breaks into a cinematic vividness: The camera seems remote from the action rather than involved in it, and although the picture admirably has been filmed in the part of the country where it’s set, it doesn’t really communicate a sense of place. It’s the story of a depressed town in Maine whose inhabitants are either waiting for something to happen or resigned to a world where nothing does. It’s one of those big small towns, familiar from the movies, compact enough to be ruled by a single family and for everyone to know everyone’s business, whatever their standing or circumstances. The film most specifically concerns two families: the Whitings, who own the town, and the Robys, who -- like everyone else -- just live in it. Among the latter are central character Miles (Ed Harris), who runs the Empire Diner; his formerly wayward brother David (Aidan Quinn), who cooks there; soon-to-be-ex-wife Janine (Helen Hunt), newly thin and about to marry her cocky boss (Dennis Farina); and daughter Tick (Danielle Panabaker), not quite befriending spooky quiet kid John Voss (Lou Taylor Pucci), who will bring a bit of headline-ripped mayhem to the climax. Just across the river are rich and powerful Mrs. Whiting (Joanne Woodward, in what might be termed the Lionel Barrymore role), her crippled daughter (Kate Burton) and dead husband, Charles (Philip Seymour Hoffman), who shows up in flashbacks, along with Miles’ late mother (Robin Wright Penn). There are a lot of sad secrets among them, and the film is largely a matter of getting them out. Russo emphasizes the movie’s hard-bound origins with chapter headings and a folksy, godly narrator -- a little too reminiscent of Earl Hamner on \"The Waltons,\" or Tom Bodett for Motel 6 -- who returns again and again to emphasize that the river that runs through the town and story is not merely a waterway but a metaphor. (\"Lives are like rivers; eventually they go where they must, not where we want them to.\" And so on.) But in most respects all the film does is demonstrate why a movie isn’t a book. The original novel is a long work in which nothing much happens, but it is thick with information; it flits from character to character and roots around in their heads, providing histories and motivations for sometimes their smallest gestures. Conversations run for pages and pages, and while Russo has managed to maintain some of the novel’s talk-for-talk’s-sake, which gives it color and texture, a manageable running time requires that characters unburden themselves of their message and go. The film version has something of a freeze-dried quality -- the constituent elements are there, but the juice has been sucked out. Harris doesn’t really succeed in making Miles interesting, although we’re interested in him by default, since he’s obviously the hero of the piece. An almost painfully good guy, with a habit of underestimating everyone around him, Miles has a strong sense of duty and obligation coupled with an inability to take any sort of action to improve their lot or his own -- he’s a Hamlet without the soliloquies or sexiness. The desperation in his life is so quiet he imagines he’s happy, in spite of what everyone else seems to think. We wait for him to awake, smell coffee. As Miles’ father, Paul Newman’s role is easier. His character has no inner life to speak of -- he’s all extravagant surface. His Max -- a close double for Poopdeck Pappy -- is a kind of human hound dog whose life has been dedicated to finding the sunny spot and staying in it as long as possible; he is a good-natured, even good-hearted sociopath. Newman has a history with the author, having played in the film of Russo’s novel \"Nobody’s Fool\" and in the Russo-co-scripted \"Twilight\" (both directed by Robert Benton), and it’s easy to see why he would want the part - - its air of vital, disreputable age suits him to a T. The film perks up whenever he’s on screen; even (or perhaps especially) with a scraggly beard and wayward hair, he’s a still-handsome movie star whose movie-star performance provides the movie’s most genuine moments. Only fellow old pro Estelle Parsons fares quite as well, although there is other good work here, especially in some of the smaller roles: Jeffrey DeMunn as a cynical newspaperman and William Fitchtner as a crooked cop who just wants to be liked both stand out. Copyright 2005, The Repository, All Rights Reserved."}, {"article_id": "115665962", "match_score": 70.66115702479338, "source": "Journal Gazette (Mattoon, IL)", "date": "April 8, 2005", "window_summary": "The archive excerpt is from a birthdays column noting actress Robin Wright Penn (age given).", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full AP item is a brief birthdays roundup that lists Robin Wright Penn and her age; she is mentioned as a factual biographical entry with no evaluative commentary.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "actor John Schneider is Singer guitarist Donitta Sparks of l7 is Singer Julian Lennon is rapper Biz Markie is actress Robin Wright Penn is actress Patri Cia Arquette is drummer Dar Ren Jessee Ben folds five is suitor gels thorny response says", "newsbank_text": "Elton:Eminen on par with Hendrix, Jagger NEW YORK (AP) - Elton John says that Eminem is on par with Jimi Hendrix and Mick Jagger. In the new issue of Rolling Stone, the rapper is listed in the magazine's second \"Immortals\" edition, featuring another 50 of the greatest figures of rock 'n' roll with appreciations written by other artists. In his immortalizing of Eminem, John writes that he got goose bumps when he first rehearsed with him for their performance at the 2001 Grammy Awards. \"From the start, I've always admired Eminem's thinking,\" John writes. \"That's the reason I wanted to appear on the Grammys with him when I was asked, despite all the nonsense talked about his being homophobic. Other contributors include Dave Matthews writing on Radiohead, Trey Anastasio on Frank Zappa, Beck on Hank Williams, David Bowie on Nine Inch Nails and Mos Def on Miles Davis. Host of 'TheView' gives birth to daughter NEW YORK (AP) - A day after her daughter was born, Elisabeth Hasselbeck called her co-hosts on ABC's \"The View\" to reveal the baby's name: Grace Elisabeth. \"I'm
