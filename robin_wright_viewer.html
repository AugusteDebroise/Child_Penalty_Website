een a frequent topic of conversation on the daytime chat fest. \"We feel like we all had a baby!\" exclaimed co-host Joy Behar. Today's birthdays Comedian Shecky Greene is 79. Singer J.J. Jackson is 64. Guitarist Steve Howe of Yes is 58. Bassist Mel Schacher of Grand Funk Railroad is 54. Singer-actor John Schneider is 45. Guitarist Izzy Stradlin (Guns N' Roses) is 43. Singer- guitarist Donita Sparks of L7 is 42. Singer Julian Lennon is 42. Rapper Biz Markie is 41. Actress Robin Wright Penn is 39. Actress Patricia Arquette is 37. Singer Craig Honeycutt of Everything is 35. Drummer Darren Jessee (Ben Folds Five) is 34. Actor Taran Noah Smith (\"Home Improvement\") is 21."}, {"article_id": "310901242", "match_score": 68.78306878306879, "source": "Daily Times-Call, The (Longmont, CO)", "date": "February 7, 2005", "window_summary": "The archive window shows 'Robin Wright' as a byline/co-author on a Washington Post dispatch about Middle East diplomacy. This presents Robin Wright in the role of a journalist/author, not as the actress.", "window_context": "other", "window_tone": "neutral", "fulltext_summary": "The full article lists Robin Wright (along with Molly Moore) as a co-author of a news report; the name appears as journalistic byline rather than as a reference to the actress. There is no depiction of the actress herself.", "fulltext_context": "other", "fulltext_tone": "neutral", "archive_window": "Hite House j to 1 1 a a 1 lawyers to take to Justice Deal Israel faces hard decisions by Robin Wright and Molly Moore Jerusalem a Secretary of state condole Ezza Rice on her first trip to the Middle East As", "newsbank_text": "Rice: Mideast has ‘hard decisions’ Robin Wright and Molly Moore The Washington Post JERUSALEM — Secretary of State Condoleezza Rice, on her first trip to the Middle East as the top U.S. top diplomat, met Sunday with Prime Minister Ariel Sharon and said Israelis faced some “hard decisions” if they wanted to achieve peace with the Palestinians. Rice called new momentum behind the peace process hopeful but also described it as a time of “great responsibility” to ensure that actions matched recent commitments. The meeting with Sharon and senior Israeli officials, to be followed by talks with Palestinian Authority president Mahmoud Abbas and other leaders today in the West Bank city of Ramallah, are part of the Bush administration’s pledge to be more involved in Middle East peace efforts during its second term. Rice arrived on the eve of a summit of Israeli and Palestinian leaders in Egypt on Tuesday. Egyptian President Hosni Mubarak and Jordan’s King Abdullah also are scheduled to attend the meeting. “We will ask of our partners and our friends in Israel that Israel continue to make the hard decisions that must be taken in order to promote peace and the emergence of a democratic Palestinian state,” Rice told reporters before meeting with the Israeli foreign minister, Silvan Shalom. Sharon’s spokesman Raanan Gissin described the discussions between Rice and Sharon as “a very good meeting,” adding “we see eye to eye.” Rice indicated the United States would be prepared to provide monitors to coordinate a future cease-fire with both sides, especially to help deal with any new outbreak of violence by extremists intent on unraveling peace efforts. “If there can be a period of calm in which there is not fighting, the most important elements will be to have some monitoring of that situation,” Rice said in an interview with CNN. In an interview with Israeli Channel 2 television, Rice said she is exploring the capabilities of the State Department and other U.S. agencies to determine “how we will help the process forward, how we will monitor, how we will help with coordination.”"}, {"article_id": "160190624", "match_score": 68.125, "source": "Charleston Gazette (WV)", "date": "May 22, 2005", "window_summary": "The archive excerpt indicates Robin Wright Penn portrays Miles Roby's mother, Grace, who died when he was young and appears only in flashback scenes.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full article/review discusses the HBO adaptation of Empire Falls and notes that Robin Wright Penn appears as Miles' deceased mother, Grace, largely in flashbacks; her role is described factually as part of the ensemble.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "Danielle who is angry about her parents imminent divorce and her mothers Helen Hunt approaching remarriage to another Miles Grace Robin Wright died when Miles was a Young but his irascible Max Paul is still doing halfhearted Odd jobs in Exchange for | to work with every one of these Harris Miles is the Only character who interacts with All the except for Robin Wright Penn who appears Only in Flashback scenes but Paul and Theresa Philip Seymour everybody else i got to work and", "newsbank_text": "An all-star cast brings to vibrant life Richard Russo's \"Empire Falls\" in a funny and achingly beautiful two-part adaptation airing Saturday and Sunday on HBO. Set in a declining Maine mill town, the TV movie stars four-time Oscar nominee Ed Harris (\"Pollock\") as Miles Roby, the central character, who is in a kind of emotional paralysis as the story opens. As a boy, Miles showed great promise for a successful life far beyond his struggling hometown, but fate and family obligations born out of long-buried secrets have forced him to remain in Empire Falls, where he scrapes out a living running the Empire Grill for Francine Whiting (Joanne Woodward), the iron-willed widow whose family owns anything worth owning in Empire Falls. At the center of Miles' life is his sensitive teenage daughter, Tick (Danielle Panabaker), who is angry about her parents' imminent divorce and her mother's (Helen Hunt) approaching remarriage to another man. Miles' mother, Grace (Robin Wright Penn), died when Miles was a young man, but his irascible father, Max (Paul Newman), is still around, doing halfhearted odd jobs in exchange for beer money. Helping Miles at the diner is his younger brother, David (Aidan Quinn), who bitterly remembers how determined their mother was that Miles would escape the dead-end existence in which he now finds himself. \"Miles is really stuck when this thing starts,\" Harris says. \"He's got nowhere to turn, doesn't see any way out of what he's doing, even though he's not very happy. During the course of this thing, he gets unstuck.\" Getting unstuck for Miles requires uncovering and confronting some startling secrets that explain the complicated ties between his own blue-collar family and the elite Whiting clan, including Francine's late husband, C.B. (Philip Seymour Hoffman), and their daughter, Cindy (Kate Burton), who was disabled in a childhood accident and harbors a desperate, unrequited love for Miles. As fans of Russo's Pulitzer Prize-winning novel know, there is a startling act of school violence near the end of the narrative, but apart from that, the story unfolds with the quirky, unhurried pace of small town life. Dramatic tension arises not from explosions or car chases, but from the resentments, passions and private shames that run through Empire Falls like the Knox River. That \"Empire Falls\" remains so utterly engrossing for its three-hours-plus running time is both a tribute to Russo's writing - he wrote the teleplay as well - and to the dazzling ensemble of actors, who manage to convince us that they've shared life experiences for years, even for generations. That's possible in large part because executive producer Newman and director Fred Schepisi gathered the entire cast together in New York for extended rehearsals before moving to the Maine filming location. \"We knew we had to concentrate on and bring about (that sense of interconnected lives), particularly as many of the characters don't actually play scenes with one another and yet they have a large effect on one another,\" Schepisi says. With Russo on hand during those early sessions, Schepisi and his cast had the luxury of asking the author to interpolate scenes or lines of dialogue he originally had omitted from the adapted script, which clarified motivations for the actors. \"I nagged Rick a bit to put some things in or take some things out. Fortunately, he transcended that nagging,\" Schepisi says, chuckling. Filming primarily in the part of Maine where Russo had lived while writing his novel also gives the TV movie added resonance, Harris says. \"That was really helpful, and I am so glad that we shot it in the towns of Waterville and Skowhegan where we were,\" he says. \"All of the community was very supportive, and you know, it's a mill town that's kind of fallen on hard times, which is just what the story was about. It just gives you so much that you don't have to think about, because you're really right there in the environment.\" Harris says his \"Empire Falls\" colleagues are the best ensemble with which he's ever worked. \"And what was really fun was that as Miles, I really got to work with every one of these actors,\" Harris says. \"Miles is the only character who interacts with all the others, except for Robin Wright Penn (who appears only in flashback scenes) - but Paul and Joanne, Helen, Aidan, Theresa Russell, Philip Seymour Hoffman, everybody else I got to work with.\" And while Miles undergoes a harrowing transformation during the course of \"Empire Falls,\" he comes out of it free to pursue the dreams his mother had held out for him, Harris says. Copyright, 2005, Charleston Newspapers"}, {"article_id": "150625463", "match_score": 68.11594202898551, "source": "Daily Hampshire Gazette [30 Day Embargo] (Northampton, MA)", "date": "May 20, 2005", "window_summary": "The archive excerpt briefly states that Robin Wright Penn also appears in the mentioned film/TV listing, giving her as part of the cast. The line is a short, factual credit.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The fulltext is a TV/movie listing that again names Robin Wright Penn as a star of White Oleander (and places her in the programming schedule); it offers no evaluative language and limits itself to crediting her role. The depiction is neutral and informational.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "a crime of the convict does All she can to in fluence her daughter against one maternal surrogate re Nee Robin Wright Penn also 10 on Abc Law order trial by jury nobody loves a cop killer unless Hes a in the", "newsbank_text": "Baseball's first foray into interleague play in 2005 is this weekend, and one of the more intriguing matchups (other than Mets-Yankees) is the one in Boston between the Red Sox and Atlanta Braves. Just like last season when it led the league, Boston's offense is piling up the runs scored, headed by the two-headed \"Z\" monster of Manny Ramirez and David Ortiz. Their presence will put extra pressure on the Braves' always reliable pitching staff. 7 p.m. TBS 8 p.m. WB What I Like About You Holly (Amanda Bynes) panics when Vince (Nick Zano), upset at the sight of her in her ex's arms, decides to go away for the summer. Val (Jennie Garth) gets drunk after learning her former fiance has married someone else and wakes up to discover she apparently did the same. Leslie Grossman and Wesley Jonathan also star in the season finale, \"Enough Is Enough.\" Law & Order: Trial by Jury Kibre and Gaffney (Bebe Neuwirth, Amy Carlson) have three suspects in a young woman's rape and murder, one of whom is her ex-boyfriend (guest star Ebon Moss-Bachrach). They try to get at the truth by playing the three against one another, and the ex appears to be the most truthful of the trio, prompting Kibre to consider a deal. Warren Blosjo and Adam LaVorgna also guest star in \"Truth or Consequences.\" 10 p.m. NBC At the movies: The Muppets' Wizard of Oz This is not your father's \"Wizard,\" or even your older brother's \"The Wiz.\" It's a totally Muppetational retelling of the Oz tale. Kermit as the Scarecrow, Fozzie as the Lion, Gonzo as the Tin Man -- er, Thing -- and Pepe the Prawn as Toto accompany Dorothy (Ashanti) on her quest to ask the Wizard (Jeffrey Tambor) not for a trip back to Kansas, but for showbiz stardom. Queen Latifah and David Alan Grier also star. 8 p.m. ABC White Oleander Janet Fitch's novel becomes a showcase for four fine actresses in this engrossing 2002 drama. Relative newcomer Alison Lohman (\"Matchstick Men\") admirably holds her own as a teenager sent to several foster homes after her mother (Michelle Pfeiffer) draws a life sentence for a crime of passion. The convict does all she can to influence her daughter against one maternal surrogate (Renee Zellweger). Robin Wright Penn also stars. 9 p.m. LIFETIME Copyright 2005, 2009, Daily Hampshire Gazette, All Rights Reserved."}, {"article_id": "41316598", "match_score": 67.82786885245902, "source": "Post-Star, The (Glens Falls, NY)", "date": "May 21, 2005", "window_summary": "", "window_context": "", "window_tone": "", "fulltext_summary": "", "fulltext_context": "", "fulltext_tone": "", "archive_window": "on Richard Russo s Best seller about Small town life. The ensemble cast also features Paul Newman Philip Seymour Hoffman Robin Wright Penn Aidan Quinn and Joanne Woodward. It premieres at 9 Saturday on Hob. The Bridge on the River kwai 8 | life this new miniseries Fea Tures an All Star ensemble cast de Harris Philip Seymour Hoffman Helen Hunt Paul Newman Robin Wright Penn Aidan Quinn and Joanne Woodward. Newman also an executive producer brought the project to Hob because he wanted a", "newsbank_text": "Sunday Star Wars: Episode II Attack of the Clones Now that Episode III has finally arrived, the previous installment is making its broadcast debut. Though avid fans won't need a refresher, others can catch up while waiting for the lines at the theaters to dwindle. Ewan McGregor, Natalie Portman and Samuel L. Jackson star. 7 p.m. on Fox Wild Kingdom Tonight's episode, \"Natural-Born Winners,\" looks at some species that are \"true champions of survival.\" The octopus, for example, may look odd, but it's been around for hundreds of millions of years. And one reason termites are so common is that a single queen can produce more than a million eggs. 7 p.m. on Animal Planet The Most Daring Mission of the Civil War \"Civil War Secrets Week\" starts with this new documentary about how an eight-man Union crew went deep behind enemy lines to use a torpedo - a new weapon - to sink an ironclad Confederate ship, the Albemarle. William Cushing, the daring young lieutenant who led the dangerous mission, became a popular hero. 8 p.m. on the History Channel CNN Presents Tonight's program, \"Autism Is a World,\" is an Oscar-nominated documentary about Sue Rubin, a woman with autism who has become a disabled-rights advocate. Rubin wrote the script, which provides an unusual view of autism \"from the inside out.\" She was considered mentally retarded until age 13, when a new communication technique allowed her to express herself. 8 p.m. on CNN Desperate Housewives Like many series, \"Desperate Housewives\" has its season finale this week. What's in store for Season 2? We should get some clues tonight when the women meet a new neighbor, Betty Applewhite. She's played by Alfre Woodard, who will join the full-time cast when new episodes resume in the fall. 9 p.m. on ABC Queer as Folk The series returns for a fifth and final season with Rosie O'Donnell guest-starring as a woman who escapes from an abusive husband and develops a crush on Debbie (Sharon Gless). Two of the 13 new episodes will be shown back- to-back tonight. Cyndi Lauper is set to guest-star later in the season. 10 p.m. on Showtime Monday Nick & Jessica's Tour of Duty Emulating top entertainers of earlier generations, Nick Lachey and Jessica Simpson entertain American troops overseas, joined by a big cast of fellow celebrities. They include Big & Rich, Jimmy Kimmel, Brian McKnight, Willie Nelson, and Nick's brother and sidekick, Drew Lachey. 9 p.m. on ABC American Experience In 1974, the kidnapping of newspaper heiress Patricia Hearst brought a media frenzy of a sort that was uncommon at the time. The story became even more sensational when Hearst joined her captors in their life of crime. Tonight's film looks at the case through the eyes of members of the small radical group that was responsible, the Symbionese Liberation Army. 9 p.m. on PBS Tuesday Rob and Amber Get Married After multiple \"Survivors\" and an \"Amazing Race,\" Rob Mariano and Amber Brkich apparently have at least a couple of hours of fame left. So tonight we get to see their lavish wedding in the Bahamas, along with all the preparations. 9 p.m. on CBS Trump Unauthorized And though another season of \"The Apprentice\" has ended, Donald Trump is still with us, too. This movie on a rival network traces his rise to even greater fortune and fame than achieved by his father, setbacks in his personal and business lives, and his speedy comeback. With Justin Louis as Trump, Katheryn Winnick as first wife Ivana Trump, and Ron McLarty as father Fred Trump Sr. 9 p.m. on ABC Wednesday American Idol The new \"Idol\" will be crowned tonight. That means, among other things, that television's May \"sweeps\" are ending, and tomorrow you can catch up on plenty of shows that you may have missed the first time they were on. 8 p.m. on Fox Amber Frey: Witness for the Prosecution The story of the \"other woman\" in the Laci Peterson case is told in this new movie based in part on Frey's book about her relationship with Scott Peterson. Frey, portrayed here by Janel Moloney of \"The West Wing,\" says she had come to suspect that Peterson was lying to her by the time his wife disappeared. With Nora Dunn as Frey's attorney, Gloria Allred. V Thursday With All Deliberate Speed Many people are aware that it was the U.S. Supreme Court that outlawed school segregation, and some will remember that the landmark decision came more than 50 years ago (on May 17, 1954). But what led to the ruling in Brown v. Board of Education? This new special looks at some \"heroic acts\" that came first. 8 p.m. on the Discovery Channel Aging Out Three young adults are followed as they \"age out\" of the foster-care system. Though their troubled childhoods have left them with disadvantages, this new documentary finds that they have the benefit of the resiliency they developed while \"in the system.\" 10 p.m. on PBS Friday The Bridge on the River Kwai Though director David Lean's \"Lawrence of Arabia\" has gotten more attention in recent years, some film scholars rate this earlier epic even higher. Both won seven Oscars, including best picture and director. Alec Guinness was named best actor for \"Kwai\" but wasn't nominated for his role in \"Lawrence.\" 8 p.m. on TCM Complete Savages Yanked off the air with four episodes remaining, this ratings-impaired sitcom is being allowed back (\"burned off\" in the harsh language of the TV business) now that the \"sweeps\" are over. Keith Carradine stars in the story of an all- male dysfunctional family, and tonight's episode features Betty White in the recurring role of Mrs. Riley. 8:30 p.m. on ABC Saturday French Open Tennis They're still in the early rounds at Roland Garros Stadium in Paris, but there's always the chance of a big upset there. (That red clay surface is often blamed.) NBC's team includes Ted Robinson, John McEnroe, Mary Carillo and Bud Collins. Tomorrow's coverage will start at 10 a.m. Noon on NBC The Patriot Mel Gibson stars in this Revolutionary War drama that was one of his bigger projects before he turned to directing \"The Passion of the Christ.\" He's a farmer who's seen enough of war but gets drawn into battle to protect his family. With Heath Ledger, Joely Richardson and Jason Isaacs. 8 p.m. on NBC Empire Falls Based on Richard Russo's best-seller about small-town life, this new mini-series features an all-star ensemble cast: Ed Harris, Philip Seymour Hoffman, Helen Hunt, Paul Newman, Robin Wright Penn, Aidan Quinn, and Joanne Woodward. Newman, also an executive producer, brought the project to HBO because he wanted a more complete version of Russo's book than a feature film would allow. Concludes at the same time tomorrow. 9 p.m. on HBO Laugh Whore Stand-up comedy, impersonations, singing - Mario Cantone does it all in this \"one-man variety show\" that he performed on Broadway. A familiar face on New York stages, Cantone will be remembered by fans of \"Sex and the City\" for his portrayal of wedding stylist Anthony Marantino. 9 p.m. on Showtime - Knight Ridder Copyright © 2005 Glenns Falls Post-Star, Lawrence & Cooper Streets Glens Falls, NY, All Rights Reserved."}, {"article_id": "291489531", "match_score": 67.81115879828326, "source": "Daily News of Los Angeles (CA)", "date": "May 26, 2005", "window_summary": "The archive excerpt notes that Robin Wright Penn is part of the ensemble cast of the HBO miniseries Empire Falls.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full article about the Empire Falls adaptation emphasizes the star-studded ensemble and lists Robin Wright Penn among notable cast members; her portrayal is mentioned as part of the project's strong ensemble without further comment.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "Empire Falls a Hbous miniseries boasting a dream cast Newman a wife Joanne Woodward de Harris Helen Hunt. Dennis Farina Robin Wright Penn Philip Seymour Hoffman and Aidan Quinn. It was Newman who convinced Hob that Russo a Book deserved to be | novel about a dying Mill town starring Paul Newman de Harris Helen Hunt Joanne Woodward Philip Seymour Hoffman Dennis Farina Robin Wright Penn and Aidan Quinn. Where Hob. When part i tonight 9 sunday 9 30 . And 7 . June i", "newsbank_text": "On the day that Richard Russo won the Pulitzer Prize for his novel ``Empire Falls,'' his affectionate look at life in a small, dying New England mill town, he was out playing tennis. ``I had written it off completely,'' Russo recalls. ``I wasn't going to sit at home and be dumb and arrogant enough to wait for a phone call. ... When I pulled in at home, my wife, Barbara, was eerily waiting for me with tears in her eyes. I thought, 'Something horrible has happened, or I won the Pulitzer.' '' And anyway, Russo had already received ample reward for his book before it had even been released: a phone call from Paul Newman declaring, ``Wonderful novel. It really should be a movie. And you know no one would be better as Max.'' The legendary actor was referring to Max Roby, the irascibly irresponsible patriarch of a family as broken down as he and his hometown are. Newman had worked with Russo twice before, on the film adaptation of the author's novel ``Nobody's Fool'' and the film ``Twilight,'' which Russo scripted. Still, Russo says, ``It was a wonderful surprise to hear his gruff voice on the phone. I don't know how he got a copy of the galleys. I did not presume to send it to him.'' Newman, of course, proved to be a good guy to have on Russo's side. In addition to giving an acerbic, unsentimental turn as Max, Newman also serves as executive producer on ``Empire Falls,'' HBO's miniseries boasting a dream cast: Newman's wife, Joanne Woodward, Ed Harris, Helen Hunt, Dennis Farina, Robin Wright Penn, Philip Seymour Hoffman and Aidan Quinn. It was Newman who convinced HBO that Russo's book deserved to be a miniseries. ``It's rich in detail and marvelous in its humanity,'' Newman says. ``A truncated version wouldn't do justice to the material. ... It was so rich and penetrating and human that it seemed designed for the screen. There was also a nice part for myself in it.'' ``Empire Falls'' stars Harris as Miles Roby, a 40-something fellow for whom life didn't turn out remotely as he expected. He dropped out of college to take care of his mother while she was dying of cancer and has spent the past two decades tending a diner. Somewhat reluctantly, Miles has become the glue that holds what remains of his hometown together. In addition to coping with his ne'er-do- well father Max's scams, he also guides his teen daughter Tick (Danielle Panabaker) through her difficult high school years while genially suffering the slings and arrows of his ex-wife (Hunt), who is engaged to ``The Grey Fox'' (Farina), who snows everyone with his sly bravado. He's also the town's diplomatic conduit to the moneyed and manipulative Francine Whiting (Woodward), who rules the town with a velvet gauntlet. ``I looked at the cast list and asked myself, 'What am I doing here?' '' says Farina. Hunt adds, ``Every actor involved was more interesting than the next.'' Russo concedes that the high-powered cast - many of whom play supporting characters - would have been justified in requesting that the script beef up their roles. ``The thing in the back of my mind that struck me as a possibility was that these actors would appreciate more lines than they were getting, and HBO would call and say, 'We need two more scenes for these actors,' '' he says. ``Those calls never came. It's testimony, I think, to these actors that they saw this as an ensemble cast. ... There was not a prima donna among them.'' Despite assembling such a crackerjack cast and getting Russo to adapt his own book, Newman downplays his role as producer. ``What does it take to be a good producer?'' he asks rhetorically before answering, ``I don't know. I just keep my mouth shut. ... I was an absentee landlord.'' Farina, however, credits Newman with the film's giving Russo's novel its due. ``We all felt the same way, universally, about the book, that we didn't want the film to fall too far afield from it. He was there to protect that. We were very interested in the material. It was a lot easier to go to work and not have to fix the script while doing it. It was one of those times when everything fell into place.'' Well, almost - Farina admits to being less than thrilled with getting the film's one sex scene, a tanning-booth frolic with Hunt that wasn't originally in the book. ``That's not really my forte,'' Farina says modestly. ``I was talking to (director) Fred Schepisi: 'Do I really have to do this? Can we just say we did it?' I'm a little uncomfortable doing those, even though Helen was great. If I never did another one, I'd be happy.'' Russo notes that his book explains how the Grey Fox satisfied Hunt's character through dialogue, but ``Fred pointed out something that I really knew already but needed to be reminded. And that is, when characters talk about something but you don't show it, it doesn't really happen. So we had to do something. And that way, everybody saw what they really needed to know.'' Russo admits that fans of the book might raise an eyebrow at the casting of Harris as Miles, a good-natured but shambling sort of guy. ``My first reaction was, no one's going to call him 'Big Boy,' which everyone in the book did. Ed is as lean and trim as can be,'' he says. ``But the moment I knew he was going to be fine was the first scene between him and Tick. ``There was the same thing in 'Nobody's Fool,' '' he says. ``If you go by the physical description, the lead character was Roy Scheider. But Paul took no time to master the inner man. Ed did the same thing here - he got all the right interior stuff.'' As for Newman, who has been quoted as being on the brink of retirement, well, he backs off that statement. A smidgen. ``I'm prepared to go out almost immediately,'' he says, ``but the one slogan I have is, 'It's useless to put on your brakes when you're upside down. I don't know what's happening, and I don't plan ahead. Something may come up, and it may not, so I'm loose.'' David Kronke,(818) 713-3638 david.kronke(at)dailynews.com Copyright (c) 2005 Daily News of Los Angeles"}, {"article_id": "329724663", "match_score": 67.62295081967213, "source": "Dallas Morning News, The (TX)", "date": "September 16, 2005", "window_summary": "The excerpt lists Empire Falls among films and names Robin Wright Penn as one of the cast members.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full item is a brief film roundup that describes Empire Falls and includes Robin Wright Penn in the list of principal actors.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "restaurateur de Harris who just can t shake his ties to the old Hometown try though he does Helen Hunt Robin Wright Penn Aldan Quinn Philip Seymour Hoffman and Joanne Woodward also Star. Did extras Quot making of documentary audio commentary by", "newsbank_text": "Winter Solstice (2004) An impressive feature debut from writer-director Josh Sternfeld, this drama offers no easy answers as it describes a family falling apart after a tragic loss. The cast persuasively creates the angst and edgy humor of a father and two sons, one in high school, the other a young adult, mourning the mother's death. Starring Anthony LaPaglia, Allison Janney, Mark Webber and Aaron Stanford. Empire Falls (2005) This adaptation of a Richard Russo novel is set in a weary, past-its-prime Northeast town. Paul Newman plays the busybody father of a restaurateur (Ed Harris), who can't shake his ties to the old hometown, try though he does. Also starring Helen Hunt, Robin Wright Penn and Joanne Woodward. Rock School (2005) An energetic documentary about the egomaniacal but effective man behind the Paul Green School of Rock in Philadelphia. Funny (not always intentionally) and even inspirational, it's a must-see for rock fans. Directed by Don Argott. COMING TUESDAY Adventures of Shark Boy and Lava Girl in 3-D (2005) Battlestar Galactica: Season 1 The Longest Yard (2005) Copyright 2005 The Dallas Morning News"}, {"article_id": "113755169", "match_score": 67.46724890829694, "source": "American Press (Lake Charles, LA)", "date": "May 26, 2005", "window_summary": "The excerpt lists Robin Wright Penn among the ensemble cast of Empire Falls alongside other noted actors.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The profile of Paul Newman and the Empire Falls production names Robin Wright Penn as part of the 'stellar' cast but does not single her out for specific praise or critique.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "Newman gets fifth Billing and disappears for a Long on to what Empire Falls who de Philip Seymour Helen Paul Robin Wright Aidan Quinn and Joanne Woodward when today and sunday at 8 where insight 200 stretch when Max runs off to | runs off to Florida with a senile priest other members of the cast in clude de Philip Seymour Helen Hunt Robin Wright Aidan Quinn and new mans Joanne in a rare villainess role As the heiress who wields malevolent Power Over some", "newsbank_text": "LOS ANGELES (AP) — \" I wish I was 79 again, \" quips Paul Newman, who turned 80 in January. He's far from being retired. His food company, Newman's Own, has donated $200 million in lifetime profits to charity. He supports the Hole in the Wall Camps, which provide outdoor vacations for terminally ill children (the name comes from the \" Butch Cassidy and the Sundance Kid \" hideout ). He owns an auto racing team that will compete this year in Australia, South Korea and Argentina. And, oh yes, Newman is still doing what he does best — acting. He appears on HBO on Saturday and Sunday in \" Empire Falls \" (8 p.m. CDT ), a film based on the Pulitzer Prize-winning novel by Richard Russo, who also wrote the script. Empire Falls, Maine, is a crumbling town that once thrived with clothing mills. The hangers-on comprise a rich mix of families whose secrets and failings provide the drama as well as some light touches. Newman plays Max Roby, the wily and irreverent patriarch of one of those families, whose unkempt beard is reputed to be littered with cracker crumbs. Newman gets fifth billing and disappears for a long stretch when Max runs off to Florida with a senile priest. Other members of the cast include Ed Harris, Philip Seymour Hoffman, Helen Hunt, Robin Wright Penn, Aidan Quinn — and Newman's wife, Joanne Woodward, in a rare villainess role as the heiress who wields malevolent power over some of the town's residents. Having also played an old-timer in the adaptation of another Russo novel, \" Nobody's Fool, \" Newman read \" Empire Falls \" with more than the usual interest. \" An extraordinary book, \" the actor said in an interview. \" I know there was a lot of interest in making like a two- hour film out of it, and I thought that would truncate all the values in it. It had to be done in a longer format. No major studio 1 wants to make a 3- hour, 3/2-hour film. \" HBO had no such qualms. As an executive producer, Newman helped line up the stellar cast, and he insisted that \" Empire Falls \" be shot in Maine. \" That's where it was set in the mind of Russo, and that's where we shot it, \" he said. \" We would have saved a little money by going to Canada, but I think the film would have suffered. And I think there's an obligation whenever it's possible that we should shoot here in the United States. \" One of the first Method actors to become a movie star, Newman is a stickler for realism. He grew a vagrant-style beard for the role of Max, but it didn't last long. \" Joanne made me shave the homeless part off first. Then she got the rest of it; I should really say while I was sleeping, \" he joked during a telephone chat from his home in Westport, Conn. \" She was not enamored with it. \" Copyright 2005, 2007, American Press. All Rights Reserved."}, {"article_id": "125606116", "match_score": 67.09956709956711, "source": "Daily Hampshire Gazette [30 Day Embargo] (Northampton, MA)", "date": "May 20, 2005", "window_summary": "The archive excerpt briefly notes that Robin Wright Penn also stars in the film White Oleander, mentioned among other TV/movie listings.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full TV listing describes White Oleander and identifies Robin Wright Penn as one of the film's principal actresses, presented neutrally as part of the cast.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "for a crime of the convict does All she can to influence her daughter against one maternal sur Rogate Renee Robin Wright Penn also Law order special victims unit 11 once 0 Mary Stuart Masterson guest stars in weak As a psychiatrist", "newsbank_text": "Baseball's first foray into interleague play in 2005 is this weekend, and one of the more intriguing matchups (other than Mets-Yankees) is the one in Boston between the Red Sox and Atlanta Braves. Just like last season when it led the league, Boston's offense is piling up the runs scored, headed by the two-headed \"Z\" monster of Manny Ramirez and David Ortiz. Their presence will put extra pressure on the Braves' always reliable pitching staff. 7 p.m. TBS 8 p.m. WB What I Like About You Holly (Amanda Bynes) panics when Vince (Nick Zano), upset at the sight of her in her ex's arms, decides to go away for the summer. Val (Jennie Garth) gets drunk after learning her former fiance has married someone else and wakes up to discover she apparently did the same. Leslie Grossman and Wesley Jonathan also star in the season finale, \"Enough Is Enough.\" Law & Order: Trial by Jury Kibre and Gaffney (Bebe Neuwirth, Amy Carlson) have three suspects in a young woman's rape and murder, one of whom is her ex-boyfriend (guest star Ebon Moss-Bachrach). They try to get at the truth by playing the three against one another, and the ex appears to be the most truthful of the trio, prompting Kibre to consider a deal. Warren Blosjo and Adam LaVorgna also guest star in \"Truth or Consequences.\" 10 p.m. NBC At the movies: The Muppets' Wizard of Oz This is not your father's \"Wizard,\" or even your older brother's \"The Wiz.\" It's a totally Muppetational retelling of the Oz tale. Kermit as the Scarecrow, Fozzie as the Lion, Gonzo as the Tin Man -- er, Thing -- and Pepe the Prawn as Toto accompany Dorothy (Ashanti) on her quest to ask the Wizard (Jeffrey Tambor) not for a trip back to Kansas, but for showbiz stardom. Queen Latifah and David Alan Grier also star. 8 p.m. ABC White Oleander Janet Fitch's novel becomes a showcase for four fine actresses in this engrossing 2002 drama. Relative newcomer Alison Lohman (\"Matchstick Men\") admirably holds her own as a teenager sent to several foster homes after her mother (Michelle Pfeiffer) draws a life sentence for a crime of passion. The convict does all she can to influence her daughter against one maternal surrogate (Renee Zellweger). Robin Wright Penn also stars. 9 p.m. LIFETIME Copyright 2005, 2009, Daily Hampshire Gazette, All Rights Reserved."}, {"article_id": "259079614", "match_score": 66.92607003891051, "source": "Fort Worth Star-Telegram (TX)", "date": "April 8, 2005", "window_summary": "The archive window is a celebrity birthday listing that shows actress Robin Wright Penn is 39.", "window_context": "personal_life", "window_tone": "neutral", "fulltext_summary": "The full item is a 'Celebrity birthdays' compilation that lists Robin Wright Penn with her age (39) among other entertainers' birthdays.", "fulltext_context": "personal_life", "fulltext_tone": "neutral", "archive_window": "today s birthdays comedian Shecky Greene is 79. Singer actor John Schneider is 45. Singer Julian Lennon is 42 actress Robin Wright Penn is 39. Actress Patricia Arquette is 37. Knight Ridder news Philadelphia the dec Sion yesterday to withdraw the painkiller", "newsbank_text": "Newsmakers * WFAA/Channel 8 won a Peabody Award on Thursday for \"State of Denial,\" its 19-part series on questionable practices by state agencies and insurance companies involved with Texas' workers compensation system. The awards are given by the University of Georgia for broadcasting excellence. * Dave Stewart's piano sold for $6,740 in an auction. A note signed by Stewart, who co-founded the Eurythmics with Annie Lennox, said: \"I have watched the Bechstein piano being played by so many legends, from Bob Dylan, Jodi [sic] Mitchell, Paul McCartney, Brian Ferry and of course Annie, who played it all the time.\" * Sharon Osbourne and daughter Aimee, 21, who last week canceled a London production of The Vagina Monologues, have announced why they did it: Aimee -- she's the Osbourne who had the smarts not to subject herself to the circus of a reality show Ozzy's clan had on MTV -- had a lump removed from a breast. No indication whether it was benign or malignant. Pitt joins Bono Irish singer Bono has enlisted the help of actor Brad Pitt and a gaggle of celebrities to produce a series of public- service ads aimed at raising awareness and money to fight poverty and AIDS in Africa. Pitt visited the AIDS-ravaged continent and says he's determined to help. \"I've seen it, I've been there, and to walk away from it and turn my back makes me culpable,\" the Troy star said. \"And I can't do that. Do we really believe in our hearts that we're all equal? And if we believe this, what are we going to do about it?\" A 60-second ad will begin airing on various networks Sunday and features Jewel, Penelope Cruz, Tom Hanks, Mos Def, Al Pacino, Jamie Foxx and evangelist Pat Robertson. Frida Kahlo's dresses A two-year renovation project at the home-turned-museum of legendary Mexican painter Frida Kahlo has uncovered a vast wardrobe of previously undiscovered clothing and other valuable artifacts. The home was commonly known as the Blue House because of its indigo external paint job. Kahlo and her husband, famed muralist Diego Rivera, lived in the home in the Mexican capital's fashionable Coyoacan neighborhood until her death in 1954. Rivera turned it into a museum four years after his wife's death, but it wasn't until work to restore private areas began last summer that officials found the 180 articles of clothing. Celebrity birthdays Former first lady Betty Ford is 87. Comedian Shecky Greene is 79. Basketball Hall-of-Famer John Havlicek is 65. Peggy Lennon (Lennon Sisters) is 64. Steve Howe (Yes) is 58. Actor John Schneider is 45. Singer Julian Lennon is 42. Actress Robin Wright Penn is 39. Actress Patricia Arquette is 37. Selena tribute a decade later Univision talk show host Christina Saralegui arrives for Thursday's Selena tribute in Houston, headlined by Gloria Estefan. A CD and DVD of the three-hour event is scheduled for release May 10. Notable death on this date 1973 Artist Pablo Picasso died at his home near Mougins, France, at age 91. SAY ANYTHING \"Let the Boy Georges and the George Michaels of the world get up in a twist about it if they don't have the intelligence to see his intelligence.\" -- Elton John, on his appreciation in Rolling Stone of Eminem as one of the greatest figures of rock 'n' roll \"despite all the nonsense talked about his being homophobic\" Compiled by Jim Davis from staff and wire reports -eoptag- #-PHOTO- 1. Photo: THE ASSOCIATED PRESS/BRETT COOMER Selena tribute 2. Photo: THE ASSOCIATED PRESS/BRETT COOMER Selena tribute Copyright 2005 Star-Telegram, Inc."}, {"article_id": "264381382", "match_score": 66.796875, "source": "Associated Press News Service, The", "date": "April 8, 2005", "window_summary": "The archive window is a birthdays/anniversaries listing that identifies actress Robin Wright Penn and gives her age.", "window_context": "personal_life", "window_tone": "neutral", "fulltext_summary": "The full item is an AP 'This Day' birthday entry including Robin Wright Penn among notable birthdays, providing only name and age without commentary.", "fulltext_context": "personal_life", "fulltext_tone": "neutral", "archive_window": "Greene 79 actor John Schneider 45 Singer Julian Lennon 42 Singer musician Donita Sparks l742 rapper Biz Markie 41 actress Robin Wright Penn 39 actress Patricia Arquette 37 actor Taran Noah Smith 21.hie list some guests invited to Prince Charles and Camilla", "newsbank_text": "Today is Friday, April 8, the 98th day of 2005. There are 267 days left in the year. Today's Highlight in History: On April 8, 1974, Hank Aaron of the Atlanta Braves hit his 715th career home run in a game against the Los Angeles Dodgers, breaking Babe Ruth's record. The round-tripper was off pitcher Al Downing. On this date: In 1513, explorer Juan Ponce de Leon claimed Florida for Spain. In 1935, the Works Progress Administration was approved by Congress. In 1946, the League of Nations assembled in Geneva for the last time. In 1952, President Truman seized the steel industry to avert a nationwide strike. In 1970, the Senate rejected President Nixon's nomination of G. Harold Carswell to the U.S. Supreme Court. In 1973, artist Pablo Picasso died at his home near Mougins, France, at age 91. In 1981, Gen. Omar N. Bradley died in New York at age 88. In 1990, Ryan White, the teenage AIDS patient whose battle for acceptance gained national attention, died in Indianapolis at age 18. In 1993, singer Marian Anderson died in Portland, Ore., at age 96. In 1994, Kurt Cobain, singer and guitarist for the grunge band Nirvana, was found dead in Seattle from an apparently self-inflicted gunshot wound; he was 27. Ten years ago: Former secretary of defense Robert S. McNamara, in an interview with AP Network News and Newsweek magazine to promote his memoirs, called America's Vietnam War policy ''terribly wrong.'' Five years ago: The Central Intelligence Agency confirmed that personnel action had been taken following the mistaken bombing of the Chinese embassy during the NATO war against Yugoslavia; one employee was reportedly fired. Actress Claire Trevor died in Newport Beach, Calif. One year ago: National security adviser Condoleezza Rice told the Sept. 11 commission ''there was no silver bullet'' that could have prevented the 2001 terrorist attacks. Iraqi insurgents released a videotape of three Japanese captives, threatening to burn them alive if Japan did not withdraw its troops from Iraq. (The hostages were later released unharmed.) Fred Olivi, who copiloted the plane that dropped the atomic bomb on Nagasaki, died in Lemont, Ill., at age 82. Today's Birthdays: Former first lady Betty Ford is 87. Comedian Shecky Greene is 79. Investigative reporter Seymour Hersh is 68. Basketball Hall-of-Famer John Havlicek is 65. Singer J.J. Jackson is 64. Singer Peggy Lennon (The Lennon Sisters) is 64. Songwriter-producer Leon Huff is 63. Actor Hywel Bennett is 61. Actor Stuart Pankin is 59. Rock musician Steve Howe (Yes) is 58. Rock musician Mel Schacher (Grand Funk Railroad) is 54. Baseball Hall- of-Famer Gary Carter is 51. Actor John Schneider is 45. Rock musician Izzy Stradlin is 43. Singer Julian Lennon is 42. Rock singer-musician Donita Sparks (L7) is 42. Rapper Biz Markie is 41. Actress Robin Wright Penn is 39. Actress Patricia Arquette is 37. Rock singer Craig Honeycutt (Everything) is 35. Rock musician Darren Jessee is 34. Actor Taran Noah Smith is 21. Actress Kirsten Storms is 21. Thought for Today: ''A highbrow is a person educated beyond his intelligence.'' - James Brander Matthews, American author and educator (1852-1929). Copyright (c) 2005 The Associated Press All Rights Reserved"}, {"article_id": "163000925", "match_score": 66.52719665271967, "source": "Paradise Post (CA)", "date": "November 9, 2005", "window_summary": "The archive window credits Robin Wright (with Dana Priest) as a Washington Post reporter on a story about Dick Cheney and detainee policy.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The column cites reporting by Dana Priest and Robin Wright alleging that Vice President Cheney waged an internal campaign to limit oversight of detainee treatment, portraying Wright as an investigative journalist.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "seabourn cruise it 4 Sti if x in ajl Norv Cheney pushes for leeway on detainees by Dana priest and Robin Wright the Washington Post Washington Over the past vice presi Dent Dick Cheney has waged an intense and largely unpublicized Campaign", "newsbank_text": "Former President Jimmy Carter has been on many radio and TV broadcasts lately. His new book, \"Our Endangered Values,\"probes new territory for him.When Carter vehemently disagrees with someone's point of view, he's usually civil to a fault. This time out, he's polite but unafraid to chasten the Bush administration on several issues as well as chidethereligious right for hijacking religion and spirituality. I had to laugh when media host Bill O'Reilly called Carter an interloper undermining the esprit de corps of the nation. Many on the right have said the same. On most issues, Carter's about as common-sense asone can get. Space doesn't allow for the many deserved accolades Carter has accrued. His sense of Christian noblesse oblige is legendary; his projects include helping to try to ameliorate AIDS, Guinea worm disease and river blindness disease on the African continent. His philanthropy has earned him the Nobel Peace Prize. In short, he walks his talk. He said under President George W. Bush, we have for the first time in our history adopted the doctrine of pre- emptive war. This is a violation of several treaties we have authored and/or signed with various countries in our earlier history and more recently with the United Nations. This is killing our chances at influencing others for the good overseas, particularly (though not exclusively) in the Arab/Muslim world. Catrter said he and wife, Roselyn, left the Southern BaptistChurch a few years ago because it espoused what many in the religious right are doing - breaking down the wall of separation between church and state that Thomas Jefferson said was so essential to our republic. The religious right contends the Repub-lican Party is somehow aligned with Christianity.Carter said his churchstarted to promotethe subjugation of women andmandated every leader tosign on to the idea that you follow what the head of the churchsaid without question. The Carters said no thanks. Good choice. Carter also agreed with the Democratsusing an arcanerule to close the Senate down last week until the Republican majority agreed to do what they'd promised almost one and a half years ago: begin phase two of the inquiry into the lead-up to the Iraq war. I can understand the GOP's reluctance. They're protecting the administration. This time it won't work. Many Republican constituentsare angry, and come 2008, all of the House and a third of the Senateare up for re-election. *** I recently mentioned the U.S. Senate passing a bill (90-9) to stop torture of enemy combatants. Introduced by Sen. John McCain, (R-Ariz.) the bill limits the military's detention and interrogation tactics to those expressed in the Army Field Manual. It prohibits all U.S. government employees from \"using cruel, inhuman or degrading treatments.\" The House of Representatives has enough Republicans to override a Bush veto. Now more has come to light that we're \"outsourcing\" torture to what are called \"black sites.\" Bush andCheney argue if the CIA (instead of the military) does the dirty deed and does it in a foreign country, it somehow makes the punishment socially palliative, or at least satiates the \"hawks,\" and thosesaddled with a conscience be damned. I've heard both sides argue the law is on their side. I honestly don't know legally, but morally I do. Monday, Dana Priest and Robin Wright of the Washington Post wrote, \"(Vice President) Cheney has waged an intense and largely unpublished campaign to stop Congress, the Pentagon and the State Department from imposing restrictive rules on terrorist suspects. His staff have tried to have meetings canceled or at least slow things down to gum up the works. They will conduct meetings without other key Cabinet members. One administration official said some internal memos and e-mail from the National Security Councilstaff to the N.S.C. advisor were automatically forwarded toCheney's office - in some cases without the knowledge of the authors.\" Sen. Jay Rockefeller, D-W.Va., said he's been pushing for a year to get information on the issue but, \"The White House has made it clear that anyone who suggests oversight is deemed unpatriotic.\" It just never ends. *** David Sirota of Huffing-tonPost.com writes, \"The legalized bribery in D.C. has gotten down to a scientific formula: 'Work for Congress for a few years, leave to start a private consulting firm, pick up a few large corporate clients, and have those clients donate money back to the senator's campaigns.\" Conversely, look at Montana's congressional delegation: Demo-cratic Gov. Brian Schweitzer says he won't employ registered lobbyists in the state government. He's also moving on a statewide initiative to force lobbying and ethics reform. Congressman George Miller, D-Calif., and Sen. Russ Feingold, D-Wis., have similar bills in the U.S. House and Senate respectively. We need this and much more of the same - desperately. *** David Paul Brown is a Paradise resident who loves politics. (c) 2005 Paradise Post. All rights reserved. Reproduced with the permission of Media NewsGroup, Inc. by NewsBank, Inc."}, {"article_id": "302806799", "match_score": 66.37554585152839, "source": "Anniston Star, The (AL)", "date": "September 4, 2005", "window_summary": "The snippet identifies Robin Wright Penn as one of the principal performers in the film \"Nine Lives.\"", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "Within a broader movie preview/season roundup, the article names Robin Wright Penn among the cast of \"Nine Lives,\" treating her listing as informational alongside many other film mentions.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "a a a vie. The crises of nine disparate women Are examined with Holly Hunter Glenn close Sissy Spacek and Robin Wright Penn. 1 55a Hilldale. Side effects a a popular hit at the Wisconsin film festival the movie offers a satirical", "newsbank_text": "The Dukes have roared past, sucking millions of IQ points behind them in a cloud of dust. Deuce Bigalo found the currency exchange from U.S. dollars to the euro wasn't as good as he'd hoped. The Wedding Crashers barged into the super-hit party, leaving laughing money counters in their wake. Now, though, the we-just-wanna-have-fun days of summer are over and the we-want-quality days of fall and winter are right around the corner. Right. As happens every year, Hollywood doles out the dumbness during hot days, then - supposedly - farms out the philosophy and finer things in the cooler months. Movie attendance was way down during the summer (although it was more than made up for through DVD sales), so studios are hoping for a better Christmas present over the next few months (to add to the massive DVD sales that will preface Christmas). To achieve that end, many thoughtful films will be released, including Memoirs of a Geisha, Chicago director Rob Marshall's take on the bestseller; Roman Polanski's look at the Dickens classic Oliver Twist; and Steven Spielberg's Munich, which details the killing of 11 Israeli athletes at the 1972 Olympics. You've also got big-budget extravaganzas in the pipeline (Hollywood just can't resist special effects) with the fourth installment in the Harry Potter saga, Harry Potter and the Goblet of Fire, as well as King Kong, the first film by director Peter Jackson since he finished The Lord of the Rings trilogy. And, with hopes riding high after the success of The Lord of the Rings comes The Chronicles of Narnia: The Lion, the Witch and the Wardrobe, the first time the classic C.S. Lewis fantasy novel has been brought to the big screen (and what studio execs hope is the first in a series, since Lewis wrote nine Narnia books). This being Hollywood, however, stupidity, sequels and remakes are never too far away. Steve Martin is back as the harried dad Cheaper By the Dozen 2 (clever title), Yours, Mine and Ours, a remake of a 1968 Lucille Ball/Henry Fonda comedy; comes with Dennis Quaid, Rene Russo and 18 kids. Friday An Unfinished Life: A reclusive rancher (Robert Redford) is reunited with his estranged daughter-in-law (Jennifer Lopez). Morgan Freeman co-stars. This one was supposed to come out last fall, not a good sign when a film is pushed back an entire year. The Exorcism Of Emily Rose: A lawyer (Laura Linney) defends a priest (Tom Wilkinson) accused in the death of a girl who underwent an exorcism. Man, you try to help and look what happens. The Man: A fed (Samuel L. Jackson) teams with a dental-supply guy (Eugene Levy) to solve an agent's murder in this buddy comedy. Not much bite. Junebug: Big city art dealer (Embeth Davidtz) meets her new in-laws, clashing with their rural North Carolina lifestyle. Wasn't this already done? Oh yeah, they called it Sweet Home Alabama. Yes: Writer-director Sally Potter makes daring use of iambic pentameter in a dull story of infidelity and cultural bias. With Joan Allen (The Upside of Anger). End Game: Secret Service agent (Cuba Gooding Jr.) and journalist (James Woods) investigate a presidential assassination. Maybe they should look into what happened to Gooding's career. Sept. 16 Lord Of War: An arms dealer (Nicolas Cage) faces a crisis of conscience as he's pursued by an Interpol agent (Ethan Hawke). One of those movies that Cage makes in between check-cashing stinkers like National Treasure and Gone in 60 Seconds. Proof: After her brilliant dad's death, a woman (Gwyneth Paltrow) worries she's inherited his madness. Based on the Pulitzer Prize-winning stage play. Just Like Heaven: A man encounters romance from beyond when a ghostly woman (Reese Witherspoon) keeps appearing in his apartment. Doesn't that fall under the pest-control part of the lease? The Woods: An all-girls private school in the 1950s is menaced by something coming from you-know-where. Cry Wolf: Teens spreading online rumors about a serial killer find the story coming true when classmates begin turning up dead. And they say blogs are dangerous. Hellbent: A gay slasher movie. The first one, believe it or not. Asylum: The wife (Natasha Richardson) of a psychiatrist becomes sexually obsessed with a patient. Sounds like a bad idea. Sept. 23 Flightplan: A widow (Jodie Foster) insists her 6-year-old daughter vanished on a trans-Atlantic flight - all evidence to the contrary. First Panic Room, now this; is there something about claustrophobia that Jodie likes? Tim Burton's Corpse Bride: The Nightmare Before Christmas-style flick, a man is sucked into the underworld to wed a dead chick. Features the voices of Johnny Depp and Helena Bonham Carter. The Thing About My Folks: Tragedy sends a father (Peter Falk) and son (screenwriter Paul Reiser) on a wacky road trip to self-discovery. Mad About You, You Old Geezer. Roll Bounce: Bow Wow stars as an underdog skater competing in a showdown at a glitzy roller rink. Man, what can you say that could make it sound any worse? Eternal: Lesbian vampires. No, really. Sept. 30 Oliver Twist: Roman Polanski updates Dickens' tale of an orphan's misadventures among rascals and pickpockets. Ben Kingsley plays the sinister Fagin. No musical numbers this time around. A History of Violence: A family man (Viggo Mortensen) becomes a media hero when he kills criminals in self- defense. Since this is directed by David Cronenberg, you know it's going to be kind of creepy and unsettling. Serenity: Joss Whedon resurrects his failed TV show Firefly with this sci-fi tale of a vagabond spaceship carrying two mysterious passengers. Into The Blue: Divers hunting for treasure on a sunken ship find danger instead. With Jessica Alba and Paul Walker. Alba in a bikini, anyone? Mirrormask: The Jim Henson Co. works its visual magic in a tale of a teenage girl whisked to a fantasy land controlled by a scheming queen. Sometime September The Libertine: Johnny Depp lives out the wanton life of the scandalous 17th century Earl of Rochester. And we all know about the wildness of the Earl of … what was that again? Green Street Hooligans: An expelled Harvard student (Elijah Wood) moves to London, where he's caught up in the menacing madness of soccer. Oooh, what comes after hooligan - soccer scalawag? Capote: Philip Seymour Hoffman is perfectly cast as author Truman Capote, focused on the years he researched and authored In Cold Blood. Oct. 7 Everything Is Illuminated: A man seeks to find a Ukranian woman who saved his grandfather during the Holocaust. Elijah Wood stars. In Her Shoes: Estranged sisters (Cameron Diaz and Toni Collette) reconnect with help from a mystery grandma (Shirley MacLaine). Curtis Hanson directs. Wallace & Gromit: The Curse Of The Were-Rabbit: Britain's favorite cheese-lover and his loyal dog square off against a monster bunny in this clay-animated comedy. Two for the Money: A washed-up football star (Matthew McConaughey) takes a job with a big-time sports bookie (Al Pacino). The Gospel: The market for African-American films with spiritual themes was opened by Diary of a Mad Black Woman. Oct. 14 Elizabethtown: Films by Cameron Crowe (Almost Famous, Jerry Maguire) are almost always award bait. In this one, Orlando Bloom plays a failed businessman returning home for his father's funeral. Kirsten Dunst is the free-spirited flight attendant helping him smile. Domino: Postponed from earlier release by the drug overdose death of its subject, Domino Harvey, daughter of actor Laurence Harvey and a former fashion model who became a bounty hunter. Keira Knightley plays Domino, directed by action specialist Tony Scott (Man on Fire, True Romance). The Fog: John Carpenter, who made the original in 1980, signed off on Rupert Wainwright's remake, set in a fishing village haunted by ghost pirates. The Prize Winner Of Defiance, Ohio: A mother of 10 (Julianne Moore) helps pay the bills by entering 1950s musical jingle contests. With 10 kids, how does she have any spare time? Woody Harrelson co-stars. Oct. 21 Doom: The Rock leads a team of futuristic Marines against deadly creatures on Mars in this adaptation of the video game. And video game adaptations are always way wicked, don'cha know? Derailed: Clive Owen and the most fabulous jilted woman in Hollywood, Jennifer Aniston, play lovers married to other people, blackmailed by a violent criminal. Stay: A psychiatrist races to prevent a patient from making good on a threat to commit suicide. With Ewan McGregor and Naomi Watts. Directed by Marc Forster (Monster's Ball, Finding Neverland). Dreamer: Story of a father (Kurt Russell) and daughter (Dakota Fanning) nursing a horse from injuries to the Breeders Cup. Sound familiar? Sure it does; it's \"based\" on a true story. Thumbsucker: A 17-year-old (Justin Pucci) still has a penchant for sucking his thumb. Wow. What more can you say? Oct. 28 The Weather Man: Nicolas Cage is back as a Chicago TV meteorologist who can't predict the weather or what what's going to happen in his life. Saw II: A cop (Donnie Wahlberg) discovers that a maniacal serial killer is back in business in the follow-up to last year's horror hit. What, they didn't saw off enough parts in the first one? Prime: Uma Thurman plays a woman dating the son of her psychoanalyst (Meryl Streep) in a romantic comedy. Sure, sounds like a plan. The Legend of Zorro: Semi-retired, Zorro (Antonio Banderas) whips out his sword again to help the helpless. Catherine Zeta-Jones also returns. Sometime October North Country: A single mother (Charlize Theron) leads a sexual-harassment crusade on behalf of female co-workers at a mining company. Theron might be going for that Erin Brokovich Oscar. Good Night, And Good Luck: George Clooney directs and co-stars in the story of newsman Edward R. Murrow (David Strathairn) as he battles the communist witch hunt. Nov. 4 Chicken Little: The falling sky is actually UFOs sending a plucky chicken (voice of Zach Braff) into hysterics. Jarhead: Oscar winner Sam Mendes (American Beauty) presents the most potentially explosive film of the season, based on Anthony Swofford's chronicle of serving in the Persian Gulf War of 1991. Oscar winner Jamie Foxx, Jake Gyllenhaal and Peter Sarsgaard are foxhole buddies. Any resemblance to today's conflicts in Iraq and Afghanistan is purely intentional. The Family Stone: Craig T. Nelson and Diane Keaton welcome home their son (Luke Wilson), and are less hospitable to his new girlfriend (Sarah Jessica Parker). Monster-in-Law Lite. The Matador: Too old to be Bond, Pierce Brosnan plays an aging hit man who meets a depressed businessman (Greg Kinnear) during an assignment in Mexico. Nov. 9 Get Rich Or Die Tryin': Rapper 50 Cent stars as a street punk who abandons drug dealing for music. Jim Sheridan directs. A hit album means you're an actor? Nov. 11 The New World: Colin Farrell plays 17th century explorer John Smith, whose romance of Pocahontas ruffles relations among settlers and American Indians. Bee Season: An overlooked daughter is thrown into the limelight when she becomes a spelling champ. With Richard Gere and Juliette Binoche. Zathura: A board game comes to life, propelling two children into an outer space adventure. Kiss Kiss, Bang Bang: Robbery gone awry gives a thief (Robert Downey Jr.) a movie audition and a lesson in sleuthing with a detective (Val Kilmer). Nov. 18 Harry Potter And The Goblet Of Fire: Do you really need to know the details? Pride & Prejudice: Keira Knightley stars in Jane Austen's classic of love and class warfare in 18th century Britain. With Donald Sutherland and Brenda Blethyn. Walk The Line: Joaquin Phoenix plays the man in black, Johnny Cash, in the story of the country legend's early years. With Reese Witherspoon as June er con men. King Kong: A small-town ape goes to the big city and makes a spectacle of himself in Peter Jackson's update of the 1930s classic. No set date, but on the list The Chumscrubber: A teen (Jamie Bell) stoically copes with the suicide of his best friend, a drug peddler. With Glenn Close and Ralph Fiennes. Daltry Calhoun: A teen musical prodigy suddenly re-enters the life of her estranged dad, a golf-club magnate (Johnny Knoxville). You know that anything with Knoxville is Mensa-level material. Nine Lives: Crises of nine disparate women are examined. With Holly Hunter, Glenn Close, Sissy Spacek and Robin Wright Penn. The Squid And The Whale: Marriage and parenthood are on the rocks between two Brooklyn writers (Jeff Daniels and Laura Linney). A title destined for greatness. Where The Truth Lies: A reporter (Alison Lohman) probes the dark secrets behind the breakup of a musical-comedy duo (Kevin Bacon and Colin Firth). Atom Egoyan directs. Syriana: George Clooney's an ex-CIA guy and Matt Damon's an oil exec in this political thriller with a Traffic-like ensemble cast. The White Countess: Ralph Fiennes stars in a tale of decadence and redemption in 1930s Shanghai. From director James Ivory and his late producing partner Ismail Merchant. Brokeback Mountain: Cowboy lovers (Heath Ledger and Jake Gyllenhaal) maintain their secret bond through marriage and fatherhood. Ang Lee directs. Casanova: The legendary womanizer (Heath Ledger) chases the one woman (Sienna Miller) who has rejected him. Lasse Hallstrom directs. Wow, gay guy in one movie, super-stud in next; that Ledger is quite an actor. Cheaper By The Dozen 2: Dad and mom (Steve Martin and Bonnie Hunt) take a vacation with their 12 kids. Fun With Dick And Jane: A couple (Jim Carrey and Tea Leoni) turns to thievery after hard times strike in this remake of the 1970s romp. Match Point: Woody Allen spins a drama of an Irish tennis pro (Jonathan Rhys-Meyers) whose cozy life is jeopardized by a fling with an actress inton Kelly surprise four of their past makeover subjects to see whether they've kept up their new looks. 9 p.m. TLC Arrested Development Michael (Jason Bateman) wants George Sr. (Jeffrey Tambor) out of the model home's attic because an inspector is coming. Gob (Will Arnett) tries to help, but his efforts backfire in a big way. Ann and George Michael (Mae Whitman, Michael Cera) organize a movie boycott, which also backfires. Alia Shawkat, Portia de Rossi and David Cross also star in \"Righteous Brothers.\" 9:30 p.m. FOX Crossing Jordan Two deaths at the airport have the authorities wondering if a killer virus hitched a ride on an international flight. Garret (Miguel Ferrer) determines that both victims -- a passenger and a baggage handler -- died of drug overdoses. Woody (Jerry O'Connell) thinks the deaths are related and possibly linked to a smuggling ring. Jordan (Jill Hennessy) suspects an elderly man's death was an assisted suicide in \"Gray Murders.\" 10 p.m. NBC At the movies: Forrest Gump Tom Hanks stars in the feel-good blockbuster of 1994. Simple-minded Forrest (Hanks) takes a head- on approach to life and becomes a Vietnam War hero, millionaire entrepreneur and witness to history. Sally Field co-stars as Forrest's protective mother, Robin Wright plays his love interest, and Gary Sinise is his reluctant buddy. The film won six Academy Awards. 8 p.m. TNT Copyright 2005, 2009, Daily Hampshire Gazette, All Rights Reserved."}, {"article_id": "302934694", "match_score": 66.23931623931624, "source": "Anniston Star, The (AL)", "date": "September 4, 2005", "window_summary": "The archive window says the film Nine Lives (examining crises of nine women) features Robin Wright Penn among its ensemble cast.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "In a seasonal movie preview, the full article lists Nine Lives and names Robin Wright Penn as one of several prominent actresses in the ensemble; she is presented neutrally as part of the cast.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "it it it a. The crises of nine disparate women Are examined. With Holly Hunter Glenn close. Sissy Spacek and Robin Wright Penn. 1 55a Hilldale. Pride amp prejudice it it it it Keira Knightley gets a Chance to be charmingly opinionated", "newsbank_text": "The Dukes have roared past, sucking millions of IQ points behind them in a cloud of dust. Deuce Bigalo found the currency exchange from U.S. dollars to the euro wasn't as good as he'd hoped. The Wedding Crashers barged into the super-hit party, leaving laughing money counters in their wake. Now, though, the we-just-wanna-have-fun days of summer are over and the we-want-quality days of fall and winter are right around the corner. Right. As happens every year, Hollywood doles out the dumbness during hot days, then - supposedly - farms out the philosophy and finer things in the cooler months. Movie attendance was way down during the summer (although it was more than made up for through DVD sales), so studios are hoping for a better Christmas present over the next few months (to add to the massive DVD sales that will preface Christmas). To achieve that end, many thoughtful films will be released, including Memoirs of a Geisha, Chicago director Rob Marshall's take on the bestseller; Roman Polanski's look at the Dickens classic Oliver Twist; and Steven Spielberg's Munich, which details the killing of 11 Israeli athletes at the 1972 Olympics. You've also got big-budget extravaganzas in the pipeline (Hollywood just can't resist special effects) with the fourth installment in the Harry Potter saga, Harry Potter and the Goblet of Fire, as well as King Kong, the first film by director Peter Jackson since he finished The Lord of the Rings trilogy. And, with hopes riding high after the success of The Lord of the Rings comes The Chronicles of Narnia: The Lion, the Witch and the Wardrobe, the first time the classic C.S. Lewis fantasy novel has been brought to the big screen (and what studio execs hope is the first in a series, since Lewis wrote nine Narnia books). This being Hollywood, however, stupidity, sequels and remakes are never too far away. Steve Martin is back as the harried dad Cheaper By the Dozen 2 (clever title), Yours, Mine and Ours, a remake of a 1968 Lucille Ball/Henry Fonda comedy; comes with Dennis Quaid, Rene Russo and 18 kids. Friday An Unfinished Life: A reclusive rancher (Robert Redford) is reunited with his estranged daughter-in-law (Jennifer Lopez). Morgan Freeman co-stars. This one was supposed to come out last fall, not a good sign when a film is pushed back an entire year. The Exorcism Of Emily Rose: A lawyer (Laura Linney) defends a priest (Tom Wilkinson) accused in the death of a girl who underwent an exorcism. Man, you try to help and look what happens. The Man: A fed (Samuel L. Jackson) teams with a dental-supply guy (Eugene Levy) to solve an agent's murder in this buddy comedy. Not much bite. Junebug: Big city art dealer (Embeth Davidtz) meets her new in-laws, clashing with their rural North Carolina lifestyle. Wasn't this already done? Oh yeah, they called it Sweet Home Alabama. Yes: Writer-director Sally Potter makes daring use of iambic pentameter in a dull story of infidelity and cultural bias. With Joan Allen (The Upside of Anger). End Game: Secret Service agent (Cuba Gooding Jr.) and journalist (James Woods) investigate a presidential assassination. Maybe they should look into what happened to Gooding's career. Sept. 16 Lord Of War: An arms dealer (Nicolas Cage) faces a crisis of conscience as he's pursued by an Interpol agent (Ethan Hawke). One of those movies that Cage makes in between check-cashing stinkers like National Treasure and Gone in 60 Seconds. Proof: After her brilliant dad's death, a woman (Gwyneth Paltrow) worries she's inherited his madness. Based on the Pulitzer Prize-winning stage play. Just Like Heaven: A man encounters romance from beyond when a ghostly sica Alba and Paul Walker. Alba in a bikini, anyone? Mirrormask: The Jim Henson Co. works its visual magic in a tale of a teenage girl whisked to a fantasy land controlled by a scheming queen. Sometime September The Libertine: Johnny Depp lives out the wanton life of the scandalous 17th century Earl of Rochester. And we all know about the wildness of the Earl of … what was that again? Green Street Hooligans: An expelled Harvard student (Elijah Wood) moves to London, where he's caught up in the menacing madness of soccer. Oooh, what comes after hooligan - soccer scalawag? Capote: Philip Seymour Hoffman is perfectly cast as author Truman Capote, focused on the years he researched and authored In Cold Blood. Oct. 7 Everything Is Illuminated: A man seeks to find a Ukranian woman who saved his grandfather during the Holocaust. Elijah Wood stars. In Her Shoes: Estranged sisters (Cameron Diaz and Toni Collette) reconnect with help from a mystery grandma (Shirley MacLaine). Curtis Hanson directs. Wallace & Gromit: The Curse Of The Were-Rabbit: Britain's favorite cheese-lover and his loyal dog square off against a monster bunny in this clay-animated comedy. Two for the Money: A washed-up football star (Matthew McConaughey) takes a job with a big-time sports bookie (Al Pacino). The Gospel: The market for African-American films with spiritual themes was opened by Diary of a Mad Black Woman. Oct. 14 Elizabethtown: Films by Cameron Crowe (Almost Famous, Jerry Maguire) are almost always award bait. In this one, Orlando Bloom plays a failed businessman returning home for his father's funeral. Kirsten Dunst is the free-spirited flight attendant helping him smile. Domino: Postponed from earlier release by the drug overdose death of its subject, Domino Harvey, daughter of actor Laurence Harvey and a former fashion model who became a bounty hunter. Keira Knightley plays Domino, directed by action specialist Tony Scott (Man on Fire, True Romance). The Fog: John Carpenter, who made the e and largely unpublicized Campaign", "newsbank_text": "Former President Jimmy Carter has been on many radio and TV broadcasts lately. His new book, \"Our Endangered Values,\"probes new territory for him.When Carter vehemently disagrees with someone's point of view, he's usually civil to a fault. This time out, he's polite but unafraid to chasten the Bush administration on several issues as well as chidethereligious right for hijacking religion and spirituality. I had to laugh when media host Bill O'Reilly called Carter an interloper undermining the esprit de corps of the nation. Many on the right have said the same. On most issues, Carter's about as common-sense asone can get. Space doesn't allow for the many deserved accolades Carter has accrued. His sense of Christian noblesse oblige is legendary; his projects include helping to try to ameliorate AIDS, Guinea worm disease and river blindness disease on the African continent. His philanthropy has earned him the Nobel Peace Prize. In short, he walks his talk. He said under President George W. Bush, we have for the first time in our history adopted the doctrine of pre- emptive war. This is a violation of several treaties we have authored and/or signed with various countries in our earlier history and more recently with the United Nations. This is killing our chances at influencing others for the good overseas, particularly (though not exclusively) in the Arab/Muslim world. Catrter said he and wife, Roselyn, left the Southern BaptistChurch a few years ago because it espoused what many in the religious right are doing - breaking down the wall of separation between church and state that Thomas Jefferson said was so essential to our republic. The religious right contends the Repub-lican Party is somehow aligned with Christianity.Carter said his churchstarted to promotethe subjugation of women andmandated every leader tosign on to the idea that you follow what the head of the churchsaid without question. The Carters said no thanks. Good choice. Carter also agreed with the Democratsusing an arcanerule to close the Senate down last week until the Republican majority agreed to do what they'd promised almost one and a half years ago: begin phase two of the inquiry into the lead-up to the Iraq war. I can understand the GOP's reluctance. They're protecting the administration. This time it won't work. Many Republican constituentsare angry, and come 2008, all of the House and a third of the Senateare up for re-election. *** I recently mentioned the U.S. Senate passing a bill (90-9) to stop torture of enemy combatants. Introduced by Sen. John McCain, (R-Ariz.) the bill limits the military's detention and interrogation tactics to those expressed in the Army Field Manual. It prohibits all U.S. government employees from \"using cruel, inhuman or degrading treatments.\" The House of Representatives has enough Republicans to override a Bush veto. Now more has come to light that we're \"outsourcing\" torture to what are called \"black sites.\" Bush andCheney argue if the CIA (instead of the military) does the dirty deed and does it in a foreign country, it somehow makes the punishment socially palliative, or at least satiates the \"hawks,\" and thosesaddled with a conscience be damned. I've heard both sides argue the law is on their side. I honestly don't know legally, but morally I do. Monday, Dana Priest and Robin Wright of the Washington Post wrote, \"(Vice President) Cheney has waged an intense and largely unpublished campaign to stop Congress, the Pentagon and the State Department from imposing restrictive rules on terrorist suspects. His staff have tried to have meetings canceled or at least slow things down to gum up the works. They will conduct meetings without other key Cabinet members. One administration official said some internal memos and e-mail from the National Security Councilstaff to the N.S.C. advisor were automatically forwarded toCheney's office - in some cases without the knowledge of the authors.\" Sen. Jay Rockefeller, D-W.Va., said he's been pushing for a year to get information on the issue but, \"The White House has made it clear that anyone who suggests oversight is deemed unpatriotic.\" It just never ends. *** David Sirota of Huffing-tonPost.com writes, \"The legalized bribery in D.C. has gotten down to a scientific formula: 'Work for Congress for a few years, leave to start a private consulting firm, pick up a few large corporate clients, and have those clients donate money back to the senator's campaigns.\" Conversely, look at Montana's congressional delegation: Demo-cratic Gov. Brian Schweitzer says he won't employ registered lobbyists in the state government. He's also moving on a statewide initiative to force lobbying and ethics reform. Congressman George Miller, D-Calif., and Sen. Russ Feingold, D-Wis., have similar bills in the U.S. House and Senate respectively. We need this and much more of the same - desperately. *** David Paul Brown is a Paradise resident who loves politics. (c) 2005 Paradise Post. All rights reserved. Reproduced with the permission of Media NewsGroup, Inc. by NewsBank, Inc."}, {"article_id": "254864174", "match_score": 63.6734693877551, "source": "Morning Call, The (Allentown, PA)", "date": "November 10, 2005", "window_summary": "The archive excerpt names Robin Wright Penn among the ensemble cast of Nine Lives and says the cast does 'fine work.'", "window_context": "career", "window_tone": "positive", "fulltext_summary": "The article summarizes the film Nine Lives and includes Robin Wright Penn as part of an ensemble of notable actresses, presenting her inclusion as part of solid/commendable performances.", "fulltext_context": "career", "fulltext_tone": "positive", "archive_window": "of nine very different women. Some episodes resonate others Don t but a cast that includes Molly Parker Amanda Seyfried Robin Wright Penn Sissy Spacek Holly Hunter and Amy Brenneman does Fine work. Rated , sexual material
