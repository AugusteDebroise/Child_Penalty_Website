nd Francine’s late husband C.B. Whiting (Philip Seymour Hoffman). Russo, perhaps the most famous writer to live in Carbondale,", "newsbank_text": "\"Empire Falls\" will be shown tonight on HBO. Part One will be shown at 6 p.m. Part Two will be shown at 8 p.m. More information and other show times can be found at www.hbo.com/films/empirefalls. Former SIUC professor's novel comes to HBO with all-star cast Russo PR: PROVIDED / SIUC MEDIA AND COMMUNICATIONS SIUC file photo taken shortly after \"Empire Falls\" author Richard Russo joined the English Department. BY MARLEEN SHEPHERD THE SOUTHERN Richard Russo may not be a household name, but the former SIUC professor is quietly emerging as one of the best American novelists to capture small-town life. This weekend Russo's Pulitzer Prize-winning novel, \"Empire Falls,\" premieres as a two-part movie on HBO starring Ed Harris, Philip Seymour Hoffman, Helen Hunt, Paul Newman, Robin Wright Penn and Joanne Woodward. This humorous and poignant story of a declining New England town and its inhabitants describes the economic, social and moral battles of modern small-town America. Empire Falls, Maine, is struggling with the loss of its milling industry, class differences and the ghosts of the past. Protagonist Miles Roby (Harris) has tucked away his dreams to meet family obligations, like those to his father Max (Newman). Miles works as the manager of the Empire Grill, a restaurant owned by wealthy and manipulative Francine Whiting (Joanne Woodward). Miles copes with a recent divorce from wife Janine (Helen Hunt) and raising daughter Tick (Danielle Panabaker) while unraveling the secret taken to the grave by his mother Grace (Robin Wright Penn) and Francine's late husband C.B. Whiting (Philip Seymour Hoffman). Russo, perhaps the most famous writer to live in Carbondale, started building his reputation as one the great contemporary American novelists while living in Carbondale. During Russo's stint as a member of the SIUC English faculty from 1986 to 1991 he penned his second and third books, \"The Risk Pool\" and \"Nobody's Fool.\" Russo, a New York native, left SIUC for Colby College in Waterville, Maine. He retired from academia in coastal Maine after \"Nobody's Fool\" was made into a movie, also starring Paul Newman. \"Empire Falls\" has been described as \"a stirring mix of poignancy, drama and comedy\" by the \"Washington Post\" and lauded as Russo's \"most seductive book\" by the \"New York Times.\" Russo adapted the screenplay for the HBO movie, Newman is one of the film's executive producers, and Fred Schepisi (Plenty, Roxanne, The Russia House, The Devil's Playground) directs. Marleen.Shepherd@thesouthern.com 618-351-5074 Copyright, 2005, Southern Illinoisan"}, {"article_id": "302966983", "match_score": 70.14218009478674, "source": "American Press (Lake Charles, LA)", "date": "May 28, 2005", "window_summary": "The archive window notes that Robin Wright Penn co-stars in the HBO miniseries Empire Falls.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The TV listings describe Empire Falls and list Robin Wright Penn among the principal cast, with no evaluative commentary.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "Miles Roby de Harris who try As he might can to shake his ties to the old Hometown. Helen Hunt Robin Wright Penn and Joanne ire you searching it a a great gift idea Carrier Home delivery 3 months $33.35 6 months", "newsbank_text": "6 PM (FX) NASCAR Racing For the second consecutive Saturday, there is racing under the lights at Lowe's Motor Speedway in Concord, N. C., home this week to the Busch CarQuest Auto Parts 300. Kyle Busch turned in a dominating performance in this race last year, leading for 92 of 200 laps before it ended under caution with two laps to go. The win was Busch's second in three races. 7 PM & * NCIS A dead civilian is found on a Marine firing range, which leads to the discovery that the Mafia cussing actors finding balance between comedy and serious roles; she is mentioned only as a co-star in a neutral, factual way.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "Nice to have a balance Between comedy and serious Minghella a film will also Star Ray Winstone Juliette finoche and Robin Wright Penn. What s up around town today authors Linda Godfrey and Richard Hendricks discuss Quot weird Wisconsin Quot 7 .", "newsbank_text": "Quotable: \"We're standing on some incredible people and I think I'm the186th little cement thing here.\" - Adam Sandler, while getting his hand and footprints to the Hollywood Boulevard Walk of Fame. Ellen tells of abuse by stepfather TV chat show host Ellen DeGeneres shocked fans by revealing that she was molested by her stepfather 30 years ago. In the new issue of Allure magazine, the comic said she was a victim of her stepfather in1975, while her mother, Betty, was in the hospital for breast cancer treatments. DeGeneres, who was a teenager at the time, claims her stepfather insisted on checking her breasts for lumps. \"He made me let him feel my breasts. He made me lie down because he said he felt hers (mother's) when she was lying down.\" She said her stepfather became violent when she refused his advances after the incident. \"He tried to break down the door to my bedroom . . . I had to kick a window out and escape and sleep in a hospital all night long,\" DeGeneres added. An 'exciting year' for Wilmer It looks like dating Lindsay Lohan has left Wilmer Valderramma convinced he can do anything. Lohan's ex reportedly wants to create his own a clothing line. The \"That '70s Show\" actor also has a number of other projects in development, which include a new comedy series and a role in an animated TV program. \"I'm a workaholic. I went through a time in my life when I was having fun with my success, enjoying it very much,\" Valderamma explained. \"Then I thought, 'You know what? Let's do the homework and put the hours in and really make things happen.' For the last two and a half years, I've been getting ready, and now I'm at the point I'm announcing all the things I've been working on. It's an exciting year.\" Finding an acting balance Martin Freeman, who stars in \"The Hitchhiker's Guide to the Galaxy,\" will depart from his recent comedic roles by starring opposite Jude Lawin Anthony Minghella's new film \"Breaking and Entering.\" \"The film is set in contemporary London and I play Jude Law's business partner,\" said Freeman, who also stared in \"The Office.\" \"It's a straight role for me. I have played them before but I'm very much associated with comedy and that's something I'm trying to rectify. It's nice to have a balance between comedy and serious stuff.\" Minghella's film will also star Ray Winstone, Juliette Binoche and Robin Wright Penn. Burt frightened by Russell Crowe According to an interview in Stuff magazine, Burt Reynolds was awed and intimated by co-star Russell Crowe's tough guy behavior when the two worked on 1999's \"Mystery, Alaska.\" While they were shooting in a little boondocks town, Reynolds tells Stuff, \"(Russell) was only allowed to go to one bar, since he had beaten up 32 people. I avoided drinking with Russell as long as I could.\" When Reynolds finally worked up the nerve to go drinking with Crowe, he said, \"I slipped the bartender $100 before Russell got there and told him that every other vodka and tonic of mine would be just tonic. At our 14th drink, Russell said, 'Let me take a sip of your drink, mate.' Thank God it was the drink with vodka.\" Gandolfini's hidden rage \"The Sopranos\" star James Gandolfini revealed that his own \"useless temper\" provided the basis for his TV mob boss' ranting and raging. Gandolfini, who plays Tony Soprano on the HBO series, reminisced about the formulation of the iconic character on CBS's \"60 Minutes Wednesday.\" \"I have a little bit of a temper, but it's . . . useless. It doesn't accomplish anything, generally. It's just a lot of ranting and raving and nothing, so (show creator) David (Chase) probably saw that and put it into the character,\" Gandolfini said. \"All writers are vampires and . . . they'll look around and they watch you when you're not even thinking they're watching you and they'll slip stuff in.\" Copyright, 2005, Madison Newspapers, Inc."}, {"article_id": "329734046", "match_score": 69.07630522088353, "source": "Charleston Gazette (WV)", "date": "May 22, 2005", "window_summary": "The archive snippet again notes the Empire Falls storyline and mentions Robin Wright Penn as Miles' mother (appearing in flashbacks).", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full article is the same Empire Falls review that highlights the ensemble performance and states Robin Wright Penn plays the deceased mother Grace, appearing only in flashback scenes.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "angry about her parents imminent divorce and her Mother s Helen Hunt approaching remarriage to another Man Miles Mother Grace Robin Wright pen died when Miles was a Young Man but his irascible father Max Paul Newman is still around doing halfhearted | of these actors a Harris says. A Miles is the Only character who interacts with All the others except for Robin Wright Penn who appears Only in Flashback scenes but Paul and Joanne Helen Aidan Theresa Russell Philip Seymour Hoffman everybody else", "newsbank_text": "An all-star cast brings to vibrant life Richard Russo's \"Empire Falls\" in a funny and achingly beautiful two-part adaptation airing Saturday and Sunday on HBO. Set in a declining Maine mill town, the TV movie stars four-time Oscar nominee Ed Harris (\"Pollock\") as Miles Roby, the central character, who is in a kind of emotional paralysis as the story opens. As a boy, Miles showed great promise for a successful life far beyond his struggling hometown, but fate and family obligations born out of long-buried secrets have forced him to remain in Empire Falls, where he scrapes out a living running the Empire Grill for Francine Whiting (Joanne Woodward), the iron-willed widow whose family owns anything worth owning in Empire Falls. At the center of Miles' life is his sensitive teenage daughter, Tick (Danielle Panabaker), who is angry about her parents' imminent divorce and her mother's (Helen Hunt) approaching remarriage to another man. Miles' mother, Grace (Robin Wright Penn), died when Miles was a young man, but his irascible father, Max (Paul Newman), is still around, doing halfhearted odd jobs in exchange for beer money. Helping Miles at the diner is his younger brother, David (Aidan Quinn), who bitterly remembers how determined their mother was that Miles would escape the dead-end existence in which he now finds himself. \"Miles is really stuck when this thing starts,\" Harris says. \"He's got nowhere to turn, doesn't see any way out of what he's doing, even though he's not very happy. During the course of this thing, he gets unstuck.\" Getting unstuck for Miles requires uncovering and confronting some startling secrets that explain the complicated ties between his own blue-collar family and the elite Whiting clan, including Francine's late husband, C.B. (Philip Seymour Hoffman), and their daughter, Cindy (Kate Burton), who was disabled in a childhood accident and harbors a desperate, unrequited love for Miles. As fans of Russo's Pulitzer Prize-winning novel know, there is a startling act of school violence near the end of the narrative, but apart from that, the story unfolds with the quirky, unhurried pace of small town life. Dramatic tension arises not from explosions or car chases, but from the resentments, passions and private shames that run through Empire Falls like the Knox River. That \"Empire Falls\" remains so utterly engrossing for its three-hours-plus running time is both a tribute to Russo's writing - he wrote the teleplay as well - and to the dazzling ensemble of actors, who manage to convince us that they've shared life experiences for years, even for generations. That's possible in large part because executive producer Newman and director Fred Schepisi gathered the entire cast together in New York for extended rehearsals before moving to the Maine filming location. \"We knew we had to concentrate on and bring about (that sense of interconnected lives), particularly as many of the characters don't actually play scenes with one another and yet they have a large effect on one another,\" Schepisi says. With Russo on hand during those early sessions, Schepisi and his cast had the luxury of asking the author to interpolate scenes or lines of dialogue he originally had omitted from the adapted script, which clarified motivations for the actors. \"I nagged Rick a bit to put some things in or take some things out. Fortunately, he transcended that nagging,\" Schepisi says, chuckling. Filming primarily in the part of Maine where Russo had lived while writing his novel also gives the TV movie added resonance, Harris says. \"That was really helpful, and I am so glad that we shot it in the towns of Waterville and Skowhegan where we were,\" he says. \"All of the community was very supportive, and you know, it's a mill town that's kind of fallen on hard times, which is just what the story was about. It just gives you so much that you don't have to think about, because you're really right there in the environment.\" Harris says his \"Empire Falls\" colleagues are the best ensemble with which he's ever worked. \"And what was really fun was that as Miles, I really got to work with every one of these actors,\" Harris says. \"Miles is the only character who interacts with all the others, except for Robin Wright Penn (who appears only in flashback scenes) - but Paul and Joanne, Helen, Aidan, Theresa Russell, Philip Seymour Hoffman, everybody else I got to work with.\" And while Miles undergoes a harrowing transformation during the course of \"Empire Falls,\" he comes out of it free to pursue the dreams his mother had held out for him, Harris says. Copyright, 2005, Charleston Newspapers"}, {"article_id": "264336627", "match_score": 68.95734597156398, "source": "Daily Herald (Arlington Heights, IL)", "date": "March 12, 2005", "window_summary": "The archive blurb announces a screening of the 1987 film \"The Princess Bride,\" noting it stars Cary Elwes, Robin Wright Penn and Andre the Giant.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full community article promoting the Des Plaines Theatre event lists \"The Princess Bride\" (1987) on the schedule and identifies Robin Wright Penn as one of the film's stars, presented as a classic screening.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "On april i and 2, the theater will show the 1987 whimsical classic a the Princess Bride starring Cary Elwes Robin Wright Penn and Andre the giant. Shows will be at 7 . Tickets will be $5, $4 for seniors and society | and Gina Lollobrigida at 7 . March 18 and 19 a a the Princess Bride a starring Cary Elwes and Robin Wright Penn at 7 . April 1 and 2 a Call 847 803-1875 for More information. Refurbishing of the theater is", "newsbank_text": "The renaissance will continue this spring at the Des Plaines Theatre, where Humphrey Bogart and Andre the Giant will grace the screen, and a student jazz festival will help raise scholarship money. The Des Plaines Theater Preservation Society on March 18-19 will present the 1953 John Huston film \"Beat the Devil\" starring Bogart. The movie will begin at 7 p.m. both nights at the theater, 1476 Miner St. On April 1 and 2, the theater will show the 1987 whimsical classic \"The Princess Bride\" starring Cary Elwes, Robin Wright Penn and Andre the Giant. Shows will be at 7 p.m. Tickets will be $5, $4 for seniors and society members, and $3 for children. The group of preservationists made a deal with the owner of the downtown theater last fall to host events in exchange for doing repairs. The group has repaired the marquee and painted the inside of the theater, which features films from India. On April 9, the Arts Council of Des Plaines will present \"DesJazz\" to benefit college scholarships for arts students. Tickets will be $5, or $15 for a family of four. High school and middle school students will perform. Refreshments will be served between performances. No times were available Friday. The society will hold a fund-raiser April 18 for its efforts to restore the theater. A complete refurbishing of the theater is expected to top $4 million. Broadcaster Joe Gentile, who has a show on WJJG 1530-AM, will host the event. The society hopes to release more details on the event soon. Douglas Bryan Bean, president of the society's board, said the events are just a hint of what the society hopes to host at the theater on a more regular basis. Last year, the society held a Flash Gordon festival, showed the Christmas classic \"Miracle on 34th Street\" and hosted a Halloween festival. The 1925 theater is eligible for the National Register of Historic Places. Co-owner Dhitu Bhagwakar hasn't signed the necessary papers to complete the application process. Volunteers like Bean have been discovering architectural nuances in the theater, including marble near the flooring and ornate plaster work on the wooden beams. GRAPHIC: Now showing Des Plaines Theatre, 1476 Miner St., features classic films. - \"Beat the Devil,\" starring Humphrey Bogart and Gina Lollobrigida, at 7 p.m. March 18-19 - \"The Princess Bride,\" starring Cary Elwes and Robin Wright Penn, at 7 p.m. April 1-2 - Call (847) 803-1875 for more information. Copyright 2005 Daily Herald"}, {"article_id": "262988026", "match_score": 68.88888888888889, "source": "Journal Gazette (Mattoon, IL)", "date": "April 8, 2005", "window_summary": "The archive window is a birthdays list that identifies actress Robin Wrig
