 -- Rob Thomas 'Side Effects,' shot in Madison, opens at Westgate One movie that shouldn't be overlooked in the holiday shuffle is the homegrown \"Side Effects,\" which opens Friday at Westgate. Fresh off a sold-out screening at last spring's Wisconsin Film Festival, \"Side Effects\" tells the story of a sales rep for a pharmaceutical company (Katherine Heigl of \"Grey's Anatomy\") faced with deep misgivings about the unethical practices she sees all around her. The feature from Kathleen Slattery-Moschkau, a former drug company sales rep, was shot in Madison in about 10 days. It's actually more of a romantic comedy than a whistleblowing melodrama, although the screenplay skillfully works in real-life information about the state of the health care industry. -- Rob Thomas Copyright, 2005, Madison Newspapers, Inc."}, {"article_id": "259075257", "match_score": 93.75, "source": "American Press (Lake Charles, LA)", "date": "May 26, 2005", "window_summary": "The archive excerpt names Robin Wright Penn among the cast of Empire Falls alongside Ed Harris, Helen Hunt and others.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full AP article about Paul Newman and the HBO adaptation Empire Falls lists Robin Wright Penn as part of the prominent ensemble cast and treats her mention as part of the program's casting information.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "to Florida with a senile priest. Other members of the cast include de Harris Philip sey Mour Hoffman Helen Hunt Robin Wright Penn Aidan Quinn a and or. A Newman a wife Joanne Woodward in a rare villainess role As the heiress", "newsbank_text": "LOS ANGELES (AP) — \" I wish I was 79 again, \" quips Paul Newman, who turned 80 in January. He's far from being retired. His food company, Newman's Own, has donated $200 million in lifetime profits to charity. He supports the Hole in the Wall Camps, which provide outdoor vacations for terminally ill children (the name comes from the \" Butch Cassidy and the Sundance Kid \" hideout ). He owns an auto racing team that will compete this year in Australia, South Korea and Argentina. And, oh yes, Newman is still doing what he does best — acting. He appears on HBO on Saturday and Sunday in \" Empire Falls \" (8 p.m. CDT ), a film based on the Pulitzer Prize-winning novel by Richard Russo, who also wrote the script. Empire Falls, Maine, is a crumbling town that once thrived with clothing mills. The hangers-on comprise a rich mix of families whose secrets and failings provide the drama as well as some light touches. Newman plays Max Roby, the wily and irreverent patriarch of one of those families, whose unkempt beard is reputed to be littered with cracker crumbs. Newman gets fifth billing and disappears for a long stretch when Max runs off to Florida with a senile priest. Other members of the cast include Ed Harris, Philip Seymour Hoffman, Helen Hunt, Robin Wright Penn, Aidan Quinn — and Newman's wife, Joanne Woodward, in a rare villainess role as the heiress who wields malevolent power over some of the town's residents. Having also played an old-timer in the adaptation of another Russo novel, \" Nobody's Fool, \" Newman read \" Empire Falls \" with more than the usual interest. \" An extraordinary book, \" the actor said in an interview. \" I know there was a lot of interest in making like a two- hour film out of it, and I thought that would truncate all the values in it. It had to be done in a longer format. No major studio 1 wants to make a 3- hour, 3/2-hour film. \" HBO had no such qualms. As an executive producer, Newman helped line up the stellar cast, and he insisted that \" Empire Falls \" be shot in Maine. \" That's where it was set in the mind of Russo, and that's where we shot it, \" he said. \" We would have saved a little money by going to Canada, but I think the film would have suffered. And I think there's an obligation whenever it's possible that we should shoot here in the United States. \" One of the first Method actors to become a movie star, Newman is a stickler for realism. He grew a vagrant-style beard for the role of Max, but it didn't last long. \" Joanne made me shave the homeless part off first. Then she got the rest of it; I should really say while I was sleeping, \" he joked during a telephone chat from his home in Westport, Conn. \" She was not enamored with it. \" Copyright 2005, 2007, American Press. All Rights Reserved."}, {"article_id": "112766412", "match_score": 93.5483870967742, "source": "Bucks County Courier Times (Levittown, PA)", "date": "September 2, 2005", "window_summary": "The archive snippet notes that Robin Wright plays Forrest Gump's love interest in a TV listing for the film.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full TV-preview text describes Forrest Gump and simply lists Robin Wright as the actress who plays the lead character's love interest, with no evaluative comment.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "life and becomes a Vietnam War hero millionaire entrepreneur and witness to history Sally Reid costars As forests protective Mother Robin Wright plays his love interest and Gary Sinise is his reluctant buddy the film won six Academy awards 8 on tic", "newsbank_text": "Catch it tonight \"Forrest Gump,\" 8 p.m., TNT Tom Hanks stars in the feel-good blockbuster of 1994. Simple-minded Forrest (Hanks) takes a head-on approach to life and becomes a Vietnam War hero, millionaire entrepreneur and witness to history. Sally Field co-stars as Forrest's protective mother, Robin Wright plays his love interest, and Gary Sinise is his reluctant buddy. The film won six Academy Awards. Supernanny, 8 p.m., ABC Forget spoonfuls of sugar. The star of this reality series is more Patton than Poppins. Jo Frost, who's spent years taming bratty Brits, helps American parents take back the reins of power from their youngsters. Once Frost has helped Mom and Dad lay down and enforce the law, and the kids have had some practice following it, she lets the family fly solo. Never fear, though; she's watching and will return if help is needed. What I Like About You, 8 p.m., WB In \"My Boyfriend's Back,\" Holly (Amanda Bynes) seeks advice from old flame Henry (guest star Michael McMillian) on improving her miserable track record with guys. Her sister (Jennie Garth) is on the receiving end of an attempt to revive her own love life, as Lauren (Leslie Grossman) lures Todd (guest star Luke Perry) back to the bakery. Hope & Faith, 9 p.m., ABC Faith (Kelly Ripa) lands a new job doing the weather at a television station, and the temperature rises when she meets newscaster Larry (guest star Dean Cain). Hope (Faith Ford) feels abandoned by her partner in the catering business and hires a new, superefficient assistant. Now it's Faith's turn to feel slighted. Ted McGinley also stars in \"Weather or Not.\" What Not to Where Are They Now?, 9 p.m., TLC It's easy to change your look when you have a pair of fashion experts, a top hairstylist and a professional makeup artist helping you out - not to mention a Visa card with $5,000 on it. But can you keep it up? In this new special edition of the series, fashionistas Stacy London and Clinton Kelly surprise four of their past makeover subjects to see whether they've kept up their new looks. Arrested Development, 9:30 p.m., Fox Michael (Jason Bateman) wants George Sr. (Jeffrey Tambor) out of the model home's attic because an inspector is coming. Gob (Will Arnett) tries to help, but his efforts backfire in a big way. Ann and George Michael (Mae Whitman, Michael Cera) organize a movie boycott, which also backfires. Alia Shawkat, Portia de Rossi and David Cross also star in \"Righteous Brothers.\" NUMB3RS, 10 p.m., CBS A prison bus crashes, and two dangerous inmates manage to escape in the ensuing confusion. Don (Rob Morrow) knows something about finding fugitives, but as always, a little help from his math-whiz brother, Charlie (David Krumholtz), couldn't hurt. Sabrina Lloyd also stars in \"Man Hunt.\" Crossing Jordan, 10 p.m., NBC Two deaths at the airport have the authorities wondering if a killer virus hitched a ride on an international flight. Garret (Miguel Ferrer) determines that both victims - a passenger and a baggage handler - died of drug overdoses. Woody (Jerry O'Connell) thinks the deaths are related and possibly linked to a smuggling ring. Jordan (Jill Hennessy) suspects an elderly man's death was an assisted suicide in \"Gray Murders.\" Copyright, 2005, Bucks County Courier Times"}, {"article_id": "263016239", "match_score": 93.24894514767934, "source": "Houston Chronicle (TX)", "date": "January 10, 2005", "window_summary": "The archive fragment reports that Sean Penn is 'now happily married to actress Robin Wright Penn.'", "window_context": "personal_life", "window_tone": "positive", "fulltext_summary": "In the full article the writer quotes Sean Penn discussing his past marriage to Madonna and states he is now happily married to actress Robin Wright Penn, portraying her primarily in the role of his spouse and implying a positive current relationship.", "fulltext_context": "personal_life", "fulltext_tone": "positive", "archive_window": "marriage to Madonna and still thinks the pop superstar is a wonderful person reports . Now happily married to actress Robin Wright Penn the a Mystic River Star says of his volatile relationship with the material girl a it was a miserable", "newsbank_text": "Soupy Sales gets his star in Hollywood Comedian Soupy Sales, who once said a pie in the eye was worth two in the sky, saw his proclivity for pie-tossing pay off with a star on Hollywood's Walk of Fame. \"I appreciate this from the bottom of my heart and I appreciate you all coming here in the rain,\" Sales, who was seated in a wheelchair, said Friday. Inside the Hollywood Roosevelt Hotel, Hollywood's honorary mayor, Johnny Grant, set up the 79-year-old comic's classic shtick. \"Frank Sinatra, Sammy Davis Jr. had pies thrown in their face by Soupy Sales and I want to belong to that club,\" Grant said. He then got down within Sales' reach and took a pie in the face. The star was the walk's 2,274th. Springer opera aired despite complaints Britain's public broadcaster televised Jerry Springer The Opera on Saturday, despite appeals from church groups not to air the expletive-heavy musical. The BBC said it had received 40,000 complaints even before airing the show, which has been running in London's West End, but claims that 1.7 million viewers watched the show Saturday on BBC2. Inspired by Jerry Springer's trashy American television talk program, it features songs titled Pregnant By A Transsexual and Here Come The Hookers. Weisz brushes aside offers from Playboy Movie beauty Rachel Weisz turned down an offer to appear nude in Playboy because she doesn't like how the magazine airbrushes its models, reports IMDB.com. The About A Boy star has been invited to strip for the publication \"a couple of times\" but decided against going naked - despite her admiration for the quality of Playboy writing. Penn has no regrets about Material Girl Movie star Sean Penn has no regrets about his brief marriage to Madonna and still thinks the pop superstar is a wonderful person, reports IMDB.com. Now happily married to actress Robin Wright Penn, the Mystic River star says of his volatile relationship with the Material Girl: \"It was a miserable marriage, but I like her a lot. It got me steps further and clearer into knowing what I wanted. I still had a lot of demon doors to go through. . . . I don't recall having a single conversation in four years of marriage. I've talked to her a couple of times since, and there's a whole person there. I just didn't know it.\" Copyright 2005 Houston Chronicle"}, {"article_id": "229275470", "match_score": 92.91338582677166, "source": "Hartford Courant, The (CT)", "date": "August 21, 2005", "window_summary": "The archive excerpt lists Robin Wright (credited as Robin Wright Penn) as a member of the ensemble cast for the film Nine Lives.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "In a fall movie preview, the article mentions Nine Lives and includes Robin Wright Penn among the ensemble of actresses featured in the film.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "women who endure life a travails. With Sissy Spacek Kathy Baker Glenn close May Kay place Molly Parker Holly Hunter Robin Wright Penn Lisa Gay Hamilton and Amy Brenneman and a supporting cast featuring Aidan Quinn Joe Mantegna Ian Mcswane Stephen Dillane", "newsbank_text": "Will the movie industry's fall lineup have what it takes to reverse summer's box office slump? You be the judge. Behind us are the dog days of August, the traditional month for studios to bring out their trash. (And if you think about it, there were very few exceptions.) Ahead is autumn, which brings a smattering of prestige pictures before November and December set the stage for the award season. So for September and October, expect a mixed bag, the beginnings of a drum roll that will reach a crescendo in early winter with many of the year's biggest releases. In the coming two months, big studio releases include Cameron Crowe's ``Elizabethtown'' with Orlando Bloom and Kirsten Dunst; Jodie Foster in the thriller ``Flightplan''; Roman Polanski's adaptation of Charles Dickens' ``Oliver Twist''; Laura Linney and Tom Wilkinson in court in ``The Exorcism of Emily Rose''; Charlize Theron as a miner tired of sexual harassment in ``North Country''; and Andrew Niccol's ``Lord of War,'' with Nicolas Cage as an arms dealer who discovers he has a conscience. Lighter entertainment comes in a number of packages. Reese Witherspoon and Mark Ruffalo pair up in the ``Ghost''-ly romance ``Just Like Heaven''; Keira Knightley stars in yet another adaptation of Jane Austen's ``Pride & Prejudice''; and Steve Martin's best-selling novella ``Shopgirl'' finds Cameron Diaz's retail clerk torn between two lovers. In the action-adventure category, Jason Statham returns in ``Transporter 2''; TV's Joss Whedon mines his canceled ``Firefly'' for his sci-fi pic ``Serenity''; Ray Bradbury's ``A Sound of Thunder'' takes a safari through time; husband- and-wife swashbucklers Antonio Banderas and Catherine Zeta-Jones draw swords in ``The Legend of Zorro''; the busy Knightly plays a real-life model-turned-bounty hunter in Tony Scott's ``Domino''; and Paul Walker and Jessica Alba go sunken-treasure-hunting in ``Into the Blue.'' Feel-good family fare might include the rehabilitation tale ``Dreamer'' with Kurt Russell, Dakota Fanning and a promising racehorse; Bill Paxton's U.S. Open drama ``The Greatest Game Ever Played''; ``The Curse of the Were- Rabbit Starring Wallace & Gromit''; and Tim Burton's ``Corpse Bride.'' The healthier-than-ever horror genre continues to be crowded (isn't real life horrible enough?): Watch for Rupert Wainwright's remake of John Carpenter's ``The Fog''; the girl's prep school screamer ``The Woods''; the year's second bayou chiller ``The Reaper''; ``Cry Wolf''; and don't leave out ``Saw II.'' Art-house fans, be on alert for Terry Zwigoff's return with ``Art School Confidential''; Marc Forster's ``Stay''; Gore Verbinski's ``Weather Man'' with Nicolas Cage; ``Capote'' starring Philip Seymour Hoffman and Catherine Keener; David Cronenberg's ``A History of Violence''; Michael Winterbottom's ``A Cock and Bull Story''; Johnny Depp's turn as the Earl of Rochester in ``The Libertine''; John Madden's adaptation of the Pulitzer Prize-winning play ``Proof''; Liev Schrieber's adaptation of Jonathan Safran Foer's bestseller ``Everything Is Illuminated''; and George Clooney's look at Edward R. Murrow and Sen. Joseph McCarthy, ``Good Night, and Good Luck.'' So, away we go into the autumn season. Let's see what it does for the bottom line at the box office. (Release dates can change at the whim of the studios.) Sept. 2 The Transporter 2 -- Jason Statham reprises his role as Frank Martin, an ex-Special Forces operative who must use everything he knows when the Miami family for whom he works is victimized by kidnappers. If that isn't enough, the perps threaten to release a lethal virus. Amber Valleta (``Hitch'') co-stars. A Sound of Thunder -- Based on a story by sci-fi writer Ray Bradbury, this time-traveling adventure begins as a big game hunter goes back in time to shoot the ultimate kill -- dinosaurs -- only to step on a butterfly and really foul things up. Ben Kingsley owns the safari service, and Edward Burns and Catherine McCormack are the scientists who must stop a chain reaction that spells doom for the human race. Underclassmen -- Nick Cannon (``Drumline'') goes undercover at an elite prep school to expose a car theft ring. Hugh Bonneville, Shawn Ashmore and Kelly Hu co-star, but Marcos Siega's film sounds too much like a cross between ``The Fast and the Furious'' and ``The Skulls'' to earn a passing grade. The Woods -- And it's off to another private school, the all-girl variety, in Lucky McKee's horror flick about things that go bump in the night in the woods beyond the campus. Lauren Birkell and Agnes Bruckner star with help from Patricia Clarkson and Bruce Campbell. Sept. 9 The Exorcism of Emily Rose -- Based on true events from 1976, Laura Linney stars as a lawyer who takes on the defense of a priest (Tom Wilkinson) charged with negligent homicide after performing an exorcism on a young girl whose severe epilepsy was mistaken for demonic possession. Scott Derrickson directs in the multiple point-of-view style of ``Rashomon.'' The Man -- Les Mayfield's action comedy is a weird chemistry test that teams Eugene Levy and Samuel Jackson. Levy is the chatterbox salesman who unwittingly crashes an ATF sting operation only to be recruited by the agent in charge (Jackson). Sounds about right for the director of ``Blue Streak'' and ``Flubber.'' Sept. 16 Just Like Heaven -- Or, ``The Goodbye Girl'' meets ``Ghost.'' Reese Witherspoon and Mark Ruffalo are paired in this romance about an architect (Ruffalo) who moves into a new apartment only to find himself confronted with a young woman (Witherspoon) who insists the place is hers. But then it becomes clear this young woman can walk through walls. Donal Logue and Jon Heder (``Napoleon Dynamite'') co-star under the direction of Mark Waters (``Mean Girls,'' ``Freaky Friday). Proof -- David Auburn's Tony- and Pulitzer Prize-winning play is brought to the screen by John Madden (``Shakespeare in Love'') who teams again with Gwyneth Paltrow. She plays the troubled daughter of a brilliant but mentally ill math professor (Anthony Hopkins) whose authorship of a proof is in question. Lord of War -- ``The Truman Show'' director Andrew Niccol returns with this action drama about a successful, veteran arms dealer (Nicolas Cage) who has a crisis of conscience while being pursued by an Interpol agent (Ethan Hawke). The Reaper -- More peril in bayou country! Jim Gillespie's horror flick finds a pack of teens pursued by a mysterious evil force that might or might not have voodoo magic on its side. Agnes Bruckner, Bijou Phillips, Jonathan Jackson and Meagan Good star. Sept. 23 Flightplan -- Or, ``Panic Room'' at high altitude. ... Jodie Foster is back as a bereaved widow (and, more conveniently, an airplane designer) who falls asleep on a flight from Berlin to New York only to wake and discover her young daughter is missing from the seat beside her. The crew and fellow passengers swear the girl was never there in the first place. Peter Sarsgaard and Sean Bean co-star. Robert Schwentke directs. Corpse Bride -- Tim Burton, whose ``Charlie and the Chocolate Factory'' was summer's most delicious hit, teams with director Mike Johnson and his regular collaborators Johnny Depp, Helena Bonham Carter and composer Danny Elfman for this stop-motion animated fantasy. Set in a 19th century European village, it follows the story of Victor (Depp) who is whisked away to the underworld to marry a mysterious corpse bride (Bonham-Carter) while his real fiancee, Victoria (Emily Watson), waits bereft in the land of the living. Art School Confidential -- Or, Signs of Intelligent Life in the Film Industry. Terry Zwigoff (``Ghost World,'' ``Bad Santa'') helms this adaptation of a Dan Clowes' story about an art student (Max Minghella) who dreams of becoming the greatest artist in the world and getting the girl, all while surrounded by arrivistes and poseurs at an elite East Coast art school. Sophia Myles, Matt Keeslar, John Malkovich, Jim Broadbent and Angelica Huston co-star. Capote -- Philip Seymour Hoffman and Catherine Keener are the dream pairing in this biopic about Truman Capote (Hoffman), The New Yorker correspondent assigned to write about the brutal murders of a Kansas family in 1959. Capote is shocked to find himself forming a friendship with one of the killers (Clifton Collins Jr.) and from that life- altering experience, he pens the best-seller ``In Cold Blood.'' Keener is Capote's friend, fellow author Harper Lee. Chris Cooper is also featured in the cast under the direction of Bennett Miller. The screenplay is a first from actor- turned-writer Dan Futterman. Romance & Cigarettes -- Actor John Turturro wrote and directed this working-class musical love story in which a man (James Gandolfini) must choose between his wife Kitty (Susan Sarandon) and his mistress Tula (Kate Winslet). The songs, lip-synched by the characters, include tunes by composers as diverse as Bruce Springsteen, Buena Vista Social Club and Bow Wow Wow. Rounding out the cast are Mary-Louise Parker, Mandy Moore, Christopher Walken, Aida Turturro and Bobby Cannavale. Cry Wolf -- Yes, another low-budget horror flick. This time, a bunch of teens create a game involving a serial killer called ``The Wolf'' only to see the entertainment turn horrifically real. Jeff Wadlow directs Julian Morris, Lindy Booth, and Jared Padalecki. Roll Bounce -- Roller-skate jams are the action in Malcolm D. Lee's Chicago coming-of-age comedy starring Bow Wow, Nick Cannon and Meagan Good. Elbow pads, anyone? Pride & Prejudice -- If only Jane Austen were alive to collect author's royalties. Yes, here it is, yet another adaptation of her beloved comedy of manners in which the Bennett family tries to marry off their five daughters. Keira Knightley is the headstrong and true blue Elizabeth Bennett with Matthew MacFayden as Mr. Darcy. Sept. 30 Oliver Twist --``Please Sir, I want some more [sequels]''? Director Roman Polanski and screenwriter Ronald Harwood, who collaborated successfully on ``The Pianist,'' revisit the Charles Dickens classic about a 19th century London orphan. Barney Clarke is young Oliver, who escapes an orphan's workhouse and falls in with a crew of pint- size pickpockets led by Fagin (Ben Kingsley). A History of Violence -- Arty horror-meister David Cronenberg (``Dead Ringers,'' ``The Fly'') returns with this drama about a cafe owner (Viggo Mortensen) who commits murder in self-defense and finds his life turned upside down by the media attention that follows. Maria Bello and Ed Harris co-star. The Greatest Game Ever Played -- Actor Bill Paxton steps behind the camera for his second feature, this one about the 1913 U.S. Open in which a 20-year-old golfer, Francis Ouimet (Shia LaBeouf) takes on champion Harry Vardon (Stephen Dillane). Serenity -- Joss Whedon, the man who gave us television's ``Buffy the Vampire Slayer'' and ``Firefly,'' mines the latter for his first big-screen outing, a sci-fi action adventure set 500 years in the future in the midst of a galactic civil war. Nathan Fillion is Capt. Malcolm Reynolds. Gina Torres and Chiwetel Ejiofor co-star. Into the Blue -- When a group of divers stumbles upon the cargo of a submerged airplane belonging to a ruthless drug lord, it means, well, ``The Deep'' all over again. This time, the wet T-shirt prize goes to Jessica Alba who co- stars with Paul Walker, Scott Caan and Ashley Scott. Oct. 7 In Her Shoes -- Cameron Diaz plays party girl Maggie, a young women whose relationship with her sister Rose (Toni Collette) has been compromised by an indiscretion with the latter's boyfriend. Arriving to help stage a rapprochement is Grandma (Shirley MacLaine,) a relation neither sister knew she had. Scripted by Susannah Grant (``Ever After'') from the comic novel by Jennifer Weiner (who grew up in Simsbury), the comedy is directed by Curtis Hanson. The Curse of the Were-Rabbit Starring Wallace & Gromit -- The beloved duo from Aardman's Oscar-winning claymated ``Wallace & Gromit'' shorts break out in their first feature and they are in great company. Creator of the duo, Nick Park (``Chicken Run''), directs a story in which Wallace and his loyal pooch, Gromit, are hired to stop a marauder who is demolishing gardens on the eve of the village's giant vegetable growing contest. Helena Bonham Carter and Ralph Fiennes lend their voices to the supporting characters Lady Tottingham and Viktor. Waiting ... -- As in ``on tables,'' and probably at a canned-fun franchise like TGI Friday's or Bennigan's. Newcomer Rob McKittrick's comedy finds John Francis Daley's Mitch joining the staff of a restaurant called Shenanigans where the too cheery staff introduces him to ``The Game,'' a competition to be the eatery's best waiter. Anna Faris and Ryan Reynolds garnish. 2 for the Money -- A former football star (Matthew McConaughey) whose sports career ended with an injury teams up with a renowned bookie (Al Pacino) in D.J. Caruso's comedy/drama. The Gospel -- When the bishop father of a successful young R&B singer falls ill, it sets the stage for a homecoming in Rob Hardy's drama. Clifton Powell is Bishop Taylor. The cast also features Tamyra Gray, Yolanda Adams and Omar Gooding. Kiss, Kiss, Bang, Bang -- ``Lethal Weapon'' writer Shane Black adapts and directs Brett Halliday's murder mystery about a private investigator (Val Kilmer), an actress (Michelle Monaghan) and a thief who masquerades as an actor (Robert Downey Jr.). Oct. 14 Elizabethtown -- Inspired at least in part by autobiographical events, Cameron Crowe's latest finds Drew Baylor (Orlando Bloom) returning home to Kentucky for his father's funeral (just as Crowe once did in off-screen life). On the trip home, Drew meets flight attendant Claire Coburn (Kirsten Dunst) and romance takes wing. Susan Sarandon, Judy Greer and Alec Baldwin round out the cast, but because this is a Crowe film, pop music is sure to play the strongest supporting role, as it did in ``Almost Famous'' and ``Say Anything.'' North Country -- Based on the landmark sexual harassment lawsuit Jenson vs. Eveleth Mines, Niki Caro's drama stars Charlize Theron as miner Josey Aimes, who endures years of abuse and finally fights back in court. The fabulous cast for Caro (``Whale Rider'') includes Frances McDormand, Woody Harrelson, Sissy Spacek, Sean Bean and Richard Jenkins. Domino -- Based on the true story of the daughter of actor Laurence Harvey who was a Ford model who became a bounty hunter, Tony Scott's action/adventure puts Keira Knightley in the title role with support from Jacqueline Bissett and Dabney Coleman. The Fog -- Rupert Wainwright's remake of John Carpenter's 1980 horror flick ``The Fog'' finds the leprous ghosts of a century-old shipwreck coming ashore in Northern California to exact bloody revenge. Tom Welling and Selma Blair star. Oct. 21 Shopgirl -- Based on Steve Martin's script of his bestselling novella, this comedy/drama concerns Mirabelle Butterfield (Claire Danes), a retail clerk and aspiring artist who finds herself torn between two men. One is Martin's wealthy divorcee, Ray Porter, who makes her life better. The other is a musician, Jason Schwartzman's Jeremy Kraft, who is closer to her age. What's a girl to do? Anand Tucker (``Hilary & Jackie'') directs. Doom -- Another video game gets the silver screen treatment in Andrzej Bartkowiak's futuristic horror flick. It is the year 2145 on Mars and, in the aftermath of a botched experiment, a group of Marines must contend with horrific creatures that infiltrate their base. ``Alien'' anyone? Derailed -- An adulterous affair between business colleagues played by Clive Owen and Jennifer Aniston results in blackmail, and the lovers fight back to protect their families (who they had sabotaged already, right? Or am I missing something?). Swedish director Mikael Hafstrom helms. Vincent Cassel (``Read My Lips'') co-stars. Stay -- Marc Forster (``Monster's Ball,'' ``Finding Neverland'') directs this world-of-the-living meets world-of-the- dead drama about an Ivy League professor (Ewan McGregor) who struggles to prevent a student (Ryan Gosling) from committing suicide. Naomi Watts co-stars. The screenplay is by David Benioff, scribe of ``Troy.'' Dreamer: Inspired by a True Story -- Get out the hankies. Kurt Russell and Dakota Fanning star in this drama about a horse trainer (Russell) and his daughter (Fanning) who nurse an injured horse back to health and set their sights on the Breeder's Cup race. Screenwriter John Gatins (``Coach Carter'') also rides the directing hobbyhorse. Oct. 28 The Weather Man -- Gore Verbinski (``Pirates of the Caribbean: Legend of the Black Pearl,'' ``The Ring'') directs Nicolas Cage in Steve Conrad 's ``American Beauty''--style dark comedy about a Chicago weatherman, his alienated wife (Hope Davis), son (Nicholas Hoult) and a job offer in New York City. Saw II -- We know, we know. You can't wait. In the sequel to the surprise horror hit, Donnie Wahlberg plays a detective charged with tracking down the serial killer known as ``Jigsaw.'' Darren Lynn Housman directs a cast that includes Beverley Mitchell and a returning Shawnee Smith. Prime -- Uma Thurman stars as a career-driven Upper East Sider who draws the amorous attentions of a young Brooklyn painter who happens to be the son of her psychiatrist (Meryl Streep). Newcomer Bryan Greenberg stars under the direction of Ben Younger, writer/director of ``Boiler Room.'' The Legend of Zorro -- Girls can swashbuckle, too. That seems to be the twist offered up in Martin Campbell's new adaptation of the classic action/adventure starring cinema's greatest swordsman. Here, it is 1840 and Zorro (Antonio Banderas) has married and is keeping the promise he made to the Mrs. that he would live a quiet life. But when California's statehood is threatened, the Z man must unsheathe his sharp toys. Catherine Zeta-Jones works up a Spanglish accent and hikes her skirts to play the Mrs. Connecticut dates to be announced Margaret Cho: Assassin -- In her fourth concert film, comedian Cho weighs in on topics including human rights violations, the end of democracy, and corrupt media outlets. An Unfinished Life -- J-Lo and Robert Redford are paired in this tale of a desperate woman (Lopez) and her daughter who are forced by circumstance to move in with the woman's estranged father-in-law (Redford). Lasse Hallstrom, whose career began with the wonders of ``What's Eating Gilbert Grape'' and ``My Life as a Dog'' only to devolve into the sticky sweetness of ``Chocolat,'' directs this commercial package. The Libertine -- Johnny Depp takes on the persona of the 17th century's Earl of Rochester, a man who drank and debauched his way to an early grave but who left behind poetry that set the standard. Samantha Morton and John Malkovich co-star under the direction of Laurence Dunmore. Everything Is Illuminated -- Actor-turned-director Liev Schrieber adapts and directs Jonathan Safran Foer's best- selling novel in which a young Jewish American (Elijah Wood) attempts to find the woman who saved his grandfather when Nazis invaded his small village in the Ukraine. Eugene Hutz and Boris Leskin co-star. Thumbsucker -- Director Mike Mills moves from music videos to feature film in this debut about a young man (Lou Taylor Pucci) who attempts to buck his addiction. Tilda Swinton, Keanu Reeves and Vincent D'Onofrio are featured. Hooligans -- Elijah Wood (``Lord of the Rings'') stars as a young student who is expelled from Harvard and who moves to London where he gets drawn into the violent underworld of soccer hooligans. Lexi Alexander directs this festival fave. The Prize Winner of Defiance Ohio -- With 10 children to support and a husband (Woody Harrelson) whose paycheck doesn't quite make ends meet, Julianne Moore's 1950s housewife Evelyn Ryan defies the conventions of the day and takes to writing jingles. Laura Dern lends support in this drama adapted by writer/director Jane Anderson from the novel by Terry Ryan. A Cock and Bull Story -- Michael Winterbottom's latest finds Jeremy Northam in the role of Winterbottom who, after a day on the set of his latest film, gives us a peek at the world -- and the dirt -- going on behind the scenes. Steve Coogan, Stephen Fry and Ian Hart are all onboard. Good Night, and Good Luck -- George Clooney steps behind the camera to film this account of the attempts of broadcast journalist Edward R. Murrow (David Strathairn) to bring down Sen. Joseph McCarthy (played by himself in the archival footage that inspired Clooney to make his film in black-and-white). Patricia Clarkson, Jeff Daniels, Robert Downey Jr. and Clooney add to the roster of A-list talents. Nine Lives -- Rodrigo Garcia (``Things You Can Tell Just By Looking at Her'') returns with another ensemble story of women. The film's nine real-time vignettes create portraits of women who endure life's travails. With Sissy Spacek, Kathy Baker, Glenn Close, Mary Kay Place, Molly Parker, Holly Hunter, Robin Wright Penn, Lisa Gay Hamilton and Amy Brenneman, and a supporting cast featuring Aidan Quinn, Joe Mantegna, Ian McShane, Stephen Dillane and Dakota Fanning. Separate Lies -- Actor Julian Fellowes steps behind the camera to film his adaptation of Nigel Balchin's novel about a couple's marriage that is strained by a third party. Emily Watson, Tom Wilkinson and Rupert Everett are featured. Somersault -- Experience teaches a young woman (Abbie Cornish) the difference between sex and love in Aussie director Cate Shortland's drama. Contact Deborah Hornblow at dhornblow@courant.com. Copyright (c) 2005 The Hartford Courant Co."}, {"article_id": "273884425", "match_score": 92.7710843373494, "source": "Associated Press Archive", "date": "September 9, 2005", "window_summary": "The excerpt indicates that Robin Wright Penn stars in Sorry, Haters as a troubled, angry New Yorker who forges a bond with an Arab taxi driver in a post‑9/11 setting.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The AP piece about films addressing Sept. 11 references Sorry, Haters and describes Robin Wright Penn's role as a troubled New Yorker who develops an unlikely relationship with an Arab cab driver amid post‑9/11 Manhattan; the portrayal is factual and contextual.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "11-like attacks around new York City the targets including grand Central station. Another Toronto entry a sorry haters a stars Robin Wright Penn As a troubled angry new yorker who forges an unlikely Bond with an Arab taxi Driver the relationship set", "newsbank_text": "Author: DAVID GERMAIN; AP Movie Writer 552 Words OpenURL Link Anguish over Sept. 11 lingers, yet filmmakers slowly are overcoming an early reticence to address the attacks with a growing number of projects examining the horrors and heroes and even finding rays of humor in the tragedy. Leading the way are two yet-untitled projects, Oliver Stone's big-screen tale starring Nicolas Cage in the story of two New York City rescuers involved in the World Trade Center aftermath and an ABC miniseries chronicling the terrorist attacks. The Toronto International Film Festival features a handful of films that, with the initial shock of Sept. 11 wearing off, now are beginning to incorporate the events in historical context as facts of everyday life. \"It takes artists awhile both to digest current events and get films made. This lag of four years makes sense, if one was going to predict accurately when we would start seeing these kinds of films,\" said Noah Cowan, Toronto festival co-director. Among the Toronto films: \"The War Within,\" a chilling portrait of an Arab student falsely detained as a terrorism suspect who seeks revenge against the United States by joining a terrorist cell that plots a new wave of Sept. 11- like attacks around New York City, the targets including Grand Central Station. Another Toronto entry, \"Sorry, Haters,\" stars Robin Wright Penn as a troubled, angry New Yorker who forges an unlikely bond with an Arab taxi driver, the relationship set against the backdrop of post-Sept. 11 Manhattan. In her performance film \"Sarah Silverman: Jesus Is Magic,\" comedian Silverman takes on a range of taboo topics -- AIDS, the Holocaust, race relations -- with a fierce politically incorrect attitude. Regarding Sept. 11, Silverman jokes that American Airlines missed out on a good marketing slogan: \"American Airlines: First through the towers.\" She also kids that Sept. 11 was especially trying for her because it was the same day she learned that the soy lattes she had been drinking daily had a whopping 900 calories. Silverman said it took her a long while after Sept. 11 before she could think about including material on the attacks in her act but that eventually the need for humor won out. \"I always want to laugh at the sad stuff. You don't need to laugh at the other stuff,\" Silverman said. \"I'm not numb to these things. I still go into really dark periods about Sept. 11. I think it's kind of like bullies. Bullies are just scared and thin-skinned, so they have to become bullies as a kind of survival tactic. I think comics are that way, too.\" Other films related to Sept. 11 are finding their way into theaters, onto television and on DVD. The documentary \"The Flight That Fought Back\" -- examining United Airlines Flight 93, whose passengers died in a crash after they foiled one of the terrorist attacks on Sept. 11 -- played in a handful of movie theaters in advance of its TV debut. \"Flight From Death: The Quest for Immortality,\" a documentary that includes a segment on how the Sept. 11 attacks wounded the American psyche, came out this week on DVD. \"Answering the Call: Ground Zero's Volunteers,\" a documentary about emergency personnel that mobilized on Sept. 11, is playing at memorial screenings this month in several cities. \"Protocols of Zion,\" which opens theatrically in October, looks at a surge in anti-Semitism that followed the Sept. 11 attacks."}, {"article_id": "435207957", "match_score": 92.7007299270073, "source": "Bucks County Courier Times (Levittown, PA)", "date": "February 26, 2005", "window_summary": "The archive window notes Robin Wright plays Forrest Gump’s love interest in the film Forrest Gump.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The TV listing repeats that Robin Wright (credited as playing Forrest's love interest) is part of the cast of Forrest Gump in a neutral, factual mention.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "life and becomes a Vietnam War hero, millionaire entrepreneur and witness to history. Sally Field co-stars as Forrest’s protective mother, Robin Wright plays his love interest, and Gary Sinise is his reluctant buddy. The film won six Academy Awards. The Shawshank Redemption", "newsbank_text": "Catch it tonight ''The People Next Door,'' 7 p.m., Lifetime A mother of three (Nicollette Sheridan) who's just fled her abusive husband finds instant friendship with her new neighbors (Tracy Ellis, Michael O'Keefe). They're a wealthy, childless couple who give generously of their time and money to help the struggling family. What she doesn't know is that they want something in return: her kids. Faye Dunaway also stars in this 1996 thriller. ''Forrest Gump,'' 8 p.m., ABC Tom Hanks stars in the feel-good blockbuster of 1994. Simple-minded Forrest (Hanks) takes a head-on approach to life and becomes a Vietnam War hero, millionaire entrepreneur and witness to history. Sally Field co-stars as Forrest's protective mother, Robin Wright plays his love interest, and Gary Sinise portrays his reluctant buddy. The film won six Academy Awards. Law & Order, 8 p.m., NBC Four pedestrians are gunned down on a sidewalk in ''All in the Family.'' Fontana and Green (Dennis Farina, Jesse L. Martin) discover one of the victims had ties to Russian organized crime and was helping the feds. The killers are found, but issues of jurisdiction and religion make things difficult for McCoy (Sam Waterston). Mercedes Ruehl guest stars. America's Most Wanted: America Fights Back, 9 p.m., Fox In the new episode ''Without a Trace Special Edition,'' the person being sought isn't wanted for a crime; she's the possible victim of one. A popular nursery-school teacher, she was enjoying a day at the shore, painting the scenery and having lunch, when she vanished. Host John Walsh travels to the scene of her disappearance and discloses the identity of a man who may have access to the solution for this mystery. ''Never Die Alone,'' 10 p.m., Cinemax Rapper DMX stars in this 2004 drama as King David, a drug dealer who's decided to reform, starting by repaying the money he owes to a crime boss. Things go wrong when his thugs come to collect, and David is mortally wounded. His story unfolds in flashbacks after a wannabe writer (David Arquette) comes into possession of his money and belongings, including a diary of sorts on audiotape. Copyright, 2005, Bucks County Courier Times"}, {"article_id": "113756674", "match_score": 92.63565891472868, "source": "San Juan Star, The (Puerto Rico)", "date": "August 18, 2005", "window_summary": "The excerpt credits Washington Post reporters Robin Wright and Ellen Knickmeyer with a scoop about the administration lowering expectations for Iraq, portraying Wright as a credited journalist.", "window_context": "career", "window_tone": "positive", "fulltext_summary": "The commentary references a Washington Post scoop by Robin Wright (with Ellen Knickmeyer) and presents her as a credited reporter breaking significant political news; the mention treats her as a reliable news source.", "fulltext_context": "career", "fulltext_tone": "positive", "archive_window": "Washington Post scoop Fol lowing Bush meet Namh his National Security team at his ranch in Crawford Texas the posts Robin Wright and Ellen Knickmeyer re ported that the administration is significantly lowering expectations of whal can be achieved in Iraq Lon", "newsbank_text": "Martin Schram Commentary T he new signs are, in a sense, positive. It appears that President Bush, Vice President Cheney, Defense Secretary Rumsfeld and Secretary of State Rice, et al., may have finally stopped conning themselves about their avalanche of misjudgments and self-deceptions that caused things to go so horribly wrong in Iraq. Any day now, they may stop conning us. The most hopeful sign appeared on Sunday in a Washington Post scoop following Bush's meeting with his national security team at his ranch in Crawford, Texas. The Post's Robin Wright and Ellen Knickmeyer reported that the administration is \"significantly lowering expectations\" of what can be achieved in Iraq. Long-silent, anonymous \"U. S. officials\" were now saying Team Bush no longer expects the toppling of Saddam Hussein will result in a model democracy, a self-supporting oil industry or a nation free from attacks by insurgents. Officials say they miscalculated the fervency of Iraq's factional divisions, the power of the insurgents and the ability of outside militants to fuel them. Bush officials thought rebuilding Iraq's electricity and water would be no problem. \"What we expected to achieve was never realistic given the timetable or what unfolded on the ground,\" according to \"a senior official involved in policy since the 2003 invasion\"quoted by the Post. \"We are in a process of absorbing the factors of the situation we're in and shedding the unreality that dominated at the beginning,\" the senior official is quoted as saying. Now, hopefully, this gang that was so clueless in getting us into the mess in Iraq - a policy failure with a price tag that includes the lost lives of 1,846 troops so far - will apply a new cold, clear candor to getting us out. The solution must start with a new essential bottom line. And it cannot be as simple as promptly pulling out the troops, the demand of many unthinking critics who warn about a Vietnamization of the Iraq war. Bush's new bottom line must be to get U.S. troops out of Iraq in a way that avoids forever a worst-case scenario that was once inconceivable, was always unacceptable, but is now no longer unimaginable: the Afghanization of Iraq. Which is to say that U.S. homeland security requires that Iraq cannot be allowed to disintegrate into an ungoverned non-nation composed of three factions (Shiites, Sunnis,Kurds) that break apart rather than coexist in compromised unity. That will only create the sort of vacuum that will become the new haven for global terrorists, just as Afghanistan was the haven for the al Qaeda terrorists, where they planned their attacks of Sept. 11, 2001. Meanwhile, when it comes to basics in Iraq, the Shiites, Sunnis and Kurds are not the only ones who cannot seem to get it together. Team Bush seems to be having similar problems of coherence and cohesion. One day, the top U.S. general in Iraq, Gen. George Casey, says that if things go well, \"substantial reductions\" in troops can be made next spring or summer. Other military officials put \"substantial\" in numerical terms - 20 percent or 25 percent of the 135,000 U.S. forces in Iraq. But then Bush declares:\"No decision has been made yet\" about troop-withdrawal possibilities. He adds:\"I know there's a lot of speculation and rumors about that.\" Meanwhile,Rumsfeld prods Iraqis to do more to stop infiltration of weapons and terrorists from Iran and Syria. But it was Bush officials who disbanded the Iraqi army that might have helped seal the borders. They've been trying to reconstitute an Iraqi army ever since. The United States hasn't had enough troops in Iraq to secure the outlying cities and towns,nor prevent infiltration of terrorists and bombs that are killing Iraqis and U.S. troops. That is why Sens. John McCain, R-Ariz., and Joseph Biden, D-Del., have courageously urged increases in U.S. troop levels. It is the key to protecting troops now at risk and the key to preparing for a prudent pullout. The unresolved question is whether Bush will have the fortitude to increase forces next year in the middle of the 2006 congressional elections - bad politics, but the best way to protect the military and salvage a bit of their mission. While an Afghanization of Iraq is unacceptable, Americans may wind up accepting an outcome that Bush had no clue 28 months ago might be a result of his zeal to topple Saddam: the Iranization of Iraq. Which is to say that Iraq will likely end up as an Islamic republic, as some experts predict. Iraq could even evolve into a radicalized, fundamentalist Islamic republic, one with close ties to Iran. The tragic irony is that this will leave the U.S. homeland and Americans traveling around the world with a security threat far more perilous than any Saddam ever posed. Copyright (c) 2005 The San Juan Star"}, {"article_id": "109968397", "match_score": 92.6086956521739, "source": "American Press (Lake Charles, LA)", "date": "May 26, 2005", "window_summary": "The excerpt names Robin Wright Penn among the ensemble cast of the HBO adaptation of Empire Falls.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full article about Paul Newman and the Empire Falls production lists Robin Wright Penn as one of the principal cast members, again without commentary on her performance.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "off to Florida with a senile priest other members of the cast include de Harris Philip Seymour Hoffman Helen Hunt Robin Wright Perm Aidan Quinn and new mans wife Joanne Wood Ward in a rare villainess role As the heiress who wields", "newsbank_text": "LOS ANGELES (AP) — \" I wish I was 79 again, \" quips Paul Newman, who turned 80 in January. He's far from being retired. His food company, Newman's Own, has donated $200 million in lifetime profits to charity. He supports the Hole in the Wall Camps, which provide outdoor vacations for terminally ill children (the name comes from the \" Butch Cassidy and the Sundance Kid \" hideout ). He owns an auto racing team that will compete this year in Australia, South Korea and Argentina. And, oh yes, Newman is still doing what he does best — acting. He appears on HBO on Saturday and Sunday in \" Empire Falls \" (8 p.m. CDT ), a film based on the Pulitzer Prize-winning novel by Richard Russo, who also wrote the script. Empire Falls, Maine, is a crumbling town that once thrived with clothing mills. The hangers-on comprise a rich mix of families whose secrets and failings provide the drama as well as some light touches. Newman plays Max Roby, the wily and irreverent patriarch of one of those families, whose unkempt beard is reputed to be littered with cracker crumbs. Newman gets fifth billing and disappears for a long stretch when Max runs off to Florida with a senile priest. Other members of the cast include Ed Harris, Philip Seymour Hoffman, Helen Hunt, Robin Wright Penn, Aidan Quinn — and Newman's wife, Joanne Woodward, in a rare villainess role as the heiress who wields malevolent power over some of the town's residents. Having also played an old-timer in the adaptation of another Russo novel, \" Nobody's Fool, \" Newman read \" Empire Falls \" with more than the usual interest. \" An extraordinary book, \" the actor said in an interview. \" I know there was a lot of interest in making like a two- hour film out of it, and I thought that would truncate all the values in it. It had to be done in a longer format. No major studio 1 wants to make a 3- hour, 3/2-hour film. \" HBO had no such qualms. As an executive producer, Newman helped line up the stellar cast, and he insisted that \" Empire Falls \" be shot in Maine. \" That's where it was set in the mind of Russo, and that's where we shot it, \" he said. \" We would have saved a little money by going to Canada, but I think the film would have suffered. And I think there's an obligation whenever it's possible that we should shoot here in the United States. \" One of the first Method actors to become a movie star, Newman is a stickler for realism. He grew a vagrant-style beard for the role of Max, but it didn't last long. \" Joanne made me shave the homeless part off first. Then she got the rest of it; I should really say while I was sleeping, \" he joked during a telephone chat from his home in Westport, Conn. \" She was not enamored with it. \" Copyright 2005, 2007, American Press. All Rights Reserved."}, {"article_id": "33983849", "match_score": 92.34042553191487, "source": "Associated Press News Service, The", "date": "April 8, 2005", "window_summary": "The excerpt is from a 'Today in History' / birthdays list and notes actress Robin Wright Penn is 39. It presents her age as part of a routine birthday listing.", "window_context": "personal_life", "window_tone": "neutral", "fulltext_summary": "The Associated Press 'Today' entry includes Robin Wright Penn in its Birthdays section, listing her age among other notable birthdays. The mention is factual and contains no evaluative or contextual information about her career or life beyond her age.", "fulltext_context": "personal_life", "fulltext_tone": "neutral", "archive_window": "Singer Julian Lennon is 42 Rock Singer musician Donita Sparks l7 is 42 rap per Biz Markie is 41 actress Robin Wright Penn is 39 actress Patricia Arquette is 37 Rock Singer Craig Honeycutt everything is 35 Rock musician Darren Jessee is", "newsbank_text": "Today is Friday, April 8, the 98th day of 2005. There are 267 days left in the year. Today's Highlight in History: On April 8, 1974, Hank Aaron of the Atlanta Braves hit his 715th career home run in a game against the Los Angeles Dodgers, breaking Babe Ruth's record. The round-tripper was off pitcher Al Downing. On this date: In 1513, explorer Juan Ponce de Leon claimed Florida for Spain. In 1935, the Works Progress Administration was approved by Congress. In 1946, the League of Nations assembled in Geneva for the last time. In 1952, President Truman seized the steel industry to avert a nationwide strike. In 1970, the Senate rejected President Nixon's nomination of G. Harold Carswell to the U.S. Supreme Court. In 1973, artist Pablo Picasso died at his home near Mougins, France, at age 91. In 1981, Gen. Omar N. Bradley died in New York at age 88. In 1990, Ryan White, the teenage AIDS patient whose battle for acceptance gained national attention, died in Indianapolis at age 18. In 1993, singer Marian Anderson died in Portland, Ore., at age 96. In 1994, Kurt Cobain, singer and guitarist for the grunge band Nirvana, was found dead in Seattle from an apparently self-inflicted gunshot wound; he was 27. Ten years ago: Former secretary of defense Robert S. McNamara, in an interview with AP Network News and Newsweek magazine to promote his memoirs, called America's Vietnam War policy ''terribly wrong.'' Five years ago: The Central Intelligence Agency confirmed that personnel action had been taken following the mistaken bombing of the Chinese embassy during the NATO war against Yugoslavia; one employee was reportedly fired. Actress Claire Trevor died in Newport Beach, Calif. One year ago: National security adviser Condoleezza Rice told the Sept. 11 commission ''there was no silver bullet'' that could have prevented the 2001 terrorist attacks. Iraqi insurgents released a videotape of three Japanese captives, threatening to burn them alive if Japan did not withdraw its troops from Iraq. (The hostages were later released unharmed.) Fred Olivi, who copiloted the plane that dropped the atomic bomb on Nagasaki, died in Lemont, Ill., at age 82. Today's Birthdays: Former first lady Betty Ford is 87. Comedian Shecky Greene is 79. Investigative reporter Seymour Hersh is 68. Basketball Hall-of-Famer John Havlicek is 65. Singer J.J. Jackson is 64. Singer Peggy Lennon (The Lennon Sisters) is 64. Songwriter-producer Leon Huff is 63. Actor Hywel Bennett is 61. Actor Stuart Pankin is 59. Rock musician Steve Howe (Yes) is 58. Rock musician Mel Schacher (Grand Funk Railroad) is 54. Baseball Hall- of-Famer Gary Carter is 51. Actor John Schneider is 45. Rock musician Izzy Stradlin is 43. Singer Julian Lennon is 42. Rock singer-musician Donita Sparks (L7) is 42. Rapper Biz Markie is 41. Actress Robin Wright Penn is 39. Actress Patricia Arquette is 37. Rock singer Craig Honeycutt (Everything) is 35. Rock musician Darren Jessee is 34. Actor Taran Noah Smith is 21. Actress Kirsten Storms is 21. Thought for Today: ''A highbrow is a person educated beyond his intelligence.'' - James Brander Matthews, American author and educator (1852-1929). Copyright (c) 2005 The Associated Press All Rights Reserved"}, {"article_id": "35922986", "match_score": 92.10526315789474, "source": "American Press (Lake Charles, LA)", "date": "May 26, 2005", "window_summary": "The excerpt lists Robin Wright Penn among the ensemble cast of the HBO adaptation Empire Falls. She is named alongside other actors as part of the film's cast roster.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The AP piece on Paul Newman and the Empire Falls production names Robin Wright Penn among the several notable cast members. The art e of her estranged dad, a golf-club magnate (Johnny Knoxville). \"Dear Wendy\": A pacifist youth (Jamie Bell) is unaccountably smitten with a vintage handgun he finds. Bill Pullman co-stars. \"Going Shopping\": Director Henry Jaglom (\"Eating\") has a go at consumer addiction in this domestic tale starring Victoria Foyt, Lee Grant and Rob Morrow. \"The Greatest Game Ever Played\": A young amateur (Shia LaBeouf) shocks the golfing world in an upset of the British champ in 1913. Actor Bill Paxton directs. \"Green Street Hooligans\": An expelled Harvard student (Elijah Wood) moves to London, where he's caught up in the menacing madness of soccer. \"Into the Blue\": Divers hunting for treasure on a sunken ship find danger instead. With Jessica Alba and Paul Walker. \"Little Manhattan\": A Woody Allen-style romance centers on the joys and pangs of first love for two 11-year-olds. With Cynthia Nixon and Bradley Whitford. \"Mirrormask\": The Jim Henson Co. works its visual magic in a tale of a teenage girl whisked to a fantasy land controlled by a scheming queen. \"Oliver Twist\": Roman Polanski updates Dickens' tale of an orphan's misadventures among rascals and pickpockets. Ben Kingsley plays the sinister Fagin. \"One Bright Shining Moment\": The Forgotten Summer of George McGovern:\" A documentary chronicling the Democrat's failed 1972 presidential bid against Richard Nixon. \"The Outsiders: The Complete Novel\": Francis Ford Coppola expands his 1983 coming-of-age drama with an extra 22 minutes of footage. \"The Prize Winner of Defiance, Ohio\": A mother of 10 (Julianne Moore) helps pay the bills by entering 1950s musical jingle contests. Woody Harrelson co-stars. \"Separate Lies\": The lives of a married couple (Emily Watson and Tom Wilkinson) are turned upside-down by the arrival of another man (Rupert Everett). \"Serenity\": Joss Whedon resurrects his failed TV show \"Firefly\" with this sci-fi tale of a vagabond spaceship carrying two mysterious passengers. \"Sueno\": A Mexican singer (John Leguizamo) lands in a love triangle and a latino music competition in los angeles. \"The War Within\": Wrongly interrogated as a terrorism suspect, a Pakistani student seeks revenge and joins a terrorist cell in New York City. October \"Domino\": Keira Knightley plays the bounty-hunting daughter of actor Laurence Harvey in an action thriller directed by Tony Scott. \"Doom\": The Rock leads a team of futuristic Marines against deadly creatures on Mars in this adaptation of the video game. \"Dreamer\": A fired equestrian trainer (Kurt Russell) and his daughter (Dakota Fanning) nurse an injured racehorse back to health. \"Elizabethtown\": Romance is in the air during a Southern patriarch's funeral. Kirsten Dunst and Orlando Bloom star, Cameron Crowe directs. \"The Fog\": Vengeful ghosts from a shipwreck terrorize a town in this remake of the 1980 horror tale. With Tom Welling and Selma Blair. \"Good Night, and Good Luck\": George Clooney directs and co-stars in the story of newsman Edward R. Murrow (David Strathairn) as he battles the communist witch hunt. \"The Gospel\": An R&B star (Boris Kodjoe) tries to reconcile with his ailing father, the bishop of their hometown church. Nona Gaye co-stars. \"In Her Shoes\": Estranged sisters (Cameron Diaz and Toni Collette) reconnect with help from a mystery grandma (Shirley MacLaine). Curtis Hanson directs. \"Innocent Voices\": An 11-year-old boy in 1980s El Salvador balances childhood and adult issues as he faces automatic army conscription on his 12th birthday. \"Kiss Kiss, Bang Bang\": Robbery gone awry gives a thief (Robert Downey Jr.) a movie audition and a lesson in sleuthing with a detective (Val Kilmer). \"The Legend of Zorro\": The masked swordsman (Antonio Banderas) and his wife (Catherine Zeta-Jones) are back in action in this swashbuckling sequel. \"Loggerheads\": Interlocking stories trace the melancholy history of a boy's adoption. With Bonnie Hunt, Tess Harper and Kip Pardue. \"Nine Lives\": Crises of nine disparate women are examined. With Holly Hunter, Glenn Close, Sissy Spacek and Robin Wright Penn. \"North Country\": A single mother (Charlize Theron) leads a sexual-harassment crusade on behalf of female co- workers at a mining company. \"Paradise Now\": Palestinian best friends face crisis when they are tapped to carry out a suicide attack in Tel Aviv. \"Prime\": A thirty-something divorcee (Uma Thurman) takes up with a young painter. Meryl Streep co-stars. \"Protocols of Zion\": Documentary filmmaker Marc Levin examines a backlash of anti-Semitism that followed the Sept. 11 attacks. \"Saw II\": A cop (Donnie Wahlberg) discovers that a maniacal serial killer is back in business in the follow-up to last year's horror hit. \"Shopgirl\": A Saks clerk (Claire Danes) is wooed by an older man (Steve Martin) and a younger suitor (Jason Schwartzman). Based on Martin's novella. \"The Squid and The Whale\": Marriage and parenthood are on the rocks between two Brooklyn writers (Jeff Daniels and Laura Linney). \"Stay\": A psychiatrist races to prevent a patient from making good on a threat to commit suicide. With Ewan McGregor and Naomi Watts. \"Two for the Money\": Al Pacino, Rene Russo and Matthew McConaughey star in the tale of an ex-athlete who enters the high-rolling sports gambling world. \"Wallace & Gromit: The Curse of the Were-Rabbit\": Britain's favorite cheese-lover and his loyal dog square off against a monster bunny in this clay-animated comedy. \"The Weather Man\": A local weather guy (Nicolas Cage) wins a national TV audition but faces storm clouds in his personal life. Michael Caine co-stars. \"Where the Truth Lies\": A reporter (Alison Lohman) probes the dark secrets behind the breakup of a musical- comedy duo (Kevin Bacon and Colin Firth). Atom Egoyan directs. November \"Bee Season\": An overlooked daughter is thrown into the limelight when she becomes a spelling champ. With Richard Gere and Juliette Binoche. \"Breakfast on Pluto\": A cross-dressing Irish misfit (Cillian Murphy) hunts for the mother who abandoned him as a baby. Neil Jordan directs, Liam Neeson co-stars. \"Chicken Little\": The sky is really, really falling in an animated tale of the chick who cried wolf. Zach Braff heads the voice cast. \"Derailed\": Business execs having an affair (Jennifer Aniston and Clive Owen) square off against a blackmailer. \"Dying for Dolly\": A club DJ (Usher) falls for the daughter of the crime boss (Chazz Palminteri) whose life he saved. \"The Dying Gaul\": A writer (Peter Sarsgaard) lands in a bizarre triangle with a studio exec (Campbell Scott) and his wife (Patricia Clarkson). \"Ellie Parker\": A wannabe actress (Naomi Watts) gallops through auditions and disappointments in Hollywood. With Chevy Chase. \"The Family Stone\": A Manhattan career woman (Sarah Jessica Parker) gets a cold reception from his fiance's family. With Diane Keaton, Luke Wilson. \"The Ice Harvest\": Yuletide turns dicey for an embezzler (John Cusack) stuck in Wichita on Christmas Eve. Billy Bob Thornton co-stars, Harold Ramis directs. \"I Love Your Work\": A movie star (Giovanni Ribisi) struggles with the frenzy of celebrity. Actor Adam Goldberg directs. \"Jarhead\": A third-generation Marine (Jake Gyllenhaal) joins a sniper platoon in the Gulf War. Jamie Foxx co-stars, Sam Mendes directs. \"Just Friends\": A music-business hotshot (Ryan Reynolds) is reunited with his old high school dream girl. With Anna Faris and Amy Smart. \"The Matador\": A hit man (Pierce Brosnan) and a traveling salesman (Greg Kinnear) pal around after meeting at a Mexican bar. \"The New World\": Cultures collide in director Terrence Malick's drama of colonial days starring Colin Farrell as John Smith and Q'orianka Kilcher as Pocahantas. \"New York Doll\": After alcoholism and a broken marriage, bassist Arthur Kane is reunited with his old band - '70s punk pioneers the New York Dolls. \"Pride & Prejudice\": Keira Knightley stars in Jane Austen's classic of love and class warfare in 18th century Britain. With Donald Sutherland and Brenda Blethyn. \"Pulse\": Kiyoshi Kurosawa's 2001 Japanese horror tale, about ghostly apparitions terrorizing Tokyo, gets a belated U.S. release. \"Sarah Silverman\": Jesus Is Magic\": AIDS, Sept. 11 and the Holocaust are grist for the standup comic in this adaptation of her stage show. \"Syriana\": George Clooney's an ex-CIA guy and Matt Damon's an oil exec in this political thriller with a \"Traffic\"-like ensemble cast. \"Tristram Shandy: A Cock And Bull Story\": Filmmaker Michael Winterbottom adapts Laurence Sterne's classic comic novel. Steve Coogan stars. \"The White Countess\": Ralph Fiennes stars in a tale of decadence and redemption in 1930s Shanghai. From director James Ivory and his late producing partner Ismail Merchant. \"Wolf Creek\": Three stranded backpackers encounter terror at the hands of a local on a trip in the Australian Outback. \"Yours, Mine and Ours\": Single parents (Dennis Quaid and Rene Russo) with 18 children between them plan to marry in this remake of the Henry Fonda-Lucille Ball comedy. \"Zathura\": Two young brothers discover a game that transports them into an interstellar adventure. Actor Jon Favreau directs. December \"Be Here to Love Me: A Film About Townes Van Zandt\": This documentary portrait of the late singer-songwriter features Willie Nelson, Lyle Lovett and Steve Earle. \"Brokeback Mountain\": Cowboy lovers (Heath Ledger and Jake Gyllenhaal) maintain their secret bond through marriage and fatherhood. \"Casanova\": The legendary womanizer (Heath Ledger) chases the one woman (Sienna Miller) who has rejected him. Lasse Hallstrom directs. \"Freedomland\": Samuel L. Jackson and Julianne Moore star in a crime thriller centering on a carjacking and a missing child. \"Fun With Dick and Jane\": A couple (Jim Carrey and Tea Leoni) turns to thievery after hard times strike in this remake of the 1970s romp. \"Hard Candy\": A thirty-something fashion photographer gets more than he bargained for when he hooks up with a teenage woman on the Internet. \"Hidden\": A couple (Juliette Binoche and Daniel Auteuil) are harassed by a video stalker sending disturbing tapes of their domestic life. \"The Kid & I\": A washed-up actor (Tom Arnold) learns his comeback project isn't what it seemed. Arnold Schwarzenegger makes a cameo appearance. \"The Libertine\": Johnny Depp lives out the wanton life of the scandalous 17th century Earl of Rochester. With John Malkovich and Samantha Morton. \"Match Point\": Woody Allen spins a drama of an Irish tennis pro (Jonathan Rhys-Meyers) whose cozy life is jeopardized by a fling with an actress (Scarlett Johansson). \"Mrs. Henderson Presents\": A society dame (Judi Dench) starts a nude revue in prewar London. With Bob Hoskins. \"Munich\": Steven Spielberg directs a thriller about agents pursuing Palestinians suspected of plotting the deaths of 11 Israeli athletes at the 1972 Olympics. \"The Producers\": Nathan Lane and Matthew Broderick reprise their stage roles in the new movie version of Mel Brooks' musical comedy of theater con men. \"The Ringer\": A slimeball (Johnny Knoxville) finds unlikely allies when he masquerades among mentally disabled to compete in the Special Olympics. \"Rumor Has It\": An obituary writer (Jennifer Aniston) learns her family may have inspired the film and book \"The Graduate.\" Kevin Costner co-stars, Rob Reiner directs. \"Transamerica\": A transsexual woman and a teen runaway take a cross-country road trip. With Felicity Huffman. Copyright, 2005, The Daily Herald, Everett, WA. All Rights Reserved."}, {"article_id": "278582105", "match_score": 91.66666666666666, "source": "York Dispatch, The (PA)", "date": "February 9, 2005", "window_summary": "The archive snippet identifies Hopper Jack's parents as Sean Penn and Robin Wright Penn and notes the couple also have a daughter, Dylan.", "window_context": "family", "window_tone": "neutral", "fulltext_summary": "The full Q&A confirms that Hopper Jack's parents are Sean Penn and Robin Wright Penn, gives Hopper Jack's birthdate, mentions their daughter Dylan Francis Penn, and notes Sean and Robin's marriage date.", "fulltext_context": "family", "fulltext_tone": "neutral", "archive_window": "Dennis Hopper and Jack Nicholson. Who Are Hopper Jack s parents a a j., Foxboro mass. A Sean Penn and Robin Wright Penn. Hopper Jack was Dom on aug. 6, 1993. The couple also Nave a daughter Dylan Francis Penn who was", "newsbank_text": "Q: When and where was one of my favorite actors, Kevin Bacon, born? -- A.H., Portland, Ore. A: He was born in Philadelphia, Pa., on July 8, 1958. Q: Where was Mario Andretti born? -- L.V., Toledo, Ohio A: Race car driver Mario Gabriele Andretti was born in Montona, Italy, on Feb. 28, 1940. Q: I once heard that many referees in sports use an Acme whistle. What is it? Where is it made? -- R.L., Mitchell, S.D. A: The whistle is an Acme Thunderer and has been manufactured by J. Hudson and Co. of Birmingham, England, since 1884. Q: When was the premiere of George Gershwin's \"Rhapsody in Blue\"? -- S.P., Mesa, Ariz. A: One of the most beloved pieces of music ever written, \"Rhapsody\" was first performed in the Aeolian Concert Hall on 43rd Street in Manhattan on Feb. 12, 1924. Gershwin was at the piano during the presentation. Q: I saw an oil painting in which the word \"impasto\" was used to describe the painting technique. What is impasto? - - E.J., Hastings, Neb. A: It's a technique in which the paint is thickly applied. Q: How long has the parking meter been around? Which city was the first to install a meter? -- I.J., Andrews, Md. A: Giving credit (or blame) for the parking meter to Carlton Magee of Oklahoma City is sometimes disputed, but he is generally considered to be the inventor of the device. In 1935, Oklahoma City became the first city to install the parking meter. Q: Who was America's first millionaire? -- O.C., Elk, Calif. A: When Elias Haskett Derby died on Sept. 8, 1799, he left an estate of $1,000,000, the largest single fortune in New England, if not the whole country. Derby was born in Salem, Mass., in 1739. He worked for his father in an import business and took over the operation after his father's death. Derby greatly increased trade with England and the West Indies, adding to the company's growth and his personal fortune. Q: A long time ago I came across a word that described someone who hates tobacco smoke. By any chance do you know of such a word? -- P.D., Waycross, Ga. A: There are those who do not like tobacco smoke and there are those who really, really hate tobacco smoke. Those folks are called misocapnists. The word comes from the Greek words misos (\"hatred\") and kapnos (\"smoke\"). Q: I have a baseball question for you. What were the most runs scored in a single World Series game? -- J.T., Norfolk, Va. A: In Game 2 of the 1936 World Series, the New York Yankees scored 18 runs on 17 hits against cross-town rivals the New York Giants, who scored four runs. The game was played on Oct. 2 in the Polo Grounds. The \"Bronx Bombers\" would go on to win the series in six games. By the way, this was the first series game the Yankees played without Babe Ruth. Q: A Hollywood couple named their son Hopper Jack, after Dennis Hopper and Jack Nicholson. Who are Hopper Jack's parents? -- A.J., Foxboro, Mass. A: Sean Penn and Robin Wright Penn. Hopper Jack was born on Aug. 6, 1993. The couple also have a daughter, Dylan Francis Penn, who was born on April 13, 1991. Sean and Robin were married on April 27, 1996. Q: Do you have any idea what percentage of a tomato is water? -- G.H., Batesville, Mich. A: The experts say the average red tomato is up to 95 percent water. (c) 2005 The York Dispatch. All rights reserved. Reproduced with the permission of Media NewsGroup, Inc. by NewsBank, Inc."}, {"article_id": "113755106", "match_score": 91.63179916317992, "source": "Texarkana Gazette (TX)", "date": "May 26, 2005", "window_summary": "The excerpt quotes 'The Washington Post's Robin Wright' as the reporter who received a remark from Margaret Tutwiler, portraying her in a journalistic role rather than as the actress.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The opinion piece cites 'The Washington Post's Robin Wright' as the journalist to whom Tutwiler spoke, presenting Wright as a reporter referenced for sourcing rather than commenting on the actress Robin Wright Penn.", "fulltext_context": "career", "fulltext_tone": "neutral", "archive_window": "be seriously prioritized on an equal level with an air Craft a frustrated Tutwiler told the washing ton posts mu1mm Robin Wright Schmo upon leaving Hughes has one thing that is essential for someone with a big title but Little staff Little", "newsbank_text": "It's high time that we say a good word about the crucial job that is being done by President Bush's best international policymaking appointment-his designee to mobilize U.S. efforts to win hearts and minds in the Muslim world, Undersecretary of State for Public Diplomacy Karen Hughes. There is only one thing that is stopping us today from saying a good word about the job she's done since her appointment was announced with due fanfare March 15-she hasn't started doing it yet and won't begin until this fall. This is not just an opportunity missed, but a crisis-management opportunity missed. Because America's reputation in the Muslim world is in critical shape and getting worse. And America's public diplomacy has been a nonfunctional disaster, woefully underfunded and understaffed. The last undersecretary, Margaret Tutwiler, quit last year to join the private sector-the job went inexplicably unfilled since. \"The activities associated with public diplomacy need to be seriously prioritized on an equal level with an aircraft carrier,\" a frustrated Tutwiler told The Washington Post's Robin Wright upon leaving. Hughes has one thing that is essential for someone with a big title but little staff, little funding and little line authority: She has big-time clout-access to her pal, the president, anytime she needs it. Bureaucrats fear and will respond to that-because what they do best is cover their own aspirations. In hailing Hughes' appointment in March, Vice President Cheney conceded to The Washington Post that public diplomacy \"has been a very weak part of our arsenal.\" Indeed. A Government Accountability Office report warned last month that \"recent polling data show that anti-Americanism is spreading and deepening around the world. ... Such anti-American sentiments can increase foreign public support for terrorism directed at Americans, impact the cost and effectiveness of military operations, weaken the United States' ability to align with other nations in pursuit of common policy objectives, and dampen foreign publics' enthusiasm for U.S. business services and products.\" While President Bush points with pride to having brought democracy to Afghanistan and Iraq, this is not the message that dominates the daily news in that region. The daily drumbeat of news in the Muslim world has long been about painful truths caught on film: Photos of U.S. military guards sadistically abusing detainees at Iraq's Abu Graib prison (piling naked prisoners atop one another, et al.). Then came those Guantanamo reports not caught on tape but verified officially-abuses of terrorist suspects in sadistic ways that seem cut from tales we used to tell about our enemies in World War II. And accounts, for two years, of U.S. guards abusing Islam's holy Koran in various ways. Then came Newsweek's blunder-reported, retracted-that the U.S. military was \"expected\" to confirm that a Guantanamo guard flushed pages of a copy of the Koran down a toilet. News 101 taught us to never try to predict official actions as news. Still, the U.S. military issued orders more than a year ago that guards must treat the Koran respectfully. Something surely occurred to prompt that military order. Predictably, Bush officials hammered at Newsweek's blunder. Predictably, a new official blunder surfaced: Official photos were taken and sold of Saddam Hussein in his briefs. Viewed in the continuum of the television and print news, the world sees only that lowlevel grunts are punished for these abuses but top-level generals get a wink-and-a-nod-anda-free pass-even though official investigations found they failed to swiftly halt them. And top officials who set the tone that begat the policy that begat the unconscionable abuses also get free passes. No wonder Uncle Sam's image in the Mideast has plunged to fathoms that once seemed unfathomable. Meanwhile, as we await the belated arrival of the undersecretary for public diplomacy, we must recognize that even the best spin doctor cannot be a miracle worker. So our first advice to help the savvy Hughes do her job (when she gets to it) is not directed at the spin-doctor-designate but those top dogs who set the tone that became horribly discordant. It can best be told by tweaking an old vaudeville doctor-patient joke to fit the tumult of our times: Uncle Sam, in great pain, visits his spin doctor. He bends his arm this way and that. Uncle Sam: \"Spin Doctor, it hurts when I do this-what can I do?\" Spin Doctor: \"Don't do that.\" Copyright 2005, 2012, Texarkana Gazette."}, {"article_id": "329105937", "match_score": 91.4027149321267, "source": "American Press (Lake Charles, LA)", "date": "December 1, 2005", "window_summary": "The archive snippet refers to Robin Wright Penn portraying a married woman thrown into turmoil by a chance encounter with an old lover in the film Nine Lives.", "window_context": "career", "window_tone": "neutral", "fulltext_summary": "The full article (Independent Spirit Awards coverage) names Robin Wright Penn as a supporting-actress nominee for Nine Lives, describing her role as a married woman upended by a reunion with a former lover and thereby recognizing her performance.", "fulltext_context": "career", "fulltext_tone": "positive", "archive_window": "As a wife stung by revelations her husband is carrying on with another Man in Quot Brok Eback Mountain and Robin Wright Penn As a married woman thrown into turmoil by a Chance encounter with an old Lover in a nine joining", "newsbank_text": "LOS ANGELES ( AP ) — The divorce tale “ The Squid and the Whale ” led contenders Tuesday for the Independent Spirit Awards with six nomi - nations , including best - pic - ture and honors for director Noah Baumbach and actors Jeff Daniels and Laura Linney . The other best - picture nom - inees were the cowboy tales “ Brokeback Mountain ” and “ The Three Burials of Melquiades Estrada ” and the film biographies “ Capote ” and “ Good Night , and Good Luck . ” Those four movies all had four nominations each for the awards , which honor films whose financing comes at least partly from independent sources outside the Hollywood studio system . Daniels was nominated for lead actor and Linney for lead actress as parents going through a caustic divorce in “ The Squid and the Whale , ” inspired by writer - director Baumbach ' s own parents ' breakup in the 1980 s . Jesse Eisenberg scored a supporting - actor nomination as Daniels and Linney ' s son , while Baumbach was nomi - nated for directing and his screenplay . Other lead - actor nominees were Philip Seymour Hoffman as Truman Capote in “ Capote , ” a chronicle of the author ' s years creating the true - crime novel “ In Cold Blood ” ; Terrence Howard as a pimp and drug dealer trying to build a rap career in “ Hustle & Flow ” ; Heath Ledger as a family man carry - ing on a gay affair with an old ranch buddy in “ Brokeback Mountain ” ; and David Strathairn as Edward R . Murrow in “ Good Night , and Good Luck , ” an account of the newsman ' s battle against the communist witch hunt in the 1950 s . Also among lead - actress contenders were Felicity Huffman in a gender - bending role in “ Transamerica ,
