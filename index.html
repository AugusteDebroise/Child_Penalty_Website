<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Child Penalty Research</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,.12);
    padding: 40px 48px;
    width: 340px;
    text-align: center;
  }
  h1 { font-size: 18px; color: #343a40; margin-bottom: 8px; }
  p  { font-size: 13px; color: #6c757d; margin-bottom: 28px; }
  input[type="password"] {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #ced4da;
    border-radius: 6px;
    font-size: 15px;
    margin-bottom: 14px;
    outline: none;
    transition: border-color .2s;
  }
  input[type="password"]:focus { border-color: #343a40; }
  button {
    width: 100%;
    padding: 10px;
    background: #343a40;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    transition: background .2s;
  }
  button:hover { background: #23272b; }
  .error { color: #dc3545; font-size: 13px; margin-top: 10px; display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>Child Penalty Research</h1>
  <p>Enter the password to access the data viewer.</p>
  <input type="password" id="pwd" placeholder="Password" onkeydown="if(event.key==='Enter') login()">
  <button onclick="login()">Enter</button>
  <div class="error" id="err">Incorrect password.</div>
</div>
<script>
  function login() {
    if (document.getElementById('pwd').value === 'hollywood') {
      sessionStorage.setItem('auth', '1');
      window.location.href = 'robin_wright_viewer.html';
    } else {
      const err = document.getElementById('err');
      err.style.display = 'block';
      setTimeout(() => err.style.display = 'none', 2000);
    }
  }
</script>
</body>
</html>
